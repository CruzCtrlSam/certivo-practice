rue}, {"label": "C", "text": "Backdating", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "Replacing with existing values for commission = churning.", "id": "en-s3-q30", "topic": "Texas Law", "globalNumber": 130}, {"simulator": 3, "number": 31, "stem": "The producer acting as the “first underwriter,” gathering and verifying information, performs:", "options": [{"label": "A", "text": "Adverse selection", "correct": false}, {"label": "B", "text": "Field underwriting", "correct": true}, {"label": "C", "text": "Commingling", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "The agent as first evaluator = field underwriting.", "id": "en-s3-q31", "topic": "General", "globalNumber": 131}, {"simulator": 3, "number": 32, "stem": "A pair of partners wants funds when the first of them dies to fund a buy-sell agreement. Best suited is:", "options": [{"label": "A", "text": "Survivorship (second-to-die)", "correct": false}, {"label": "B", "text": "Joint life (first-to-die)", "correct": true}, {"label": "C", "text": "Individual decreasing term", "correct": false}, {"label": "D", "text": "Immediate annuity", "correct": false}], "explanation": "Funds at the first death between partners = joint life (first-to-die).", "id": "en-s3-q32", "topic": "Retirement", "globalNumber": 132}, {"simulator": 3, "number": 33, "stem": "The interest earned on dividends left to accumulate with the insurer is:", "options": [{"label": "A", "text": "Non-taxable", "correct": false}, {"label": "B", "text": "Taxable", "correct": true}, {"label": "C", "text": "Deductible", "correct": false}, {"label": "D", "text": "A return of premium", "correct": false}], "explanation": "The interest on accumulated dividends is taxable.", "id": "en-s3-q33", "topic": "Annuities", "globalNumber": 133}, {"simulator": 3, "number": 34, "stem": "In Texas, the regulation of insurance falls mainly to:", "options": [{"label": "A", "text": "The federal government", "correct": false}, {"label": "B", "text": "The states (McCarran-Ferguson)", "correct": true}, {"label": "C", "text": "The SEC", "correct": false}, {"label": "D", "text": "FINRA", "correct": false}], "explanation": "State regulation (McCarran-Ferguson).", "id": "en-s3-q34", "topic": "General", "globalNumber": 134}, {"simulator": 3, "number": 35, "stem": "Which risk classification receives the lowest premium?", "options": [{"label": "A", "text": "Declined", "correct": false}, {"label": "B", "text": "Substandard", "correct": false}, {"label": "C", "text": "Standard", "correct": false}, {"label": "D", "text": "Preferred", "correct": true}], "explanation": "Preferred receives the lowest premium.", "id": "en-s3-q35", "topic": "Texas Law", "globalNumber": 135}, {"simulator": 3, "number": 36, "stem": "An employee leaves their job and wants to move their 401(k) to an IRA without the 20% withholding. They should use:", "options": [{"label": "A", "text": "An indirect 60-day rollover", "correct": false}, {"label": "B", "text": "A direct (trustee-to-trustee) transfer", "correct": true}, {"label": "C", "text": "A cash withdrawal", "correct": false}, {"label": "D", "text": "A loan", "correct": false}], "explanation": "No 20% withholding = direct transfer.", "id": "en-s3-q36", "topic": "Taxation", "globalNumber": 136}, {"simulator": 3, "number": 37, "stem": "The lump-sum death benefit paid at death is income-tax-free, but it is included in the estate if the insured:", "options": [{"label": "A", "text": "Was under 65", "correct": false}, {"label": "B", "text": "Had incidents of ownership", "correct": true}, {"label": "C", "text": "Paid annual premiums", "correct": false}, {"label": "D", "text": "Lived in Texas", "correct": false}], "explanation": "Included in the estate if they had incidents of ownership.", "id": "en-s3-q37", "topic": "Annuities", "globalNumber": 137}, {"simulator": 3, "number": 38, "stem": "A “life only” annuity leaves beneficiaries, at the annuitant’s death:", "options": [{"label": "A", "text": "The entire remaining balance", "correct": false}, {"label": "B", "text": "Nothing (payments cease)", "correct": true}, {"label": "C", "text": "Half", "correct": false}, {"label": "D", "text": "A refund of premiums", "correct": false}], "explanation": "Life only: at the annuitant’s death, nothing to beneficiaries.", "id": "en-s3-q38", "topic": "General", "globalNumber": 138}, {"simulator": 3, "number": 39, "stem": "The conditional receipt pays the benefit if the applicant dies before issue and:", "options": [{"label": "A", "text": "Paid double the premium", "correct": false}, {"label": "B", "text": "Was insurable under normal underwriting", "correct": true}, {"label": "C", "text": "Had an irrevocable beneficiary", "correct": false}, {"label": "D", "text": "Lived outside Texas", "correct": false}], "explanation": "Conditional receipt: pays if they were insurable.", "id": "en-s3-q39", "topic": "Taxation", "globalNumber": 139}, {"simulator": 3, "number": 40, "stem": "Contributions to a qualified plan are:", "options": [{"label": "A", "text": "After-tax (not deductible)", "correct": false}, {"label": "B", "text": "Pre-tax (deductible)", "correct": true}, {"label": "C", "text": "Always Roth", "correct": false}, {"label": "D", "text": "Not permitted", "correct": false}], "explanation": "Qualified plan: contributions are pre-tax (deductible).", "id": "en-s3-q40", "topic": "General", "globalNumber": 140}, {"simulator": 3, "number": 41, "stem": "Which document must be given to the consumer to compare life policies?", "options": [{"label": "A", "text": "The agent’s report", "correct": false}, {"label": "B", "text": "The buyer’s guide and the policy summary", "correct": true}, {"label": "C", "text": "The MIB", "correct": false}, {"label": "D", "text": "The APS", "correct": false}], "explanation": "To compare: buyer’s guide + policy summary.", "id": "en-s3-q41", "topic": "General", "globalNumber": 141}, {"simulator": 3, "number": 42, "stem": "Under a “per capita” designation, if a beneficiary dies before the insured, their share:", "options": [{"label": "A", "text": "Passes to their descendants", "correct": false}, {"label": "B", "text": "Is divided among the surviving beneficiaries", "correct": true}, {"label": "C", "text": "Goes to the deceased beneficiary’s estate", "correct": false}, {"label": "D", "text": "Is lost to all", "correct": false}], "explanation": "Per capita: the share is divided among survivors.", "id": "en-s3-q42", "topic": "General", "globalNumber": 142}, {"simulator": 3, "number": 43, "stem": "The grace period for an ordinary life policy in Texas is:", "options": [{"label": "A", "text": "7 days", "correct": false}, {"label": "B", "text": "10 days", "correct": false}, {"label": "C", "text": "31 days", "correct": true}, {"label": "D", "text": "90 days", "correct": false}], "explanation": "Texas life grace period = 31 days.", "id": "en-s3-q43", "topic": "Texas Law", "globalNumber": 143}, {"simulator": 3, "number": 44, "stem": "Which rider allows buying additional coverage on future dates without proving good health?", "options": [{"label": "A", "text": "Waiver of premium", "correct": false}, {"label": "B", "text": "Guaranteed Insurability", "correct": true}, {"label": "C", "text": "Accidental Death Benefit", "correct": false}, {"label": "D", "text": "Return of Premium", "correct": false}], "explanation": "Buying more coverage without exam = Guaranteed Insurability.", "id": "en-s3-q44", "topic": "General", "globalNumber": 144}, {"simulator": 3, "number": 45, "stem": "An insurer may not decline an application based solely on:", "options": [{"label": "A", "text": "The medical exam", "correct": false}, {"label": "B", "text": "The coded MIB information", "correct": true}, {"label": "C", "text": "Part II of the application", "correct": false}, {"label": "D", "text": "The APS", "correct": false}], "explanation": "Do not decline solely on the MIB.", "id": "en-s3-q45", "topic": "Retirement", "globalNumber": 145}, {"simulator": 3, "number": 46, "stem": "The SIMPLE IRA is available to employers with a maximum of:", "options": [{"label": "A", "text": "10 employees", "correct": false}, {"label": "B", "text": "50 employees", "correct": false}, {"label": "C", "text": "100 employees", "correct": true}, {"label": "D", "text": "500 employees", "correct": false}], "explanation": "SIMPLE IRA: up to 100 employees.", "id": "en-s3-q46", "topic": "General", "globalNumber": 146}, {"simulator": 3, "number": 47, "stem": "Which contract characteristic means only the insurer makes a legally enforceable promise?", "options": [{"label": "A", "text": "Aleatory", "correct": false}, {"label": "B", "text": "Unilateral", "correct": true}, {"label": "C", "text": "Adhesion", "correct": false}, {"label": "D", "text": "Conditional", "correct": false}], "explanation": "Only the insurer promises = unilateral.", "id": "en-s3-q47", "topic": "General", "globalNumber": 147}, {"simulator": 3, "number": 48, "stem": "Under the common disaster clause (Uniform Simultaneous Death Act), if the insured and primary beneficiary die together with no known order:", "options": [{"label": "A", "text": "The beneficiary’s estate collects", "correct": false}, {"label": "B", "text": "The insured is presumed to have survived, and the contingent collects", "correct": true}, {"label": "C", "text": "Nothing is paid", "correct": false}, {"label": "D", "text": "The insurer collects", "correct": false}], "explanation": "The insured is presumed to have survived → the contingent collects.", "id": "en-s3-q48", "topic": "General", "globalNumber": 148}, {"simulator": 3, "number": 49, "stem": "Which retirement plan receives contributions from both employee and employer, for small businesses?", "options": [{"label": "A", "text": "SEP IRA", "correct": false}, {"label": "B", "text": "SIMPLE IRA", "correct": true}, {"label": "C", "text": "DB pension", "correct": false}, {"label": "D", "text": "Keogh only", "correct": false}], "explanation": "Employee + employer, small business = SIMPLE IRA.", "id": "en-s3-q49", "topic": "Retirement", "globalNumber": 149}, {"simulator": 3, "number": 50, "stem": "In Texas, an agent is prohibited from using as a sales argument:", "options": [{"label": "A", "text": "The policy’s features", "correct": false}, {"label": "B", "text": "The existence of the Guaranty Association", "correct": true}, {"label": "C", "text": "The insurer’s name", "correct": false}, {"label": "D", "text": "The premium price", "correct": false}], "explanation": "Prohibited to use the Guaranty Association as a sales argument.", "id": "en-s3-q50", "topic": "Texas Law", "globalNumber": 150}, {"simulator": 4, "number": 1, "stem": "An insured transfers the pure risk of death to the insurer in exchange for a premium. This illustrates the concept of:", "options": [{"label": "A", "text": "Indemnity", "correct": false}, {"label": "B", "text": "Risk transfer", "correct": true}, {"label": "C", "text": "Speculative risk", "correct": false}, {"label": "D", "text": "Pooling", "correct": false}], "explanation": "Transferring pure risk for a premium = risk transfer.", "id": "en-s4-q1", "topic": "Annuities", "globalNumber": 151}, {"simulator": 4, "number": 2, "stem": "Which dividend option increases both the cash value and the death benefit without requiring a medical exam?", "options": [{"label": "A", "text": "Cash", "correct": false}, {"label": "B", "text": "Reduce premium", "correct": false}, {"label": "C", "text": "Paid-up additions", "correct": true}, {"label": "D", "text": "Accumulate at interest", "correct": false}], "explanation": "Paid-up additions increase CV and DB without an exam.", "id": "en-s4-q2", "topic": "General", "globalNumber": 152}, {"simulator": 4, "number": 3, "stem": "A Texas agent who sells annuities must complete, after the initial Best Interest course, per license period:", "options": [{"label": "A", "text": "4 hours of annuities", "correct": false}, {"label": "B", "text": "8 hours of annuities", "correct": true}, {"label": "C", "text": "No additional hours", "correct": false}, {"label": "D", "text": "24 hours of ethics", "correct": false}], "explanation": "After the initial course: 8 hours of annuities per period.", "id": "en-s4-q3", "topic": "Texas Law", "globalNumber": 153}, {"simulator": 4, "number": 4, "stem": "A person contributes to an annuity for 20 years and then begins receiving payments. The moment they convert the value into payments — which is irreversible — is called:", "options": [{"label": "A", "text": "Accumulation", "correct": false}, {"label": "B", "text": "Annuitization", "correct": true}, {"label": "C", "text": "Surrender", "correct": false}, {"label": "D", "text": "Free look", "correct": false}], "explanation": "Converting value into payments (irreversible) = annuitization.", "id": "en-s4-q4", "topic": "General", "globalNumber": 154}, {"simulator": 4, "number": 5, "stem": "In a defined benefit plan, what is guaranteed is:", "options": [{"label": "A", "text": "The annual contribution", "correct": false}, {"label": "B", "text": "The specific benefit at retirement", "correct": true}, {"label": "C", "text": "The investment return", "correct": false}, {"label": "D", "text": "The agent’s commission", "correct": false}], "explanation": "DB guarantees the specific benefit.", "id": "en-s4-q5", "topic": "Retirement", "globalNumber": 155}, {"simulator": 4, "number": 6, "stem": "How much death benefit coverage does TLHIGA protect per person per insolvent insurer?", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": false}, {"label": "C", "text": "$300,000", "correct": true}, {"label": "D", "text": "$500,000", "correct": false}], "explanation": "TLHIGA death benefit = $300,000.", "id": "en-s4-q6", "topic": "Texas Law", "globalNumber": 156}, {"simulator": 4, "number": 7, "stem": "An owner stops paying and chooses no option. The insurer keeps the same face amount for the longest the cash value allows. They applied:", "options": [{"label": "A", "text": "Reduced paid-up", "correct": false}, {"label": "B", "text": "Extended term", "correct": true}, {"label": "C", "text": "Cash surrender", "correct": false}, {"label": "D", "text": "APL", "correct": false}], "explanation": "Same face, limited period = extended term.", "id": "en-s4-q7", "topic": "General", "globalNumber": 157}, {"simulator": 4, "number": 8, "stem": "A $40,000 distribution from a qualified plan is taxable in:", "options": [{"label": "A", "text": "$0", "correct": false}, {"label": "B", "text": "The gain only", "correct": false}, {"label": "C", "text": "Its entirety ($40,000)", "correct": true}, {"label": "D", "text": "Half", "correct": false}], "explanation": "Qualified plan: taxable in its entirety.", "id": "en-s4-q8", "topic": "Retirement", "globalNumber": 158}, {"simulator": 4, "number": 9, "stem": "Which type of annuity shifts the investment risk to the owner and requires a prospectus?", "options": [{"label": "A", "text": "Fixed", "correct": false}, {"label": "B", "text": "Indexed", "correct": false}, {"label": "C", "text": "Variable", "correct": true}, {"label": "D", "text": "Fixed immediate", "correct": false}], "explanation": "Owner’s risk + prospectus = variable.", "id": "en-s4-q9", "topic": "Retirement", "globalNumber": 159}, {"simulator": 4, "number": 10, "stem": "Insurable interest in life insurance must exist:", "options": [{"label": "A", "text": "At the time of death", "correct": false}, {"label": "B", "text": "At policy issue", "correct": true}, {"label": "C", "text": "Throughout the entire term", "correct": false}, {"label": "D", "text": "Only if the insurer requests it", "correct": false}], "explanation": "For life, at issue.", "id": "en-s4-q10", "topic": "General", "globalNumber": 160}, {"simulator": 4, "number": 11, "stem": "Which medical document requires the applicant’s written authorization to obtain?", "options": [{"label": "A", "text": "The buyer’s guide", "correct": false}, {"label": "B", "text": "The Attending Physician Statement (APS)", "correct": true}, {"label": "C", "text": "The policy summary", "correct": false}, {"label": "D", "text": "The agent’s report", "correct": false}], "explanation": "The APS requires written authorization.", "id": "en-s4-q11", "topic": "General", "globalNumber": 161}, {"simulator": 4, "number": 12, "stem": "A client wants to protect their 30-year mortgage: if they die, enough to pay off the decreasing balance. Best suited is:", "options": [{"label": "A", "text": "Increasing term", "correct": false}, {"label": "B", "text": "Decreasing term", "correct": true}, {"label": "C", "text": "Whole life", "correct": false}, {"label": "D", "text": "Annuity", "correct": false}], "explanation": "Decreasing mortgage balance = decreasing term.", "id": "en-s4-q12", "topic": "Texas Law", "globalNumber": 162}, {"simulator": 4, "number": 13, "stem": "“Once a MEC, always a MEC” means that:", "options": [{"label": "A", "text": "A MEC can be reversed by paying less", "correct": false}, {"label": "B", "text": "The MEC classification is permanent", "correct": true}, {"label": "C", "text": "The MEC loses its death benefit", "correct": false}, {"label": "D", "text": "The MEC becomes an annuity", "correct": false}], "explanation": "The MEC classification is permanent.", "id": "en-s4-q13", "topic": "Taxation", "globalNumber": 163}, {"simulator": 4, "number": 14, "stem": "The producer legally represents:", "options": [{"label": "A", "text": "The client", "correct": false}, {"label": "B", "text": "The insurer", "correct": true}, {"label": "C", "text": "The TDI", "correct": false}, {"label": "D", "text": "The beneficiary", "correct": false}], "explanation": "The producer represents the insurer.", "id": "en-s4-q14", "topic": "Annuities", "globalNumber": 164}, {"simulator": 4, "number": 15, "stem": "In 2026, the elective deferral limit for a 401(k) (excluding catch-up) is:", "options": [{"label": "A", "text": "$7,500", "correct": false}, {"label": "B", "text": "$19,500", "correct": false}, {"label": "C", "text": "$23,000", "correct": false}, {"label": "D", "text": "$24,500", "correct": true}], "explanation": "401(k) 2026 = $24,500 (excluding catch-up).", "id": "en-s4-q15", "topic": "Texas Law", "globalNumber": 165}, {"simulator": 4, "number": 16, "stem": "A “joint and survivor” annuity continues paying:", "options": [{"label": "A", "text": "Until the first of the two dies", "correct": false}, {"label": "B", "text": "To the surviving spouse after the first death", "correct": true}, {"label": "C", "text": "Only for a fixed period", "correct": false}, {"label": "D", "text": "Only if the death was accidental", "correct": false}], "explanation": "Joint and survivor continues to the survivor.", "id": "en-s4-q16", "topic": "General", "globalNumber": 166}, {"simulator": 4, "number": 17, "stem": "Which Texas practice penalizes both the agent and the client who accepts it?", "options": [{"label": "A", "text": "Field underwriting", "correct": false}, {"label": "B", "text": "Rebating", "correct": true}, {"label": "C", "text": "Replacement with disclosure", "correct": false}, {"label": "D", "text": "Suitability", "correct": false}], "explanation": "Rebating penalizes both.", "id": "en-s4-q17", "topic": "General", "globalNumber": 167}, {"simulator": 4, "number": 18, "stem": "An applicant states a lower age than their real one and pays an insufficient premium. At death, the insurer:", "options": [{"label": "A", "text": "Voids the policy", "correct": false}, {"label": "B", "text": "Adjusts the benefit to what the premium would buy at the correct age", "correct": true}, {"label": "C", "text": "Pays double", "correct": false}, {"label": "D", "text": "Refunds the premiums", "correct": false}], "explanation": "Misstatement of age → adjust the benefit.", "id": "en-s4-q18", "topic": "Retirement", "globalNumber": 168}, {"simulator": 4, "number": 19, "stem": "Which withdrawal from a non-qualified annuity is subject to tax and, before 59½, a 10% penalty?", "options": [{"label": "A", "text": "The return of basis", "correct": false}, {"label": "B", "text": "The gain (which comes out first under LIFO)", "correct": true}, {"label": "C", "text": "None", "correct": false}, {"label": "D", "text": "The death benefit", "correct": false}], "explanation": "The gain (LIFO) is taxable, +10% if under 59½.", "id": "en-s4-q19", "topic": "General", "globalNumber": 169}, {"simulator": 4, "number": 20, "stem": "An insured dies of natural illness. They had an Accidental Death Benefit rider. The insurer pays:", "options": [{"label": "A", "text": "Double the benefit", "correct": false}, {"label": "B", "text": "Only the base benefit", "correct": true}, {"label": "C", "text": "Only the ADB", "correct": false}, {"label": "D", "text": "Nothing", "correct": false}], "explanation": "Death by illness → only the base benefit (ADB does not apply).", "id": "en-s4-q20", "topic": "Texas Law", "globalNumber": 170}, {"simulator": 4, "number": 21, "stem": "The incontestability clause primarily protects:", "options": [{"label": "A", "text": "The insurer", "correct": false}, {"label": "B", "text": "The insured and their family", "correct": true}, {"label": "C", "text": "The agent", "correct": false}, {"label": "D", "text": "The TDI", "correct": false}], "explanation": "Incontestability protects the insured/family.", "id": "en-s4-q21", "topic": "Texas Law", "globalNumber": 171}, {"simulator": 4, "number": 22, "stem": "A company owned by shareholders that issues non-participating policies is:", "options": [{"label": "A", "text": "Mutual", "correct": false}, {"label": "B", "text": "Stock", "correct": true}, {"label": "C", "text": "Fraternal", "correct": false}, {"label": "D", "text": "Reciprocal", "correct": false}], "explanation": "Shareholders + non-par = stock.", "id": "en-s4-q22", "topic": "Taxation", "globalNumber": 172}, {"simulator": 4, "number": 23, "stem": "What is required to move a 401(k) to an IRA while avoiding the mandatory 20% withholding?", "options": [{"label": "A", "text": "An indirect 60-day rollover", "correct": false}, {"label": "B", "text": "A direct transfer", "correct": true}, {"label": "C", "text": "A cash withdrawal", "correct": false}, {"label": "D", "text": "Waiting until 73", "correct": false}], "explanation": "No 20% withholding = direct transfer.", "id": "en-s4-q23", "topic": "Texas Law", "globalNumber": 173}, {"simulator": 4, "number": 24, "stem": "The free look for a life policy in Texas, in a replacement case, may be extended up to:", "options": [{"label": "A", "text": "5 days", "correct": false}, {"label": "B", "text": "10 days", "correct": false}, {"label": "C", "text": "20 days", "correct": true}, {"label": "D", "text": "60 days", "correct": false}], "explanation": "Free look in a replacement extends up to 20 days.", "id": "en-s4-q24", "topic": "General", "globalNumber": 174}, {"simulator": 4, "number": 25, "stem": "A permanent policy whose premiums are paid only 20 years but covers for life is:", "options": [{"label": "A", "text": "Annual renewable term", "correct": false}, {"label": "B", "text": "20-pay whole life (limited-pay)", "correct": true}, {"label": "C", "text": "Decreasing term", "correct": false}, {"label": "D", "text": "Universal Life Option B", "correct": false}], "explanation": "Pay 20 years, cover for life = 20-pay whole life.", "id": "en-s4-q25", "topic": "Texas Law", "globalNumber": 175}, {"simulator": 4, "number": 26, "stem": "Who assumes the investment risk in a defined contribution (401k) plan?", "options": [{"label": "A", "text": "The employer", "correct": false}, {"label": "B", "text": "The employee", "correct": true}, {"label": "C", "text": "The government", "correct": false}, {"label": "D", "text": "The insurer", "correct": false}], "explanation": "In a DC plan, the risk is on the employee.", "id": "en-s4-q26", "topic": "Retirement", "globalNumber": 176}, {"simulator": 4, "number": 27, "stem": "An agent adds a rider the client did not request and overcharges them. They commit:", "options": [{"label": "A", "text": "Sliding", "correct": true}, {"label": "B", "text": "Twisting", "correct": false}, {"label": "C", "text": "Rebating", "correct": false}, {"label": "D", "text": "Backdating", "correct": false}], "explanation": "Adding a rider/charge without consent = sliding.", "id": "en-s4-q27", "topic": "General", "globalNumber": 177}, {"simulator": 4, "number": 28, "stem": "The cash value of a whole life policy is a benefit that is:", "options": [{"label": "A", "text": "Only for death", "correct": false}, {"label": "B", "text": "Living (in-life benefit)", "correct": true}, {"label": "C", "text": "Exclusive to annuities", "correct": false}, {"label": "D", "text": "Nonexistent in permanent policies", "correct": false}], "explanation": "The cash value is a living benefit.", "id": "en-s4-q28", "topic": "General", "globalNumber": 178}, {"simulator": 4, "number": 29, "stem": "Which of the following 1035 exchanges is permitted?", "options": [{"label": "A", "text": "Annuity to life", "correct": false}, {"label": "B", "text": "Life to annuity", "correct": true}, {"label": "C", "text": "Annuity to health", "correct": false}, {"label": "D", "text": "Health to life", "correct": false}], "explanation": "Life → annuity is permitted.", "id": "en-s4-q29", "topic": "Retirement", "globalNumber": 179}, {"simulator": 4, "number": 30, "stem": "RMDs are not required during the owner’s life in a:", "options": [{"label": "A", "text": "Traditional IRA", "correct": false}, {"label": "B", "text": "401(k)", "correct": false}, {"label": "C", "text": "Roth IRA", "correct": true}, {"label": "D", "text": "DB pension", "correct": false}], "explanation": "The Roth IRA requires no lifetime RMDs.", "id": "en-s4-q30", "topic": "Texas Law", "globalNumber": 180}, {"simulator": 4, "number": 31, "stem": "A person wants the most coverage for the least cost, knowing it is temporary. Best suited is:", "options": [{"label": "A", "text": "Whole life", "correct": false}, {"label": "B", "text": "Term life", "correct": true}, {"label": "C", "text": "Universal Life", "correct": false}, {"label": "D", "text": "Variable life", "correct": false}], "explanation": "Cheap temporary coverage = term life.", "id": "en-s4-q31", "topic": "General", "globalNumber": 181}, {"simulator": 4, "number": 32, "stem": "In Texas, who appoints the Commissioner of Insurance?", "options": [{"label": "A", "text": "The voters", "correct": false}, {"label": "B", "text": "The Governor", "correct": true}, {"label": "C", "text": "The President", "correct": false}, {"label": "D", "text": "The federal legislature", "correct": false}], "explanation": "The Governor appoints the Commissioner.", "id": "en-s4-q32", "topic": "Retirement", "globalNumber": 182}, {"simulator": 4, "number": 33, "stem": "A fixed annuity mainly exposes the owner to the risk of:", "options": [{"label": "A", "text": "Market loss", "correct": false}, {"label": "B", "text": "Inflation (purchasing power of fixed payments)", "correct": true}, {"label": "C", "text": "The beneficiary’s bankruptcy", "correct": false}, {"label": "D", "text": "Dismemberment", "correct": false}], "explanation": "The fixed annuity faces inflation risk.", "id": "en-s4-q33", "topic": "Annuities", "globalNumber": 183}, {"simulator": 4, "number": 34, "stem": "The application answers that are true “to the best of the applicant’s knowledge” are:", "options": [{"label": "A", "text": "Warranties", "correct": false}, {"label": "B", "text": "Representations", "correct": true}, {"label": "C", "text": "Fraud", "correct": false}, {"label": "D", "text": "Independent clauses", "correct": false}], "explanation": "They are representations.", "id": "en-s4-q34", "topic": "General", "globalNumber": 184}, {"simulator": 4, "number": 35, "stem": "What portion of a settlement option that pays in installments with interest is taxable?", "options": [{"label": "A", "text": "The whole payment", "correct": false}, {"label": "B", "text": "Only the interest", "correct": true}, {"label": "C", "text": "None", "correct": false}, {"label": "D", "text": "Only the principal", "correct": false}], "explanation": "Only the interest of the settlement is taxable.", "id": "en-s4-q35", "topic": "Texas Law", "globalNumber": 185}, {"simulator": 4, "number": 36, "stem": "An insured commits suicide 30 months after the policy is issued. The insurer:", "options": [{"label": "A", "text": "Refunds the premiums", "correct": false}, {"label": "B", "text": "Pays nothing", "correct": false}, {"label": "C", "text": "Pays the benefit (the 2-year period has passed)", "correct": true}, {"label": "D", "text": "Pays half", "correct": false}], "explanation": "At 30 months (>2 years): pays the benefit.", "id": "en-s4-q36", "topic": "Taxation", "globalNumber": 186}, {"simulator": 4, "number": 37, "stem": "The number of continuing-education hours Texas requires per 2-year period is:", "options": [{"label": "A", "text": "12", "correct": false}, {"label": "B", "text": "20", "correct": false}, {"label": "C", "text": "24", "correct": true}, {"label": "D", "text": "30", "correct": false}], "explanation": "CE: 24 hours.", "id": "en-s4-q37", "topic": "Annuities", "globalNumber": 187}, {"simulator": 4, "number": 38, "stem": "A single-premium immediate annuity (SPIA) is distinguished because:", "options": [{"label": "A", "text": "It has a long accumulation phase", "correct": false}, {"label": "B", "text": "It begins paying in about one year, with a single premium", "correct": true}, {"label": "C", "text": "It is only variable", "correct": false}, {"label": "D", "text": "It does not pay for life", "correct": false}], "explanation": "SPIA: single premium, pays in ~1 year.", "id": "en-s4-q38", "topic": "General", "globalNumber": 188}, {"simulator": 4, "number": 39, "stem": "The rider that waives premiums if the insured becomes totally disabled is:", "options": [{"label": "A", "text": "Accidental Death Benefit", "correct": false}, {"label": "B", "text": "Waiver of Premium", "correct": true}, {"label": "C", "text": "Guaranteed Insurability", "correct": false}, {"label": "D", "text": "Return of Premium", "correct": false}], "explanation": "Waiver for disability = Waiver of Premium.", "id": "en-s4-q39", "topic": "Taxation", "globalNumber": 189}, {"simulator": 4, "number": 40, "stem": "A “substandard (rated)” risk classification means the applicant:", "options": [{"label": "A", "text": "Was declined", "correct": false}, {"label": "B", "text": "Is accepted with a higher premium", "correct": true}, {"label": "C", "text": "Receives the lowest premium", "correct": false}, {"label": "D", "text": "Needs no underwriting", "correct": false}], "explanation": "Substandard = accepted with a surcharge.", "id": "en-s4-q40", "topic": "General", "globalNumber": 190}, {"simulator": 4, "number": 41, "stem": "Which federal law protects the privacy and accuracy of consumer reports used in underwriting?", "options": [{"label": "A", "text": "HIPAA", "correct": false}, {"label": "B", "text": "Fair Credit Reporting Act", "correct": true}, {"label": "C", "text": "McCarran-Ferguson", "correct": false}, {"label": "D", "text": "ERISA", "correct": false}], "explanation": "Fair Credit Reporting Act.", "id": "en-s4-q41", "topic": "General", "globalNumber": 191}, {"simulator": 4, "number": 42, "stem": "Contributions to a Roth IRA are:", "options": [{"label": "A", "text": "Deductible", "correct": false}, {"label": "B", "text": "Never deductible (after-tax)", "correct": true}, {"label": "C", "text": "Deductible after age 50", "correct": false}, {"label": "D", "text": "Have no income limit", "correct": false}], "explanation": "Roth: never deductible.", "id": "en-s4-q42", "topic": "General", "globalNumber": 192}, {"simulator": 4, "number": 43, "stem": "The lump-sum death benefit paid at death is, for income tax:", "options": [{"label": "A", "text": "Fully taxable", "correct": false}, {"label": "B", "text": "Generally tax-free", "correct": true}, {"label": "C", "text": "50% taxable", "correct": false}, {"label": "D", "text": "Taxable if over $250,000", "correct": false}], "explanation": "Lump-sum death benefit = income-tax-free.", "id": "en-s4-q43", "topic": "Texas Law", "globalNumber": 193}, {"simulator": 4, "number": 44, "stem": "An agent who replaces a policy through misleading comparisons commits:", "options": [{"label": "A", "text": "Churning", "correct": false}, {"label": "B", "text": "Twisting", "correct": true}, {"label": "C", "text": "Sliding", "correct": false}, {"label": "D", "text": "Field underwriting", "correct": false}], "explanation": "Replacement by deception = twisting.", "id": "en-s4-q44", "topic": "General", "globalNumber": 194}, {"simulator": 4, "number": 45, "stem": "The producer who delivers a policy without having collected the premium must obtain, in addition to payment:", "options": [{"label": "A", "text": "A court order", "correct": false}, {"label": "B", "text": "A statement of good health", "correct": true}, {"label": "C", "text": "The beneficiary’s signature", "correct": false}, {"label": "D", "text": "A new MIB exam", "correct": false}], "explanation": "At delivery: statement of good health (+ payment).", "id": "en-s4-q45", "topic": "Retirement", "globalNumber": 195}, {"simulator": 4, "number": 46, "stem": "Which plan receives contributions only from the employer to the employees’ IRAs?", "options": [{"label": "A", "text": "SIMPLE", "correct": false}, {"label": "B", "text": "SEP", "correct": true}, {"label": "C", "text": "401(k)", "correct": false}, {"label": "D", "text": "Roth IRA", "correct": false}], "explanation": "Only the employer contributes = SEP.", "id": "en-s4-q46", "topic": "General", "globalNumber": 196}, {"simulator": 4, "number": 47, "stem": "A contingent beneficiary collects the benefit:", "options": [{"label": "A", "text": "Always, together with the primary", "correct": false}, {"label": "B", "text": "Only if the primary does not survive the insured", "correct": true}, {"label": "C", "text": "Never", "correct": false}, {"label": "D", "text": "Only if the primary authorizes it", "correct": false}], "explanation": "The contingent collects if the primary does not survive.", "id": "en-s4-q47", "topic": "General", "globalNumber": 197}, {"simulator": 4, "number": 48, "stem": "Which contract characteristic implies an exchange of unequal values?", "options": [{"label": "A", "text": "Unilateral", "correct": false}, {"label": "B", "text": "Aleatory", "correct": true}, {"label": "C", "text": "Adhesion", "correct": false}, {"label": "D", "text": "Conditional", "correct": false}], "explanation": "Unequal values = aleatory.", "id": "en-s4-q48", "topic": "General", "globalNumber": 198}, {"simulator": 4, "number": 49, "stem": "An agent represents a new insurer. To do so legally, they need:", "options": [{"label": "A", "text": "Only their existing license", "correct": false}, {"label": "B", "text": "An appointment from that insurer", "correct": true}, {"label": "C", "text": "The client’s approval", "correct": false}, {"label": "D", "text": "A new state exam", "correct": false}], "explanation": "Needs an appointment from that insurer.", "id": "en-s4-q49", "topic": "Retirement", "globalNumber": 199}, {"simulator": 4, "number": 50, "stem": "The TLHIGA limit for the present value of annuities is:", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": true}, {"label": "C", "text": "$300,000", "correct": false}, {"label": "D", "text": "$500,000", "correct": false}], "explanation": "TLHIGA annuity = $250,000.", "id": "en-s4-q50", "topic": "Texas Law", "globalNumber": 200}, {"simulator": 5, "number": 1, "stem": "The risk that has only two outcomes — loss or no loss — and is insurable is called:", "options": [{"label": "A", "text": "Speculative", "correct": false}, {"label": "B", "text": "Pure", "correct": true}, {"label": "C", "text": "Moral", "correct": false}, {"label": "D", "text": "Fortuitous", "correct": false}], "explanation": "Only loss or no loss = pure risk.", "id": "en-s5-q1", "topic": "Annuities", "globalNumber": 201}, {"simulator": 5, "number": 2, "stem": "A flexible-premium deferred annuity (FPDA) is characterized by:", "options": [{"label": "A", "text": "A single premium", "correct": false}, {"label": "B", "text": "Allowing multiple contributions during accumulation", "correct": true}, {"label": "C", "text": "Payments that begin in less than a year", "correct": false}, {"label": "D", "text": "Having no accumulation phase", "correct": false}], "explanation": "FPDA = multiple contributions during accumulation.", "id": "en-s5-q2", "topic": "General", "globalNumber": 202}, {"simulator": 5, "number": 3, "stem": "Which of the following is NOT covered by the Texas Guaranty Association?", "options": [{"label": "A", "text": "The guaranteed death benefit", "correct": false}, {"label": "B", "text": "The guaranteed surrender value", "correct": false}, {"label": "C", "text": "The non-guaranteed portion of a variable annuity (separate account)", "correct": true}, {"label": "D", "text": "The present value of a fixed annuity", "correct": false}], "explanation": "The non-guaranteed portion (separate account) is not covered.", "id": "en-s5-q3", "topic": "Texas Law", "globalNumber": 203}, {"simulator": 5, "number": 4, "stem": "A client wants their family to receive, if they die, the face amount plus all premiums paid. Best suited is the rider:", "options": [{"label": "A", "text": "Waiver of premium", "correct": false}, {"label": "B", "text": "Return of premium", "correct": true}, {"label": "C", "text": "Accidental death", "correct": false}, {"label": "D", "text": "Guaranteed insurability", "correct": false}], "explanation": "DB + premiums paid = Return of Premium.", "id": "en-s5-q4", "topic": "General", "globalNumber": 204}, {"simulator": 5, "number": 5, "stem": "Under the direct (trustee-to-trustee) transfer rule, the mandatory 20% withholding is:", "options": [{"label": "A", "text": "Always applicable", "correct": false}, {"label": "B", "text": "Not applicable", "correct": true}, {"label": "C", "text": "10%", "correct": false}, {"label": "D", "text": "30%", "correct": false}], "explanation": "Direct transfer = no 20% withholding.", "id": "en-s5-q5", "topic": "Retirement", "globalNumber": 205}, {"simulator": 5, "number": 6, "stem": "A single-premium whole life policy will likely be classified as:", "options": [{"label": "A", "text": "Convertible term", "correct": false}, {"label": "B", "text": "MEC", "correct": true}, {"label": "C", "text": "Pure endowment", "correct": false}, {"label": "D", "text": "Immediate annuity", "correct": false}], "explanation": "Single-premium WL is usually a MEC.", "id": "en-s5-q6", "topic": "Texas Law", "globalNumber": 206}, {"simulator": 5, "number": 7, "stem": "The agent must give the applicant, to compare policies, the:", "options": [{"label": "A", "text": "Agent’s report", "correct": false}, {"label": "B", "text": "Buyer’s guide and policy summary", "correct": true}, {"label": "C", "text": "MIB", "correct": false}, {"label": "D", "text": "APS", "correct": false}], "explanation": "To compare: buyer’s guide + policy summary.", "id": "en-s5-q7", "topic": "General", "globalNumber": 207}, {"simulator": 5, "number": 8, "stem": "A 68-year-old with a Roth IRA does not want to be forced to withdraw money. Must they take RMDs?", "options": [{"label": "A", "text": "Yes, from age 65", "correct": false}, {"label": "B", "text": "Yes, from age 73", "correct": false}, {"label": "C", "text": "No, the Roth requires no lifetime RMDs", "correct": true}, {"label": "D", "text": "Only if it exceeds $100,000", "correct": false}], "explanation": "The Roth requires no lifetime RMDs.", "id": "en-s5-q8", "topic": "Retirement", "globalNumber": 208}, {"simulator": 5, "number": 9, "stem": "Which settlement option lets the insurer retain the principal and pay only the interest?", "options": [{"label": "A", "text": "Fixed period", "correct": false}, {"label": "B", "text": "Fixed amount", "correct": false}, {"label": "C", "text": "Interest only", "correct": true}, {"label": "D", "text": "Life income", "correct": false}], "explanation": "Retain principal and pay interest = interest only.", "id": "en-s5-q9", "topic": "Retirement", "globalNumber": 209}, {"simulator": 5, "number": 10, "stem": "An agent who collects a premium and deposits it into a personal account violates their duty of:", "options": [{"label": "A", "text": "Suitability", "correct": false}, {"label": "B", "text": "Fiduciary (commingling)", "correct": true}, {"label": "C", "text": "Field underwriting", "correct": false}, {"label": "D", "text": "Disclosure", "correct": false}], "explanation": "Mixing premiums = fiduciary (commingling) violation.", "id": "en-s5-q10", "topic": "General", "globalNumber": 210}, {"simulator": 5, "number": 11, "stem": "What is the age at which withdrawals of qualified retirement funds no longer carry the 10% penalty?", "options": [{"label": "A", "text": "55", "correct": false}, {"label": "B", "text": "59½", "correct": true}, {"label": "C", "text": "65", "correct": false}, {"label": "D", "text": "73", "correct": false}], "explanation": "No 10% penalty from 59½.", "id": "en-s5-q11", "topic": "General", "globalNumber": 211}, {"simulator": 5, "number": 12, "stem": "A policy whose death benefit equals the face amount plus the cash value is a Universal Life:", "options": [{"label": "A", "text": "Option A", "correct": false}, {"label": "B", "text": "Option B", "correct": true}, {"label": "C", "text": "Indexed", "correct": false}, {"label": "D", "text": "Single-premium", "correct": false}], "explanation": "DB = face + cash value = Option B.", "id": "en-s5-q12", "topic": "Texas Law", "globalNumber": 212}, {"simulator": 5, "number": 13, "stem": "The TDI may, for serious violations by an agent:", "options": [{"label": "A", "text": "Only send a letter", "correct": false}, {"label": "B", "text": "Suspend or revoke the license, fine, and issue cease-and-desist orders", "correct": true}, {"label": "C", "text": "Nothing, it depends on the federal government", "correct": false}, {"label": "D", "text": "Cancel the client’s policy", "correct": false}], "explanation": "The TDI may suspend/revoke, fine, and cease.", "id": "en-s5-q13", "topic": "Taxation", "globalNumber": 213}, {"simulator": 5, "number": 14, "stem": "An insured incorrectly states their sex and pays an insufficient premium. When paying, the insurer:", "options": [{"label": "A", "text": "Voids the policy", "correct": false}, {"label": "B", "text": "Adjusts the benefit to what the premium would have bought", "correct": true}, {"label": "C", "text": "Pays double", "correct": false}, {"label": "D", "text": "Refunds the premiums", "correct": false}], "explanation": "Misstatement (age/sex) → adjust the benefit.", "id": "en-s5-q14", "topic": "Annuities", "globalNumber": 214}, {"simulator": 5, "number": 15, "stem": "Which type of retirement plan is for government employees who defer compensation?", "options": [{"label": "A", "text": "403(b)", "correct": false}, {"label": "B", "text": "457(b)", "correct": true}, {"label": "C", "text": "SEP", "correct": false}, {"label": "D", "text": "Keogh", "correct": false}], "explanation": "Government employees = 457(b).", "id": "en-s5-q15", "topic": "Texas Law", "globalNumber": 215}, {"simulator": 5, "number": 16, "stem": "The producer who gathers information, observes the applicant, and verifies accuracy before submitting the application performs:", "options": [{"label": "A", "text": "Adverse selection", "correct": false}, {"label": "B", "text": "Field underwriting", "correct": true}, {"label": "C", "text": "Commingling", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "Gathering/verifying info = field underwriting.", "id": "en-s5-q16", "topic": "General", "globalNumber": 216}, {"simulator": 5, "number": 17, "stem": "Which is the annuity payout option with the highest periodic income?", "options": [{"label": "A", "text": "Joint and survivor", "correct": false}, {"label": "B", "text": "Life with period certain", "correct": false}, {"label": "C", "text": "Life only (straight life)", "correct": true}, {"label": "D", "text": "Cash refund", "correct": false}], "explanation": "Life only pays the highest income.", "id": "en-s5-q17", "topic": "General", "globalNumber": 217}, {"simulator": 5, "number": 18, "stem": "The period during which the owner may return a new policy and receive a full refund is called:", "options": [{"label": "A", "text": "Grace period", "correct": false}, {"label": "B", "text": "Free look", "correct": true}, {"label": "C", "text": "Contestable period", "correct": false}, {"label": "D", "text": "Elimination period", "correct": false}], "explanation": "Return with full refund = free look.", "id": "en-s5-q18", "topic": "Retirement", "globalNumber": 218}, {"simulator": 5, "number": 19, "stem": "The premiums of a personal life insurance policy are:", "options": [{"label": "A", "text": "Tax-deductible", "correct": false}, {"label": "B", "text": "Not deductible", "correct": true}, {"label": "C", "text": "Deductible after age 65", "correct": false}, {"label": "D", "text": "Partially deductible", "correct": false}], "explanation": "Personal premiums = not deductible.", "id": "en-s5-q19", "topic": "General", "globalNumber": 219}, {"simulator": 5, "number": 20, "stem": "In a non-qualified annuity, the portion of each annuitized payment that represents the return of basis is:", "options": [{"label": "A", "text": "Taxable", "correct": false}, {"label": "B", "text": "Non-taxable", "correct": true}, {"label": "C", "text": "Penalized", "correct": false}, {"label": "D", "text": "Deductible", "correct": false}], "explanation": "The return of basis = nontaxable.", "id": "en-s5-q20", "topic": "Texas Law", "globalNumber": 220}, {"simulator": 5, "number": 21, "stem": "An irrevocable beneficiary has a right that is:", "options": [{"label": "A", "text": "A mere expectancy", "correct": false}, {"label": "B", "text": "Vested", "correct": true}, {"label": "C", "text": "Nonexistent", "correct": false}, {"label": "D", "text": "That the owner can ignore", "correct": false}], "explanation": "The irrevocable beneficiary has a vested right.", "id": "en-s5-q21", "topic": "Texas Law", "globalNumber": 221}, {"simulator": 5, "number": 22, "stem": "The Texas law that automatically revokes an ex-spouse as beneficiary after a divorce is:", "options": [{"label": "A", "text": "The spendthrift clause", "correct": false}, {"label": "B", "text": "The Divorce Revocation Statute (Family Code §9.301)", "correct": true}, {"label": "C", "text": "The incontestability clause", "correct": false}, {"label": "D", "text": "The 3-year rule", "correct": false}], "explanation": "Divorce Revocation §9.301.", "id": "en-s5-q22", "topic": "Taxation", "globalNumber": 222}, {"simulator": 5, "number": 23, "stem": "An insurer publishes false financial statements. This is a practice that is:", "options": [{"label": "A", "text": "Permitted", "correct": false}, {"label": "B", "text": "An unfair trade practice (prohibited)", "correct": true}, {"label": "C", "text": "Suitability", "correct": false}, {"label": "D", "text": "Field underwriting", "correct": false}], "explanation": "False financial statements = a prohibited unfair practice.", "id": "en-s5-q23", "topic": "Texas Law", "globalNumber": 223}, {"simulator": 5, "number": 24, "stem": "A person wants to participate in a stock index with a floor that protects them from losses. Best suited is a(n) ______ annuity:", "options": [{"label": "A", "text": "Variable", "correct": false}, {"label": "B", "text": "Indexed", "correct": true}, {"label": "C", "text": "Variable immediate", "correct": false}, {"label": "D", "text": "Variable flexible-premium", "correct": false}], "explanation": "Index with a floor = indexed.", "id": "en-s5-q24", "topic": "General", "globalNumber": 224}, {"simulator": 5, "number": 25, "stem": "How many years, typically, is the period within which a lapsed policy can be reinstated under the standard provision?", "options": [{"label": "A", "text": "1 year", "correct": false}, {"label": "B", "text": "3 years (in Texas often up to 5)", "correct": true}, {"label": "C", "text": "10 years", "correct": false}, {"label": "D", "text": "Indefinitely", "correct": false}], "explanation": "Standard reinstatement ~3 years (TX up to 5).", "id": "en-s5-q25", "topic": "Texas Law", "globalNumber": 225}, {"simulator": 5, "number": 26, "stem": "The death benefit is included in the insured’s estate for estate tax if the insured:", "options": [{"label": "A", "text": "Lived in Texas", "correct": false}, {"label": "B", "text": "Had incidents of ownership at death", "correct": true}, {"label": "C", "text": "Paid monthly premiums", "correct": false}, {"label": "D", "text": "Was under 60", "correct": false}], "explanation": "Included in the estate if they had incidents of ownership.", "id": "en-s5-q26", "topic": "Retirement", "globalNumber": 226}, {"simulator": 5, "number": 27, "stem": "Which plan allows an 80-employee company for both employee and employer to contribute?", "options": [{"label": "A", "text": "SEP IRA", "correct": false}, {"label": "B", "text": "SIMPLE IRA", "correct": true}, {"label": "C", "text": "Keogh", "correct": false}, {"label": "D", "text": "DB pension", "correct": false}], "explanation": "Employee + employer, small company = SIMPLE IRA.", "id": "en-s5-q27", "topic": "General", "globalNumber": 227}, {"simulator": 5, "number": 28, "stem": "The clause that pays the benefit minus the overdue premium if the insured dies with a recent unpaid premium is the:", "options": [{"label": "A", "text": "Free look", "correct": false}, {"label": "B", "text": "Grace period", "correct": true}, {"label": "C", "text": "Contestable period", "correct": false}, {"label": "D", "text": "Reinstatement", "correct": false}], "explanation": "Paying the DB minus the overdue premium = grace period.", "id": "en-s5-q28", "topic": "General", "globalNumber": 228}, {"simulator": 5, "number": 29, "stem": "An agent legally represents the ______ even though they owe the client honesty and suitability:", "options": [{"label": "A", "text": "Insurer", "correct": true}, {"label": "B", "text": "Client’s family", "correct": false}, {"label": "C", "text": "NAIC", "correct": false}, {"label": "D", "text": "SEC", "correct": false}], "explanation": "The agent represents the insurer.", "id": "en-s5-q29", "topic": "Retirement", "globalNumber": 229}, {"simulator": 5, "number": 30, "stem": "To sell a variable annuity, one is required to have:", "options": [{"label": "A", "text": "A life license only", "correct": false}, {"label": "B", "text": "A life license plus a securities registration", "correct": true}, {"label": "C", "text": "A health license only", "correct": false}, {"label": "D", "text": "No license", "correct": false}], "explanation": "Variable = life license + securities.", "id": "en-s5-q30", "topic": "Texas Law", "globalNumber": 230}, {"simulator": 5, "number": 31, "stem": "The suicide clause in Texas, within the exclusion period, causes the insurer to:", "options": [{"label": "A", "text": "Pay the full benefit", "correct": false}, {"label": "B", "text": "Refund the premiums paid", "correct": true}, {"label": "C", "text": "Do nothing", "correct": false}, {"label": "D", "text": "Pay double", "correct": false}], "explanation": "Suicide within the period → refunds premiums.", "id": "en-s5-q31", "topic": "General", "globalNumber": 231}, {"simulator": 5, "number": 32, "stem": "What is taxed in a qualified plan upon distribution?", "options": [{"label": "A", "text": "Only the gain", "correct": false}, {"label": "B", "text": "The entire amount", "correct": true}, {"label": "C", "text": "Nothing", "correct": false}, {"label": "D", "text": "Only the basis", "correct": false}], "explanation": "Qualified plan: taxable in its entirety.", "id": "en-s5-q32", "topic": "Retirement", "globalNumber": 232}, {"simulator": 5, "number": 33, "stem": "A “per stirpes” designation causes a predeceased beneficiary’s share to:", "options": [{"label": "A", "text": "Be divided among the survivors", "correct": false}, {"label": "B", "text": "Pass to their descendants", "correct": true}, {"label": "C", "text": "Go to the insured’s estate", "correct": false}, {"label": "D", "text": "Be lost", "correct": false}], "explanation": "Per stirpes: passes to descendants.", "id": "en-s5-q33", "topic": "Annuities", "globalNumber": 233}, {"simulator": 5, "number": 34, "stem": "The TLHIGA coverage limit for health (major medical) is:", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": false}, {"label": "C", "text": "$300,000", "correct": false}, {"label": "D", "text": "$500,000", "correct": true}], "explanation": "TLHIGA health = $500,000.", "id": "en-s5-q34", "topic": "General", "globalNumber": 234}, {"simulator": 5, "number": 35, "stem": "The rider that allows collecting part of the benefit while alive due to terminal illness, reducing the final amount, is:", "options": [{"label": "A", "text": "Accidental Death Benefit", "correct": false}, {"label": "B", "text": "Accelerated Death Benefit", "correct": true}, {"label": "C", "text": "Guaranteed Insurability", "correct": false}, {"label": "D", "text": "Waiver of Premium", "correct": false}], "explanation": "Collect while alive for terminal illness = Accelerated Death Benefit.", "id": "en-s5-q35", "topic": "Texas Law", "globalNumber": 235}, {"simulator": 5, "number": 36, "stem": "Who assumes the investment risk in a fixed annuity?", "options": [{"label": "A", "text": "The owner", "correct": false}, {"label": "B", "text": "The insurer", "correct": true}, {"label": "C", "text": "The government", "correct": false}, {"label": "D", "text": "The beneficiary", "correct": false}], "explanation": "In a fixed annuity, the risk is on the insurer.", "id": "en-s5-q36", "topic": "Taxation", "globalNumber": 236}, {"simulator": 5, "number": 37, "stem": "An applicant with a better-than-average risk, with excellent health and habits, is classified as:", "options": [{"label": "A", "text": "Standard", "correct": false}, {"label": "B", "text": "Preferred", "correct": true}, {"label": "C", "text": "Substandard", "correct": false}, {"label": "D", "text": "Declined", "correct": false}], "explanation": "Better-than-average risk = preferred.", "id": "en-s5-q37", "topic": "Annuities", "globalNumber": 237}, {"simulator": 5, "number": 38, "stem": "Which practice consists of replacing policies using their accumulated values solely to generate commissions?", "options": [{"label": "A", "text": "Twisting", "correct": false}, {"label": "B", "text": "Churning", "correct": true}, {"label": "C", "text": "Sliding", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "Replacing with existing values for commission = churning.", "id": "en-s5-q38", "topic": "General", "globalNumber": 238}, {"simulator": 5, "number": 39, "stem": "Under the “entire contract” clause, the complete contract is formed by:", "options": [{"label": "A", "text": "Only the policy", "correct": false}, {"label": "B", "text": "The policy plus the attached application", "correct": true}, {"label": "C", "text": "The policy plus the buyer’s guide", "correct": false}, {"label": "D", "text": "Only the application", "correct": false}], "explanation": "Entire contract = policy + attached application.", "id": "en-s5-q39", "topic": "Taxation", "globalNumber": 239}, {"simulator": 5, "number": 40, "stem": "The mandatory course a Texas agent must take before selling annuities lasts:", "options": [{"label": "A", "text": "24 hours", "correct": false}, {"label": "B", "text": "4 hours (Best Interest)", "correct": true}, {"label": "C", "text": "8 hours of ethics", "correct": false}, {"label": "D", "text": "3 hours of flood", "correct": false}], "explanation": "Best Interest, 4-hour course.", "id": "en-s5-q40", "topic": "General", "globalNumber": 240}, {"simulator": 5, "number": 41, "stem": "Which type of life insurance does NOT accumulate cash value?", "options": [{"label": "A", "text": "Whole life", "correct": false}, {"label": "B", "text": "Universal life", "correct": false}, {"label": "C", "text": "Term life", "correct": true}, {"label": "D", "text": "Variable life", "correct": false}], "explanation": "Term life does not accumulate cash value.", "id": "en-s5-q41", "topic": "General", "globalNumber": 241}, {"simulator": 5, "number": 42, "stem": "An insurer takes an adverse action based on a consumer report. Under the FCRA it must:", "options": [{"label": "A", "text": "Conceal the source", "correct": false}, {"label": "B", "text": "Notify the applicant and disclose the agency", "correct": true}, {"label": "C", "text": "Pay a fine", "correct": false}, {"label": "D", "text": "Cancel the policy", "correct": false}], "explanation": "FCRA: notify and disclose the agency.", "id": "en-s5-q42", "topic": "General", "globalNumber": 242}, {"simulator": 5, "number": 43, "stem": "The concept “MIG” (mortality up, interest down, expenses up) describes the factors of:", "options": [{"label": "A", "text": "Premium calculation", "correct": true}, {"label": "B", "text": "Settlement options", "correct": false}, {"label": "C", "text": "Medical underwriting", "correct": false}, {"label": "D", "text": "Insurer classification", "correct": false}], "explanation": "MIG = factors of the premium.", "id": "en-s5-q43", "topic": "Texas Law", "globalNumber": 243}, {"simulator": 5, "number": 44, "stem": "In 2026, the additional catch-up for an IRA (50+) is:", "options": [{"label": "A", "text": "$500", "correct": false}, {"label": "B", "text": "$1,000", "correct": false}, {"label": "C", "text": "$1,100", "correct": true}, {"label": "D", "text": "$7,500", "correct": false}], "explanation": "IRA catch-up 2026 (50+) = $1,100.", "id": "en-s5-q44", "topic": "General", "globalNumber": 244}, {"simulator": 5, "number": 45, "stem": "A company insures its key employee. The treatment of the premiums and the benefit is:", "options": [{"label": "A", "text": "Premiums deductible, benefit taxable", "correct": false}, {"label": "B", "text": "Premiums not deductible, benefit generally tax-free", "correct": true}, {"label": "C", "text": "Both taxable", "correct": false}, {"label": "D", "text": "Both deductible", "correct": false}], "explanation": "Key person: premiums not deductible, benefit tax-free.", "id": "en-s5-q45", "topic": "Retirement", "globalNumber": 245}, {"simulator": 5, "number": 46, "stem": "The beneficiary who collects only if the primary does not survive the insured is the:", "options": [{"label": "A", "text": "Tertiary", "correct": false}, {"label": "B", "text": "Contingent", "correct": true}, {"label": "C", "text": "Irrevocable", "correct": false}, {"label": "D", "text": "Revocable", "correct": false}], "explanation": "Collects if the primary does not survive = contingent.", "id": "en-s5-q46", "topic": "General", "globalNumber": 246}, {"simulator": 5, "number": 47, "stem": "The 1035 exchange that is NOT permitted is:", "options": [{"label": "A", "text": "Life to life", "correct": false}, {"label": "B", "text": "Life to annuity", "correct": false}, {"label": "C", "text": "Annuity to annuity", "correct": false}, {"label": "D", "text": "Annuity to life", "correct": true}], "explanation": "Annuity → life is NOT permitted.", "id": "en-s5-q47", "topic": "General", "globalNumber": 247}, {"simulator": 5, "number": 48, "stem": "The regulation of insurance in the United States falls, under the McCarran-Ferguson Act, to:", "options": [{"label": "A", "text": "The federal government", "correct": false}, {"label": "B", "text": "The states", "correct": true}, {"label": "C", "text": "The SEC", "correct": false}, {"label": "D", "text": "Congress exclusively", "correct": false}], "explanation": "Regulation = state (McCarran-Ferguson).", "id": "en-s5-q48", "topic": "General", "globalNumber": 248}, {"simulator": 5, "number": 49, "stem": "A conditional receipt pays the benefit to the applicant who died before issue if they:", "options": [{"label": "A", "text": "Paid double the premium", "correct": false}, {"label": "B", "text": "Were insurable under normal underwriting", "correct": true}, {"label": "C", "text": "Had a contingent beneficiary", "correct": false}, {"label": "D", "text": "Were a Texas resident", "correct": false}], "explanation": "Conditional receipt: pays if they were insurable.", "id": "en-s5-q49", "topic": "Retirement", "globalNumber": 249}, {"simulator": 5, "number": 50, "stem": "The central purpose of an annuity is to protect against:", "options": [{"label": "A", "text": "Dying prematurely", "correct": false}, {"label": "B", "text": "Living longer than one’s savings last (longevity)", "correct": true}, {"label": "C", "text": "Disability", "correct": false}, {"label": "D", "text": "Property damage", "correct": false}], "explanation": "The annuity protects against living too long (longevity).", "id": "en-s5-q50", "topic": "Texas Law", "globalNumber": 250}, {"simulator": 6, "number": 1, "stem": "A 79-year-old client needs access to her money in less than a year. An agent recommends a deferred annuity with 10-year surrender charges. What is the BEST characterization of this recommendation?", "options": [{"label": "A", "text": "Suitable, because the annuity defers taxes", "correct": false}, {"label": "B", "text": "Not suitable: the product ties up the liquidity the client needs", "correct": true}, {"label": "C", "text": "Suitable, because it offers a surrender charge", "correct": false}, {"label": "D", "text": "Mandatory under the best interest standard", "correct": false}], "explanation": "The product ties up the liquidity the client needs soon: not suitable. A/C: a tax benefit or a surrender charge does not make suitable a product that clashes with her need. D: best interest requires the opposite.", "id": "en-s6-q1", "topic": "Suitability / Best Interest", "globalNumber": 251}, {"simulator": 6, "number": 2, "stem": "Before recommending an annuity to a client, what is the FIRST action the producer must take?", "options": [{"label": "A", "text": "Collect the premium", "correct": false}, {"label": "B", "text": "Gather the client’s suitability information (financial situation, objectives, liquidity, risk tolerance)", "correct": true}, {"label": "C", "text": "Issue the policy", "correct": false}, {"label": "D", "text": "Notify TLHIGA", "correct": false}], "explanation": "Suitability starts with gathering the client’s information. A/C: these come later and depend on the product being suitable. D: TLHIGA is not involved in the sale.", "id": "en-s6-q2", "topic": "Suitability / Best Interest", "globalNumber": 252}, {"simulator": 6, "number": 3, "stem": "The best interest standard for annuities in Texas requires all of the following obligations EXCEPT:", "options": [{"label": "A", "text": "Care", "correct": false}, {"label": "B", "text": "Disclosure", "correct": false}, {"label": "C", "text": "Managing conflicts of interest", "correct": false}, {"label": "D", "text": "Guaranteeing a minimum 8% return", "correct": true}], "explanation": "Best interest requires care, disclosure, and conflict management; no product guarantees 8%. A/B/C are real obligations of the standard.", "id": "en-s6-q3", "topic": "Suitability / Best Interest", "globalNumber": 253}, {"simulator": 6, "number": 4, "stem": "A client wants to replace an existing policy with a new one. What is the agent’s PRIMARY obligation?", "options": [{"label": "A", "text": "Hide the prior policy from the new insurer", "correct": false}, {"label": "B", "text": "Provide a replacement notice and a comparison of the policies", "correct": true}, {"label": "C", "text": "Cancel the old policy before issuing the new one", "correct": false}, {"label": "D", "text": "Increase their commission", "correct": false}], "explanation": "The central obligation is to give a replacement notice and compare the policies. A: concealing violates the rule. C: you don’t cancel before issuing. D: commission is not the obligation.", "id": "en-s6-q4", "topic": "Suitability / Best Interest", "globalNumber": 254}, {"simulator": 6, "number": 5, "stem": "When recommending a product to a senior client, the agent’s BEST practice is:", "options": [{"label": "A", "text": "Speed up the sale to seize the decision", "correct": false}, {"label": "B", "text": "Document suitability and the reasons for the recommendation", "correct": true}, {"label": "C", "text": "Avoid explaining the charges", "correct": false}, {"label": "D", "text": "Omit risk tolerance", "correct": false}], "explanation": "With seniors, documenting suitability and reasons is the best practice. A/C/D describe exactly what NOT to do.", "id": "en-s6-q5", "topic": "Suitability / Best Interest", "globalNumber": 255}, {"simulator": 6, "number": 6, "stem": "A producer recommends a variable annuity to an 82-year-old client with no investment experience who wants to protect their principal from losses. What is the BEST characterization?", "options": [{"label": "A", "text": "Suitable, because variable annuities always gain", "correct": false}, {"label": "B", "text": "Not suitable: market risk contradicts the goal of protecting principal", "correct": true}, {"label": "C", "text": "Suitable, if it pays a good commission", "correct": false}, {"label": "D", "text": "Required by best interest", "correct": false}], "explanation": "The variable’s market risk contradicts the goal of protecting principal: not suitable. A: variables can lose. C: commission doesn’t determine suitability. D: best interest prohibits it.", "id": "en-s6-q6", "topic": "Suitability / Best Interest", "globalNumber": 256}, {"simulator": 6, "number": 7, "stem": "The PRIMARY purpose of the “free look” period is:", "options": [{"label": "A", "text": "To give the insurer time to investigate", "correct": false}, {"label": "B", "text": "To let the client review the policy and return it for a full refund if unsatisfied", "correct": true}, {"label": "C", "text": "To extend the contestable period", "correct": false}, {"label": "D", "text": "To increase the premium", "correct": false}], "explanation": "The free look lets the client review and return for a full refund. A: it’s not for the insurer. C: it doesn’t extend contestability. D: it doesn’t affect the premium.", "id": "en-s6-q7", "topic": "Suitability / Best Interest", "globalNumber": 257}, {"simulator": 6, "number": 8, "stem": "The suitability information an agent must gather before recommending an annuity includes all of the following EXCEPT:", "options": [{"label": "A", "text": "The client’s age and income", "correct": false}, {"label": "B", "text": "Financial objectives and time horizon", "correct": false}, {"label": "C", "text": "Risk tolerance and liquidity needs", "correct": false}, {"label": "D", "text": "The client’s favorite hobby", "correct": true}], "explanation": "Age, income, objectives, liquidity, and risk tolerance are suitability; the hobby is not. A/B/C are suitability information.", "id": "en-s6-q8", "topic": "Suitability / Best Interest", "globalNumber": 258}, {"simulator": 6, "number": 9, "stem": "Before being able to sell annuities in Texas, an agent MUST complete:", "options": [{"label": "A", "text": "A real-estate exam", "correct": false}, {"label": "B", "text": "An initial 4-hour “Best Interest” course", "correct": true}, {"label": "C", "text": "40 hours of ethics", "correct": false}, {"label": "D", "text": "Nothing additional", "correct": false}], "explanation": "Texas requires the 4-hour Best Interest course before selling annuities. A/C/D are not annuity requirements.", "id": "en-s6-q9", "topic": "Suitability / Best Interest", "globalNumber": 259}, {"simulator": 6, "number": 10, "stem": "An agent convinces a client to replace their policy using its accumulated values, solely to generate a new commission. This practice is known as:", "options": [{"label": "A", "text": "Suitability", "correct": false}, {"label": "B", "text": "Churning", "correct": true}, {"label": "C", "text": "Field underwriting", "correct": false}, {"label": "D", "text": "Free look", "correct": false}], "explanation": "Replacing using existing values for commission = churning. A: suitability is the right thing, not this. C: field underwriting is gathering info. D: free look is something else.", "id": "en-s6-q10", "topic": "Suitability / Best Interest", "globalNumber": 260}, {"simulator": 6, "number": 11, "stem": "When evaluating the suitability of an annuity for a retiree, what is the MOST important factor?", "options": [{"label": "A", "text": "The color of the brochure", "correct": false}, {"label": "B", "text": "That the product fits their objectives, liquidity, and risk tolerance", "correct": true}, {"label": "C", "text": "The agent’s commission", "correct": false}, {"label": "D", "text": "The insurer’s brand", "correct": false}], "explanation": "The MOST important thing is the fit to objectives, liquidity, and risk. A/C/D are irrelevant to suitability.", "id": "en-s6-q11", "topic": "Suitability / Best Interest", "globalNumber": 261}, {"simulator": 6, "number": 12, "stem": "Using a misleading “senior specialist” designation to gain an older client’s trust is:", "options": [{"label": "A", "text": "Good marketing", "correct": false}, {"label": "B", "text": "A prohibited consumer-protection practice", "correct": true}, {"label": "C", "text": "Required by the TDI", "correct": false}, {"label": "D", "text": "Part of field underwriting", "correct": false}], "explanation": "A misleading “senior” designation is a prohibited consumer-protection practice. A: it’s not good marketing, it’s deception. C: the TDI doesn’t require it. D: it’s not field underwriting.", "id": "en-s6-q12", "topic": "Suitability / Best Interest", "globalNumber": 262}, {"simulator": 6, "number": 13, "stem": "An agent exaggerates, with false information, the flaws of a client’s current policy so they replace it. This is:", "options": [{"label": "A", "text": "Churning", "correct": false}, {"label": "B", "text": "Twisting", "correct": true}, {"label": "C", "text": "Suitability", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "Inducing replacement with false information = twisting. A: churning uses values, not deception. C: suitability is the right thing. D: rebating is an inducement.", "id": "en-s6-q13", "topic": "Suitability / Best Interest", "globalNumber": 263}, {"simulator": 6, "number": 14, "stem": "Under the best interest standard, if the agent receives a higher commission for recommending a certain product, they MUST:", "options": [{"label": "A", "text": "Hide it", "correct": false}, {"label": "B", "text": "Disclose the conflict of interest", "correct": true}, {"label": "C", "text": "Cancel the sale", "correct": false}, {"label": "D", "text": "Pay the commission to the client", "correct": false}], "explanation": "Best interest requires disclosing the conflict of interest. A: hiding it violates it. C: it doesn’t force a cancellation. D: you don’t “pay” the commission to the client.", "id": "en-s6-q14", "topic": "Suitability / Best Interest", "globalNumber": 264}, {"simulator": 6, "number": 15, "stem": "The PRIMARY purpose of replacement regulation is:", "options": [{"label": "A", "text": "To increase the agent’s commissions", "correct": false}, {"label": "B", "text": "To protect the client from losing benefits and from unnecessary charges when changing policies", "correct": true}, {"label": "C", "text": "To eliminate the grace period", "correct": false}, {"label": "D", "text": "To speed up underwriting", "correct": false}], "explanation": "Replacement is regulated to protect the client from losses and charges. A: the opposite. C/D: not its purpose.", "id": "en-s6-q15", "topic": "Suitability / Best Interest", "globalNumber": 265}, {"simulator": 6, "number": 16, "stem": "An agent recommends that a 75-year-old put all their savings into a single long-term deferred annuity. The BEST observation is:", "options": [{"label": "A", "text": "It is suitable to concentrate everything in one product", "correct": false}, {"label": "B", "text": "It is not suitable: it ties up all their liquidity in a long-term product", "correct": true}, {"label": "C", "text": "It reduces their risk to zero", "correct": false}, {"label": "D", "text": "It is mandatory", "correct": false}], "explanation": "Concentrating all liquidity in a long-term product is not suitable. A: concentrating isn’t prudent here. C: it doesn’t eliminate risk. D: it’s not mandatory.", "id": "en-s6-q16", "topic": "Suitability / Best Interest", "globalNumber": 266}, {"simulator": 6, "number": 17, "stem": "A client receives their life policy on Monday and returns it eight days later, with no claim. Under the Texas free look, the insurer MUST:", "options": [{"label": "A", "text": "Refuse, because the deadline has passed", "correct": false}, {"label": "B", "text": "Refund the premium paid (it is within the 10 days)", "correct": true}, {"label": "C", "text": "Charge a penalty", "correct": false}, {"label": "D", "text": "Convert the policy into an annuity", "correct": false}], "explanation": "Eight days is within the 10 of the free look: the insurer refunds. A: the deadline hasn’t passed. C: no penalty. D: it doesn’t convert.", "id": "en-s6-q17", "topic": "General", "globalNumber": 267}, {"simulator": 6, "number": 18, "stem": "An insurer unjustifiably delays payment of a valid claim beyond the legal deadline. What MUST it generally do?", "options": [{"label": "A", "text": "Nothing", "correct": false}, {"label": "B", "text": "Pay penalty interest (18%) and attorney’s fees", "correct": true}, {"label": "C", "text": "Cancel the policy", "correct": false}, {"label": "D", "text": "Double the benefit", "correct": false}], "explanation": "Unjustified delay → 18% interest and fees. A: there is a consequence. C/D: do not apply.", "id": "en-s6-q18", "topic": "Retirement", "globalNumber": 268}, {"simulator": 6, "number": 19, "stem": "An insured divorces and dies months later without updating their ex-spouse beneficiary. Under Texas law, the MOST likely outcome is:", "options": [{"label": "A", "text": "The ex-spouse collects anyway", "correct": false}, {"label": "B", "text": "The exspouse’s designation was automatically revoked (with exceptions)", "correct": true}, {"label": "C", "text": "The insurer decides who to pay", "correct": false}, {"label": "D", "text": "The benefit is lost", "correct": false}], "explanation": "Divorce revocation (§9.301): the ex-spouse is automatically revoked. A: by default they don’t collect. C: the insurer doesn’t decide. D: it passes to the contingent/estate, it isn’t “lost.”", "id": "en-s6-q19", "topic": "General", "globalNumber": 269}, {"simulator": 6, "number": 20, "stem": "A licensed agent wants to start selling for a new insurer. What is needed FIRST?", "options": [{"label": "A", "text": "A new state exam", "correct": false}, {"label": "B", "text": "An appointment from that insurer (reported to the TDI)", "correct": true}, {"label": "C", "text": "The client’s approval", "correct": false}, {"label": "D", "text": "A second license", "correct": false}], "explanation": "First they need an appointment from that insurer. A: no repeat exam. C: the client doesn’t authorize. D: no second license needed.", "id": "en-s6-q20", "topic": "Texas Law", "globalNumber": 270}, {"simulator": 6, "number": 21, "stem": "A Texas resident’s insurer is declared insolvent. TLHIGA covers the death benefit of their life policy up to:", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": false}, {"label": "C", "text": "$300,000", "correct": true}, {"label": "D", "text": "$500,000", "correct": false}], "explanation": "TLHIGA death benefit = $300,000. A: $100k is cash value. B: $250k is annuity. D: $500k is health.", "id": "en-s6-q21", "topic": "Texas Law", "globalNumber": 271}, {"simulator": 6, "number": 22, "stem": "An agent offers a client a $200 gift card to sign today. Regarding rebating:", "options": [{"label": "A", "text": "Only the agent can be penalized", "correct": false}, {"label": "B", "text": "Both the agent and the client who accepts can be penalized", "correct": true}, {"label": "C", "text": "It is legal in Texas", "correct": false}, {"label": "D", "text": "Only the client is penalized", "correct": false}], "explanation": "Rebating penalizes agent and client. A/D: not just one. C: it’s not legal.", "id": "en-s6-q22", "topic": "Taxation", "globalNumber": 272}, {"simulator": 6, "number": 23, "stem": "A Texas agent is going to renew their life license. They MUST complete, per 2-year period:", "options": [{"label": "A", "text": "12 hours, 1 of ethics", "correct": false}, {"label": "B", "text": "24 hours, 3 of ethics", "correct": true}, {"label": "C", "text": "40 hours, 5 of ethics", "correct": false}, {"label": "D", "text": "None", "correct": false}], "explanation": "CE in Texas = 24 hours, 3 of ethics. A/C/D do not match.", "id": "en-s6-q23", "topic": "Texas Law", "globalNumber": 273}, {"simulator": 6, "number": 24, "stem": "An agent spreads, without proof, that a rival insurer “is going bankrupt” to steal its clients. They commit:", "options": [{"label": "A", "text": "Rebating", "correct": false}, {"label": "B", "text": "Defamation", "correct": true}, {"label": "C", "text": "Twisting", "correct": false}, {"label": "D", "text": "Sliding", "correct": false}], "explanation": "Defaming another insurer’s solvency = defamation. A: rebating is an inducement. C: twisting is replacement by deception. D: sliding is a charge without permission.", "id": "en-s6-q24", "topic": "General", "globalNumber": 274}, {"simulator": 6, "number": 25, "stem": "An agent deposits client premiums into their personal bank account “for a few days.” This is:", "options": [{"label": "A", "text": "Acceptable", "correct": false}, {"label": "B", "text": "Commingling, a breach of fiduciary duty", "correct": true}, {"label": "C", "text": "Rebating", "correct": false}, {"label": "D", "text": "Field underwriting", "correct": false}], "explanation": "Mixing premiums with personal funds = commingling. A: not acceptable. C/D: do not apply.", "id": "en-s6-q25", "topic": "Texas Law", "globalNumber": 275}, {"simulator": 6, "number": 26, "stem": "To obtain a Texas life license, a candidate MUST score at least:", "options": [{"label": "A", "text": "60%", "correct": false}, {"label": "B", "text": "65%", "correct": false}, {"label": "C", "text": "70%", "correct": true}, {"label": "D", "text": "80%", "correct": false}], "explanation": "Passing the Texas license = 70%. A/B/D are not the threshold.", "id": "en-s6-q26", "topic": "Retirement", "globalNumber": 276}, {"simulator": 6, "number": 27, "stem": "A client invested $100,000 in an annuity whose total expected return is $200,000. What percentage of each payment is excluded from tax (exclusion ratio)?", "options": [{"label": "A", "text": "25%", "correct": false}, {"label": "B", "text": "50%", "correct": true}, {"label": "C", "text": "75%", "correct": false}, {"label": "D", "text": "100%", "correct": false}], "explanation": "Exclusion ratio = investment ÷ expected return = 100,000 ÷ 200,000 = 50%. The others don’t result from that ratio.", "id": "en-s6-q27", "topic": "General", "globalNumber": 277}, {"simulator": 6, "number": 28, "stem": "An owner surrenders their policy. They paid $25,000 in premiums (no dividends) and the cash value is $40,000. How much is taxable?", "options": [{"label": "A", "text": "$40,000", "correct": false}, {"label": "B", "text": "$25,000", "correct": false}, {"label": "C", "text": "$15,000", "correct": true}, {"label": "D", "text": "$0
