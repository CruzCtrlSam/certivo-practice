", "correct": false}, {"label": "D", "text": "El agent’s report", "correct": false}], "explanation": "El APS requiere autorización escrita.", "id": "es-s4-q11", "topic": "General", "globalNumber": 161}, {"simulator": 4, "number": 12, "stem": "Un cliente quiere proteger su hipoteca de 30 años: si muere, que alcance para liquidar el saldo decreciente. Le conviene:", "options": [{"label": "A", "text": "Increasing term", "correct": false}, {"label": "B", "text": "Decreasing term", "correct": true}, {"label": "C", "text": "Whole life", "correct": false}, {"label": "D", "text": "Anualidad", "correct": false}], "explanation": "Saldo decreciente de hipoteca = decreasing term.", "id": "es-s4-q12", "topic": "Ley de Texas", "globalNumber": 162}, {"simulator": 4, "number": 13, "stem": "El “once a MEC, always a MEC” significa que:", "options": [{"label": "A", "text": "Un MEC puede revertirse pagando menos", "correct": false}, {"label": "B", "text": "La clasificación de MEC es permanente", "correct": true}, {"label": "C", "text": "El MEC pierde su death benefit", "correct": false}, {"label": "D", "text": "El MEC se convierte en anualidad", "correct": false}], "explanation": "La clasificación de MEC es permanente.", "id": "es-s4-q13", "topic": "Impuestos", "globalNumber": 163}, {"simulator": 4, "number": 14, "stem": "El productor representa legalmente a:", "options": [{"label": "A", "text": "El cliente", "correct": false}, {"label": "B", "text": "La aseguradora", "correct": true}, {"label": "C", "text": "El TDI", "correct": false}, {"label": "D", "text": "El beneficiario", "correct": false}], "explanation": "El productor representa a la aseguradora.", "id": "es-s4-q14", "topic": "Anualidades", "globalNumber": 164}, {"simulator": 4, "number": 15, "stem": "En 2026, el límite de aportación electiva a un 401(k) (sin catch-up) es:", "options": [{"label": "A", "text": "$7,500", "correct": false}, {"label": "B", "text": "$19,500", "correct": false}, {"label": "C", "text": "$23,000", "correct": false}, {"label": "D", "text": "$24,500", "correct": true}], "explanation": "401(k) 2026 = $24,500 (sin catch-up).", "id": "es-s4-q15", "topic": "Ley de Texas", "globalNumber": 165}, {"simulator": 4, "number": 16, "stem": "Una anualidad “joint and survivor” continúa pagando:", "options": [{"label": "A", "text": "Hasta que muere el primero de los dos", "correct": false}, {"label": "B", "text": "Al cónyuge sobreviviente tras la muerte del primero", "correct": true}, {"label": "C", "text": "Solo por un periodo fijo", "correct": false}, {"label": "D", "text": "Solo si la muerte fue accidental", "correct": false}], "explanation": "Joint and survivor continúa al sobreviviente.", "id": "es-s4-q16", "topic": "General", "globalNumber": 166}, {"simulator": 4, "number": 17, "stem": "¿Qué práctica de Texas se castiga tanto al agente como al cliente que la acepta?", "options": [{"label": "A", "text": "Field underwriting", "correct": false}, {"label": "B", "text": "Rebating", "correct": true}, {"label": "C", "text": "Replacement con divulgación", "correct": false}, {"label": "D", "text": "Suitability", "correct": false}], "explanation": "Rebating sanciona a ambos.", "id": "es-s4-q17", "topic": "General", "globalNumber": 167}, {"simulator": 4, "number": 18, "stem": "Un solicitante declara una edad menor a la real y paga prima insuficiente. Al morir, la aseguradora:", "options": [{"label": "A", "text": "Anula la póliza", "correct": false}, {"label": "B", "text": "Ajusta el beneficio a lo que la prima compraba a la edad correcta", "correct": true}, {"label": "C", "text": "Paga el doble", "correct": false}, {"label": "D", "text": "Devuelve las primas", "correct": false}], "explanation": "Misstatement of age → ajustan el beneficio.", "id": "es-s4-q18", "topic": "Retiro", "globalNumber": 168}, {"simulator": 4, "number": 19, "stem": "¿Qué retiro de una anualidad no calificada está sujeto a impuesto y, antes de 59½, a penalidad del 10%?", "options": [{"label": "A", "text": "El retorno de la base", "correct": false}, {"label": "B", "text": "La ganancia (que sale primero por LIFO)", "correct": true}, {"label": "C", "text": "Ninguno", "correct": false}, {"label": "D", "text": "El death benefit", "correct": false}], "explanation": "La ganancia (LIFO) es gravable, +10% si <59½.", "id": "es-s4-q19", "topic": "General", "globalNumber": 169}, {"simulator": 4, "number": 20, "stem": "Un asegurado fallece por enfermedad natural. Tenía un rider de Accidental Death Benefit. La aseguradora paga:", "options": [{"label": "A", "text": "El doble del beneficio", "correct": false}, {"label": "B", "text": "Solo el beneficio base", "correct": true}, {"label": "C", "text": "Solo el ADB", "correct": false}, {"label": "D", "text": "Nada", "correct": false}], "explanation": "Muerte por enfermedad → solo el beneficio base (ADB no aplica).", "id": "es-s4-q20", "topic": "Ley de Texas", "globalNumber": 170}, {"simulator": 4, "number": 21, "stem": "La cláusula de incontestabilidad protege principalmente:", "options": [{"label": "A", "text": "A la aseguradora", "correct": false}, {"label": "B", "text": "Al asegurado y su familia", "correct": true}, {"label": "C", "text": "Al agente", "correct": false}, {"label": "D", "text": "Al TDI", "correct": false}], "explanation": "Incontestabilidad protege al asegurado/familia.", "id": "es-s4-q21", "topic": "Ley de Texas", "globalNumber": 171}, {"simulator": 4, "number": 22, "stem": "Una compañía propiedad de accionistas que emite pólizas non-participating es:", "options": [{"label": "A", "text": "Mutual", "correct": false}, {"label": "B", "text": "Stock", "correct": true}, {"label": "C", "text": "Fraternal", "correct": false}, {"label": "D", "text": "Reciprocal", "correct": false}], "explanation": "Accionistas + non-par = stock.", "id": "es-s4-q22", "topic": "Impuestos", "globalNumber": 172}, {"simulator": 4, "number": 23, "stem": "¿Qué se requiere para mover un 401(k) a una IRA evitando la retención obligatoria del 20%?", "options": [{"label": "A", "text": "Un rollover indirecto de 60 días", "correct": false}, {"label": "B", "text": "Una transferencia directa", "correct": true}, {"label": "C", "text": "Un retiro en efectivo", "correct": false}, {"label": "D", "text": "Esperar a los 73", "correct": false}], "explanation": "Sin retención del 20% = transferencia directa.", "id": "es-s4-q23", "topic": "Ley de Texas", "globalNumber": 173}, {"simulator": 4, "number": 24, "stem": "El free look de una póliza de vida en Texas, en un caso de reemplazo, puede extenderse hasta:", "options": [{"label": "A", "text": "5 días", "correct": false}, {"label": "B", "text": "10 días", "correct": false}, {"label": "C", "text": "20 días", "correct": true}, {"label": "D", "text": "60 días", "correct": false}], "explanation": "Free look en reemplazo se extiende hasta 20 días.", "id": "es-s4-q24", "topic": "General", "globalNumber": 174}, {"simulator": 4, "number": 25, "stem": "Una póliza permanente cuyas primas se pagan solo 20 años pero cubre de por vida es:", "options": [{"label": "A", "text": "Annual renewable term", "correct": false}, {"label": "B", "text": "20-pay whole life (limited-pay)", "correct": true}, {"label": "C", "text": "Decreasing term", "correct": false}, {"label": "D", "text": "Universal Life Opción B", "correct": false}], "explanation": "Pagas 20 años, cubre de por vida = 20-pay whole life.", "id": "es-s4-q25", "topic": "Ley de Texas", "globalNumber": 175}, {"simulator": 4, "number": 26, "stem": "¿Quién asume el riesgo de inversión en un plan de contribución definida (401k)?", "options": [{"label": "A", "text": "El empleador", "correct": false}, {"label": "B", "text": "El empleado", "correct": true}, {"label": "C", "text": "El gobierno", "correct": false}, {"label": "D", "text": "La aseguradora", "correct": false}], "explanation": "En un DC el riesgo es del empleado.", "id": "es-s4-q26", "topic": "Retiro", "globalNumber": 176}, {"simulator": 4, "number": 27, "stem": "Un agente añade un rider que el cliente no solicitó y le cobra de más. Comete:", "options": [{"label": "A", "text": "Sliding", "correct": true}, {"label": "B", "text": "Twisting", "correct": false}, {"label": "C", "text": "Rebating", "correct": false}, {"label": "D", "text": "Backdating", "correct": false}], "explanation": "Agregar rider/cargo sin consentimiento = sliding.", "id": "es-s4-q27", "topic": "General", "globalNumber": 177}, {"simulator": 4, "number": 28, "stem": "El valor en efectivo de una whole life es un beneficio:", "options": [{"label": "A", "text": "Solo por muerte", "correct": false}, {"label": "B", "text": "En vida (living benefit)", "correct": true}, {"label": "C", "text": "Exclusivo de las anualidades", "correct": false}, {"label": "D", "text": "Que no existe en pólizas permanentes", "correct": false}], "explanation": "El cash value es un living benefit.", "id": "es-s4-q28", "topic": "General", "globalNumber": 178}, {"simulator": 4, "number": 29, "stem": "¿Cuál de los siguientes intercambios 1035 está permitido?", "options": [{"label": "A", "text": "Anualidad a vida", "correct": false}, {"label": "B", "text": "Vida a anualidad", "correct": true}, {"label": "C", "text": "Anualidad a salud", "correct": false}, {"label": "D", "text": "Salud a vida", "correct": false}], "explanation": "Vida → anualidad está permitido.", "id": "es-s4-q29", "topic": "Retiro", "globalNumber": 179}, {"simulator": 4, "number": 30, "stem": "El RMD no se exige en vida del titular en una:", "options": [{"label": "A", "text": "IRA tradicional", "correct": false}, {"label": "B", "text": "401(k)", "correct": false}, {"label": "C", "text": "Roth IRA", "correct": true}, {"label": "D", "text": "Pensión DB", "correct": false}], "explanation": "La Roth IRA no exige RMD en vida.", "id": "es-s4-q30", "topic": "Ley de Texas", "globalNumber": 180}, {"simulator": 4, "number": 31, "stem": "Una persona quiere la mayor cobertura por el menor costo, sabiendo que es temporal. Le conviene:", "options": [{"label": "A", "text": "Whole life", "correct": false}, {"label": "B", "text": "Term life", "correct": true}, {"label": "C", "text": "Universal Life", "correct": false}, {"label": "D", "text": "Variable life", "correct": false}], "explanation": "Cobertura temporal barata = term life.", "id": "es-s4-q31", "topic": "General", "globalNumber": 181}, {"simulator": 4, "number": 32, "stem": "En Texas, ¿quién designa al Comisionado de Seguros?", "options": [{"label": "A", "text": "Los votantes", "correct": false}, {"label": "B", "text": "El Gobernador", "correct": true}, {"label": "C", "text": "El Presidente", "correct": false}, {"label": "D", "text": "La legislatura federal", "correct": false}], "explanation": "El Gobernador designa al Comisionado.", "id": "es-s4-q32", "topic": "Retiro", "globalNumber": 182}, {"simulator": 4, "number": 33, "stem": "Una anualidad fija expone al titular principalmente al riesgo de:", "options": [{"label": "A", "text": "Pérdida de mercado", "correct": false}, {"label": "B", "text": "Inflación (poder adquisitivo de pagos fijos)", "correct": true}, {"label": "C", "text": "Quiebra del beneficiario", "correct": false}, {"label": "D", "text": "Desmembramiento", "correct": false}], "explanation": "La anualidad fija enfrenta riesgo de inflación.", "id": "es-s4-q33", "topic": "Anualidades", "globalNumber": 183}, {"simulator": 4, "number": 34, "stem": "Las respuestas de la solicitud que son ciertas “a leal saber y entender” del solicitante son:", "options": [{"label": "A", "text": "Garantías", "correct": false}, {"label": "B", "text": "Representaciones", "correct": true}, {"label": "C", "text": "Fraude", "correct": false}, {"label": "D", "text": "Cláusulas independientes", "correct": false}], "explanation": "Son representaciones.", "id": "es-s4-q34", "topic": "General", "globalNumber": 184}, {"simulator": 4, "number": 35, "stem": "¿Qué porción de un settlement option que paga en cuotas con interés es gravable?", "options": [{"label": "A", "text": "Todo el pago", "correct": false}, {"label": "B", "text": "Solo el interés", "correct": true}, {"label": "C", "text": "Nada", "correct": false}, {"label": "D", "text": "Solo el principal", "correct": false}], "explanation": "Solo el interés del settlement es gravable.", "id": "es-s4-q35", "topic": "Ley de Texas", "globalNumber": 185}, {"simulator": 4, "number": 36, "stem": "Un asegurado se suicida 30 meses después de emitida la póliza. La aseguradora:", "options": [{"label": "A", "text": "Devuelve las primas", "correct": false}, {"label": "B", "text": "No paga nada", "correct": false}, {"label": "C", "text": "Paga el beneficio (ya pasó el periodo de 2 años)", "correct": true}, {"label": "D", "text": "Paga la mitad", "correct": false}], "explanation": "A los 30 meses (>2 años): paga el beneficio.", "id": "es-s4-q36", "topic": "Impuestos", "globalNumber": 186}, {"simulator": 4, "number": 37, "stem": "El número de horas de educación continua que exige Texas por periodo de 2 años es:", "options": [{"label": "A", "text": "12", "correct": false}, {"label": "B", "text": "20", "correct": false}, {"label": "C", "text": "24", "correct": true}, {"label": "D", "text": "30", "correct": false}], "explanation": "CE: 24 horas.", "id": "es-s4-q37", "topic": "Anualidades", "globalNumber": 187}, {"simulator": 4, "number": 38, "stem": "Una anualidad inmediata (SPIA) se distingue porque:", "options": [{"label": "A", "text": "Tiene una larga fase de acumulación", "correct": false}, {"label": "B", "text": "Comienza a pagar en aproximadamente un año, con prima única", "correct": true}, {"label": "C", "text": "Solo es variable", "correct": false}, {"label": "D", "text": "No paga de por vida", "correct": false}], "explanation": "SPIA: prima única, paga en ~1 año.", "id": "es-s4-q38", "topic": "General", "globalNumber": 188}, {"simulator": 4, "number": 39, "stem": "El rider que exime las primas si el asegurado queda totalmente discapacitado es:", "options": [{"label": "A", "text": "Accidental Death Benefit", "correct": false}, {"label": "B", "text": "Waiver of Premium", "correct": true}, {"label": "C", "text": "Guaranteed Insurability", "correct": false}, {"label": "D", "text": "Return of Premium", "correct": false}], "explanation": "Exención por discapacidad = Waiver of Premium.", "id": "es-s4-q39", "topic": "Impuestos", "globalNumber": 189}, {"simulator": 4, "number": 40, "stem": "Una clasificación de riesgo “substandard (rated)” significa que el solicitante:", "options": [{"label": "A", "text": "Fue rechazado", "correct": false}, {"label": "B", "text": "Es aceptado con prima recargada", "correct": true}, {"label": "C", "text": "Recibe la prima más baja", "correct": false}, {"label": "D", "text": "No necesita underwriting", "correct": false}], "explanation": "Substandard = aceptado con recargo.", "id": "es-s4-q40", "topic": "General", "globalNumber": 190}, {"simulator": 4, "number": 41, "stem": "¿Qué ley federal protege la privacidad y exactitud de los consumer reports usados en underwriting?", "options": [{"label": "A", "text": "HIPAA", "correct": false}, {"label": "B", "text": "Fair Credit Reporting Act", "correct": true}, {"label": "C", "text": "McCarran-Ferguson", "correct": false}, {"label": "D", "text": "ERISA", "correct": false}], "explanation": "Fair Credit Reporting Act.", "id": "es-s4-q41", "topic": "General", "globalNumber": 191}, {"simulator": 4, "number": 42, "stem": "Las aportaciones a una Roth IRA:", "options": [{"label": "A", "text": "Son deducibles", "correct": false}, {"label": "B", "text": "Nunca son deducibles (after-tax)", "correct": true}, {"label": "C", "text": "Son deducibles después de los 50", "correct": false}, {"label": "D", "text": "No tienen límite de ingreso", "correct": false}], "explanation": "Roth: nunca deducibles.", "id": "es-s4-q42", "topic": "General", "globalNumber": 192}, {"simulator": 4, "number": 43, "stem": "El death benefit en suma global pagado por muerte es, para income tax:", "options": [{"label": "A", "text": "Gravable en su totalidad", "correct": false}, {"label": "B", "text": "Generalmente libre de impuesto", "correct": true}, {"label": "C", "text": "Gravable al 50%", "correct": false}, {"label": "D", "text": "Gravable si excede $250,000", "correct": false}], "explanation": "Death benefit lump sum = libre de income tax.", "id": "es-s4-q43", "topic": "Ley de Texas", "globalNumber": 193}, {"simulator": 4, "number": 44, "stem": "Un agente que reemplaza una póliza mediante comparaciones engañosas comete:", "options": [{"label": "A", "text": "Churning", "correct": false}, {"label": "B", "text": "Twisting", "correct": true}, {"label": "C", "text": "Sliding", "correct": false}, {"label": "D", "text": "Field underwriting", "correct": false}], "explanation": "Reemplazo por engaño = twisting.", "id": "es-s4-q44", "topic": "General", "globalNumber": 194}, {"simulator": 4, "number": 45, "stem": "El productor que entrega una póliza sin haber cobrado la prima debe obtener, además del pago:", "options": [{"label": "A", "text": "Una orden judicial", "correct": false}, {"label": "B", "text": "Una declaración de buena salud", "correct": true}, {"label": "C", "text": "La firma del beneficiario", "correct": false}, {"label": "D", "text": "Un nuevo examen del MIB", "correct": false}], "explanation": "En la entrega: statement of good health (+ pago).", "id": "es-s4-q45", "topic": "Retiro", "globalNumber": 195}, {"simulator": 4, "number": 46, "stem": "¿Qué plan recibe aportaciones solo del empleador a las IRA de los empleados?", "options": [{"label": "A", "text": "SIMPLE", "correct": false}, {"label": "B", "text": "SEP", "correct": true}, {"label": "C", "text": "401(k)", "correct": false}, {"label": "D", "text": "Roth IRA", "correct": false}], "explanation": "Solo el empleador aporta = SEP.", "id": "es-s4-q46", "topic": "General", "globalNumber": 196}, {"simulator": 4, "number": 47, "stem": "Un beneficiario contingente cobra el beneficio:", "options": [{"label": "A", "text": "Siempre, junto con el primario", "correct": false}, {"label": "B", "text": "Solo si el primario no sobrevive al asegurado", "correct": true}, {"label": "C", "text": "Nunca", "correct": false}, {"label": "D", "text": "Solo si lo autoriza el primario", "correct": false}], "explanation": "El contingente cobra si el primario no sobrevive.", "id": "es-s4-q47", "topic": "General", "globalNumber": 197}, {"simulator": 4, "number": 48, "stem": "¿Qué característica del contrato implica un intercambio de valores desiguales?", "options": [{"label": "A", "text": "Unilateral", "correct": false}, {"label": "B", "text": "Aleatorio", "correct": true}, {"label": "C", "text": "De adhesión", "correct": false}, {"label": "D", "text": "Condicional", "correct": false}], "explanation": "Valores desiguales = aleatorio.", "id": "es-s4-q48", "topic": "General", "globalNumber": 198}, {"simulator": 4, "number": 49, "stem": "Un agente representa a una nueva aseguradora. Para hacerlo legalmente requiere:", "options": [{"label": "A", "text": "Solo su licencia existente", "correct": false}, {"label": "B", "text": "Un appointment de esa aseguradora", "correct": true}, {"label": "C", "text": "Aprobación del cliente", "correct": false}, {"label": "D", "text": "Un nuevo examen estatal", "correct": false}], "explanation": "Requiere un appointment de esa aseguradora.", "id": "es-s4-q49", "topic": "Retiro", "globalNumber": 199}, {"simulator": 4, "number": 50, "stem": "El límite de la TLHIGA para el valor presente de anualidades es:", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": true}, {"label": "C", "text": "$300,000", "correct": false}, {"label": "D", "text": "$500,000", "correct": false}], "explanation": "TLHIGA anualidad = $250,000.", "id": "es-s4-q50", "topic": "Ley de Texas", "globalNumber": 200}, {"simulator": 5, "number": 1, "stem": "El riesgo que solo tiene dos resultados —pérdida o no pérdida— y es asegurable se llama:", "options": [{"label": "A", "text": "Especulativo", "correct": false}, {"label": "B", "text": "Puro", "correct": true}, {"label": "C", "text": "Moral", "correct": false}, {"label": "D", "text": "Fortuito", "correct": false}], "explanation": "Solo pérdida o no pérdida = riesgo puro.", "id": "es-s5-q1", "topic": "Anualidades", "globalNumber": 201}, {"simulator": 5, "number": 2, "stem": "Una anualidad diferida de prima flexible (FPDA) se caracteriza por:", "options": [{"label": "A", "text": "Una sola prima", "correct": false}, {"label": "B", "text": "Permitir múltiples aportaciones durante la acumulación", "correct": true}, {"label": "C", "text": "Pagos que inician en menos de un año", "correct": false}, {"label": "D", "text": "No tener fase de acumulación", "correct": false}], "explanation": "FPDA = múltiples aportaciones en la acumulación.", "id": "es-s5-q2", "topic": "General", "globalNumber": 202}, {"simulator": 5, "number": 3, "stem": "¿Cuál de los siguientes NO está cubierto por la Texas Guaranty Association?", "options": [{"label": "A", "text": "El beneficio por muerte garantizado", "correct": false}, {"label": "B", "text": "El valor de rescate garantizado", "correct": false}, {"label": "C", "text": "La porción no garantizada de una variable annuity (cuenta separada)", "correct": true}, {"label": "D", "text": "El valor presente de una anualidad fija", "correct": false}], "explanation": "La porción no garantizada (cuenta separada) no está cubierta.", "id": "es-s5-q3", "topic": "Ley de Texas", "globalNumber": 203}, {"simulator": 5, "number": 4, "stem": "Un cliente quiere que, si muere, su familia reciba la suma asegurada más todas las primas pagadas. Le conviene el rider:", "options": [{"label": "A", "text": "Waiver of premium", "correct": false}, {"label": "B", "text": "Return of premium", "correct": true}, {"label": "C", "text": "Accidental death", "correct": false}, {"label": "D", "text": "Guaranteed insurability", "correct": false}], "explanation": "DB + primas pagadas = Return of Premium.", "id": "es-s5-q4", "topic": "General", "globalNumber": 204}, {"simulator": 5, "number": 5, "stem": "Bajo la regla de la transferencia directa (trustee-to-trustee), la retención obligatoria del 20% es:", "options": [{"label": "A", "text": "Aplicable siempre", "correct": false}, {"label": "B", "text": "No aplicable", "correct": true}, {"label": "C", "text": "Del 10%", "correct": false}, {"label": "D", "text": "Del 30%", "correct": false}], "explanation": "Transferencia directa = sin retención del 20%.", "id": "es-s5-q5", "topic": "Retiro", "globalNumber": 205}, {"simulator": 5, "number": 6, "stem": "Una whole life de prima única (single-premium) probablemente se clasifique como:", "options": [{"label": "A", "text": "Term convertible", "correct": false}, {"label": "B", "text": "MEC", "correct": true}, {"label": "C", "text": "Endowment puro", "correct": false}, {"label": "D", "text": "Anualidad inmediata", "correct": false}], "explanation": "Single-premium WL suele ser MEC.", "id": "es-s5-q6", "topic": "Ley de Texas", "globalNumber": 206}, {"simulator": 5, "number": 7, "stem": "El agente debe entregar al solicitante, para que compare pólizas, el:", "options": [{"label": "A", "text": "Agent’s report", "correct": false}, {"label": "B", "text": "Buyer’s guide y policy summary", "correct": true}, {"label": "C", "text": "MIB", "correct": false}, {"label": "D", "text": "APS", "correct": false}], "explanation": "Para comparar: buyer’s guide + policy summary.", "id": "es-s5-q7", "topic": "General", "globalNumber": 207}, {"simulator": 5, "number": 8, "stem": "Una persona de 68 años con una Roth IRA no quiere verse obligada a retirar dinero. ¿Debe tomar RMD?", "options": [{"label": "A", "text": "Sí, desde los 65", "correct": false}, {"label": "B", "text": "Sí, desde los 73", "correct": false}, {"label": "C", "text": "No, la Roth no exige RMD en vida", "correct": true}, {"label": "D", "text": "Solo si excede $100,000", "correct": false}], "explanation": "La Roth no exige RMD en vida.", "id": "es-s5-q8", "topic": "Retiro", "globalNumber": 208}, {"simulator": 5, "number": 9, "stem": "¿Qué opción de liquidación deja que la aseguradora retenga el capital y pague solo los intereses?", "options": [{"label": "A", "text": "Fixed period", "correct": false}, {"label": "B", "text": "Fixed amount", "correct": false}, {"label": "C", "text": "Interest only", "correct": true}, {"label": "D", "text": "Life income", "correct": false}], "explanation": "Retener capital y pagar interés = interest only.", "id": "es-s5-q9", "topic": "Retiro", "globalNumber": 209}, {"simulator": 5, "number": 10, "stem": "Un agente que cobra una prima y la deposita en su cuenta personal viola su deber:", "options": [{"label": "A", "text": "De suitability", "correct": false}, {"label": "B", "text": "Fiduciario (commingling)", "correct": true}, {"label": "C", "text": "De field underwriting", "correct": false}, {"label": "D", "text": "De disclosure", "correct": false}], "explanation": "Mezclar primas = violación fiduciaria (commingling).", "id": "es-s5-q10", "topic": "General", "globalNumber": 210}, {"simulator": 5, "number": 11, "stem": "¿Cuál es la edad a partir de la cual los retiros de fondos de retiro calificados ya no tienen la penalidad del 10%?", "options": [{"label": "A", "text": "55", "correct": false}, {"label": "B", "text": "59½", "correct": true}, {"label": "C", "text": "65", "correct": false}, {"label": "D", "text": "73", "correct": false}], "explanation": "Sin penalidad del 10% a partir de 59½.", "id": "es-s5-q11", "topic": "General", "globalNumber": 211}, {"simulator": 5, "number": 12, "stem": "Una póliza con beneficio por muerte que equivale a la suma asegurada más el valor en efectivo es una Universal Life:", "options": [{"label": "A", "text": "Opción A", "correct": false}, {"label": "B", "text": "Opción B", "correct": true}, {"label": "C", "text": "Indexada", "correct": false}, {"label": "D", "text": "De prima única", "correct": false}], "explanation": "DB = suma + cash value = Opción B.", "id": "es-s5-q12", "topic": "Ley de Texas", "globalNumber": 212}, {"simulator": 5, "number": 13, "stem": "El TDI puede, ante violaciones graves de un agente:", "options": [{"label": "A", "text": "Solo enviar una carta", "correct": false}, {"label": "B", "text": "Suspender o revocar la licencia, multar y emitir órdenes de cese", "correct": true}, {"label": "C", "text": "Nada, depende del gobierno federal", "correct": false}, {"label": "D", "text": "Cancelar la póliza del cliente", "correct": false}], "explanation": "El TDI puede suspender/revocar, multar y cesar.", "id": "es-s5-q13", "topic": "Impuestos", "globalNumber": 213}, {"simulator": 5, "number": 14, "stem": "Un asegurado declara incorrectamente su sexo y paga prima insuficiente. La aseguradora, al pagar:", "options": [{"label": "A", "text": "Anula la póliza", "correct": false}, {"label": "B", "text": "Ajusta el beneficio según lo que la prima habría comprado", "correct": true}, {"label": "C", "text": "Paga el doble", "correct": false}, {"label": "D", "text": "Devuelve las primas", "correct": false}], "explanation": "Misstatement (edad/sexo) → ajustan el beneficio.", "id": "es-s5-q14", "topic": "Anualidades", "globalNumber": 214}, {"simulator": 5, "number": 15, "stem": "¿Qué tipo de plan de retiro es para empleados gubernamentales que difieren compensación?", "options": [{"label": "A", "text": "403(b)", "correct": false}, {"label": "B", "text": "457(b)", "correct": true}, {"label": "C", "text": "SEP", "correct": false}, {"label": "D", "text": "Keogh", "correct": false}], "explanation": "Empleados gubernamentales = 457(b).", "id": "es-s5-q15", "topic": "Ley de Texas", "globalNumber": 215}, {"simulator": 5, "number": 16, "stem": "El productor que reúne información, observa al solicitante y verifica exactitud antes de enviar la solicitud realiza:", "options": [{"label": "A", "text": "Adverse selection", "correct": false}, {"label": "B", "text": "Field underwriting", "correct": true}, {"label": "C", "text": "Rebating", "correct": false}, {"label": "D", "text": "Twisting", "correct": false}], "explanation": "Reunir/verificar info = field underwriting.", "id": "es-s5-q16", "topic": "General", "globalNumber": 216}, {"simulator": 5, "number": 17, "stem": "¿Cuál es la opción de pago de anualidad con el ingreso periódico más alto?", "options": [{"label": "A", "text": "Joint and survivor", "correct": false}, {"label": "B", "text": "Life with period certain", "correct": false}, {"label": "C", "text": "Life only (straight life)", "correct": true}, {"label": "D", "text": "Cash refund", "correct": false}], "explanation": "Life only paga el ingreso más alto.", "id": "es-s5-q17", "topic": "General", "globalNumber": 217}, {"simulator": 5, "number": 18, "stem": "El periodo durante el cual el dueño puede devolver una póliza nueva y recibir reembolso total se llama:", "options": [{"label": "A", "text": "Grace period", "correct": false}, {"label": "B", "text": "Free look", "correct": true}, {"label": "C", "text": "Contestable period", "correct": false}, {"label": "D", "text": "Elimination period", "correct": false}], "explanation": "Devolución con reembolso total = free look.", "id": "es-s5-q18", "topic": "Retiro", "globalNumber": 218}, {"simulator": 5, "number": 19, "stem": "Las primas de un seguro de vida personal son:", "options": [{"label": "A", "text": "Deducibles de impuestos", "correct": false}, {"label": "B", "text": "No deducibles", "correct": true}, {"label": "C", "text": "Deducibles después de los 65", "correct": false}, {"label": "D", "text": "Parcialmente deducibles", "correct": false}], "explanation": "Primas personales = no deducibles.", "id": "es-s5-q19", "topic": "General", "globalNumber": 219}, {"simulator": 5, "number": 20, "stem": "En una anualidad no calificada, la porción de cada pago anualizado que representa el retorno de la base es:", "options": [{"label": "A", "text": "Gravable", "correct": false}, {"label": "B", "text": "No gravable", "correct": true}, {"label": "C", "text": "Penalizada", "correct": false}, {"label": "D", "text": "Deducible", "correct": false}], "explanation": "El retorno de la base = no gravable.", "id": "es-s5-q20", "topic": "Ley de Texas", "globalNumber": 220}, {"simulator": 5, "number": 21, "stem": "Un beneficiario irrevocable tiene un derecho:", "options": [{"label": "A", "text": "De mera expectativa", "correct": false}, {"label": "B", "text": "Adquirido (vested)", "correct": true}, {"label": "C", "text": "Inexistente", "correct": false}, {"label": "D", "text": "Que el dueño puede ignorar", "correct": false}], "explanation": "El irrevocable tiene derecho vested.", "id": "es-s5-q21", "topic": "Ley de Texas", "globalNumber": 221}, {"simulator": 5, "number": 22, "stem": "La ley de Texas que revoca automáticamente al excónyuge como beneficiario tras un divorcio es:", "options": [{"label": "A", "text": "La cláusula spendthrift", "correct": false}, {"label": "B", "text": "El Divorce Revocation Statute (Family Code §9.301)", "correct": true}, {"label": "C", "text": "La cláusula de incontestabilidad", "correct": false}, {"label": "D", "text": "La regla de los 3 años", "correct": false}], "explanation": "Divorce Revocation §9.301.", "id": "es-s5-q22", "topic": "Impuestos", "globalNumber": 222}, {"simulator": 5, "number": 23, "stem": "Una aseguradora difunde estados financieros falsos. Esto es una práctica:", "options": [{"label": "A", "text": "Permitida", "correct": false}, {"label": "B", "text": "Comercial injusta (prohibida)", "correct": true}, {"label": "C", "text": "De suitability", "correct": false}, {"label": "D", "text": "De field underwriting", "correct": false}], "explanation": "Estados financieros falsos = práctica injusta prohibida.", "id": "es-s5-q23", "topic": "Ley de Texas", "globalNumber": 223}, {"simulator": 5, "number": 24, "stem": "Una persona quiere participar de un índice bursátil con un piso que la proteja de pérdidas. Le conviene una anualidad:", "options": [{"label": "A", "text": "Variable", "correct": false}, {"label": "B", "text": "Indexada", "correct": true}, {"label": "C", "text": "Inmediata variable", "correct": false}, {"label": "D", "text": "De prima flexible variable", "correct": false}], "explanation": "Índice con piso = indexada.", "id": "es-s5-q24", "topic": "General", "globalNumber": 224}, {"simulator": 5, "number": 25, "stem": "¿Cuántos años, típicamente, dura el periodo dentro del cual una póliza caducada puede reactivarse bajo la provisión estándar?", "options": [{"label": "A", "text": "1 año", "correct": false}, {"label": "B", "text": "3 años (en Texas a menudo hasta 5)", "correct": true}, {"label": "C", "text": "10 años", "correct": false}, {"label": "D", "text": "Indefinidamente", "correct": false}], "explanation": "Reinstatement estándar ~3 años (TX hasta 5).", "id": "es-s5-q25", "topic": "Ley de Texas", "globalNumber": 225}, {"simulator": 5, "number": 26, "stem": "El death benefit entra al patrimonio del asegurado para estate tax si este:", "options": [{"label": "A", "text": "Vivía en Texas", "correct": false}, {"label": "B", "text": "Tenía incidents of ownership al morir", "correct": true}, {"label": "C", "text": "Pagó primas mensuales", "correct": false}, {"label": "D", "text": "Tenía menos de 60 años", "correct": false}], "explanation": "Entra al estate si tenía incidents of ownership.", "id": "es-s5-q26", "topic": "Retiro", "globalNumber": 226}, {"simulator": 5, "number": 27, "stem": "¿Qué plan permite a una empresa de 80 empleados que tanto el empleado como el patrón aporten?", "options": [{"label": "A", "text": "SEP IRA", "correct": false}, {"label": "B", "text": "SIMPLE IRA", "correct": true}, {"label": "C", "text": "Keogh", "correct": false}, {"label": "D", "text": "Pensión DB", "correct": false}], "explanation": "Empleado + patrón, empresa chica = SIMPLE IRA.", "id": "es-s5-q27", "topic": "General", "globalNumber": 227}, {"simulator": 5, "number": 28, "stem": "La cláusula que paga el beneficio menos la prima vencida si el asegurado muere con una prima impaga reciente es el:", "options": [{"label": "A", "text": "Free look", "correct": false}, {"label": "B", "text": "Periodo de gracia", "correct": true}, {"label": "C", "text": "Periodo contestable", "correct": false}, {"label": "D", "text": "Reinstatement", "correct": false}], "explanation": "Pagar el DB menos la prima vencida = periodo de gracia.", "id": "es-s5-q28", "topic": "General", "globalNumber": 228}, {"simulator": 5, "number": 29, "stem": "Un agente representa a la ___ aunque le deba honestidad e idoneidad al cliente:", "options": [{"label": "A", "text": "Aseguradora", "correct": true}, {"label": "B", "text": "Familia del cliente", "correct": false}, {"label": "C", "text": "NAIC", "correct": false}, {"label": "D", "text": "SEC", "correct": false}], "explanation": "El agente representa a la aseguradora.", "id": "es-s5-q29", "topic": "Retiro", "globalNumber": 229}, {"simulator": 5, "number": 30, "stem": "Para vender una anualidad variable se requiere:", "options": [{"label": "A", "text": "Solo licencia de vida", "correct": false}, {"label": "B", "text": "Licencia de vida más registro de valores", "correct": true}, {"label": "C", "text": "Solo licencia de salud", "correct": false}, {"label": "D", "text": "Ninguna licencia", "correct": false}], "explanation": "Variable = licencia de vida + valores.", "id": "es-s5-q30", "topic": "Ley de Texas", "globalNumber": 230}, {"simulator": 5, "number": 31, "stem": "La cláusula de suicidio en Texas, dentro del periodo de exclusión, hace que la aseguradora:", "options": [{"label": "A", "text": "Pague el beneficio completo", "correct": false}, {"label": "B", "text": "Devuelva las primas pagadas", "correct": true}, {"label": "C", "text": "No haga nada", "correct": false}, {"label": "D", "text": "Pague el doble", "correct": false}], "explanation": "Suicidio en el periodo → devuelve primas.", "id": "es-s5-q31", "topic": "General", "globalNumber": 231}, {"simulator": 5, "number": 32, "stem": "¿Qué se grava en un plan calificado al distribuirse?", "options": [{"label": "A", "text": "Solo la ganancia", "correct": false}, {"label": "B", "text": "La totalidad", "correct": true}, {"label": "C", "text": "Nada", "correct": false}, {"label": "D", "text": "Solo la base", "correct": false}], "explanation": "Plan calificado: gravable en su totalidad.", "id": "es-s5-q32", "topic": "Retiro", "globalNumber": 232}, {"simulator": 5, "number": 33, "stem": "Una designación “per stirpes” hace que la porción de un beneficiario premuerto:", "options": [{"label": "A", "text": "Se reparta entre los sobrevivientes", "correct": false}, {"label": "B", "text": "Baje a sus descendientes", "correct": true}, {"label": "C", "text": "Vaya al estate del asegurado", "correct": false}, {"label": "D", "text": "Se pierda", "correct": false}], "explanation": "Per stirpes: baja a los descendientes.", "id": "es-s5-q33", "topic": "Anualidades", "globalNumber": 233}, {"simulator": 5, "number": 34, "stem": "El límite de cobertura de la TLHIGA para salud (médico mayor) es:", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": false}, {"label": "C", "text": "$300,000", "correct": false}, {"label": "D", "text": "$500,000", "correct": true}], "explanation": "TLHIGA salud = $500,000.", "id": "es-s5-q34", "topic": "General", "globalNumber": 234}, {"simulator": 5, "number": 35, "stem": "El rider que permite cobrar parte del beneficio en vida ante enfermedad terminal, reduciendo el monto final, es:", "options": [{"label": "A", "text": "Accidental Death Benefit", "correct": false}, {"label": "B", "text": "Accelerated Death Benefit", "correct": true}, {"label": "C", "text": "Guaranteed Insurability", "correct": false}, {"label": "D", "text": "Waiver of Premium", "correct": false}], "explanation": "Cobrar en vida por terminal = Accelerated Death Benefit.", "id": "es-s5-q35", "topic": "Ley de Texas", "globalNumber": 235}, {"simulator": 5, "number": 36, "stem": "¿Quién asume el riesgo de inversión en una anualidad fija?", "options": [{"label": "A", "text": "El dueño", "correct": false}, {"label": "B", "text": "La aseguradora", "correct": true}, {"label": "C", "text": "El gobierno", "correct": false}, {"label": "D", "text": "El beneficiario", "correct": false}], "explanation": "En la fija, el riesgo es de la aseguradora.", "id": "es-s5-q36", "topic": "Impuestos", "globalNumber": 236}, {"simulator": 5, "number": 37, "stem": "Un solicitante con riesgo mejor que el promedio, con salud y hábitos excelentes, se clasifica como:", "options": [{"label": "A", "text": "Standard", "correct": false}, {"label": "B", "text": "Preferred", "correct": true}, {"label": "C", "text": "Substandard", "correct": false}, {"label": "D", "text": "Declined", "correct": false}], "explanation": "Riesgo mejor que el promedio = preferred.", "id": "es-s5-q37", "topic": "Anualidades", "globalNumber": 237}, {"simulator": 5, "number": 38, "stem": "¿Qué práctica consiste en reemplazar pólizas usando sus valores acumulados solo para generar comisiones?", "options": [{"label": "A", "text": "Twisting", "correct": false}, {"label": "B", "text": "Churning", "correct": true}, {"label": "C", "text": "Sliding", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "Reemplazar con valores existentes por comisión = churning.", "id": "es-s5-q38", "topic": "General", "globalNumber": 238}, {"simulator": 5, "number": 39, "stem": "Bajo la cláusula “entire contract”, el contrato completo lo forman:", "options": [{"label": "A", "text": "Solo la póliza", "correct": false}, {"label": "B", "text": "La póliza más la solicitud adjunta", "correct": true}, {"label": "C", "text": "La póliza más el buyer’s guide", "correct": false}, {"label": "D", "text": "Solo la solicitud", "correct": false}], "explanation": "Entire contract = póliza + solicitud adjunta.", "id": "es-s5-q39", "topic": "Impuestos", "globalNumber": 239}, {"simulator": 5, "number": 40, "stem": "El curso obligatorio que un agente de Texas debe tomar antes de vender anualidades dura:", "options": [{"label": "A", "text": "24 horas", "correct": false}, {"label": "B", "text": "4 horas (Best Interest)", "correct": true}, {"label": "C", "text": "8 horas de ética", "correct": false}, {"label": "D", "text": "3 horas de flood", "correct": false}], "explanation": "Curso Best Interest de 4 horas.", "id": "es-s5-q40", "topic": "General", "globalNumber": 240}, {"simulator": 5, "number": 41, "stem": "¿Qué tipo de seguro de vida no acumula valor en efectivo?", "options": [{"label": "A", "text": "Whole life", "correct": false}, {"label": "B", "text": "Universal life", "correct": false}, {"label": "C", "text": "Term life", "correct": true}, {"label": "D", "text": "Variable life", "correct": false}], "explanation": "El term life no acumula cash value.", "id": "es-s5-q41", "topic": "General", "globalNumber": 241}, {"simulator": 5, "number": 42, "stem": "Una aseguradora toma una acción adversa por un consumer report. Bajo la FCRA debe:", "options": [{"label": "A", "text": "Ocultar la fuente", "correct": false}, {"label": "B", "text": "Notificar al solicitante y revelar la agencia", "correct": true}, {"label": "C", "text": "Pagar una multa", "correct": false}, {"label": "D", "text": "Cancelar la póliza", "correct": false}], "explanation": "FCRA: notificar y revelar la agencia.", "id": "es-s5-q42", "topic": "General", "globalNumber": 242}, {"simulator": 5, "number": 43, "stem": "El concepto “MIG” (mortalidad sube, interés baja, gastos suben) describe los factores de:", "options": [{"label": "A", "text": "El cálculo de la prima", "correct": true}, {"label": "B", "text": "Las opciones de liquidación", "correct": false}, {"label": "C", "text": "El underwriting médico", "correct": false}, {"label": "D", "text": "La clasificación de aseguradoras", "correct": false}], "explanation": "MIG = factores de la prima.", "id": "es-s5-q43", "topic": "Ley de Texas", "globalNumber": 243}, {"simulator": 5, "number": 44, "stem": "En 2026, el catch-up adicional para una IRA (50+) es de:", "options": [{"label": "A", "text": "$500", "correct": false}, {"label": "B", "text": "$1,000", "correct": false}, {"label": "C", "text": "$1,100", "correct": true}, {"label": "D", "text": "$7,500", "correct": false}], "explanation": "Catch-up IRA 2026 (50+) = $1,100.", "id": "es-s5-q44", "topic": "General", "globalNumber": 244}, {"simulator": 5, "number": 45, "stem": "Una empresa asegura a su empleado clave. El tratamiento de las primas y el beneficio es:", "options": [{"label": "A", "text": "Primas deducibles, beneficio gravable", "correct": false}, {"label": "B", "text": "Primas no deducibles, beneficio generalmente libre", "correct": true}, {"label": "C", "text": "Ambos gravables", "correct": false}, {"label": "D", "text": "Ambos deducibles", "correct": false}], "explanation": "Key person: primas no deducibles, beneficio libre.", "id": "es-s5-q45", "topic": "Retiro", "globalNumber": 245}, {"simulator": 5, "number": 46, "stem": "El beneficiario que cobra solo si el primario no sobrevive al asegurado es el:", "options": [{"label": "A", "text": "Terciario", "correct": false}, {"label": "B", "text": "Contingente", "correct": true}, {"label": "C", "text": "Irrevocable", "correct": false}, {"label": "D", "text": "Revocable", "correct": false}], "explanation": "Cobra si el primario no sobrevive = contingente.", "id": "es-s5-q46", "topic": "General", "globalNumber": 246}, {"simulator": 5, "number": 47, "stem": "El intercambio 1035 que NO está permitido es:", "options": [{"label": "A", "text": "Vida a vida", "correct": false}, {"label": "B", "text": "Vida a anualidad", "correct": false}, {"label": "C", "text": "Anualidad a anualidad", "correct": false}, {"label": "D", "text": "Anualidad a vida", "correct": true}], "explanation": "Anualidad → vida NO se permite.", "id": "es-s5-q47", "topic": "General", "globalNumber": 247}, {"simulator": 5, "number": 48, "stem": "La regulación de seguros en Estados Unidos corresponde, por la McCarran-Ferguson Act, a:", "options": [{"label": "A", "text": "El gobierno federal", "correct": false}, {"label": "B", "text": "Los estados", "correct": true}, {"label": "C", "text": "La SEC", "correct": false}, {"label": "D", "text": "El Congreso exclusivamente", "correct": false}], "explanation": "Regulación = estatal (McCarran-Ferguson).", "id": "es-s5-q48", "topic": "General", "globalNumber": 248}, {"simulator": 5, "number": 49, "stem": "Un recibo condicional paga el beneficio al solicitante fallecido antes de la emisión si este:", "options": [{"label": "A", "text": "Pagó prima doble", "correct": false}, {"label": "B", "text": "Era asegurable según el underwriting normal", "correct": true}, {"label": "C", "text": "Tenía beneficiario contingente", "correct": false}, {"label": "D", "text": "Era residente de Texas", "correct": false}], "explanation": "Conditional receipt: paga si era asegurable.", "id": "es-s5-q49", "topic": "Retiro", "globalNumber": 249}, {"simulator": 5, "number": 50, "stem": "El propósito central de una anualidad es proteger contra:", "options": [{"label": "A", "text": "Morir prematuramente", "correct": false}, {"label": "B", "text": "Vivir más de lo que duran los ahorros (longevidad)", "correct": true}, {"label": "C", "text": "La discapacidad", "correct": false}, {"label": "D", "text": "Daños a la propiedad", "correct": false}], "explanation": "La anualidad protege contra vivir demasiado (longevidad).", "id": "es-s5-q50", "topic": "Ley de Texas", "globalNumber": 250}, {"simulator": 6, "number": 1, "stem": "Una clienta de 79 años necesita acceso a su dinero en menos de un año. Un agente le recomienda una anualidad diferida con cargos de rescate a 10 años. ¿Cuál es la MEJOR caracterización de esta recomendación?", "options": [{"label": "A", "text": "Idónea, porque la anualidad difiere impuestos", "correct": false}, {"label": "B", "text": "No idónea: el producto compromete la liquidez que la clienta necesita", "correct": true}, {"label": "C", "text": "Idónea, porque ofrece un cargo de rescate", "correct": false}, {"label": "D", "text": "Obligatoria bajo el estándar de mejor interés", "correct": false}], "explanation": "El producto atrapa la liquidez que la clienta necesita pronto: no es idóneo. A/C: un beneficio fiscal o un cargo de rescate no vuelven idóneo un producto que choca con su necesidad. D: el best interest exige lo contrario.", "id": "es-s6-q1", "topic": "Idoneidad / Mejor interés", "globalNumber": 251}, {"simulator": 6, "number": 2, "stem": "Antes de recomendar una anualidad a un cliente, ¿cuál es la PRIMERA acción que debe tomar el productor?", "options": [{"label": "A", "text": "Cobrar la prima", "correct": false}, {"label": "B", "text": "Recabar la información de idoneidad (situación financiera, objetivos, liquidez, tolerancia al riesgo)", "correct": true}, {"label": "C", "text": "Emitir la póliza", "correct": false}, {"label": "D", "text": "Notificar a la TLHIGA", "correct": false}], "explanation": "La idoneidad empieza por recabar la información del cliente. A/C: van después y dependen de que el producto sea idóneo. D: la TLHIGA no se involucra en la venta.", "id": "es-s6-q2", "topic": "Idoneidad / Mejor interés", "globalNumber": 252}, {"simulator": 6, "number": 3, "stem": "El estándar de mejor interés (best interest) para anualidades en Texas exige todas las siguientes obligaciones EXCEPTO:", "options": [{"label": "A", "text": "Cuidado (care)", "correct": false}, {"label": "B", "text": "Divulgación (disclosure)", "correct": false}, {"label": "C", "text": "Manejo de conflictos de interés", "correct": false}, {"label": "D", "text": "Garantizar un rendimiento mínimo del 8%", "correct": true}], "explanation": "El best interest exige care, disclosure y manejo de conflictos; ningún producto garantiza 8%. A/B/C sí son obligaciones reales del estándar.", "id": "es-s6-q3", "topic": "Idoneidad / Mejor interés", "globalNumber": 253}, {"simulator": 6, "number": 4, "stem": "Un cliente quiere reemplazar una póliza vigente por una nueva. ¿Cuál es la obligación PRINCIPAL del agente?", "options": [{"label": "A", "text": "Ocultar la póliza anterior a la nueva aseguradora", "correct": false}, {"label": "B", "text": "Proporcionar un aviso de reemplazo y una comparación de las pólizas", "correct": true}, {"label": "C", "text": "Cancelar la póliza vieja antes de emitir la nueva", "correct": false}, {"label": "D", "text": "Aumentar su comisión", "correct": false}], "explanation": "La obligación central es avisar el reemplazo y comparar las pólizas. A: ocultar viola la regla. C: no se cancela antes de emitir. D: la comisión no es la obligación.", "id": "es-s6-q4", "topic": "Idoneidad / Mejor interés", "globalNumber": 254}, {"simulator": 6, "number": 5, "stem": "Al recomendar un producto a un cliente mayor (senior), la MEJOR práctica del agente es:", "options": [{"label": "A", "text": "Acelerar la venta para aprovechar la decisión", "correct": false}, {"label": "B", "text": "Documentar la idoneidad y las razones de la recomendación", "correct": true}, {"label": "C", "text": "Evitar explicar los cargos", "correct": false}, {"label": "D", "text": "Omitir la tolerancia al riesgo", "correct": false}], "explanation": "Con seniors, documentar idoneidad y razones es la mejor práctica. A/C/D describen exactamente lo que NO se debe hacer.", "id": "es-s6-q5", "topic": "Idoneidad / Mejor interés", "globalNumber": 255}, {"simulator": 6, "number": 6, "stem": "Un productor recomienda una anualidad variable a un cliente de 82 años, sin experiencia en inversiones, que busca proteger su capital de pérdidas. ¿Cuál es la MEJOR caracterización?", "options": [{"label": "A", "text": "Idónea, porque las anualidades variables siempre ganan", "correct": false}, {"label": "B", "text": "No idónea: el riesgo de mercado contradice el objetivo de proteger el capital", "correct": true}, {"label": "C", "text": "Idónea, si paga buena comisión", "correct": false}, {"label": "D", "text": "Requerida por el best interest", "correct": false}], "explanation": "El riesgo de mercado de la variable contradice el objetivo de proteger capital: no idónea. A: las variables pueden perder. C: la comisión no determina idoneidad. D: el best interest lo prohíbe.", "id": "es-s6-q6", "topic": "Idoneidad / Mejor interés", "globalNumber": 256}, {"simulator": 6, "number": 7, "stem": "El propósito PRINCIPAL del periodo de “free look” es:", "options": [{"label": "A", "text": "Dar tiempo a la aseguradora para investigar", "correct": false}, {"label": "B", "text": "Permitir al cliente revisar la póliza y devolverla para reembolso total si no le satisface", "correct": true}, {"label": "C", "text": "Extender el periodo contestable", "correct": false}, {"label": "D", "text": "Aumentar la prima", "correct": false}], "explanation": "El free look permite revisar y devolver para reembolso total. A: no es para la aseguradora. C: no extiende la contestabilidad. D: no afecta la prima.", "id": "es-s6-q7", "topic": "Idoneidad / Mejor interés", "globalNumber": 257}, {"simulator": 6, "number": 8, "stem": "La información de idoneidad que un agente debe recabar antes de recomendar una anualidad incluye todo lo siguiente EXCEPTO:", "options": [{"label": "A", "text": "Edad e ingresos del cliente", "correct": false}, {"label": "B", "text": "Objetivos financieros y horizonte de tiempo", "correct": false}, {"label": "C", "text": "Tolerancia al riesgo y necesidades de liquidez", "correct": false}, {"label": "D", "text": "El pasatiempo favorito del cliente", "correct": true}], "explanation": "Edad, ingresos, objetivos, liquidez y tolerancia al riesgo son idoneidad; el pasatiempo no. A/B/C sí son información de idoneidad.", "id": "es-s6-q8", "topic": "Idoneidad / Mejor interés", "globalNumber": 258}, {"simulator": 6, "number": 9, "stem": "Antes de poder vender anualidades en Texas, un agente DEBE completar:", "options": [{"label": "A", "text": "Un examen de bienes raíces", "correct": false}, {"label": "B", "text": "Un curso inicial de “Best Interest” de 4 horas", "correct": true}, {"label": "C", "text": "40 horas de ética", "correct": false}, {"label": "D", "text": "Nada adicional", "correct": false}], "explanation": "Texas exige el curso Best Interest de 4 horas antes de vender anualidades. A/C/D no son requisitos para anualidades.", "id": "es-s6-q9", "topic": "Idoneidad / Mejor interés", "globalNumber": 259}, {"simulator": 6, "number": 10, "stem": "Un agente convence a un cliente de reemplazar su póliza usando los valores acumulados de esta, solo para generar una nueva comisión. Esta práctica se conoce como:", "options": [{"label": "A", "text": "Suitability", "correct": false}, {"label": "B", "text": "Churning", "correct": true}, {"label": "C", "text": "Field underwriting", "correct": false}, {"label": "D", "text": "Free look", "correct": false}], "explanation": "Reemplazar usando los valores existentes por comisión = churning. A: suitability es lo correcto, no esto. C: field underwriting es reunir info. D: free look es otra cosa.", "id": "es-s6-q10", "topic": "Idoneidad / Mejor interés", "globalNumber": 260}, {"simulator": 6, "number": 11, "stem": "Al evaluar la idoneidad de una anualidad para un jubilado, ¿cuál es el factor MÁS importante?", "options": [{"label": "A", "text": "El color del folleto", "correct": false}, {"label": "B", "text": "Que el producto se ajuste a sus objetivos, liquidez y tolerancia al riesgo", "correct": true}, {"label": "C", "text": "La comisión del agente", "correct": false}, {"label": "D", "text": "La marca de la aseguradora", "correct": false}], "explanation": "Lo MÁS importante es el ajuste a objetivos, liquidez y riesgo. A/C/D son irrelevantes para la idoneidad.", "id": "es-s6-q11", "topic": "Idoneidad / Mejor interés", "globalNumber": 261}, {"simulator": 6, "number": 12, "stem": "Usar una designación engañosa de “especialista en seniors” para ganarse la confianza de un cliente mayor es:", "options": [{"label": "A", "text": "Una buena práctica de marketing", "correct": false}, {"label": "B", "text": "Una práctica prohibida de protección al consumidor", "correct": true}, {"label": "C", "text": "Requerido por el TDI", "correct": false}, {"label": "D", "text": "Parte del field underwriting", "correct": false}], "explanation": "Una designación engañosa de “senior” es práctica prohibida de protección al consumidor. A: no es buen marketing, es engaño. C: el TDI no lo exige. D: no es field underwriting.", "id": "es-s6-q12", "topic": "Idoneidad / Mejor interés", "globalNumber": 262}, {"simulator": 6, "number": 13, "stem": "Un agente exagera con información falsa los defectos de la póliza vigente de un cliente para que la reemplace. Esto es:", "options": [{"label": "A", "text": "Churning", "correct": false}, {"label": "B", "text": "Twisting", "correct": true}, {"label": "C", "text": "Suitability", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "Inducir el reemplazo con información falsa = twisting. A: churning usa valores, no engaño. C: suitability es lo correcto. D: rebating es un incentivo.", "id": "es-s6-q13", "topic": "Idoneidad / Mejor interés", "globalNumber": 263}, {"simulator": 6, "number": 14, "stem": "Bajo el estándar de mejor interés, si el agente recibe una comisión mayor por recomendar cierto producto, DEBE:", "options": [{"label": "A", "text": "Ocultarlo", "correct": false}, {"label": "B", "text": "Divulgar el conflicto de interés", "correct": true}, {"label": "C", "text": "Cancelar la venta", "correct": false}, {"label": "D", "text": "Pagar la comisión al cliente", "correct": false}], "explanation": "El best interest exige divulgar el conflicto de interés. A: ocultarlo lo viola. C: no obliga a cancelar. D: no se “paga” la comisión al cliente.", "id": "es-s6-q14", "topic": "Idoneidad / Mejor interés", "globalNumber": 264}, {"simulator": 6, "number": 15, "stem": "El propósito PRINCIPAL de la regulación de reemplazos es:", "options": [{"label": "A", "text": "Aumentar las comisiones del agente", "correct": false}, {"label": "B", "text": "Proteger al cliente de perder beneficios y de cargos innecesarios al cambiar de póliza", "correct": true}, {"label": "C", "text": "Eliminar el periodo de gracia", "correct": false}, {"label": "D", "text": "Acelerar el underwriting", "correct": false}], "explanation": "El reemplazo se regula para proteger al cliente de pérdidas y cargos. A: lo contrario. C/D: no es su propósito.", "id": "es-s6-q15", "topic": "Idoneidad / Mejor interés", "globalNumber": 265}, {"simulator": 6, "number": 16, "stem": "Un agente recomienda a una persona de 75 años colocar todos sus ahorros en una sola anualidad diferida de largo plazo. La MEJOR observación es:", "options": [{"label": "A", "text": "Es idóneo concentrar todo en un producto", "correct": false}, {"label": "B", "text": "No es idóneo: compromete toda su liquidez en un producto de largo plazo", "correct": true}, {"label": "C", "text": "Reduce su riesgo a cero", "correct": false}, {"label": "D", "text": "Es obligatorio", "correct": false}], "explanation": "Concentrar toda la liquidez en un producto de largo plazo no es idóneo. A: concentrar no es prudente aquí. C: no elimina el riesgo. D: no es obligatorio.", "id": "es-s6-q16", "topic": "Idoneidad / Mejor interés", "globalNumber": 266}, {"simulator": 6, "number": 17, "stem": "Un cliente recibe su póliza de vida el lunes y la devuelve ocho días después, sin reclamo. Bajo el free look de Texas, la aseguradora DEBE:", "options": [{"label": "A", "text": "Negarse, porque ya pasó el plazo", "correct": false}, {"label": "B", "text": "Reembolsar la prima pagada (está dentro de los 10 días)", "correct": true}, {"label": "C", "text": "Cobrar una penalidad", "correct": false}, {"label": "D", "text": "Convertir la póliza en anualidad", "correct": false}], "explanation": "Ocho días está dentro de los 10 del free look: la aseguradora reembolsa. A: no ha pasado el plazo. C: no hay penalidad. D: no se convierte en nada.", "id": "es-s6-q17", "topic": "General", "globalNumber": 267}, {"simulator": 6, "number": 18, "stem": "Una aseguradora retrasa injustificadamente el pago de una reclamación válida más allá del plazo legal. ¿Qué DEBE hacer, generalmente?", "options": [{"label": "A", "text": "Nada", "correct": false}, {"label": "B", "text": "Pagar interés de penalización (18%) y honorarios de abogado", "correct": true}, {"label": "C", "text": "Cancelar la póliza", "correct": false}, {"label": "D", "text": "Duplicar el beneficio", "correct": false}], "explanation": "Demora injustificada → 18% de interés y honorarios. A: sí hay consecuencia. C/D: no aplican.", "id": "es-s6-q18", "topic": "Retiro", "globalNumber": 268}, {"simulator": 6, "number": 19, "stem": "Un asegurado se divorcia y muere meses después sin actualizar a su excónyuge como beneficiario. Bajo la ley de Texas, lo MÁS probable es que:", "options": [{"label": "A", "text": "El excónyuge cobre igualmente", "correct": false}, {"label": "B", "text": "La designación del excónyuge se haya revocado automáticamente (con excepciones)", "correct": true}, {"label": "C", "text": "La aseguradora decida a quién pagar", "correct": false}, {"label": "D", "text": "El beneficio se pierda", "correct": false}], "explanation": "Divorce revocation (§9.301): el excónyuge se revoca automáticamente. A: por defecto no cobra. C: no decide la aseguradora. D: pasa al contingente/patrimonio, no se “pierde”.", "id": "es-s6-q19", "topic": "General", "globalNumber": 269}, {"simulator": 6, "number": 20, "stem": "Un agente con licencia quiere empezar a vender para una nueva aseguradora. ¿Qué se necesita PRIMERO?", "options": [{"label": "A", "text": "Un nuevo examen estatal", "correct": false}, {"label": "B", "text": "Un appointment de esa aseguradora (notificado al TDI)", "correct": true}, {"label": "C", "text": "La aprobación del cliente", "correct": false}, {"label": "D", "text": "Una segunda licencia", "correct": false}], "explanation": "Primero necesita un appointment de esa aseguradora. A: no repite examen. C: el cliente no autoriza. D: no necesita otra licencia.", "id": "es-s6-q20", "topic": "Ley de Texas", "globalNumber": 270}, {"simulator": 6, "number": 21, "stem": "La aseguradora de un residente de Texas es declarada insolvente. La TLHIGA cubre el beneficio por muerte de su póliza de vida hasta:", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": false}, {"label": "C", "text": "$300,000", "correct": true}, {"label": "D", "text": "$500,000", "correct": false}], "explanation": "TLHIGA beneficio por muerte = $300,000. A: $100k es cash value. B: $250k es anualidad. D: $500k es salud.", "id": "es-s6-q21", "topic": "Ley de Texas", "globalNumber": 271}, {"simulator": 6, "number": 22, "stem": "Un agente ofrece a un cliente una tarjeta de regalo de $200 por firmar hoy. Respecto del rebating:", "options": [{"label": "A", "text": "Solo el agente puede ser sancionado", "correct": false}, {"label": "B", "text": "Tanto el agente como el cliente que acepta pueden ser sancionados", "correct": true}, {"label": "C", "text": "Es legal en Texas", "correct": false}, {"label": "D", "text": "Solo el cliente es sancionado", "correct": false}], "explanation": "El rebating sanciona a agente y cliente. A/D: no es solo uno. C: no es legal.", "id": "es-s6-q22", "topic": "Impuestos", "globalNumber": 272}, {"simulator": 6, "number": 23, "stem": "Un agente de Texas va a renovar su licencia de vida. DEBE completar, por periodo de 2 años:", "options": [{"label": "A", "text": "12 horas, 1 de ética", "correct": false}, {"label": "B", "text": "24 horas, 3 de ética", "correct": true}, {"label": "C", "text": "40 horas, 5 de ética", "correct": false}, {"label": "D", "text": "Ninguna", "correct": false}], "explanation": "CE en Texas = 24 horas, 3 de ética. A/C/D no corresponden.", "id": "es-s6-q23", "topic": "Ley de Texas", "globalNumber": 273}, {"simulator": 6, "number": 24, "stem": "Un agente difunde, sin pruebas, que una aseguradora rival “está quebrando” para robarle clientes. Comete:", "options": [{"label": "A", "text": "Rebating", "correct": false}, {"label": "B", "text": "Defamation", "correct": true}, {"label": "C", "text": "Twisting", "correct": false}, {"label": "D", "text": "Sliding", "correct": false}], "explanation": "Difamar la solvencia de otra aseguradora = defamation. A: rebating es un incentivo. C: twisting es reemplazo por engaño. D: sliding es cargo sin permiso.", "id": "es-s6-q24", "topic": "General", "globalNumber": 274}, {"simulator": 6, "number": 25, "stem": "Un agente deposita las primas de sus clientes en su cuenta bancaria personal “por unos días”. Esto es:", "options": [{"label": "A", "text": "Aceptable", "correct": false}, {"label": "B", "text": "Commingling, una violación del deber fiduciario", "correct": true}, {"label": "C", "text": "Rebating", "correct": false}, {"label": "D", "text": "Field underwriting", "correct": false}], "explanation": "Mezclar primas con fondos personales = commingling. A: no es aceptable. C/D: no aplican.", "id": "es-s6-q25", "topic": "Ley de Texas", "globalNumber": 275}, {"simulator": 6, "number": 26, "stem": "Para obtener la licencia de vida de Texas, un candidato DEBE obtener una calificación de al menos:", "options": [{"label": "A", "text": "60%", "correct": false}, {"label": "B", "text": "65%", "correct": false}, {"label": "C", "text": "70%", "correct": true}, {"label": "D", "text": "80%", "correct": false}], "explanation": "Aprobar la licencia de Texas = 70%. A/B/D no son el umbral.", "id": "es-s6-q26", "topic": "Retiro", "globalNumber": 276}, {"simulator": 6, "number": 27, "stem": "Un cliente invirtió $100,000 en una anualidad cuyo rendimiento esperado total es $200,000. ¿Qué porcentaje de cada pago está excluido de impuestos (exclusion ratio)?", "options": [{"label": "A", "text": "25%", "correct": false}, {"label": "B", "text": "50%", "correct": true}, {"label": "C", "text": "75%", "correct": false}, {"label": "D", "text": "100%", "correct": false}], "explanation": "Exclusion ratio = inversión ÷ rendimiento esperado = 100,000 ÷ 200,000 = 50%. Las demás no resultan de esa razón.", "id": "es-s6-q27", "topic": "General", "globalNumber": 277}, {"simulator": 6, "number": 28, "stem": "Un dueño rescata su póliza. Pagó $25,000 en primas (sin dividendos) y el valor en efectivo es $40,000. ¿Cuánto es gravable?", "options": [{"label": "A", "text": "$40,000", "correct": false}, {"label": "B", "text": "$25,000", "correct": false}, {"label": "C", "text": "$15,000", "correct": true}, {"label": "D", "text": "$0", "correct": false}], "explanation": "Gravable = valor en efectivo − base = 40,000 − 25,000 = $15,000. A: gravar todo ignora la base. B: es la base. D: sí hay ganancia.", "id": "es-s6-q28", "topic": "General", "globalNumber": 278}, {"simulator": 6, "number": 29, "stem": "Un empleador proporciona $90,000 de seguro de vida grupal de término a un empleado. ¿Sobre qué monto se calcula el ingreso imputado (gravable)?", "options": [{"label": "A", "text": "$90,000", "correct": false}, {"label": "B", "text": "$50,000", "correct": false}, {"label": "C", "text": "$40,000", "correct": true}, {"label": "D", "text": "$0", "correct": false}], "explanation": "Libre hasta $50,000; el ingreso imputado se calcula sobre el exceso de $40,000. A: no todo. B: ese tramo es libre. D: sí hay exceso.", "id": "es-s6-q29", "topic": "Retiro", "globalNumber": 279}, {"simulator": 6, "number": 30, "stem": "Un titular de IRA tradicional cumple los requisitos de edad bajo las reglas vigentes. ¿A qué edad DEBE comenzar a tomar sus RMD?", "options": [{"label": "A", "text": "59½", "correct": false}, {"label": "B", "text": "70½", "correct": false}, {"label": "C", "text": "72", "correct": false}, {"label": "D", "text": "73", "correct": true}], "explanation": "RMD a los 73 (SECURE 2.0). A: penalidad temprana. B: regla antigua. C: ya no aplica.", "id": "es-s6-q30", "topic": "Ley de Texas", "globalNumber": 280}, {"simulator": 6, "number": 31, "stem": "Un beneficiario elige recibir $1,000 mensuales hasta agotar el beneficio. ¿Qué opción de liquidación eligió, y qué variable se determina?", "options": [{"label": "A", "text": "Fixed period; se determina el monto", "correct": false}, {"label": "B", "text": "Fixed amount; se determina el tiempo (cuánto durará)", "correct": true}, {"label": "C", "text": "Interest only; se retiene el capital", "correct": false}, {"label": "D", "text": "Life only; de por vida", "correct": false}], "explanation": "Monto fijo hasta agotarse = fixed amount; se determina el tiempo. A: el fixed period fija el tiempo y calcula el monto. C: retiene capital. D: es de por vida.", "id": "es-s6-q31", "topic": "General", "globalNumber": 281}, {"simulator": 6, "number": 32, "stem": "Un cliente pagó $30,000 en primas y recibió $5,000 en dividendos. ¿Cuál es su base de costo (cost basis)?", "options": [{"label": "A", "text": "$35,000", "correct": false}, {"label": "B", "text": "$30,000", "correct": false}, {"label": "C", "text": "$25,000", "correct": true}, {"label": "D", "text": "$5,000", "correct": false}], "explanation": "Base = primas − dividendos = 30,000 − 5,000 = $25,000. A: suma en vez de restar. B: ignora los dividendos. D: solo los dividendos.", "id": "es-s6-q32", "topic": "Retiro", "globalNumber": 282}, {"simulator": 6, "number": 33, "stem": "Una póliza tiene un beneficio por muerte de $250,000 y un préstamo pendiente de $20,000 más intereses al morir el asegurado. El beneficiario recibe:", "options": [{"label": "A", "text": "$250,000", "correct": false}, {"label": "B", "text": "$270,000", "correct": false}, {"label": "C", "text": "$250,000 menos el préstamo y sus intereses", "correct": true}, {"label": "D", "text": "$0", "correct": false}], "explanation": "El préstamo pendiente reduce el beneficio por el saldo más intereses. A: ignora el préstamo. B: no se suma. D: no se anula.", "id": "es-s6-q33", "topic": "Anualidades", "globalNumber": 283}, {"simulator": 6, "number": 34, "stem": "¿Cuál de los siguientes intercambios 1035 puede hacerse SIN reconocer ganancia gravable?", "options": [{"label": "A", "text": "Anualidad a vida", "correct": false}, {"label": "B", "text": "Vida a anualidad", "correct": true}, {"label": "C", "text": "Anualidad a salud", "correct": false}, {"label": "D", "text": "Salud a vida", "correct": false}], "explanation": "1035 permite vida → anualidad sin impuesto. A: anualidad→vida NO. C/D: salud no participa así.", "id": "es-s6-q34", "topic": "General", "globalNumber": 284}, {"simulator": 6, "number": 35, "stem": "Un cliente menor de 59½ retira $10,000 de ganancia de una anualidad no calificada. ¿Cómo se grava bajo LIFO?", "options": [{"label": "A", "text": "Libre de impuesto", "correct": false}, {"label": "B", "text": "Como ganancia gravable, más penalidad del 10%", "correct": true}, {"label": "C", "text": "Como retorno de base, libre", "correct": false}, {"label": "D", "text": "No está permitido", "correct": false}], "explanation": "Anualidad no calificada: ganancia LIFO gravable + 10% si <59½. A/C: la ganancia sí se grava. D: sí está permitido.", "id": "es-s6-q35", "topic": "Ley de Texas", "globalNumber": 285}, {"simulator": 6, "number": 36, "stem": "Un cliente de 50 años retira fondos de un plan calificado sin excepción aplicable. Además del impuesto ordinario, paga una penalidad de:", "options": [{"label": "A", "text": "5%", "correct": false}, {"label": "B", "text": "10%", "correct": true}, {"label": "C", "text": "20%", "correct": false}, {"label": "D", "text": "50%", "correct": false}], "explanation": "Retiro temprano de plan calificado = penalidad del 10%. A/C/D no son la penalidad.", "id": "es-s6-q36", "topic": "Impuestos", "globalNumber": 286}, {"simulator": 6, "number": 37, "stem": "Un cliente quiere una Universal Life cuyo beneficio por muerte CREZCA junto con el valor en efectivo. ¿Qué opción es la MÁS apropiada?", "options": [{"label": "A", "text": "Opción A (nivelada)", "correct": false}, {"label": "B", "text": "Opción B (suma asegurada + valor en efectivo)", "correct": true}, {"label": "C", "text": "Decreasing term", "correct": false}, {"label": "D", "text": "Prima única", "correct": false}], "explanation": "DB creciente con el cash value = Opción B. A: la A es nivelada. C/D: no aplican.", "id": "es-s6-q37", "topic": "Anualidades", "globalNumber": 287}, {"simulator": 6, "number": 38, "stem": "El asegurado muere. El beneficiario primario había fallecido antes; hay un contingente vivo. ¿Quién cobra PRIMERO?", "options": [{"label": "A", "text": "El estate del primario", "correct": false}, {"label": "B", "text": "El beneficiario contingente", "correct": true}, {"label": "C", "text": "El estate del asegurado", "correct": false}, {"label": "D", "text": "La aseguradora", "correct": false}], "explanation": "Cobra el contingente (el primario no sobrevivió). A/C: no aplican si hay contingente vivo. D: no cobra la aseguradora.", "id": "es-s6-q38", "topic": "General", "globalNumber": 288}, {"simulator": 6, "number": 39, "stem": "En el proceso de solicitud, ¿quién actúa como el PRIMER underwriter?", "options": [{"label": "A", "text": "El actuario", "correct": false}, {"label": "B", "text": "El agente (field underwriting)", "correct": true}, {"label": "C", "text": "El MIB", "correct": false}, {"label": "D", "text": "El reasegurador", "correct": false}], "explanation": "El agente es el primer underwriter (field underwriting). A/C/D actúan después o no evalúan al inicio.", "id": "es-s6-q39", "topic": "Impuestos", "globalNumber": 289}, {"simulator": 6, "number": 40, "stem": "Un cliente paga una prima única grande y la póliza falla el 7-pay test. La consecuencia PRINCIPAL es:", "options": [{"label": "A", "text": "Pierde el beneficio por muerte", "correct": false}, {"label": "B", "text": "Se clasifica como MEC y sus distribuciones en vida se gravan LIFO (+10% si <59½)", "correct": true}, {"label": "C", "text": "Se convierte en término", "correct": false}, {"label": "D", "text": "Sube la prima", "correct": false}], "explanation": "Fallar el 7-pay test → MEC, distribuciones LIFO (+10% si <59½). A: conserva el DB. C/D: no ocurre eso.", "id": "es-s6-q40", "topic": "General", "globalNumber": 290}, {"simulator": 6, "number": 41, "stem": "Un asegurado con enfermedad terminal quiere acceder en vida a parte de su beneficio. ¿Qué rider lo permite, reduciendo el beneficio final?", "options": [{"label": "A", "text": "Accidental Death Benefit", "correct": false}, {"label": "B", "text": "Accelerated Death Benefit", "correct": true}, {"label": "C", "text": "Waiver of Premium", "correct": false}, {"label": "D", "text": "Return of Premium", "correct": false}], "explanation": "Cobrar en vida por enfermedad terminal, reduciendo el DB = Accelerated Death Benefit. A: es por accidente. C: exime primas. D: devuelve primas.", "id": "es-s6-q41", "topic": "General", "globalNumber": 291}, {"simulator": 6, "number": 42, "stem": "El propósito PRINCIPAL de una anualidad es proteger contra el riesgo de:", "options": [{"label": "A", "text": "Morir prematuramente", "correct": false}, {"label": "B", "text": "Vivir más de lo que duran los ahorros (longevidad)", "correct": true}, {"label": "C", "text": "Discapacidad", "correct": false}, {"label": "D", "text": "Incendio", "correct": false}], "explanation": "La anualidad protege contra vivir demasiado (longevidad). A: eso es el seguro de vida. C/D: no son su propósito.", "id": "es-s6-q42", "topic": "General", "globalNumber": 292}, {"simulator": 6, "number": 43, "stem": "Un solicitante paga la prima y recibe un recibo condicional. Muere antes de la emisión, pero era asegurable como se solicitó. La aseguradora MÁS probablemente:", "options": [{"label": "A", "text": "No paga", "correct": false}, {"label": "B", "text": "Paga el beneficio", "correct": true}, {"label": "C", "text": "Devuelve solo la prima", "correct": false}, {"label": "D", "text": "Paga la mitad", "correct": false}], "explanation": "Conditional receipt + asegurable = paga. A: sí paga si era asegurable. C/D: no corresponde.", "id": "es-s6-q43", "topic": "Ley de Texas", "globalNumber": 293}, {"simulator": 6, "number": 44, "stem": "Un agente quiere recomendar una anualidad variable. Además de su licencia de vida, DEBE tener:", "options": [{"label": "A", "text": "Una licencia de salud", "correct": false}, {"label": "B", "text": "Un registro de valores (securities)", "correct": true}, {"label": "C", "text": "Nada", "correct": false}, {"label": "D", "text": "Una licencia de propiedad", "correct": false}], "explanation": "Variable = security → registro de valores además de la licencia de vida. A/D: otras líneas. C: sí requiere algo más.", "id": "es-s6-q44", "topic": "General", "globalNumber": 294}, {"simulator": 6, "number": 45, "stem": "Un asegurado queda totalmente discapacitado y no puede trabajar. El rider que MÁS le conviene haber adquirido es:", "options": [{"label": "A", "text": "Accidental Death Benefit", "correct": false}, {"label": "B", "text": "Waiver of Premium", "correct": true}, {"label": "C", "text": "Guaranteed Insurability", "correct": false}, {"label": "D", "text": "Return of Premium", "correct": false}], "explanation": "Discapacidad total → Waiver of Premium. A: por muerte accidental. C: compra futura. D: devuelve primas.", "id": "es-s6-q45", "topic": "Retiro", "globalNumber": 295}, {"simulator": 6, "number": 46, "stem": "Tras la muerte se descubre que el asegurado declaró una edad menor y pagó de menos. La aseguradora MÁS probablemente:", "options": [{"label": "A", "text": "Anula la póliza", "correct": false}, {"label": "B", "text": "Ajusta el beneficio a lo que la prima habría comprado a la edad correcta", "correct": true}, {"label": "C", "text": "Paga el doble", "correct": false}, {"label": "D", "text": "Devuelve las primas", "correct": false}], "explanation": "Misstatement of age → ajustan el beneficio. A: no anulan. C/D: no aplican.", "id": "es-s6-q46", "topic": "General", "globalNumber": 296}, {"simulator": 6, "number": 47, "stem": "Una aseguradora descubre, a los 3 años de emitida la póliza, un error no fraudulento en la solicitud. PUEDE:", "options": [{"label": "A", "text": "Anular la póliza", "correct": false}, {"label": "B", "text": "No anularla: ya pasó el periodo contestable de 2 años", "correct": true}, {"label": "C", "text": "Duplicar la prima", "correct": false}, {"label": "D", "text": "Cancelar sin pago", "correct": false}], "explanation": "A los 3 años (>2) ya no pueden anular por la solicitud (incontestability). A/D: no pueden. C: no aplica.", "id": "es-s6-q47", "topic": "General", "globalNumber": 297}, {"simulator": 6, "number": 48, "stem": "Una madre designa a sus 3 hijos “per stirpes”. Un hijo muere antes que ella, dejando 2 nietos. Al morir la madre, ¿qué reciben esos 2 nietos EN CONJUNTO?", "options": [{"label": "A", "text": "Nada", "correct": false}, {"label": "B", "text": "Un tercio del beneficio (la porción del hijo fallecido)", "correct": true}, {"label": "C", "text": "La mitad", "correct": false}, {"label": "D", "text": "Todo", "correct": false}], "explanation": "Per stirpes: los 2 nietos comparten la porción de su padre (un tercio). A: sí reciben. C/D: no es la mitad ni todo.", "id": "es-s6-q48", "topic": "General", "globalNumber": 298}, {"simulator": 6, "number": 49, "stem": "Un agente recomienda reemplazar una anualidad por otra con mayores cargos y sin beneficio claro para el cliente, solo por comisión. Esto viola principalmente:", "options": [{"label": "A", "text": "El estándar de idoneidad / mejor interés", "correct": true}, {"label": "B", "text": "Ninguna regla", "correct": false}, {"label": "C", "text": "El periodo de gracia", "correct": false}, {"label": "D", "text": "El free look", "correct": false}], "explanation": "Reemplazo sin beneficio para el cliente, solo por comisión, viola la idoneidad/mejor interés. B: sí viola una
