", "correct": false}], "explanation": "Taxable = cash value − basis = 40,000 − 25,000 = $15,000. A: taxing all ignores basis. B: that’s the basis. D: there is gain.", "id": "en-s6-q28", "topic": "General", "globalNumber": 278}, {"simulator": 6, "number": 29, "stem": "An employer provides $90,000 of group term life insurance to an employee. On what amount is the imputed (taxable) income calculated?", "options": [{"label": "A", "text": "$90,000", "correct": false}, {"label": "B", "text": "$50,000", "correct": false}, {"label": "C", "text": "$40,000", "correct": true}, {"label": "D", "text": "$0", "correct": false}], "explanation": "Tax-free up to $50,000; imputed income is calculated on the $40,000 excess. A: not all. B: that portion is free. D: there is excess.", "id": "en-s6-q29", "topic": "Retirement", "globalNumber": 279}, {"simulator": 6, "number": 30, "stem": "A traditional IRA holder meets the age requirements under current rules. At what age MUST they begin taking RMDs?", "options": [{"label": "A", "text": "59½", "correct": false}, {"label": "B", "text": "70½", "correct": false}, {"label": "C", "text": "72", "correct": false}, {"label": "D", "text": "73", "correct": true}], "explanation": "RMD at 73 (SECURE 2.0). A: early penalty. B: old rule. C: no longer applies.", "id": "en-s6-q30", "topic": "Texas Law", "globalNumber": 280}, {"simulator": 6, "number": 31, "stem": "A beneficiary chooses to receive $1,000 monthly until the benefit runs out. Which settlement option did they choose, and which variable is determined?", "options": [{"label": "A", "text": "Fixed period; the amount is determined", "correct": false}, {"label": "B", "text": "Fixed amount; the time (how long it lasts) is determined", "correct": true}, {"label": "C", "text": "Interest only; principal is retained", "correct": false}, {"label": "D", "text": "Life only; for life", "correct": false}], "explanation": "Fixed amount until depleted = fixed amount; the time is determined. A: fixed period fixes time and computes the amount. C: retains principal. D: it’s for life.", "id": "en-s6-q31", "topic": "General", "globalNumber": 281}, {"simulator": 6, "number": 32, "stem": "A client paid $30,000 in premiums and received $5,000 in dividends. What is their cost basis?", "options": [{"label": "A", "text": "$35,000", "correct": false}, {"label": "B", "text": "$30,000", "correct": false}, {"label": "C", "text": "$25,000", "correct": true}, {"label": "D", "text": "$5,000", "correct": false}], "explanation": "Basis = premiums − dividends = 30,000 − 5,000 = $25,000. A: adds instead of subtracts. B: ignores the dividends. D: only the dividends.", "id": "en-s6-q32", "topic": "Retirement", "globalNumber": 282}, {"simulator": 6, "number": 33, "stem": "A policy has a $250,000 death benefit and an outstanding loan of $20,000 plus interest at the insured’s death. The beneficiary receives:", "options": [{"label": "A", "text": "$250,000", "correct": false}, {"label": "B", "text": "$270,000", "correct": false}, {"label": "C", "text": "$250,000 minus the loan and its interest", "correct": true}, {"label": "D", "text": "$0", "correct": false}], "explanation": "The outstanding loan reduces the benefit by the balance plus interest. A: ignores the loan. B: not added. D: not voided.", "id": "en-s6-q33", "topic": "Annuities", "globalNumber": 283}, {"simulator": 6, "number": 34, "stem": "Which of the following 1035 exchanges can be done WITHOUT recognizing taxable gain?", "options": [{"label": "A", "text": "Annuity to life", "correct": false}, {"label": "B", "text": "Life to annuity", "correct": true}, {"label": "C", "text": "Annuity to health", "correct": false}, {"label": "D", "text": "Health to life", "correct": false}], "explanation": "1035 allows life → annuity tax-free. A: annuity→life NO. C/D: health doesn’t participate this way.", "id": "en-s6-q34", "topic": "General", "globalNumber": 284}, {"simulator": 6, "number": 35, "stem": "A client under 59½ withdraws $10,000 of gain from a non-qualified annuity. How is it taxed under LIFO?", "options": [{"label": "A", "text": "Tax-free", "correct": false}, {"label": "B", "text": "As taxable gain, plus a 10% penalty", "correct": true}, {"label": "C", "text": "As a return of basis, tax-free", "correct": false}, {"label": "D", "text": "Not permitted", "correct": false}], "explanation": "Non-qualified annuity: LIFO gain taxable + 10% if under 59½. A/C: the gain is taxed. D: it is permitted.", "id": "en-s6-q35", "topic": "Texas Law", "globalNumber": 285}, {"simulator": 6, "number": 36, "stem": "A 50-year-old client withdraws funds from a qualified plan with no applicable exception. In addition to ordinary income tax, they pay a penalty of:", "options": [{"label": "A", "text": "5%", "correct": false}, {"label": "B", "text": "10%", "correct": true}, {"label": "C", "text": "20%", "correct": false}, {"label": "D", "text": "50%", "correct": false}], "explanation": "Early withdrawal from a qualified plan = 10% penalty. A/C/D are not the penalty.", "id": "en-s6-q36", "topic": "Taxation", "globalNumber": 286}, {"simulator": 6, "number": 37, "stem": "A client wants a Universal Life whose death benefit GROWS along with the cash value. Which option is MOST appropriate?", "options": [{"label": "A", "text": "Option A (level)", "correct": false}, {"label": "B", "text": "Option B (face amount + cash value)", "correct": true}, {"label": "C", "text": "Decreasing term", "correct": false}, {"label": "D", "text": "Single premium", "correct": false}], "explanation": "DB growing with the cash value = Option B. A: A is level. C/D: do not apply.", "id": "en-s6-q37", "topic": "Annuities", "globalNumber": 287}, {"simulator": 6, "number": 38, "stem": "The insured dies. The primary beneficiary had died earlier; there is a living contingent. Who collects FIRST?", "options": [{"label": "A", "text": "The primary’s estate", "correct": false}, {"label": "B", "text": "The contingent beneficiary", "correct": true}, {"label": "C", "text": "The insured’s estate", "correct": false}, {"label": "D", "text": "The insurer", "correct": false}], "explanation": "The contingent collects (the primary didn’t survive). A/C: don’t apply if a contingent is alive. D: the insurer doesn’t collect.", "id": "en-s6-q38", "topic": "General", "globalNumber": 288}, {"simulator": 6, "number": 39, "stem": "In the application process, who acts as the FIRST underwriter?", "options": [{"label": "A", "text": "The actuary", "correct": false}, {"label": "B", "text": "The agent (field underwriting)", "correct": true}, {"label": "C", "text": "The MIB", "correct": false}, {"label": "D", "text": "The reinsurer", "correct": false}], "explanation": "The agent is the first underwriter (field underwriting). A/C/D act later or don’t evaluate at the start.", "id": "en-s6-q39", "topic": "Taxation", "globalNumber": 289}, {"simulator": 6, "number": 40, "stem": "A client pays a large single premium and the policy fails the 7-pay test. The PRIMARY consequence is:", "options": [{"label": "A", "text": "They lose the death benefit", "correct": false}, {"label": "B", "text": "It is classified as a MEC and its in-life distributions are taxed LIFO (+10% if under 59½)", "correct": true}, {"label": "C", "text": "It becomes term", "correct": false}, {"label": "D", "text": "The premium goes up", "correct": false}], "explanation": "Failing the 7-pay test → MEC, distributions LIFO (+10% if under 59½). A: it keeps the DB. C/D: that doesn’t happen.", "id": "en-s6-q40", "topic": "General", "globalNumber": 290}, {"simulator": 6, "number": 41, "stem": "An insured with a terminal illness wants to access part of their benefit while alive. Which rider allows this, reducing the final benefit?", "options": [{"label": "A", "text": "Accidental Death Benefit", "correct": false}, {"label": "B", "text": "Accelerated Death Benefit", "correct": true}, {"label": "C", "text": "Waiver of Premium", "correct": false}, {"label": "D", "text": "Return of Premium", "correct": false}], "explanation": "Collecting while alive for terminal illness, reducing the DB = Accelerated Death Benefit. A: for accident. C: waives premiums. D: refunds premiums.", "id": "en-s6-q41", "topic": "General", "globalNumber": 291}, {"simulator": 6, "number": 42, "stem": "The PRIMARY purpose of an annuity is to protect against the risk of:", "options": [{"label": "A", "text": "Dying prematurely", "correct": false}, {"label": "B", "text": "Living longer than one’s savings last (longevity)", "correct": true}, {"label": "C", "text": "Disability", "correct": false}, {"label": "D", "text": "Fire", "correct": false}], "explanation": "The annuity protects against living too long (longevity). A: that’s life insurance. C/D: not its purpose.", "id": "en-s6-q42", "topic": "General", "globalNumber": 292}, {"simulator": 6, "number": 43, "stem": "An applicant pays the premium and receives a conditional receipt. They die before issue, but were insurable as applied. The insurer MOST likely:", "options": [{"label": "A", "text": "Does not pay", "correct": false}, {"label": "B", "text": "Pays the benefit", "correct": true}, {"label": "C", "text": "Refunds only the premium", "correct": false}, {"label": "D", "text": "Pays half", "correct": false}], "explanation": "Conditional receipt + insurable = pays. A: it pays if they were insurable. C/D: do not apply.", "id": "en-s6-q43", "topic": "Texas Law", "globalNumber": 293}, {"simulator": 6, "number": 44, "stem": "An agent wants to recommend a variable annuity. In addition to a life license, they MUST have:", "options": [{"label": "A", "text": "A health license", "correct": false}, {"label": "B", "text": "A securities registration", "correct": true}, {"label": "C", "text": "Nothing", "correct": false}, {"label": "D", "text": "A property license", "correct": false}], "explanation": "Variable = security → securities registration in addition to the life license. A/D: other lines. C: something more is required.", "id": "en-s6-q44", "topic": "General", "globalNumber": 294}, {"simulator": 6, "number": 45, "stem": "An insured becomes totally disabled and cannot work. The rider they would MOST benefit from having purchased is:", "options": [{"label": "A", "text": "Accidental Death Benefit", "correct": false}, {"label": "B", "text": "Waiver of Premium", "correct": true}, {"label": "C", "text": "Guaranteed Insurability", "correct": false}, {"label": "D", "text": "Return of Premium", "correct": false}], "explanation": "Total disability → Waiver of Premium. A: for accidental death. C: future purchase. D: refunds premiums.", "id": "en-s6-q45", "topic": "Retirement", "globalNumber": 295}, {"simulator": 6, "number": 46, "stem": "After death it is discovered that the insured stated a lower age and paid too little. The insurer MOST likely:", "options": [{"label": "A", "text": "Voids the policy", "correct": false}, {"label": "B", "text": "Adjusts the benefit to what the premium would have bought at the correct age", "correct": true}, {"label": "C", "text": "Pays double", "correct": false}, {"label": "D", "text": "Refunds the premiums", "correct": false}], "explanation": "Misstatement of age → adjust the benefit. A: not void. C/D: do not apply.", "id": "en-s6-q46", "topic": "General", "globalNumber": 296}, {"simulator": 6, "number": 47, "stem": "An insurer discovers, 3 years after the policy was issued, a non-fraudulent error in the application. It MAY:", "options": [{"label": "A", "text": "Void the policy", "correct": false}, {"label": "B", "text": "Not void it: the 2-year contestable period has passed", "correct": true}, {"label": "C", "text": "Double the premium", "correct": false}, {"label": "D", "text": "Cancel without payment", "correct": false}], "explanation": "At 3 years (>2) they can no longer void for the application (incontestability). A/D: they cannot. C: does not apply.", "id": "en-s6-q47", "topic": "General", "globalNumber": 297}, {"simulator": 6, "number": 48, "stem": "A mother designates her 3 children “per stirpes.” One child dies before her, leaving 2 grandchildren. When the mother dies, what do those 2 grandchildren receive TOGETHER?", "options": [{"label": "A", "text": "Nothing", "correct": false}, {"label": "B", "text": "One-third of the benefit (their parent’s share)", "correct": true}, {"label": "C", "text": "Half", "correct": false}, {"label": "D", "text": "All", "correct": false}], "explanation": "Per stirpes: the 2 grandchildren share their parent’s portion (one-third). A: they do receive. C/D: not half nor all.", "id": "en-s6-q48", "topic": "General", "globalNumber": 298}, {"simulator": 6, "number": 49, "stem": "An agent recommends replacing an annuity with another that has higher charges and no clear benefit to the client, solely for commission. This primarily violates:", "options": [{"label": "A", "text": "The suitability / best interest standard", "correct": true}, {"label": "B", "text": "No rule", "correct": false}, {"label": "C", "text": "The grace period", "correct": false}, {"label": "D", "text": "The free look", "correct": false}], "explanation": "Replacement with no client benefit, solely for commission, violates suitability/best interest. B: it does violate a rule. C/D: not the relevant ones.", "id": "en-s6-q49", "topic": "Suitability / Best Interest", "globalNumber": 299}, {"simulator": 6, "number": 50, "stem": "An agent meets with an 80-year-old couple interested in an annuity. What should be their FIRST step to act in the couple’s best interest?", "options": [{"label": "A", "text": "Close the sale immediately", "correct": false}, {"label": "B", "text": "Gather and document their financial situation, objectives, and liquidity needs", "correct": true}, {"label": "C", "text": "Recommend the highestcommission product", "correct": false}, {"label": "D", "text": "Skip the disclosure of charges", "correct": false}], "explanation": "The FIRST step is to gather and document the couple’s situation. A/C/D put the sale or commission before the client.", "id": "en-s6-q50", "topic": "Suitability / Best Interest", "globalNumber": 300}], "es": [{"simulator": 1, "number": 1, "stem": "Una anualidad protege principalmente al titular contra el riesgo de:", "options": [{"label": "A", "text": "Morir prematuramente", "correct": false}, {"label": "B", "text": "Sobrevivir a sus propios ahorros", "correct": true}, {"label": "C", "text": "Quedar discapacitado", "correct": false}, {"label": "D", "text": "Daños a su propiedad", "correct": false}], "explanation": "La anualidad cubre el riesgo de longevidad (vivir demasiado). (A es el seguro de vida.)", "id": "es-s1-q1", "topic": "Anualidades", "globalNumber": 1}, {"simulator": 1, "number": 2, "stem": "En el seguro de vida, el interés asegurable debe existir:", "options": [{"label": "A", "text": "Solo al momento de la muerte", "correct": false}, {"label": "B", "text": "Tanto al emitir como al morir", "correct": false}, {"label": "C", "text": "Solo al momento de solicitar/emitir la póliza", "correct": true}, {"label": "D", "text": "En cualquier momento de la vigencia", "correct": false}], "explanation": "En vida, el interés asegurable solo se exige al emitir. (B mezcla la regla de propiedad.)", "id": "es-s1-q2", "topic": "General", "globalNumber": 2}, {"simulator": 1, "number": 3, "stem": "¿Cuántas horas de educación continua, incluida la ética, exige Texas por periodo de licencia de 2 años?", "options": [{"label": "A", "text": "20 horas, 2 de ética", "correct": false}, {"label": "B", "text": "24 horas, 3 de ética", "correct": true}, {"label": "C", "text": "30 horas, 5 de ética", "correct": false}, {"label": "D", "text": "12 horas, 1 de ética", "correct": false}], "explanation": "Texas: 24 horas / 3 de ética por periodo de 2 años.", "id": "es-s1-q3", "topic": "Ley de Texas", "globalNumber": 3}, {"simulator": 1, "number": 4, "stem": "La opción de no confiscación que se aplica automáticamente si el dueño no elige otra suele ser:", "options": [{"label": "A", "text": "Valor de rescate en efectivo", "correct": false}, {"label": "B", "text": "Seguro saldado reducido", "correct": false}, {"label": "C", "text": "Seguro de término extendido", "correct": true}, {"label": "D", "text": "Préstamo automático de prima", "correct": false}], "explanation": "La opción automática es extended term (misma suma, plazo limitado). (D es una cláusula, no nonforfeiture.)", "id": "es-s1-q4", "topic": "General", "globalNumber": 4}, {"simulator": 1, "number": 5, "stem": "¿A qué edad deben comenzar generalmente las distribuciones mínimas obligatorias (RMD) de una IRA tradicional bajo las reglas vigentes?", "options": [{"label": "A", "text": "59½", "correct": false}, {"label": "B", "text": "65", "correct": false}, {"label": "C", "text": "70½", "correct": false}, {"label": "D", "text": "73", "correct": true}], "explanation": "RMD a los 73 (SECURE 2.0). (C, 70½, es la regla antigua.)", "id": "es-s1-q5", "topic": "Retiro", "globalNumber": 5}, {"simulator": 1, "number": 6, "stem": "El límite de cobertura de la Texas Life and Health Insurance Guaranty Association para el beneficio por muerte de una póliza de vida es:", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": false}, {"label": "C", "text": "$300,000", "correct": true}, {"label": "D", "text": "$500,000", "correct": false}], "explanation": "TLHIGA: $300,000 de beneficio por muerte. (A es el límite de cash value.)", "id": "es-s1-q6", "topic": "Ley de Texas", "globalNumber": 6}, {"simulator": 1, "number": 7, "stem": "Las respuestas de un solicitante en la solicitud de seguro se consideran legalmente:", "options": [{"label": "A", "text": "Garantías absolutamente verdaderas", "correct": false}, {"label": "B", "text": "Representaciones ciertas a su leal saber y entender", "correct": true}, {"label": "C", "text": "Opiniones sin efecto legal", "correct": false}, {"label": "D", "text": "Cláusulas contractuales independientes", "correct": false}], "explanation": "Son representaciones (solo la material misrepresentation anula).", "id": "es-s1-q7", "topic": "General", "globalNumber": 7}, {"simulator": 1, "number": 8, "stem": "En una anualidad no calificada, los retiros (no anualizados) se gravan bajo el método:", "options": [{"label": "A", "text": "FIFO, primero la base", "correct": false}, {"label": "B", "text": "LIFO, primero la ganancia", "correct": true}, {"label": "C", "text": "Prorrateo igual", "correct": false}, {"label": "D", "text": "Exentos siempre", "correct": false}], "explanation": "LIFO: la ganancia sale primero y es gravable (+10% si <59½).", "id": "es-s1-q8", "topic": "Retiro", "globalNumber": 8}, {"simulator": 1, "number": 9, "stem": "¿Qué tipo de plan de retiro recibe aportaciones únicamente del empleador?", "options": [{"label": "A", "text": "SIMPLE IRA", "correct": false}, {"label": "B", "text": "401(k) tradicional", "correct": false}, {"label": "C", "text": "SEP IRA", "correct": true}, {"label": "D", "text": "Roth IRA", "correct": false}], "explanation": "En el SEP IRA solo aporta el empleador.", "id": "es-s1-q9", "topic": "Retiro", "globalNumber": 9}, {"simulator": 1, "number": 10, "stem": "Un beneficiario irrevocable debe dar su consentimiento para que el dueño pueda:", "options": [{"label": "A", "text": "Pagar la prima", "correct": false}, {"label": "B", "text": "Tomar un préstamo sobre el valor en efectivo", "correct": true}, {"label": "C", "text": "Leer la póliza", "correct": false}, {"label": "D", "text": "Recibir el estado de cuenta", "correct": false}], "explanation": "El irrevocable debe consentir préstamos, cambios, cesión o cancelación.", "id": "es-s1-q10", "topic": "General", "globalNumber": 10}, {"simulator": 1, "number": 11, "stem": "El recibo condicional (conditional receipt) otorga cobertura desde la solicitud/examen siempre que el solicitante:", "options": [{"label": "A", "text": "Pague el doble de la prima", "correct": false}, {"label": "B", "text": "Resulte asegurable según el underwriting normal", "correct": true}, {"label": "C", "text": "Tenga menos de 40 años", "correct": false}, {"label": "D", "text": "Firme ante notario", "correct": false}], "explanation": "El conditional receipt cubre si el solicitante era asegurable.", "id": "es-s1-q11", "topic": "General", "globalNumber": 11}, {"simulator": 1, "number": 12, "stem": "Bajo la ley de Texas, al disolverse un matrimonio, la designación de un excónyuge como beneficiario:", "options": [{"label": "A", "text": "Permanece siempre válida", "correct": false}, {"label": "B", "text": "Se revoca automáticamente, salvo excepciones", "correct": true}, {"label": "C", "text": "Solo cambia si el excónyuge lo pide", "correct": false}, {"label": "D", "text": "La decide la aseguradora", "correct": false}], "explanation": "Divorce Revocation §9.301: el excónyuge se revoca automáticamente (con excepciones).", "id": "es-s1-q12", "topic": "Ley de Texas", "globalNumber": 12}, {"simulator": 1, "number": 13, "stem": "El beneficio por muerte de una póliza de vida pagado en suma global al beneficiario es, para income tax:", "options": [{"label": "A", "text": "Totalmente gravable", "correct": false}, {"label": "B", "text": "Generalmente libre de impuesto", "correct": true}, {"label": "C", "text": "Gravable en un 50%", "correct": false}, {"label": "D", "text": "Gravable si excede $100,000", "correct": false}], "explanation": "El death benefit en lump sum es libre de income tax.", "id": "es-s1-q13", "topic": "Impuestos", "globalNumber": 13}, {"simulator": 1, "number": 14, "stem": "¿Qué opción de pago de anualidad ofrece el mayor ingreso mensual pero no deja saldo a beneficiarios?", "options": [{"label": "A", "text": "Life with 10-year period certain", "correct": false}, {"label": "B", "text": "Joint and survivor", "correct": false}, {"label": "C", "text": "Life only (straight life)", "correct": true}, {"label": "D", "text": "Cash refund", "correct": false}], "explanation": "Life only paga más, pero nada a herederos.", "id": "es-s1-q14", "topic": "Anualidades", "globalNumber": 14}, {"simulator": 1, "number": 15, "stem": "Una compañía aseguradora constituida en otro estado de EE. UU., respecto de Texas, es:", "options": [{"label": "A", "text": "Domestic", "correct": false}, {"label": "B", "text": "Foreign", "correct": true}, {"label": "C", "text": "Alien", "correct": false}, {"label": "D", "text": "Non-admitted", "correct": false}], "explanation": "Otro estado de EE. UU. = foreign (alien = otro país).", "id": "es-s1-q15", "topic": "Ley de Texas", "globalNumber": 15}, {"simulator": 1, "number": 16, "stem": "El rider de exención de prima (waiver of premium) se activa cuando el asegurado:", "options": [{"label": "A", "text": "Cumple 65 años", "correct": false}, {"label": "B", "text": "Sufre una discapacidad total que cumple las condiciones", "correct": true}, {"label": "C", "text": "Cambia de beneficiario", "correct": false}, {"label": "D", "text": "Toma un préstamo", "correct": false}], "explanation": "El waiver se activa por discapacidad total (tras el periodo de espera).", "id": "es-s1-q16", "topic": "General", "globalNumber": 16}, {"simulator": 1, "number": 17, "stem": "El acto de mezclar las primas del cliente con los fondos personales del agente se llama:", "options": [{"label": "A", "text": "Rebating", "correct": false}, {"label": "B", "text": "Commingling", "correct": true}, {"label": "C", "text": "Twisting", "correct": false}, {"label": "D", "text": "Sliding", "correct": false}], "explanation": "Mezclar primas con fondos personales es commingling.", "id": "es-s1-q17", "topic": "General", "globalNumber": 17}, {"simulator": 1, "number": 18, "stem": "En un plan calificado, ¿qué porción de la distribución es gravable como ingreso ordinario?", "options": [{"label": "A", "text": "Solo la ganancia", "correct": false}, {"label": "B", "text": "La totalidad", "correct": true}, {"label": "C", "text": "La mitad", "correct": false}, {"label": "D", "text": "Nada", "correct": false}], "explanation": "En un plan calificado se grava TODO (las aportaciones fueron pre-tax).", "id": "es-s1-q18", "topic": "Retiro", "globalNumber": 18}, {"simulator": 1, "number": 19, "stem": "¿Qué característica del contrato de seguro hace que las ambigüedades se interpreten a favor del asegurado?", "options": [{"label": "A", "text": "Aleatorio", "correct": false}, {"label": "B", "text": "Unilateral", "correct": false}, {"label": "C", "text": "De adhesión", "correct": true}, {"label": "D", "text": "Condicional", "correct": false}], "explanation": "El contrato de adhesión → ambigüedad a favor del asegurado.", "id": "es-s1-q19", "topic": "General", "globalNumber": 19}, {"simulator": 1, "number": 20, "stem": "Una anualidad variable requiere que el productor tenga:", "options": [{"label": "A", "text": "Solo licencia de vida", "correct": false}, {"label": "B", "text": "Licencia de vida y registro de valores", "correct": true}, {"label": "C", "text": "Solo registro de valores", "correct": false}, {"label": "D", "text": "Licencia de salud", "correct": false}], "explanation": "Variable = security → licencia de vida + de valores.", "id": "es-s1-q20", "topic": "Ley de Texas", "globalNumber": 20}, {"simulator": 1, "number": 21, "stem": "El periodo contestable (incontestability) en Texas es de:", "options": [{"label": "A", "text": "6 meses", "correct": false}, {"label": "B", "text": "1 año", "correct": false}, {"label": "C", "text": "2 años", "correct": true}, {"label": "D", "text": "5 años", "correct": false}], "explanation": "Periodo contestable = 2 años.", "id": "es-s1-q21", "topic": "Ley de Texas", "globalNumber": 21}, {"simulator": 1, "number": 22, "stem": "Una póliza que falla el 7-pay test se clasifica como:", "options": [{"label": "A", "text": "MEC (Modified Endowment Contract)", "correct": true}, {"label": "B", "text": "Endowment puro", "correct": false}, {"label": "C", "text": "Term convertible", "correct": false}, {"label": "D", "text": "Anualidad", "correct": false}], "explanation": "Fallar el 7-pay test la convierte en MEC.", "id": "es-s1-q22", "topic": "Impuestos", "globalNumber": 22}, {"simulator": 1, "number": 23, "stem": "¿Quién dirige el Departamento de Seguros de Texas (TDI)?", "options": [{"label": "A", "text": "Una junta electa", "correct": false}, {"label": "B", "text": "El Comisionado de Seguros, designado por el Gobernador", "correct": true}, {"label": "C", "text": "El Procurador General", "correct": false}, {"label": "D", "text": "Un panel federal", "correct": false}], "explanation": "El Comisionado (designado por el Gobernador) dirige el TDI.", "id": "es-s1-q23", "topic": "Ley de Texas", "globalNumber": 23}, {"simulator": 1, "number": 24, "stem": "En una Universal Life, la Opción B (beneficio creciente) paga:", "options": [{"label": "A", "text": "Solo la suma asegurada nivelada", "correct": false}, {"label": "B", "text": "La suma asegurada más el valor en efectivo", "correct": true}, {"label": "C", "text": "Únicamente el valor en efectivo", "correct": false}, {"label": "D", "text": "El doble en caso de accidente", "correct": false}], "explanation": "Opción B = suma asegurada + cash value (crece).", "id": "es-s1-q24", "topic": "General", "globalNumber": 24}, {"simulator": 1, "number": 25, "stem": "Ofrecer a un cliente un incentivo de valor no incluido en la póliza para inducir la compra es:", "options": [{"label": "A", "text": "Defamation", "correct": false}, {"label": "B", "text": "Rebating", "correct": true}, {"label": "C", "text": "Twisting", "correct": false}, {"label": "D", "text": "Coercion", "correct": false}], "explanation": "Incentivo no contractual para inducir compra = rebating (ilegal, ambos).", "id": "es-s1-q25", "topic": "Ley de Texas", "globalNumber": 25}, {"simulator": 1, "number": 26, "stem": "El “exclusion ratio” en una anualidad sirve para:", "options": [{"label": "A", "text": "Calcular la comisión del agente", "correct": false}, {"label": "B", "text": "Separar la porción no gravable (base) de la gravable (ganancia)", "correct": true}, {"label": "C", "text": "Determinar la prima", "correct": false}, {"label": "D", "text": "Fijar la edad de jubilación", "correct": false}], "explanation": "El exclusion ratio separa la base (no gravable) de la ganancia (gravable).", "id": "es-s1-q26", "topic": "Retiro", "globalNumber": 26}, {"simulator": 1, "number": 27, "stem": "¿Cuál de los siguientes NO es un elemento esencial de un contrato válido?", "options": [{"label": "A", "text": "Consideración", "correct": false}, {"label": "B", "text": "Propósito legal", "correct": false}, {"label": "C", "text": "Una póliza impresa y firmada", "correct": true}, {"label": "D", "text": "Partes competentes", "correct": false}], "explanation": "Una póliza impresa y firmada no es un elemento esencial (lo son acuerdo, consideración, partes competentes, propósito legal).", "id": "es-s1-q27", "topic": "General", "globalNumber": 27}, {"simulator": 1, "number": 28, "stem": "El children’s term rider típicamente:", "options": [{"label": "A", "text": "Cubre solo al hijo mayor", "correct": false}, {"label": "B", "text": "Cubre a todos los hijos y suele ser convertible sin examen", "correct": true}, {"label": "C", "text": "Paga el doble por accidente", "correct": false}, {"label": "D", "text": "Devuelve las primas", "correct": false}], "explanation": "El children’s term cubre a todos los hijos, convertible sin examen.", "id": "es-s1-q28", "topic": "General", "globalNumber": 28}, {"simulator": 1, "number": 29, "stem": "En un plan de beneficio definido (defined benefit), el riesgo de inversión lo asume:", "options": [{"label": "A", "text": "El empleado", "correct": false}, {"label": "B", "text": "El empleador", "correct": true}, {"label": "C", "text": "El gobierno", "correct": false}, {"label": "D", "text": "La aseguradora del empleado", "correct": false}], "explanation": "En un DB, el riesgo lo asume el empleador.", "id": "es-s1-q29", "topic": "Retiro", "globalNumber": 29}, {"simulator": 1, "number": 30, "stem": "El free look para una póliza de vida ordinaria en Texas es de:", "options": [{"label": "A", "text": "3 días", "correct": false}, {"label": "B", "text": "10 días", "correct": true}, {"label": "C", "text": "30 días", "correct": false}, {"label": "D", "text": "60 días", "correct": false}], "explanation": "Free look de vida en Texas = 10 días.", "id": "es-s1-q30", "topic": "Ley de Texas", "globalNumber": 30}, {"simulator": 1, "number": 31, "stem": "El Accelerated Death Benefit permite al asegurado:", "options": [{"label": "A", "text": "Duplicar el beneficio por accidente", "correct": false}, {"label": "B", "text": "Cobrar en vida parte del beneficio ante enfermedad terminal, reduciendo el monto final", "correct": true}, {"label": "C", "text": "Recuperar todas las primas", "correct": false}, {"label": "D", "text": "Comprar más cobertura sin examen", "correct": false}], "explanation": "Accelerated DB = cobrar en vida por enfermedad terminal, reduce el beneficio.", "id": "es-s1-q31", "topic": "General", "globalNumber": 31}, {"simulator": 1, "number": 32, "stem": "Las aportaciones a una Roth IRA son:", "options": [{"label": "A", "text": "Siempre deducibles", "correct": false}, {"label": "B", "text": "Nunca deducibles (aftertax)", "correct": true}, {"label": "C", "text": "Deducibles solo para mayores de 50", "correct": false}, {"label": "D", "text": "Parcialmente deducibles", "correct": false}], "explanation": "Las aportaciones Roth nunca son deducibles.", "id": "es-s1-q32", "topic": "Retiro", "globalNumber": 32}, {"simulator": 1, "number": 33, "stem": "Un intercambio 1035 NO permite ir de:", "options": [{"label": "A", "text": "Vida a vida", "correct": false}, {"label": "B", "text": "Vida a anualidad", "correct": false}, {"label": "C", "text": "Anualidad a anualidad", "correct": false}, {"label": "D", "text": "Anualidad a vida", "correct": true}], "explanation": "1035 no permite anualidad → vida.", "id": "es-s1-q33", "topic": "Anualidades", "globalNumber": 33}, {"simulator": 1, "number": 34, "stem": "Si el asegurado declaró mal su edad y pagó una prima insuficiente, la aseguradora:", "options": [{"label": "A", "text": "Rescinde la póliza", "correct": false}, {"label": "B", "text": "Paga el beneficio que la prima habría comprado a la edad correcta", "correct": true}, {"label": "C", "text": "Paga el beneficio completo sin ajuste", "correct": false}, {"label": "D", "text": "Devuelve solo las primas", "correct": false}], "explanation": "Misstatement of age → ajustan el beneficio (no anulan).", "id": "es-s1-q34", "topic": "General", "globalNumber": 34}, {"simulator": 1, "number": 35, "stem": "La cláusula de suicidio en Texas típicamente excluye el pago del beneficio si el suicidio ocurre dentro de:", "options": [{"label": "A", "text": "6 meses, y devuelve primas", "correct": false}, {"label": "B", "text": "1 año, y no paga nada", "correct": false}, {"label": "C", "text": "2 años, y devuelve las primas", "correct": true}, {"label": "D", "text": "5 años, y paga la mitad", "correct": false}], "explanation": "Suicidio dentro de 2 años → devuelve primas.", "id": "es-s1-q35", "topic": "Ley de Texas", "globalNumber": 35}, {"simulator": 1, "number": 36, "stem": "¿Qué fuente de información NO puede ser la única base para declinar una solicitud?", "options": [{"label": "A", "text": "El examen médico", "correct": false}, {"label": "B", "text": "La información del MIB", "correct": true}, {"label": "C", "text": "La solicitud", "correct": false}, {"label": "D", "text": "El APS", "correct": false}], "explanation": "No se puede declinar solo por el MIB.", "id": "es-s1-q36", "topic": "Impuestos", "globalNumber": 36}, {"simulator": 1, "number": 37, "stem": "Una anualidad inmediata de prima única (SPIA):", "options": [{"label": "A", "text": "Tiene una larga fase de acumulación", "correct": false}, {"label": "B", "text": "Comienza a pagar dentro de aproximadamente un año, sin acumulación", "correct": true}, {"label": "C", "text": "Requiere aportaciones flexibles", "correct": false}, {"label": "D", "text": "Solo existe en versión variable", "correct": false}], "explanation": "SPIA: prima única, paga en ≤1 año, sin acumulación.", "id": "es-s1-q37", "topic": "Anualidades", "globalNumber": 37}, {"simulator": 1, "number": 38, "stem": "Un agente que induce a un cliente a reemplazar su póliza mediante declaraciones falsas comete:", "options": [{"label": "A", "text": "Churning", "correct": false}, {"label": "B", "text": "Twisting", "correct": true}, {"label": "C", "text": "Backdating", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "Reemplazo por declaraciones falsas = twisting.", "id": "es-s1-q38", "topic": "General", "globalNumber": 38}, {"simulator": 1, "number": 39, "stem": "El seguro de vida grupal de término del empleador está libre de impuesto para el empleado hasta una cobertura de:", "options": [{"label": "A", "text": "$25,000", "correct": false}, {"label": "B", "text": "$50,000", "correct": true}, {"label": "C", "text": "$100,000", "correct": false}, {"label": "D", "text": "$250,000", "correct": false}], "explanation": "Group term libre hasta $50,000.", "id": "es-s1-q39", "topic": "Impuestos", "globalNumber": 39}, {"simulator": 1, "number": 40, "stem": "¿Qué clasificación de riesgo se aplica a un solicitante con riesgo mayor al promedio pero aún asegurable?", "options": [{"label": "A", "text": "Preferred", "correct": false}, {"label": "B", "text": "Standard", "correct": false}, {"label": "C", "text": "Substandard (rated)", "correct": true}, {"label": "D", "text": "Declined", "correct": false}], "explanation": "Riesgo alto pero asegurable = substandard (rated), no rechazo.", "id": "es-s1-q40", "topic": "General", "globalNumber": 40}, {"simulator": 1, "number": 41, "stem": "En la designación “per stirpes”, si un beneficiario muere antes que el asegurado, su porción:", "options": [{"label": "A", "text": "Se reparte entre los beneficiarios sobrevivientes", "correct": false}, {"label": "B", "text": "Baja a sus descendientes", "correct": true}, {"label": "C", "text": "Va al estate del asegurado", "correct": false}, {"label": "D", "text": "Se pierde", "correct": false}], "explanation": "Per stirpes: la porción baja a los descendientes del fallecido.", "id": "es-s1-q41", "topic": "General", "globalNumber": 41}, {"simulator": 1, "number": 42, "stem": "¿Qué documento contiene observaciones del agente que NO se muestran al solicitante?", "options": [{"label": "A", "text": "La Parte II médica", "correct": false}, {"label": "B", "text": "El agent’s report", "correct": true}, {"label": "C", "text": "El buyer’s guide", "correct": false}, {"label": "D", "text": "El policy summary", "correct": false}], "explanation": "El agent’s report no se muestra al solicitante.", "id": "es-s1-q42", "topic": "General", "globalNumber": 42}, {"simulator": 1, "number": 43, "stem": "Está prohibido que un agente use, como argumento de venta, la existencia de:", "options": [{"label": "A", "text": "El periodo de gracia", "correct": false}, {"label": "B", "text": "La Texas Life and Health Insurance Guaranty Association", "correct": true}, {"label": "C", "text": "El free look", "correct": false}, {"label": "D", "text": "La cláusula de incontestabilidad", "correct": false}], "explanation": "Prohibido usar la Guaranty Association como argumento de venta.", "id": "es-s1-q43", "topic": "Ley de Texas", "globalNumber": 43}, {"simulator": 1, "number": 44, "stem": "En una Universal Life con prima flexible, la póliza puede caducar si:", "options": [{"label": "A", "text": "El asegurado cumple 65", "correct": false}, {"label": "B", "text": "El valor en efectivo no cubre el costo del seguro", "correct": true}, {"label": "C", "text": "Se nombra un beneficiario contingente", "correct": false}, {"label": "D", "text": "Se paga de más", "correct": false}], "explanation": "La UL caduca si el cash value no cubre el cost of insurance.", "id": "es-s1-q44", "topic": "General", "globalNumber": 44}, {"simulator": 1, "number": 45, "stem": "Las distribuciones en vida de un MEC antes de los 59½ se gravan:", "options": [{"label": "A", "text": "Libres de impuesto", "correct": false}, {"label": "B", "text": "Ganancia primero (LIFO), gravable, más penalidad del 10%", "correct": true}, {"label": "C", "text": "Base primero (FIFO), libre", "correct": false}, {"label": "D", "text": "No se permiten", "correct": false}], "explanation": "MEC: distribuciones LIFO (ganancia primero) + 10% si <59½.", "id": "es-s1-q45", "topic": "Retiro", "globalNumber": 45}, {"simulator": 1, "number": 46, "stem": "El productor de seguros, legalmente, representa a:", "options": [{"label": "A", "text": "El solicitante", "correct": false}, {"label": "B", "text": "La aseguradora", "correct": true}, {"label": "C", "text": "El beneficiario", "correct": false}, {"label": "D", "text": "El TDI", "correct": false}], "explanation": "El agente representa a la aseguradora.", "id": "es-s1-q46", "topic": "General", "globalNumber": 46}, {"simulator": 1, "number": 47, "stem": "¿Qué tipo de póliza permanente permite pagar las primas en un periodo limitado pero mantiene la cobertura de por vida?", "options": [{"label": "A", "text": "Term life", "correct": false}, {"label": "B", "text": "Limited-pay whole life", "correct": true}, {"label": "C", "text": "Annual renewable term", "correct": false}, {"label": "D", "text": "Decreasing term", "correct": false}], "explanation": "Limited-pay whole life: pagas menos tiempo, cobertura vitalicia.", "id": "es-s1-q47", "topic": "General", "globalNumber": 47}, {"simulator": 1, "number": 48, "stem": "Bajo la Fair Credit Reporting Act, si se toma una acción adversa basada en un consumer report, la aseguradora debe:", "options": [{"label": "A", "text": "Ocultar la fuente", "correct": false}, {"label": "B", "text": "Notificar e identificar la agencia que emitió el reporte", "correct": true}, {"label": "C", "text": "Pagar una multa al solicitante", "correct": false}, {"label": "D", "text": "Cancelar la póliza", "correct": false}], "explanation": "FCRA: adverse action → notificar y revelar la fuente.", "id": "es-s1-q48", "topic": "General", "globalNumber": 48}, {"simulator": 1, "number": 49, "stem": "¿Qué plan de retiro está diseñado para empleados de escuelas públicas y organizaciones sin fines de lucro?", "options": [{"label": "A", "text": "401(k)", "correct": false}, {"label": "B", "text": "403(b) / TSA", "correct": true}, {"label": "C", "text": "SEP IRA", "correct": false}, {"label": "D", "text": "Keogh", "correct": false}], "explanation": "403(b)/TSA = escuelas públicas y nonprofits.", "id": "es-s1-q49", "topic": "Retiro", "globalNumber": 49}, {"simulator": 1, "number": 50, "stem": "El periodo de gracia para una póliza de vida ordinaria en Texas es de:", "options": [{"label": "A", "text": "7 días", "correct": false}, {"label": "B", "text": "10 días", "correct": false}, {"label": "C", "text": "31 días", "correct": true}, {"label": "D", "text": "60 días", "correct": false}], "explanation": "Grace period de vida ordinaria en Texas = 31 días.", "id": "es-s1-q50", "topic": "Ley de Texas", "globalNumber": 50}, {"simulator": 2, "number": 1, "stem": "Una empresa compra una póliza sobre la vida de su director financiero, se nombra beneficiaria y paga las primas. El director renuncia dos años después y fallece un año más tarde. La aseguradora:", "options": [{"label": "A", "text": "No paga, porque el interés asegurable desapareció", "correct": false}, {"label": "B", "text": "Paga, porque en vida el interés asegurable solo se exige al emitir", "correct": true}, {"label": "C", "text": "Paga solo la mitad", "correct": false}, {"label": "D", "text": "Devuelve las primas", "correct": false}], "explanation": "En vida el interés asegurable solo se exige al emitir; la póliza sigue pagadera.", "id": "es-s2-q1", "topic": "Anualidades", "globalNumber": 51}, {"simulator": 2, "number": 2, "stem": "Un cliente de 45 años retira $12,000 de su IRA tradicional sin que aplique excepción alguna. Las consecuencias fiscales son:", "options": [{"label": "A", "text": "Libre de impuesto", "correct": false}, {"label": "B", "text": "Impuesto ordinario más una penalidad del 10%", "correct": true}, {"label": "C", "text": "Solo la penalidad del 10%", "correct": false}, {"label": "D", "text": "Impuesto del 20% de retención únicamente", "correct": false}], "explanation": "Retiro temprano de IRA: impuesto ordinario + 10% de penalidad.", "id": "es-s2-q2", "topic": "General", "globalNumber": 52}, {"simulator": 2, "number": 3, "stem": "Una mujer designa a sus tres hijos “per stirpes”. Uno fallece antes que ella dejando dos nietos. Al morir ella, los fondos se reparten:", "options": [{"label": "A", "text": "Mitad y mitad entre los dos hijos vivos", "correct": false}, {"label": "B", "text": "Un tercio a cada hijo vivo y el tercio del fallecido entre sus dos nietos", "correct": true}, {"label": "C", "text": "Partes iguales entre hijos y nietos", "correct": false}, {"label": "D", "text": "Todo al estate", "correct": false}], "explanation": "Per stirpes: la porción del hijo fallecido baja a sus dos nietos (1/6 c/u).", "id": "es-s2-q3", "topic": "Ley de Texas", "globalNumber": 53}, {"simulator": 2, "number": 4, "stem": "Un agente deposita la prima de un cliente en su cuenta personal por tres días antes de enviarla a la aseguradora. Esto constituye:", "options": [{"label": "A", "text": "Una práctica aceptable", "correct": false}, {"label": "B", "text": "Commingling, una violación del deber fiduciario", "correct": true}, {"label": "C", "text": "Rebating", "correct": false}, {"label": "D", "text": "Field underwriting", "correct": false}], "explanation": "Mezclar primas con fondos personales = commingling.", "id": "es-s2-q4", "topic": "General", "globalNumber": 54}, {"simulator": 2, "number": 5, "stem": "Un jubilado entrega $250,000 a una aseguradora y comienza a recibir pagos mensuales al mes siguiente. Adquirió una:", "options": [{"label": "A", "text": "Anualidad diferida de prima flexible", "correct": false}, {"label": "B", "text": "Anualidad inmediata de prima única (SPIA)", "correct": true}, {"label": "C", "text": "Anualidad variable diferida", "correct": false}, {"label": "D", "text": "Whole life de prima única", "correct": false}], "explanation": "Prima única + pagos casi inmediatos = SPIA.", "id": "es-s2-q5", "topic": "Retiro", "globalNumber": 55}, {"simulator": 2, "number": 6, "stem": "Un asegurado con beneficiario irrevocable solicita un préstamo sobre el valor en efectivo. La aseguradora:", "options": [{"label": "A", "text": "Lo concede sin condiciones", "correct": false}, {"label": "B", "text": "Lo concede solo con el consentimiento escrito del beneficiario irrevocable", "correct": true}, {"label": "C", "text": "Requiere una orden judicial", "correct": false}, {"label": "D", "text": "Lo niega permanentemente", "correct": false}], "explanation": "El irrevocable debe consentir por escrito el préstamo.", "id": "es-s2-q6", "topic": "Ley de Texas", "globalNumber": 56}, {"simulator": 2, "number": 7, "stem": "Un productor quiere vender una anualidad variable. Además de su licencia de vida, necesita:", "options": [{"label": "A", "text": "Una licencia de salud", "correct": false}, {"label": "B", "text": "Un registro de valores (FINRA/SEC)", "correct": true}, {"label": "C", "text": "Nada adicional", "correct": false}, {"label": "D", "text": "Una licencia de propiedad", "correct": false}], "explanation": "Variable = security → registro de valores además de la licencia de vida.", "id": "es-s2-q7", "topic": "General", "globalNumber": 57}, {"simulator": 2, "number": 8, "stem": "Una aseguradora declina una solicitud basándose en un consumer report. Bajo la FCRA debe:", "options": [{"label": "A", "text": "Mantener la fuente en secreto", "correct": false}, {"label": "B", "text": "Notificar al solicitante e identificar la agencia", "correct": true}, {"label": "C", "text": "Pagar una indemnización", "correct": false}, {"label": "D", "text": "Reembolsar el examen médico", "correct": false}], "explanation": "FCRA: adverse action → notificar e identificar la agencia.", "id": "es-s2-q8", "topic": "Retiro", "globalNumber": 58}, {"simulator": 2, "number": 9, "stem": "Un asegurado fallece durante el periodo de gracia con una prima impaga. La aseguradora:", "options": [{"label": "A", "text": "Niega la reclamación", "correct": false}, {"label": "B", "text": "Paga el beneficio completo sin descuento", "correct": false}, {"label": "C", "text": "Paga el beneficio menos la prima vencida", "correct": true}, {"label": "D", "text": "Devuelve las primas", "correct": false}], "explanation": "Durante el grace period se paga el beneficio menos la prima vencida.", "id": "es-s2-q9", "topic": "Retiro", "globalNumber": 59}, {"simulator": 2, "number": 10, "stem": "Un empleado de una organización 501(c)(3) quiere diferir salario para el retiro con ventaja fiscal. El plan típico es:", "options": [{"label": "A", "text": "SEP IRA", "correct": false}, {"label": "B", "text": "403(b) / TSA", "correct": true}, {"label": "C", "text": "Keogh", "correct": false}, {"label": "D", "text": "Roth IRA exclusivamente", "correct": false}], "explanation": "501(c)(3) → 403(b)/TSA.", "id": "es-s2-q10", "topic": "General", "globalNumber": 60}, {"simulator": 2, "number": 11, "stem": "Un agente exagera los defectos de la póliza vigente del cliente y oculta los cargos para que la reemplace. Comete:", "options": [{"label": "A", "text": "Churning", "correct": false}, {"label": "B", "text": "Twisting", "correct": true}, {"label": "C", "text": "Sliding", "correct": false}, {"label": "D", "text": "Backdating", "correct": false}], "explanation": "Reemplazo inducido por engaño = twisting.", "id": "es-s2-q11", "topic": "General", "globalNumber": 61}, {"simulator": 2, "number": 12, "stem": "Un cliente quiere la máxima cobertura por 20 años al menor costo, con opción de volverla permanente sin nuevo examen médico. Conviene:", "options": [{"label": "A", "text": "Whole life de pago limitado", "correct": false}, {"label": "B", "text": "Term nivelado convertible", "correct": true}, {"label": "C", "text": "Anualidad diferida", "correct": false}, {"label": "D", "text": "Single-premium whole life", "correct": false}], "explanation": "Term nivelado convertible: máxima cobertura barata + conversión sin examen.", "id": "es-s2-q12", "topic": "Ley de Texas", "globalNumber": 62}, {"simulator": 2, "number": 13, "stem": "El valor en efectivo de una whole life se rescata. El cliente pagó $30,000 en primas (sin dividendos) y el cash value es $42,000. La parte gravable es:", "options": [{"label": "A", "text": "$42,000", "correct": false}, {"label": "B", "text": "$30,000", "correct": false}, {"label": "C", "text": "$12,000", "correct": true}, {"label": "D", "text": "$0", "correct": false}], "explanation": "Ganancia = 42,000 − 30,000 = $12,000 (solo la ganancia es gravable).", "id": "es-s2-q13", "topic": "Impuestos", "globalNumber": 63}, {"simulator": 2, "number": 14, "stem": "Un matrimonio adinerado quiere fondos para pagar el impuesto sucesorio que sus hijos enfrentarán cuando ambos padres hayan muerto. La póliza idónea es:", "options": [{"label": "A", "text": "Joint life (first-to-die)", "correct": false}, {"label": "B", "text": "Survivorship (second-to-die)", "correct": true}, {"label": "C", "text": "Decreasing term", "correct": false}, {"label": "D", "text": "Annual renewable term", "correct": false}], "explanation": "Survivorship (second-to-die) para impuestos sucesorios al segundo deceso.", "id": "es-s2-q14", "topic": "Anualidades", "globalNumber": 64}, {"simulator": 2, "number": 15, "stem": "Bajo la ley de Texas, un agente que vende anualidades debe completar, antes de venderlas, un curso de:", "options": [{"label": "A", "text": "8 horas de ética", "correct": false}, {"label": "B", "text": "4 horas Best Interest (suitability)", "correct": true}, {"label": "C", "text": "24 horas de LTC", "correct": false}, {"label": "D", "text": "3 horas de flood", "correct": false}], "explanation": "Texas exige el curso Best Interest de 4 horas antes de vender anualidades.", "id": "es-s2-q15", "topic": "Ley de Texas", "globalNumber": 65}, {"simulator": 2, "number": 16, "stem": "Una póliza de Universal Life lleva años pagando solo el mínimo; las tasas bajan y el valor en efectivo se agota sin cubrir el costo del seguro. Si el dueño no aporta más, la póliza:", "options": [{"label": "A", "text": "Se convierte en whole life", "correct": false}, {"label": "B", "text": "Caduca (lapse)", "correct": true}, {"label": "C", "text": "Aumenta su suma asegurada", "correct": false}, {"label": "D", "text": "Paga dividendos", "correct": false}], "explanation": "Si el cash value no cubre el cost of insurance, la UL caduca.", "id": "es-s2-q16", "topic": "General", "globalNumber": 66}, {"simulator": 2, "number": 17, "stem": "El beneficiario primario falleció un año antes que el asegurado; hay un contingente vivo. Al morir el asegurado, cobra:", "options": [{"label": "A", "text": "El estate del primario", "correct": false}, {"label": "B", "text": "El beneficiario contingente", "correct": true}, {"label": "C", "text": "El estate del asegurado", "correct": false}, {"label": "D", "text": "La aseguradora", "correct": false}], "explanation": "El contingente cobra (el primario no sobrevivió).", "id": "es-s2-q17", "topic": "General", "globalNumber": 67}, {"simulator": 2, "number": 18, "stem": "Un solicitante paga la prima y recibe un recibo condicional. Muere antes de la emisión, pero el underwriting concluye que era asegurable como se solicitó. La aseguradora:", "options": [{"label": "A", "text": "No paga", "correct": false}, {"label": "B", "text": "Paga el beneficio", "correct": true}, {"label": "C", "text": "Devuelve solo la prima", "correct": false}, {"label": "D", "text": "Paga la mitad", "correct": false}], "explanation": "Conditional receipt: era asegurable → la aseguradora paga.", "id": "es-s2-q18", "topic": "Retiro", "globalNumber": 68}, {"simulator": 2, "number": 19, "stem": "¿Qué afirmación sobre la Roth IRA es correcta?", "options": [{"label": "A", "text": "Sus aportaciones son deducibles", "correct": false}, {"label": "B", "text": "Exige RMD a los 73", "correct": false}, {"label": "C", "text": "Sus distribuciones calificadas son libres de impuesto y no hay RMD en vida", "correct": true}, {"label": "D", "text": "No tiene límites de ingreso para aportar", "correct": false}], "explanation": "Roth: distribuciones calificadas tax-free, sin RMD en vida.", "id": "es-s2-q19", "topic": "General", "globalNumber": 69}, {"simulator": 2, "number": 20, "stem": "Una aseguradora difunde, sin sustento, que una competidora “está por quebrar” para robarle clientes. Comete:", "options": [{"label": "A", "text": "Rebating", "correct": false}, {"label": "B", "text": "Defamation", "correct": true}, {"label": "C", "text": "Twisting", "correct": false}, {"label": "D", "text": "Sliding", "correct": false}], "explanation": "Difamar la solvencia de otra aseguradora = defamation.", "id": "es-s2-q20", "topic": "Ley de Texas", "globalNumber": 70}, {"simulator": 2, "number": 21, "stem": "En una anualidad, la fase en que el dinero se aporta y crece con impuestos diferidos se llama:", "options": [{"label": "A", "text": "Fase de pago", "correct": false}, {"label": "B", "text": "Fase de acumulación", "correct": true}, {"label": "C", "text": "Anualización", "correct": false}, {"label": "D", "text": "Liquidación", "correct": false}], "explanation": "Aportar y crecer tax-deferred = fase de acumulación.", "id": "es-s2-q21", "topic": "Ley de Texas", "globalNumber": 71}, {"simulator": 2, "number": 22, "stem": "Un asegurado se suicida 18 meses después de emitida la póliza. La aseguradora:", "options": [{"label": "A", "text": "Paga el beneficio completo", "correct": false}, {"label": "B", "text": "No paga nada", "correct": false}, {"label": "C", "text": "Devuelve las primas pagadas", "correct": true}, {"label": "D", "text": "Paga la mitad", "correct": false}], "explanation": "Suicidio dentro de 2 años → devuelve las primas.", "id": "es-s2-q22", "topic": "Impuestos", "globalNumber": 72}, {"simulator": 2, "number": 23, "stem": "¿Cuál de los siguientes describe un plan de contribución definida (DC)?", "options": [{"label": "A", "text": "Promete un beneficio mensual fijo en el retiro", "correct": false}, {"label": "B", "text": "Define la aportación; el beneficio depende del desempeño y el riesgo es del empleado", "correct": true}, {"label": "C", "text": "El empleador asume todo el riesgo de inversión", "correct": false}, {"label": "D", "text": "Garantiza el monto final al jubilado", "correct": false}], "explanation": "DC: aportación definida, beneficio según desempeño, riesgo del empleado.", "id": "es-s2-q23", "topic": "Ley de Texas", "globalNumber": 73}, {"simulator": 2, "number": 24, "stem": "Un agente nota un error en una respuesta de la solicitud. Lo correcto es que:", "options": [{"label": "A", "text": "El agente lo corrija sin avisar", "correct": false}, {"label": "B", "text": "El solicitante realice e inicialice la corrección", "correct": true}, {"label": "C", "text": "El underwriter lo cambie", "correct": false}, {"label": "D", "text": "Se ignore", "correct": false}], "explanation": "Las correcciones las inicializa el solicitante.", "id": "es-s2-q24", "topic": "General", "globalNumber": 74}, {"simulator": 2, "number": 25, "stem": "El límite de la Texas Guaranty Association para el valor presente de una anualidad es:", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": true}, {"label": "C", "text": "$300,000", "correct": false}, {"label": "D", "text": "$500,000", "correct": false}], "explanation": "TLHIGA anualidad = $250,000 (valor presente).", "id": "es-s2-q25", "topic": "Ley de Texas", "globalNumber": 75}, {"simulator": 2, "number": 26, "stem": "Una persona quiere recibir un pago mensual fijo de su beneficio de vida hasta que los fondos se agoten. Debe elegir:", "options": [{"label": "A", "text": "Fixed period", "correct": false}, {"label": "B", "text": "Fixed amount", "correct": true}, {"label": "C", "text": "Interest only", "correct": false}, {"label": "D", "text": "Life only", "correct": false}], "explanation": "Monto fijo hasta agotarse = fixed amount.", "id": "es-s2-q26", "topic": "Retiro", "globalNumber": 76}, {"simulator": 2, "number": 27, "stem": "El rider de doble indemnización pagará el beneficio adicional solo si la muerte:", "options": [{"label": "A", "text": "Ocurre por cualquier causa", "correct": false}, {"label": "B", "text": "Es accidental y ocurre dentro del plazo especificado (p. ej., 90 días)", "correct": true}, {"label": "C", "text": "Es por enfermedad en el primer año", "correct": false}, {"label": "D", "text": "Ocurre después de los 65", "correct": false}], "explanation": "Double indemnity: accidente dentro del plazo (~90 días).", "id": "es-s2-q27", "topic": "General", "globalNumber": 77}, {"simulator": 2, "number": 28, "stem": "Para reactivar (reinstate) una póliza caducada, NO se requiere:", "options": [{"label": "A", "text": "Evidencia de asegurabilidad", "correct": false}, {"label": "B", "text": "Pago de primas atrasadas con interés", "correct": false}, {"label": "C", "text": "Comprar una póliza nueva con nueva edad", "correct": true}, {"label": "D", "text": "Reactivar préstamos pendientes", "correct": false}], "explanation": "El reinstatement no implica comprar póliza nueva (conserva la edad original).", "id": "es-s2-q28", "topic": "General", "globalNumber": 78}, {"simulator": 2, "number": 29, "stem": "Un cliente quiere cambiar su póliza de vida por una anualidad sin disparar impuesto sobre la ganancia. El mecanismo es:", "options": [{"label": "A", "text": "Un MEC", "correct": false}, {"label": "B", "text": "Un intercambio 1035", "correct": true}, {"label": "C", "text": "Un rollover de 60 días", "correct": false}, {"label": "D", "text": "Un backdating", "correct": false}], "explanation": "Cambiar vida por anualidad sin impuesto = 1035.", "id": "es-s2-q29", "topic": "Retiro", "globalNumber": 79}, {"simulator": 2, "number": 30, "stem": "¿Qué le ocurre al beneficio por muerte cuando hay un préstamo de póliza pendiente al morir el asegurado?", "options": [{"label": "A", "text": "Se duplica", "correct": false}, {"label": "B", "text": "Se reduce por el saldo del préstamo más intereses", "correct": true}, {"label": "C", "text": "No cambia", "correct": false}, {"label": "D", "text": "Se anula", "correct": false}], "explanation": "El préstamo pendiente reduce el death benefit (saldo + intereses).", "id": "es-s2-q30", "topic": "Ley de Texas", "globalNumber": 80}, {"simulator": 2, "number": 31, "stem": "Una aseguradora insolvente es liquidada. ¿Quién queda protegido por la TLHIGA?", "options": [{"label": "A", "text": "Cualquier persona en EE. UU.", "correct": false}, {"label": "B", "text": "Solo residentes de Texas en la fecha de liquidación", "correct": true}, {"label": "C", "text": "Solo los agentes", "correct": false}, {"label": "D", "text": "Nadie", "correct": false}], "explanation": "TLHIGA protege a residentes de Texas a la fecha de liquidación.", "id": "es-s2-q31", "topic": "General", "globalNumber": 81}, {"simulator": 2, "number": 32, "stem": "Un solicitante practica paracaidismo cada fin de semana. En términos de seguros, esa afición es:", "options": [{"label": "A", "text": "Un peril", "correct": false}, {"label": "B", "text": "Un hazard", "correct": true}, {"label": "C", "text": "Un riesgo especulativo", "correct": false}, {"label": "D", "text": "Una pérdida fortuita", "correct": false}], "explanation": "La afición que aumenta el riesgo = hazard.", "id": "es-s2-q32", "topic": "Retiro", "globalNumber": 82}, {"simulator": 2, "number": 33, "stem": "¿Qué tipo de aseguradora es propiedad de sus asegurados y emite pólizas participantes?", "options": [{"label": "A", "text": "Stock", "correct": false}, {"label": "B", "text": "Mutual", "correct": true}, {"label": "C", "text": "Reciprocal", "correct": false}, {"label": "D", "text": "Fraternal", "correct": false}], "explanation": "Propiedad de asegurados + pólizas participantes = mutual.", "id": "es-s2-q33", "topic": "Anualidades", "globalNumber": 83}, {"simulator": 2, "number": 34, "stem": "Una persona de 30 años con impuestos bajos quiere crecimiento libre de impuestos al jubilarse y no verse obligada a retirar dinero. Le conviene una:", "options": [{"label": "A", "text": "IRA tradicional", "correct": false}, {"label": "B", "text": "Roth IRA", "correct": true}, {"label": "C", "text": "Anualidad inmediata", "correct": false}, {"label": "D", "text": "Pensión DB", "correct": false}], "explanation": "Roth IRA: crecimiento tax-free y sin RMD en vida.", "id": "es-s2-q34", "topic": "General", "globalNumber": 84}, {"simulator": 2, "number": 35, "stem": "El productor entrega una póliza cuya prima no se cobró al solicitar. Antes de que la cobertura inicie debe obtener:", "options": [{"label": "A", "text": "Una orden judicial", "correct": false}, {"label": "B", "text": "El pago de la primera prima y una declaración de buena salud", "correct": true}, {"label": "C", "text": "La firma del beneficiario", "correct": false}, {"label": "D", "text": "Un examen del MIB", "correct": false}], "explanation": "En la entrega sin prima previa: primera prima + statement of good health.", "id": "es-s2-q35", "topic": "Ley de Texas", "globalNumber": 85}, {"simulator": 2, "number": 36, "stem": "La penalidad por retiro de fondos de retiro calificados antes de los 59½, salvo excepción, es de:", "options": [{"label": "A", "text": "5%", "correct": false}, {"label": "B", "text": "10%", "correct": true}, {"label": "C", "text": "20%", "correct": false}, {"label": "D", "text": "50%", "correct": false}], "explanation": "Penalidad por retiro temprano = 10%.", "id": "es-s2-q36", "topic": "Impuestos", "globalNumber": 86}, {"simulator": 2, "number": 37, "stem": "En una póliza de Universal Life, los componentes que se descuentan del valor en efectivo cada periodo incluyen:", "options": [{"label": "A", "text": "Dividendos e intereses acreditados", "correct": false}, {"label": "B", "text": "El costo del seguro y los cargos de gastos", "correct": true}, {"label": "C", "text": "Solo la prima bruta", "correct": false}, {"label": "D", "text": "Las comisiones del beneficiario", "correct": false}], "explanation": "De la UL se descuentan costo del seguro y cargos de gastos.", "id": "es-s2-q37", "topic": "Anualidades", "globalNumber": 87}, {"simulator": 2, "number": 38, "stem": "Una persona quiere una anualidad que participe de las ganancias de un índice bursátil sin arriesgar el capital si el índice cae. Le conviene una:", "options": [{"label": "A", "text": "Anualidad variable", "correct": false}, {"label": "B", "text": "Anualidad indexada (con piso y tope)", "correct": true}, {"label": "C", "text": "Anualidad inmediata fija", "correct": false}, {"label": "D", "text": "Whole life", "correct": false}], "explanation": "Índice con piso y tope, sin arriesgar capital = anualidad indexada.", "id": "es-s2-q38", "topic": "General", "globalNumber": 88}, {"simulator": 2, "number": 39, "stem": "¿Qué práctica consiste en agregar cobertura o cargos a una póliza sin el consentimiento del cliente?", "options": [{"label": "A", "text": "Rebating", "correct": false}, {"label": "B", "text": "Sliding", "correct": true}, {"label": "C", "text": "Twisting", "correct": false}, {"label": "D", "text": "Churning", "correct": false}], "explanation": "Agregar cargos sin consentimiento = sliding.", "id": "es-s2-q39", "topic": "Impuestos", "globalNumber": 89}, {"simulator": 2, "number": 40, "stem": "El seguro de vida es un ejemplo de contrato:", "options": [{"label": "A", "text": "De indemnización", "correct": false}, {"label": "B", "text": "Valuado (valued)", "correct": true}, {"label": "C", "text": "Bilateral", "correct": false}, {"label": "D", "text": "Especulativo", "correct": false}], "explanation": "Vida = contrato valuado (suma fija).", "id": "es-s2-q40", "topic": "General", "globalNumber": 90}, {"simulator": 2, "number": 41, "stem": "Una compañía paga las primas de una póliza key person sobre su gerente. El tratamiento fiscal es:", "options": [{"label": "A", "text": "Primas deducibles; beneficio gravable", "correct": false}, {"label": "B", "text": "Primas no deducibles; beneficio generalmente libre de impuesto", "correct": true}, {"label": "C", "text": "Ambos gravables", "correct": false}, {"label": "D", "text": "Ambos exentos y deducibles", "correct": false}], "explanation": "Key person: primas no deducibles, beneficio libre.", "id": "es-s2-q41", "topic": "General", "globalNumber": 91}, {"simulator": 2, "number": 42, "stem": "En el seguro, la tendencia de los riesgos más altos a buscar cobertura en mayor medida que los bajos se llama:", "options": [{"label": "A", "text": "Ley de los grandes números", "correct": false}, {"label": "B", "text": "Selección adversa", "correct": true}, {"label": "C", "text": "Indemnización", "correct": false}, {"label": "D", "text": "Mancomunación", "correct": false}], "explanation": "Riesgos altos buscan seguro = selección adversa.", "id": "es-s2-q42", "topic": "General", "globalNumber": 92}, {"simulator": 2, "number": 43, "stem": "¿Cuál es la opción de pago de anualidad que paga sobre dos vidas y continúa para el sobreviviente?", "options": [{"label": "A", "text": "Life only", "correct": false}, {"label": "B", "text": "Period certain", "correct": false}, {"label": "C", "text": "Joint and survivor", "correct": true}, {"label": "D", "text": "Fixed amount", "correct": false}], "explanation": "Dos vidas con continuación al sobreviviente = joint and survivor.", "id": "es-s2-q43", "topic": "Ley de Texas", "globalNumber": 93}, {"simulator": 2, "number": 44, "stem": "Bajo la regla de transferencia por valor (transfer-for-value), si una póliza se vende por una contraprestación, el beneficio por muerte:", "options": [{"label": "A", "text": "Siempre permanece libre de impuesto", "correct": false}, {"label": "B", "text": "Puede volverse parcialmente gravable, salvo ciertas excepciones", "correct": true}, {"label": "C", "text": "Se duplica", "correct": false}, {"label": "D", "text": "Se anula", "correct": false}], "explanation": "Transfer-for-value: el beneficio puede volverse gravable (con excepciones).", "id": "es-s2-q44", "topic": "General", "globalNumber": 94}, {"simulator": 2, "number": 45, "stem": "Un agente representa a tres aseguradoras distintas. Para hacerlo legalmente necesita:", "options": [{"label": "A", "text": "Una sola licencia, sin más", "correct": false}, {"label": "B", "text": "Un appointment de cada una, notificado al TDI", "correct": true}, {"label": "C", "text": "Tres licencias separadas", "correct": false}, {"label": "D", "text": "Aprobación del beneficiario", "correct": false}], "explanation": "Necesita un appointment de cada aseguradora, notificado al TDI.", "id": "es-s2-q45", "topic": "Retiro", "globalNumber": 95}, {"simulator": 2, "number": 46, "stem": "El dividendo de una póliza participante dejado a acumularse con la aseguradora: ¿qué parte es gravable?", "options": [{"label": "A", "text": "Todo el dividendo", "correct": false}, {"label": "B", "text": "Nada", "correct": false}, {"label": "C", "text": "Solo el interés ganado", "correct": true}, {"label": "D", "text": "Solo el dividendo, no el interés", "correct": false}], "explanation": "El dividendo no es gravable; el interés acumulado sí.", "id": "es-s2-q46", "topic": "General", "globalNumber": 96}, {"simulator": 2, "number": 47, "stem": "¿Qué tipo de autoridad surge cuando la aseguradora, por su conducta, lleva al público a creer que un agente tiene facultades que en realidad no le otorgó?", "options": [{"label": "A", "text": "Express", "correct": false}, {"label": "B", "text": "Implied", "correct": false}, {"label": "C", "text": "Apparent", "correct": true}, {"label": "D", "text": "Fiduciary", "correct": false}], "explanation": "Autoridad aparente (apparent), por la apariencia creada (estoppel).", "id": "es-s2-q47", "topic": "General", "globalNumber": 97}, {"simulator": 2, "number": 48, "stem": "¿Cuál es el propósito principal de antedatar (backdating) una póliza?", "options": [{"label": "A", "text": "Extender el periodo contestable", "correct": false}, {"label": "B", "text": "Obtener una prima menor por una edad asegurada más joven", "correct": true}, {"label": "C", "text": "Evitar el examen médico", "correct": false}, {"label": "D", "text": "Eliminar el periodo de gracia", "correct": false}], "explanation": "Backdating: prima menor por edad asegurada más joven.", "id": "es-s2-q48", "topic": "General", "globalNumber": 98}, {"simulator": 2, "number": 49, "stem": "Una anualidad “life only” se elige normalmente cuando el annuitant:", "options": [{"label": "A", "text": "Quiere dejar el mayor saldo posible a sus herederos", "correct": false}, {"label": "B", "text": "No tiene dependientes y busca el mayor ingreso mensual", "correct": true}, {"label": "C", "text": "Quiere garantizar 20 años de pagos", "correct": false}, {"label": "D", "text": "Desea cobertura por muerte accidental", "correct": false}], "explanation": "Life only: sin dependientes, mayor ingreso, nada a herederos.", "id": "es-s2-q49", "topic": "Retiro", "globalNumber": 99}, {"simulator": 2, "number": 50, "stem": "En Texas, si una aseguradora retrasa injustificadamente el pago de una reclamación válida más allá del plazo legal, generalmente debe:", "options": [{"label": "A", "text": "Nada adicional", "correct": false}, {"label": "B", "text": "Pagar interés de penalización (18%) y honorarios de abogado", "correct": true}, {"label": "C", "text": "Cancelar la póliza", "correct": false}, {"label": "D", "text": "Duplicar el beneficio", "correct": false}], "explanation": "Texas: demora injustificada → 18% de interés + honorarios.", "id": "es-s2-q50", "topic": "Ley de Texas", "globalNumber": 100}, {"simulator": 3, "number": 1, "stem": "El principio que permite a una aseguradora predecir con exactitud sus pérdidas anuales esperadas es:", "options": [{"label": "A", "text": "La selección adversa", "correct": false}, {"label": "B", "text": "La Ley de los grandes números", "correct": true}, {"label": "C", "text": "La indemnización", "correct": false}, {"label": "D", "text": "El interés asegurable", "correct": false}], "explanation": "La predicción exacta de pérdidas se apoya en la Ley de los grandes números.", "id": "es-s3-q1", "topic": "Anualidades", "globalNumber": 101}, {"simulator": 3, "number": 2, "stem": "Un cliente quiere una póliza permanente cuyas primas pueda subir o bajar y cuya suma asegurada pueda ajustar. Le conviene:", "options": [{"label": "A", "text": "Term nivelado", "correct": false}, {"label": "B", "text": "Whole life de pago limitado", "correct": false}, {"label": "C", "text": "Universal Life", "correct": true}, {"label": "D", "text": "Decreasing term", "correct": false}], "explanation": "Prima flexible + suma ajustable = Universal Life.", "id": "es-s3-q2", "topic": "General", "globalNumber": 102}, {"simulator": 3, "number": 3, "stem": "Bajo SECURE 2.0, la edad de inicio de los RMD para una IRA tradicional es:", "options": [{"label": "A", "text": "65", "correct": false}, {"label": "B", "text": "70½", "correct": false}, {"label": "C", "text": "72", "correct": false}, {"label": "D", "text": "73", "correct": true}], "explanation": "RMD a los 73 (SECURE 2.0).", "id": "es-s3-q3", "topic": "Ley de Texas", "globalNumber": 103}, {"simulator": 3, "number": 4, "stem": "Una anualidad indexada generalmente:", "options": [{"label": "A", "text": "Requiere licencia de valores", "correct": false}, {"label": "B", "text": "No requiere licencia de valores y ofrece un piso de protección", "correct": true}, {"label": "C", "text": "Invierte directamente en acciones individuales", "correct": false}, {"label": "D", "text": "Garantiza pérdidas de mercado", "correct": false}], "explanation": "La indexada no requiere licencia de valores y tiene piso de protección.", "id": "es-s3-q4", "topic": "General", "globalNumber": 104}, {"simulator": 3, "number": 5, "stem": "El límite de la Texas Guaranty Association para el valor de rescate en efectivo (cash value) de vida es:", "options": [{"label": "A", "text": "$50,000", "correct": false}, {"label": "B", "text": "$100,000", "correct": true}, {"label": "C", "text": "$250,000", "correct": false}, {"label": "D", "text": "$300,000", "correct": false}], "explanation": "TLHIGA cash value de vida = $100,000.", "id": "es-s3-q5", "topic": "Retiro", "globalNumber": 105}, {"simulator": 3, "number": 6, "stem": "Un beneficiario revocable, mientras el asegurado vive, tiene:", "options": [{"label": "A", "text": "Un derecho adquirido (vested)", "correct": false}, {"label": "B", "text": "Una mera expectativa, sin derechos", "correct": true}, {"label": "C", "text": "Control de la póliza", "correct": false}, {"label": "D", "text": "Derecho a tomar préstamos", "correct": false}], "explanation": "El revocable tiene mera expectativa, sin derechos en vida del asegurado.", "id": "es-s3-q6", "topic": "Ley de Texas", "globalNumber": 106}, {"simulator": 3, "number": 7, "stem": "En un plan no calificado, al distribuirse, se grava:", "options": [{"label": "A", "text": "La totalidad", "correct": false}, {"label": "B", "text": "Solo la ganancia", "correct": true}, {"label": "C", "text": "Nada", "correct": false}, {"label": "D", "text": "El doble de la ganancia", "correct": false}], "explanation": "Plan no calificado: se grava solo la ganancia.", "id": "es-s3-q7", "topic": "General", "globalNumber": 107}, {"simulator": 3, "number": 8, "stem": "La cláusula que usa el valor en efectivo para pagar automáticamente una prima impaga y evitar la caducidad es:", "options": [{"label": "A", "text": "Reduced paid-up", "correct": false}, {"label": "B", "text": "Extended term", "correct": false}, {"label": "C", "text": "Automatic Premium Loan", "correct": true}, {"label": "D", "text": "Waiver of premium", "correct": false}], "explanation": "Pagar la prima impaga con el cash value = APL.", "id": "es-s3-q8", "topic": "Retiro", "globalNumber": 108}, {"simulator": 3, "number": 9, "stem": "El examen del estado de Texas para la licencia de vida lo administra:", "options": [{"label": "A", "text": "El TDI directamente", "correct": false}, {"label": "B", "text": "Pearson VUE", "correct": true}, {"label": "C", "text": "La NAIC", "correct": false}, {"label": "D", "text": "FINRA", "correct": false}], "explanation": "El examen lo administra Pearson VUE.", "id": "es-s3-q9", "topic": "Retiro", "globalNumber": 109}, {"simulator": 3, "number": 10, "stem": "Una persona quiere un ingreso vitalicio garantizado por al menos 20 años para proteger a su familia si muere pronto. Le conviene:", "options": [{"label": "A", "text": "Life only", "correct": false}, {"label": "B", "text": "Life with 20-year period certain", "correct": true}, {"label": "C", "text": "Interest only", "correct": false}, {"label": "D", "text": "Cash surrender", "correct": false}], "explanation": "Ingreso vitalicio con mínimo garantizado de años = life with period certain.", "id": "es-s3-q10", "topic": "General", "globalNumber": 110}, {"simulator": 3, "number": 11, "stem": "¿Cuál de estas prácticas es legal si se hace con la debida divulgación?", "options": [{"label": "A", "text": "Rebating", "correct": false}, {"label": "B", "text": "Twisting", "correct": false}, {"label": "C", "text": "Replacement (reemplazo)", "correct": true}, {"label": "D", "text": "Churning", "correct": false}], "explanation": "El reemplazo es legal con la debida divulgación.", "id": "es-s3-q11", "topic": "General", "globalNumber": 111}, {"simulator": 3, "number": 12, "stem": "Una whole life tradicional “madura” (endows) normalmente a la edad de:", "options": [{"label": "A", "text": "65", "correct": false}, {"label": "B", "text": "80", "correct": false}, {"label": "C", "text": "100 (o 121 con tablas recientes)", "correct": true}, {"label": "D", "text": "59½", "correct": false}], "explanation": "Whole life madura a los 100 (o 121 con tablas recientes).", "id": "es-s3-q12", "topic": "Ley de Texas", "globalNumber": 112}, {"simulator": 3, "number": 13, "stem": "Un asegurado con una póliza MEC toma un préstamo a los 50 años. El tratamiento fiscal del préstamo es:", "options": [{"label": "A", "text": "Libre de impuesto", "correct": false}, {"label": "B", "text": "Ganancia gravable (LIFO) más penalidad del 10%", "correct": true}, {"label": "C", "text": "Libre, como en cualquier póliza", "correct": false}, {"label": "D", "text": "No se permite", "correct": false}], "explanation": "MEC: préstamo gravado LIFO + 10% (<59½).", "id": "es-s3-q13", "topic": "Impuestos", "globalNumber": 113}, {"simulator": 3, "number": 14, "stem": "En Texas, la licencia de un agente de vida vence:", "options": [{"label": "A", "text": "Cada año, el 31 de diciembre", "correct": false}, {"label": "B", "text": "Cada 2 años, el último día del mes de cumpleaños", "correct": true}, {"label": "C", "text": "Cada 5 años", "correct": false}, {"label": "D", "text": "Nunca, es permanente", "correct": false}], "explanation": "Licencia: 2 años, último día del mes de cumpleaños.", "id": "es-s3-q14", "topic": "Anualidades", "globalNumber": 114}, {"simulator": 3, "number": 15, "stem": "La Opción A de una Universal Life proporciona un beneficio por muerte:", "options": [{"label": "A", "text": "Creciente (suma + cash value)", "correct": false}, {"label": "B", "text": "Nivelado", "correct": true}, {"label": "C", "text": "Decreciente", "correct": false}, {"label": "D", "text": "Variable según el mercado", "correct": false}], "explanation": "Opción A = beneficio nivelado.", "id": "es-s3-q15", "topic": "Ley de Texas", "globalNumber": 115}, {"simulator": 3, "number": 16, "stem": "El agente de seguros, en su relación con las primas del cliente, actúa como:", "options": [{"label": "A", "text": "Un inversionista", "correct": false}, {"label": "B", "text": "Un fiduciario que no debe mezclar fondos", "correct": true}, {"label": "C", "text": "Un beneficiario", "correct": false}, {"label": "D", "text": "Un asegurado", "correct": false}], "explanation": "El agente es fiduciario; no debe mezclar fondos.", "id": "es-s3-q16", "topic": "General", "globalNumber": 116}, {"simulator": 3, "number": 17, "stem": "¿Qué plan permite a un autoempleado no incorporado establecer un plan calificado de retiro?", "options": [{"label": "A", "text": "401(k) corporativo", "correct": false}, {"label": "B", "text": "Keogh (HR-10)", "correct": true}, {"label": "C", "text": "403(b)", "correct": false}, {"label": "D", "text": "Pensión gubernamental", "correct": false}], "explanation": "Autoempleado no incorporado = Keogh (HR-10).", "id": "es-s3-q17", "topic": "General", "globalNumber": 117}, {"simulator": 3, "number": 18, "stem": "Un solicitante omite intencionalmente un diagnóstico grave que la solicitud pregunta directamente. Esto es:", "options": [{"label": "A", "text": "Una representación inmaterial", "correct": false}, {"label": "B", "text": "Ocultamiento (concealment)", "correct": true}, {"label": "C", "text": "Una garantía", "correct": false}, {"label": "D", "text": "Buena fe máxima", "correct": false}], "explanation": "Callar un hecho material preguntado = concealment.", "id": "es-s3-q18", "topic": "Retiro", "globalNumber": 118}, {"simulator": 3, "number": 19, "stem": "El beneficio acelerado por enfermedad terminal generalmente es:", "options": [{"label": "A", "text": "Totalmente gravable", "correct": false}, {"label": "B", "text": "Libre de impuesto sobre la renta", "correct": true}, {"label": "C", "text": "Gravable al 50%", "correct": false}, {"label": "D", "text": "Gravable solo si excede $50,000", "correct": false}], "explanation": "Beneficio acelerado terminal = libre de impuesto.", "id": "es-s3-q19", "topic": "General", "globalNumber": 119}, {"simulator": 3, "number": 20, "stem"
