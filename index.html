<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#2d3f7f" />
<title>Certivo Practice</title>
<style>
:root{--blue:#2d3f7f;--gold:#d0c660;--ink:#10182f;--muted:#65718a;--bg:#f6f8fc;--card:#fff;--line:#e2e7f0;--ok:#0f9d58;--bad:#dc2626;--shadow:0 18px 45px rgba(16,24,47,.12);--radius:24px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#fff 0,#f5f7fc 32%,#eef2f8 100%);color:var(--ink);min-height:100vh}.top{background:linear-gradient(135deg,var(--blue),#172657);color:#fff;padding:calc(env(safe-area-inset-top) + 24px) 20px 26px;box-shadow:0 16px 38px rgba(45,63,127,.25)}.top h1{margin:0;font-size:34px;letter-spacing:-.04em}.top p{margin:7px 0 0;font-size:16px;line-height:1.35;opacity:.94}.version{display:inline-block;margin-top:10px;background:rgba(208,198,96,.22);border:1px solid rgba(208,198,96,.45);border-radius:999px;padding:6px 10px;color:#fff;font-weight:800;font-size:12px}.wrap{max-width:980px;margin:0 auto;padding:24px 16px 50px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}.grid{display:grid;gap:14px}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}@media(max-width:720px){.grid2,.grid3{grid-template-columns:1fr}.top h1{font-size:30px}}label{display:block;font-weight:800;color:#33405c;margin:0 0 7px}select,input{width:100%;font:inherit;border:1px solid #cfd7e6;border-radius:16px;background:#fff;padding:14px 16px;color:#111827;font-size:17px}button{appearance:none;border:0;border-radius:18px;padding:14px 18px;font-weight:900;font-size:17px;cursor:pointer;background:var(--blue);color:#fff;box-shadow:0 8px 20px rgba(45,63,127,.18)}button.secondary{background:#e9edf5;color:#172033}button.dark{background:#334155;color:#fff}button.gold{background:var(--gold);color:#172033}button.good{background:var(--ok)}button.danger{background:var(--bad)}button:disabled{opacity:.55;cursor:not-allowed}.btnrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.pill{display:inline-flex;gap:6px;align-items:center;border-radius:999px;background:#e8eef9;color:#14213b;font-weight:900;padding:9px 13px;margin:4px 4px 0 0}.pill.gold{background:rgba(208,198,96,.25)}.hidden{display:none!important}.hero-title{font-size:29px;margin:0 0 18px}.small{color:var(--muted);font-size:14px;line-height:1.35}.progress{height:14px;background:#dfe5ef;border-radius:99px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),#4260c2);transition:.25s}.qtop{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.qtop h2{font-size:24px;letter-spacing:-.03em;margin:0}.tag{background:#e8f0ff;color:#254399;border-radius:999px;font-weight:900;padding:9px 13px}.stem{font-size:25px;line-height:1.22;font-weight:900;letter-spacing:-.02em;margin:18px 0}.option{width:100%;text-align:left;background:#fff;color:var(--ink);border:3px solid #e4e8f0;box-shadow:none;padding:17px 18px;border-radius:18px;margin:10px 0;display:block}.option:hover{border-color:#c7d2e6}.option.selected{border-color:var(--blue);background:#f2f5ff}.option.correct{border-color:#16a34a;background:#eafaf1}.option.wrong{border-color:#dc2626;background:#fef2f2}.feedback{border:1px solid var(--line);background:#f8fafc;border-radius:18px;padding:16px;margin:16px 0;font-size:18px;line-height:1.35}.feedback strong{font-size:20px}.feedback.ok{border-color:#bbf7d0;background:#f0fdf4}.feedback.bad{border-color:#fecaca;background:#fff7f7}.finishScore{text-align:center}.scoreNum{font-size:58px;font-weight:950;color:var(--blue);letter-spacing:-.05em}.dashboardList{display:grid;gap:10px}.dashItem{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff;display:flex;justify-content:space-between;gap:12px}.muted{color:var(--muted)}.footer{font-size:12px;color:#73809a;text-align:center;margin-top:22px}.brandrow{display:flex;justify-content:space-between;gap:12px;align-items:center}.brandmark{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--blue),#5b6eb2);display:grid;place-items:center;color:var(--gold);font-weight:1000;font-size:24px}.toggle{display:flex;gap:8px;background:#eef2f8;border:1px solid var(--line);padding:5px;border-radius:18px}.toggle button{box-shadow:none;padding:9px 12px;border-radius:13px;background:transparent;color:#334155;font-size:15px}.toggle button.active{background:#fff;color:var(--blue);box-shadow:0 3px 10px rgba(0,0,0,.08)}
</style>
</head>
<body>
<header class="top"><div class="brandrow"><div><h1>Certivo</h1><p id="subtitle">Texas Life Insurance Trainer</p><span class="version">MVP v1.0 · Safe scoring · 600 bilingual questions</span></div><div class="brandmark">C</div></div></header>
<main class="wrap">
<section id="home" class="card">
  <div class="brandrow" style="margin-bottom:18px"><h2 class="hero-title" id="homeTitle">Start Practice</h2><div class="toggle"><button id="langEn" class="active">English</button><button id="langEs">Español</button></div></div>
  <div class="grid grid2">
    <div><label id="modeLabel">Mode</label><select id="mode"><option value="practice">Practice: instant feedback</option><option value="exam">Exam: grade at end</option></select></div>
    <div><label id="setLabel">Set</label><select id="set"><option value="all">All questions</option><option value="missed">Missed bank</option><option value="flagged">Flagged questions</option><option value="1">Simulator 1</option><option value="2">Simulator 2</option><option value="3">Simulator 3</option><option value="4">Simulator 4</option><option value="5">Simulator 5</option><option value="6">Simulator 6</option></select></div>
    <div><label id="countLabel">Quantity</label><select id="count"><option>10</option><option>25</option><option selected>50</option><option>100</option><option>300</option></select></div>
    <div><label id="shuffleLabel">Options</label><select id="shuffle"><option value="both">Shuffle questions and answers</option><option value="questions">Shuffle questions only</option><option value="none">Do not shuffle</option></select></div>
  </div>
  <div class="btnrow" style="margin-top:20px"><button id="startBtn">Start</button><button id="dashboardBtn" class="secondary">Dashboard</button><button id="resetBtn" class="dark">Reset progress</button></div>
  <div style="margin-top:14px"><span class="pill" id="seenPill">Seen: 0/300</span><span class="pill" id="attemptsPill">Attempts: 0</span><span class="pill gold" id="missedPill">Missed bank: 0</span><span class="pill gold" id="flaggedPill">Flagged: 0</span></div>
</section>
<section id="quiz" class="card hidden">
  <div class="qtop"><h2 id="qCount">Question 1 of 50</h2><span class="tag" id="topicTag">General</span></div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="small" id="simInfo" style="margin-top:18px">Simulator 1 · Question 1</div>
  <div class="stem" id="stem"></div>
  <div id="optionsBox"></div>
  <div id="feedback" class="feedback hidden"></div>
  <div class="btnrow"><button id="prevBtn" class="dark">Previous</button><button id="checkBtn">Check</button><button id="nextBtn">Next</button><button id="flagBtn" class="secondary">Flag</button><button id="finishBtn" class="good">Finish</button></div>
</section>
<section id="results" class="card hidden finishScore"><h2 id="resultTitle">Results</h2><div class="scoreNum" id="scoreNum">0/50</div><p id="scoreMsg" class="muted"></p><div class="btnrow" style="justify-content:center"><button id="reviewBtn" class="gold">Review missed</button><button id="againBtn">Practice again</button><button id="homeBtn" class="secondary">Home</button></div></section>
<section id="dashboard" class="card hidden"><h2 class="hero-title" id="dashTitle">Dashboard</h2><div class="dashboardList" id="dashList"></div><div class="btnrow" style="margin-top:18px"><button id="dashHome" class="secondary">Back</button></div></section>
<div class="footer" id="footer">Independent study aid. Not affiliated with TDI or Pearson VUE.</div>
</main>
<script>
const QUESTION_BANK = {"en": [{"simulator": 1, "number": 1, "stem": "An annuity primarily protects the owner against the risk of:", "options": [{"label": "A", "text": "Dying prematurely", "correct": false}, {"label": "B", "text": "Outliving their own savings", "correct": true}, {"label": "C", "text": "Becoming disabled", "correct": false}, {"label": "D", "text": "Property damage", "correct": false}], "explanation": "The annuity covers longevity risk (living too long). (A is life insurance.)", "id": "en-s1-q1", "topic": "Annuities", "globalNumber": 1}, {"simulator": 1, "number": 2, "stem": "In life insurance, insurable interest must exist:", "options": [{"label": "A", "text": "Only at the time of death", "correct": false}, {"label": "B", "text": "Both at issue and at death", "correct": false}, {"label": "C", "text": "Only at the time of application/issue", "correct": true}, {"label": "D", "text": "At any point during the policy term", "correct": false}], "explanation": "For life, insurable interest is required only at issue. (B mixes in the property rule.)", "id": "en-s1-q2", "topic": "General", "globalNumber": 2}, {"simulator": 1, "number": 3, "stem": "How many hours of continuing education, including ethics, does Texas require per 2-year license period?", "options": [{"label": "A", "text": "20 hours, 2 of ethics", "correct": false}, {"label": "B", "text": "24 hours, 3 of ethics", "correct": true}, {"label": "C", "text": "30 hours, 5 of ethics", "correct": false}, {"label": "D", "text": "12 hours, 1 of ethics", "correct": false}], "explanation": "Texas: 24 hours / 3 of ethics per 2-year period.", "id": "en-s1-q3", "topic": "Texas Law", "globalNumber": 3}, {"simulator": 1, "number": 4, "stem": "The nonforfeiture option applied automatically if the owner does not choose another is usually:", "options": [{"label": "A", "text": "Cash surrender value", "correct": false}, {"label": "B", "text": "Reduced paid-up insurance", "correct": false}, {"label": "C", "text": "Extended term insurance", "correct": true}, {"label": "D", "text": "Automatic premium loan", "correct": false}], "explanation": "The automatic option is extended term (same face, limited period). (D is a clause, not a nonforfeiture option.)", "id": "en-s1-q4", "topic": "General", "globalNumber": 4}, {"simulator": 1, "number": 5, "stem": "At what age must Required Minimum Distributions (RMDs) from a traditional IRA generally begin under current rules?", "options": [{"label": "A", "text": "59½", "correct": false}, {"label": "B", "text": "65", "correct": false}, {"label": "C", "text": "70½", "correct": false}, {"label": "D", "text": "73", "correct": true}], "explanation": "RMD at 73 (SECURE 2.0). (C, 70½, is the old rule.)", "id": "en-s1-q5", "topic": "Retirement", "globalNumber": 5}, {"simulator": 1, "number": 6, "stem": "The Texas Life and Health Insurance Guaranty Association (TLHIGA) coverage limit for a life insurance death benefit is:", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": false}, {"label": "C", "text": "$300,000", "correct": true}, {"label": "D", "text": "$500,000", "correct": false}], "explanation": "TLHIGA: $300,000 death benefit. (A is the cash value limit.)", "id": "en-s1-q6", "topic": "Texas Law", "globalNumber": 6}, {"simulator": 1, "number": 7, "stem": "An applicant’s answers on an insurance application are legally considered:", "options": [{"label": "A", "text": "Absolutely true warranties", "correct": false}, {"label": "B", "text": "Representations true to the best of their knowledge", "correct": true}, {"label": "C", "text": "Opinions with no legal effect", "correct": false}, {"label": "D", "text": "Independent contract clauses", "correct": false}], "explanation": "They are representations (only material misrepresentation voids).", "id": "en-s1-q7", "topic": "General", "globalNumber": 7}, {"simulator": 1, "number": 8, "stem": "In a non-qualified annuity, withdrawals (non-annuitized) are taxed under the:", "options": [{"label": "A", "text": "FIFO method, basis first", "correct": false}, {"label": "B", "text": "LIFO method, gain first", "correct": true}, {"label": "C", "text": "Equal proration", "correct": false}, {"label": "D", "text": "Always tax-free", "correct": false}], "explanation": "LIFO: gain comes out first and is taxable (+10% if under 59½).", "id": "en-s1-q8", "topic": "Retirement", "globalNumber": 8}, {"simulator": 1, "number": 9, "stem": "Which type of retirement plan receives contributions only from the employer?", "options": [{"label": "A", "text": "SIMPLE IRA", "correct": false}, {"label": "B", "text": "Traditional 401(k)", "correct": false}, {"label": "C", "text": "SEP IRA", "correct": true}, {"label": "D", "text": "Roth IRA", "correct": false}], "explanation": "In the SEP IRA only the employer contributes.", "id": "en-s1-q9", "topic": "Retirement", "globalNumber": 9}, {"simulator": 1, "number": 10, "stem": "An irrevocable beneficiary must give consent before the owner can:", "options": [{"label": "A", "text": "Pay the premium", "correct": false}, {"label": "B", "text": "Take a loan against the cash value", "correct": true}, {"label": "C", "text": "Read the policy", "correct": false}, {"label": "D", "text": "Receive the statement", "correct": false}], "explanation": "The irrevocable beneficiary must consent to loans, changes, assignment, or cancellation.", "id": "en-s1-q10", "topic": "General", "globalNumber": 10}, {"simulator": 1, "number": 11, "stem": "A conditional receipt provides coverage from application/exam as long as the applicant:", "options": [{"label": "A", "text": "Pays double the premium", "correct": false}, {"label": "B", "text": "Is insurable under normal underwriting", "correct": true}, {"label": "C", "text": "Is under 40 years old", "correct": false}, {"label": "D", "text": "Signs before a notary", "correct": false}], "explanation": "The conditional receipt covers if the applicant was insurable.", "id": "en-s1-q11", "topic": "General", "globalNumber": 11}, {"simulator": 1, "number": 12, "stem": "Under Texas law, when a marriage is dissolved, the designation of an ex-spouse as beneficiary:", "options": [{"label": "A", "text": "Always remains valid", "correct": false}, {"label": "B", "text": "Is automatically revoked, with certain exceptions", "correct": true}, {"label": "C", "text": "Only changes if the ex-spouse requests it", "correct": false}, {"label": "D", "text": "Is decided by the insurer", "correct": false}], "explanation": "Divorce Revocation (§9.301): the ex-spouse is automatically revoked (with exceptions).", "id": "en-s1-q12", "topic": "Texas Law", "globalNumber": 12}, {"simulator": 1, "number": 13, "stem": "A life insurance death benefit paid as a lump sum to the beneficiary is, for income tax:", "options": [{"label": "A", "text": "Fully taxable", "correct": false}, {"label": "B", "text": "Generally income-tax-free", "correct": true}, {"label": "C", "text": "50% taxable", "correct": false}, {"label": "D", "text": "Taxable if over $100,000", "correct": false}], "explanation": "A lump-sum death benefit is income-tax-free.", "id": "en-s1-q13", "topic": "Taxation", "globalNumber": 13}, {"simulator": 1, "number": 14, "stem": "Which annuity payout option provides the highest monthly income but leaves no remainder to beneficiaries?", "options": [{"label": "A", "text": "Life with 10-year period certain", "correct": false}, {"label": "B", "text": "Joint and survivor", "correct": false}, {"label": "C", "text": "Life only (straight life)", "correct": true}, {"label": "D", "text": "Cash refund", "correct": false}], "explanation": "Life only pays the most, but nothing to heirs.", "id": "en-s1-q14", "topic": "Annuities", "globalNumber": 14}, {"simulator": 1, "number": 15, "stem": "An insurer incorporated in another U.S. state is, with respect to Texas:", "options": [{"label": "A", "text": "Domestic", "correct": false}, {"label": "B", "text": "Foreign", "correct": true}, {"label": "C", "text": "Alien", "correct": false}, {"label": "D", "text": "Non-admitted", "correct": false}], "explanation": "Another U.S. state = foreign (alien = another country).", "id": "en-s1-q15", "topic": "Texas Law", "globalNumber": 15}, {"simulator": 1, "number": 16, "stem": "The waiver of premium rider is triggered when the insured:", "options": [{"label": "A", "text": "Turns 65", "correct": false}, {"label": "B", "text": "Suffers a qualifying total disability", "correct": true}, {"label": "C", "text": "Changes beneficiary", "correct": false}, {"label": "D", "text": "Takes a loan", "correct": false}], "explanation": "Waiver is triggered by total disability (after the waiting period).", "id": "en-s1-q16", "topic": "General", "globalNumber": 16}, {"simulator": 1, "number": 17, "stem": "The act of mixing client premiums with the agent’s personal funds is called:", "options": [{"label": "A", "text": "Rebating", "correct": false}, {"label": "B", "text": "Commingling", "correct": true}, {"label": "C", "text": "Twisting", "correct": false}, {"label": "D", "text": "Sliding", "correct": false}], "explanation": "Mixing premiums with personal funds is commingling.", "id": "en-s1-q17", "topic": "General", "globalNumber": 17}, {"simulator": 1, "number": 18, "stem": "In a qualified plan, what portion of the distribution is taxable as ordinary income?", "options": [{"label": "A", "text": "Only the gain", "correct": false}, {"label": "B", "text": "The entire amount", "correct": true}, {"label": "C", "text": "Half", "correct": false}, {"label": "D", "text": "None", "correct": false}], "explanation": "In a qualified plan everything is taxable (contributions were pre-tax).", "id": "en-s1-q18", "topic": "Retirement", "globalNumber": 18}, {"simulator": 1, "number": 19, "stem": "Which characteristic of the insurance contract causes ambiguities to be interpreted in favor of the insured?", "options": [{"label": "A", "text": "Aleatory", "correct": false}, {"label": "B", "text": "Unilateral", "correct": false}, {"label": "C", "text": "Contract of adhesion", "correct": true}, {"label": "D", "text": "Conditional", "correct": false}], "explanation": "The contract of adhesion → ambiguity favors the insured.", "id": "en-s1-q19", "topic": "General", "globalNumber": 19}, {"simulator": 1, "number": 20, "stem": "A variable annuity requires that the producer hold:", "options": [{"label": "A", "text": "A life license only", "correct": false}, {"label": "B", "text": "A life license and a securities registration", "correct": true}, {"label": "C", "text": "A securities registration only", "correct": false}, {"label": "D", "text": "A health license", "correct": false}], "explanation": "Variable = security → life license + securities registration.", "id": "en-s1-q20", "topic": "Texas Law", "globalNumber": 20}, {"simulator": 1, "number": 21, "stem": "The contestable (incontestability) period in Texas is:", "options": [{"label": "A", "text": "6 months", "correct": false}, {"label": "B", "text": "1 year", "correct": false}, {"label": "C", "text": "2 years", "correct": true}, {"label": "D", "text": "5 years", "correct": false}], "explanation": "Contestable period = 2 years.", "id": "en-s1-q21", "topic": "Texas Law", "globalNumber": 21}, {"simulator": 1, "number": 22, "stem": "A policy that fails the 7-pay test is classified as a:", "options": [{"label": "A", "text": "MEC (Modified Endowment Contract)", "correct": true}, {"label": "B", "text": "Pure endowment", "correct": false}, {"label": "C", "text": "Convertible term", "correct": false}, {"label": "D", "text": "Annuity", "correct": false}], "explanation": "Failing the 7-pay test makes it a MEC.", "id": "en-s1-q22", "topic": "Taxation", "globalNumber": 22}, {"simulator": 1, "number": 23, "stem": "Who leads the Texas Department of Insurance (TDI)?", "options": [{"label": "A", "text": "An elected board", "correct": false}, {"label": "B", "text": "The Commissioner of Insurance, appointed by the Governor", "correct": true}, {"label": "C", "text": "The Attorney General", "correct": false}, {"label": "D", "text": "A federal panel", "correct": false}], "explanation": "The Commissioner (appointed by the Governor) leads the TDI.", "id": "en-s1-q23", "topic": "Texas Law", "globalNumber": 23}, {"simulator": 1, "number": 24, "stem": "In a Universal Life policy, Option B (increasing death benefit) pays:", "options": [{"label": "A", "text": "Only the level face amount", "correct": false}, {"label": "B", "text": "The face amount plus the cash value", "correct": true}, {"label": "C", "text": "Only the cash value", "correct": false}, {"label": "D", "text": "Double in case of accident", "correct": false}], "explanation": "Option B = face amount + cash value (grows).", "id": "en-s1-q24", "topic": "General", "globalNumber": 24}, {"simulator": 1, "number": 25, "stem": "Offering a client something of value not included in the policy to induce the purchase is:", "options": [{"label": "A", "text": "Defamation", "correct": false}, {"label": "B", "text": "Rebating", "correct": true}, {"label": "C", "text": "Twisting", "correct": false}, {"label": "D", "text": "Coercion", "correct": false}], "explanation": "A non-contractual inducement to buy = rebating (illegal, both parties).", "id": "en-s1-q25", "topic": "Texas Law", "globalNumber": 25}, {"simulator": 1, "number": 26, "stem": "The “exclusion ratio” in an annuity is used to:", "options": [{"label": "A", "text": "Calculate the agent’s commission", "correct": false}, {"label": "B", "text": "Separate the non-taxable portion (basis) from the taxable portion (gain)", "correct": true}, {"label": "C", "text": "Determine the premium", "correct": false}, {"label": "D", "text": "Set the retirement age", "correct": false}], "explanation": "The exclusion ratio separates basis (non-taxable) from gain (taxable).", "id": "en-s1-q26", "topic": "Retirement", "globalNumber": 26}, {"simulator": 1, "number": 27, "stem": "Which of the following is NOT an essential element of a valid contract?", "options": [{"label": "A", "text": "Consideration", "correct": false}, {"label": "B", "text": "Legal purpose", "correct": false}, {"label": "C", "text": "A printed, signed policy", "correct": true}, {"label": "D", "text": "Competent parties", "correct": false}], "explanation": "A printed, signed policy is not an essential element (the essentials are agreement, consideration, competent parties, legal purpose).", "id": "en-s1-q27", "topic": "General", "globalNumber": 27}, {"simulator": 1, "number": 28, "stem": "The children’s term rider typically:", "options": [{"label": "A", "text": "Covers only the oldest child", "correct": false}, {"label": "B", "text": "Covers all children and is usually convertible without exam", "correct": true}, {"label": "C", "text": "Pays double for accident", "correct": false}, {"label": "D", "text": "Refunds premiums", "correct": false}], "explanation": "The children’s term covers all children, convertible without exam.", "id": "en-s1-q28", "topic": "General", "globalNumber": 28}, {"simulator": 1, "number": 29, "stem": "In a defined benefit plan, the investment risk is assumed by:", "options": [{"label": "A", "text": "The employee", "correct": false}, {"label": "B", "text": "The employer", "correct": true}, {"label": "C", "text": "The government", "correct": false}, {"label": "D", "text": "The employee’s insurer", "correct": false}], "explanation": "In a DB plan, the risk is on the employer.", "id": "en-s1-q29", "topic": "Retirement", "globalNumber": 29}, {"simulator": 1, "number": 30, "stem": "The free look for an ordinary life policy in Texas is:", "options": [{"label": "A", "text": "3 days", "correct": false}, {"label": "B", "text": "10 days", "correct": true}, {"label": "C", "text": "30 days", "correct": false}, {"label": "D", "text": "60 days", "correct": false}], "explanation": "Texas life free look = 10 days.", "id": "en-s1-q30", "topic": "Texas Law", "globalNumber": 30}, {"simulator": 1, "number": 31, "stem": "The Accelerated Death Benefit allows the insured to:", "options": [{"label": "A", "text": "Double the benefit for accident", "correct": false}, {"label": "B", "text": "Collect part of the benefit while alive due to terminal illness, reducing the final amount", "correct": true}, {"label": "C", "text": "Recover all premiums", "correct": false}, {"label": "D", "text": "Buy more coverage without exam", "correct": false}], "explanation": "Accelerated DB = collect while alive for terminal illness, reduces the benefit.", "id": "en-s1-q31", "topic": "General", "globalNumber": 31}, {"simulator": 1, "number": 32, "stem": "Contributions to a Roth IRA are:", "options": [{"label": "A", "text": "Always deductible", "correct": false}, {"label": "B", "text": "Never deductible (after-tax)", "correct": true}, {"label": "C", "text": "Deductible only for those over 50", "correct": false}, {"label": "D", "text": "Partially deductible", "correct": false}], "explanation": "Roth contributions are never deductible.", "id": "en-s1-q32", "topic": "Retirement", "globalNumber": 32}, {"simulator": 1, "number": 33, "stem": "A 1035 exchange does NOT allow going from:", "options": [{"label": "A", "text": "Life to life", "correct": false}, {"label": "B", "text": "Life to annuity", "correct": false}, {"label": "C", "text": "Annuity to annuity", "correct": false}, {"label": "D", "text": "Annuity to life", "correct": true}], "explanation": "1035 does not allow annuity → life.", "id": "en-s1-q33", "topic": "Annuities", "globalNumber": 33}, {"simulator": 1, "number": 34, "stem": "If the insured misstated their age and paid an insufficient premium, the insurer will:", "options": [{"label": "A", "text": "Rescind the policy", "correct": false}, {"label": "B", "text": "Pay the benefit the premium would have purchased at the correct age", "correct": true}, {"label": "C", "text": "Pay the full benefit with no adjustment", "correct": false}, {"label": "D", "text": "Refund only the premiums", "correct": false}], "explanation": "Misstatement of age → adjust the benefit (not void).", "id": "en-s1-q34", "topic": "General", "globalNumber": 34}, {"simulator": 1, "number": 35, "stem": "The suicide clause in Texas typically excludes payment of the benefit if suicide occurs within:", "options": [{"label": "A", "text": "6 months, and refunds premiums", "correct": false}, {"label": "B", "text": "1 year, and pays nothing", "correct": false}, {"label": "C", "text": "2 years, and refunds the premiums", "correct": true}, {"label": "D", "text": "5 years, and pays half", "correct": false}], "explanation": "Suicide within 2 years → refunds premiums.", "id": "en-s1-q35", "topic": "Texas Law", "globalNumber": 35}, {"simulator": 1, "number": 36, "stem": "Which source of information may NOT be the sole basis for declining an application?", "options": [{"label": "A", "text": "The medical exam", "correct": false}, {"label": "B", "text": "The MIB information", "correct": true}, {"label": "C", "text": "The application", "correct": false}, {"label": "D", "text": "The APS", "correct": false}], "explanation": "You cannot decline solely on the MIB.", "id": "en-s1-q36", "topic": "Taxation", "globalNumber": 36}, {"simulator": 1, "number": 37, "stem": "A single-premium immediate annuity (SPIA):", "options": [{"label": "A", "text": "Has a long accumulation phase", "correct": false}, {"label": "B", "text": "Begins paying within about one year, with no accumulation", "correct": true}, {"label": "C", "text": "Requires flexible contributions", "correct": false}, {"label": "D", "text": "Only exists in a variable version", "correct": false}], "explanation": "SPIA: single premium, pays within 1 year, no accumulation.", "id": "en-s1-q37", "topic": "Annuities", "globalNumber": 37}, {"simulator": 1, "number": 38, "stem": "An agent who induces a client to replace a policy through false statements commits:", "options": [{"label": "A", "text": "Churning", "correct": false}, {"label": "B", "text": "Twisting", "correct": true}, {"label": "C", "text": "Backdating", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "Replacement induced by false statements = twisting.", "id": "en-s1-q38", "topic": "General", "globalNumber": 38}, {"simulator": 1, "number": 39, "stem": "Employer-provided group term life insurance is income-tax-free to the employee up to coverage of:", "options": [{"label": "A", "text": "$25,000", "correct": false}, {"label": "B", "text": "$50,000", "correct": true}, {"label": "C", "text": "$100,000", "correct": false}, {"label": "D", "text": "$250,000", "correct": false}], "explanation": "Group term tax-free up to $50,000.", "id": "en-s1-q39", "topic": "Taxation", "globalNumber": 39}, {"simulator": 1, "number": 40, "stem": "Which risk classification applies to an applicant with a higher-than-average but still insurable risk?", "options": [{"label": "A", "text": "Preferred", "correct": false}, {"label": "B", "text": "Standard", "correct": false}, {"label": "C", "text": "Substandard (rated)", "correct": true}, {"label": "D", "text": "Declined", "correct": false}], "explanation": "Higher risk but insurable = substandard (rated), not a decline.", "id": "en-s1-q40", "topic": "General", "globalNumber": 40}, {"simulator": 1, "number": 41, "stem": "Under a “per stirpes” designation, if a beneficiary dies before the insured, their share:", "options": [{"label": "A", "text": "Is divided among the surviving beneficiaries", "correct": false}, {"label": "B", "text": "Passes to their descendants", "correct": true}, {"label": "C", "text": "Goes to the insured’s estate", "correct": false}, {"label": "D", "text": "Is lost", "correct": false}], "explanation": "Per stirpes: the share passes to the descendants of the deceased.", "id": "en-s1-q41", "topic": "General", "globalNumber": 41}, {"simulator": 1, "number": 42, "stem": "Which document contains the agent’s observations that are NOT shown to the applicant?", "options": [{"label": "A", "text": "The medical Part II", "correct": false}, {"label": "B", "text": "The agent’s report", "correct": true}, {"label": "C", "text": "The buyer’s guide", "correct": false}, {"label": "D", "text": "The policy summary", "correct": false}], "explanation": "The agent’s report is not shown to the applicant.", "id": "en-s1-q42", "topic": "General", "globalNumber": 42}, {"simulator": 1, "number": 43, "stem": "An agent is prohibited from using, as a sales argument, the existence of:", "options": [{"label": "A", "text": "The grace period", "correct": false}, {"label": "B", "text": "The Texas Life and Health Insurance Guaranty Association", "correct": true}, {"label": "C", "text": "The free look", "correct": false}, {"label": "D", "text": "The incontestability clause", "correct": false}], "explanation": "Prohibited to use the Guaranty Association as a sales inducement.", "id": "en-s1-q43", "topic": "Texas Law", "globalNumber": 43}, {"simulator": 1, "number": 44, "stem": "In a flexible-premium Universal Life, the policy may lapse if:", "options": [{"label": "A", "text": "The insured turns 65", "correct": false}, {"label": "B", "text": "The cash value cannot cover the cost of insurance", "correct": true}, {"label": "C", "text": "A contingent beneficiary is named", "correct": false}, {"label": "D", "text": "An overpayment is made", "correct": false}], "explanation": "UL lapses if the cash value cannot cover the cost of insurance.", "id": "en-s1-q44", "topic": "General", "globalNumber": 44}, {"simulator": 1, "number": 45, "stem": "In-life distributions from a MEC before age 59½ are taxed:", "options": [{"label": "A", "text": "Tax-free", "correct": false}, {"label": "B", "text": "Gain first (LIFO), taxable, plus a 10% penalty", "correct": true}, {"label": "C", "text": "Basis first (FIFO), tax-free", "correct": false}, {"label": "D", "text": "Not permitted", "correct": false}], "explanation": "MEC: distributions are LIFO (gain first) +10% if under 59½.", "id": "en-s1-q45", "topic": "Retirement", "globalNumber": 45}, {"simulator": 1, "number": 46, "stem": "The insurance producer legally represents:", "options": [{"label": "A", "text": "The applicant", "correct": false}, {"label": "B", "text": "The insurer", "correct": true}, {"label": "C", "text": "The beneficiary", "correct": false}, {"label": "D", "text": "The TDI", "correct": false}], "explanation": "The agent represents the insurer.", "id": "en-s1-q46", "topic": "General", "globalNumber": 46}, {"simulator": 1, "number": 47, "stem": "Which type of permanent policy allows premiums to be paid over a limited period but keeps coverage for life?", "options": [{"label": "A", "text": "Term life", "correct": false}, {"label": "B", "text": "Limited-pay whole life", "correct": true}, {"label": "C", "text": "Annual renewable term", "correct": false}, {"label": "D", "text": "Decreasing term", "correct": false}], "explanation": "Limited-pay whole life: pay for a shorter time, lifetime coverage.", "id": "en-s1-q47", "topic": "General", "globalNumber": 47}, {"simulator": 1, "number": 48, "stem": "Under the Fair Credit Reporting Act, if an adverse action is taken based on a consumer report, the insurer must:", "options": [{"label": "A", "text": "Conceal the source", "correct": false}, {"label": "B", "text": "Notify the applicant and identify the agency that issued the report", "correct": true}, {"label": "C", "text": "Pay a fine to the applicant", "correct": false}, {"label": "D", "text": "Cancel the policy", "correct": false}], "explanation": "FCRA: adverse action → notify and disclose the source.", "id": "en-s1-q48", "topic": "General", "globalNumber": 48}, {"simulator": 1, "number": 49, "stem": "Which retirement plan is designed for employees of public schools and non-profit organizations?", "options": [{"label": "A", "text": "401(k)", "correct": false}, {"label": "B", "text": "403(b) / TSA", "correct": true}, {"label": "C", "text": "SEP IRA", "correct": false}, {"label": "D", "text": "Keogh", "correct": false}], "explanation": "403(b)/TSA = public schools and non-profits.", "id": "en-s1-q49", "topic": "Retirement", "globalNumber": 49}, {"simulator": 1, "number": 50, "stem": "The grace period for an ordinary life policy in Texas is:", "options": [{"label": "A", "text": "7 days", "correct": false}, {"label": "B", "text": "10 days", "correct": false}, {"label": "C", "text": "31 days", "correct": true}, {"label": "D", "text": "60 days", "correct": false}], "explanation": "Ordinary life grace period in Texas = 31 days.", "id": "en-s1-q50", "topic": "Texas Law", "globalNumber": 50}, {"simulator": 2, "number": 1, "stem": "A company buys a policy on the life of its chief financial officer, names itself beneficiary, and pays the premiums. The director resigns two years later and dies a year after that. The insurer:", "options": [{"label": "A", "text": "Does not pay, because insurable interest disappeared", "correct": false}, {"label": "B", "text": "Pays, because for life insurance insurable interest is only required at issue", "correct": true}, {"label": "C", "text": "Pays only half", "correct": false}, {"label": "D", "text": "Refunds the premiums", "correct": false}], "explanation": "For life, insurable interest is required only at issue; the policy remains payable.", "id": "en-s2-q1", "topic": "Annuities", "globalNumber": 51}, {"simulator": 2, "number": 2, "stem": "A 45-year-old client withdraws $12,000 from a traditional IRA with no exception applying. The tax consequences are:", "options": [{"label": "A", "text": "Tax-free", "correct": false}, {"label": "B", "text": "Ordinary income tax plus a 10% penalty", "correct": true}, {"label": "C", "text": "Only the 10% penalty", "correct": false}, {"label": "D", "text": "Only a 20% withholding", "correct": false}], "explanation": "Early IRA withdrawal: ordinary income tax + 10% penalty.", "id": "en-s2-q2", "topic": "General", "globalNumber": 52}, {"simulator": 2, "number": 3, "stem": "A woman names her three children “per stirpes.” One dies before her, leaving two grandchildren. When she dies, the funds are divided:", "options": [{"label": "A", "text": "Half and half between the two living children", "correct": false}, {"label": "B", "text": "One-third to each living child, and the deceased’s third between their two grandchildren", "correct": true}, {"label": "C", "text": "Equal shares among children and grandchildren", "correct": false}, {"label": "D", "text": "All to the estate", "correct": false}], "explanation": "Per stirpes: the deceased child’s share passes to their two grandchildren (1/6 each).", "id": "en-s2-q3", "topic": "Texas Law", "globalNumber": 53}, {"simulator": 2, "number": 4, "stem": "An agent deposits a client’s premium into a personal account for three days before sending it to the insurer. This constitutes:", "options": [{"label": "A", "text": "An acceptable practice", "correct": false}, {"label": "B", "text": "Commingling, a breach of fiduciary duty", "correct": true}, {"label": "C", "text": "Rebating", "correct": false}, {"label": "D", "text": "Field underwriting", "correct": false}], "explanation": "Mixing premiums with personal funds = commingling.", "id": "en-s2-q4", "topic": "General", "globalNumber": 54}, {"simulator": 2, "number": 5, "stem": "A retiree gives $250,000 to an insurer and begins receiving monthly payments the following month. They purchased a:", "options": [{"label": "A", "text": "Flexible-premium deferred annuity", "correct": false}, {"label": "B", "text": "Single-premium immediate annuity (SPIA)", "correct": true}, {"label": "C", "text": "Variable deferred annuity", "correct": false}, {"label": "D", "text": "Single-premium whole life", "correct": false}], "explanation": "Single premium + near-immediate payments = SPIA.", "id": "en-s2-q5", "topic": "Retirement", "globalNumber": 55}, {"simulator": 2, "number": 6, "stem": "An insured with an irrevocable beneficiary requests a loan against the cash value. The insurer:", "options": [{"label": "A", "text": "Grants it without conditions", "correct": false}, {"label": "B", "text": "Grants it only with the irrevocable beneficiary’s written consent", "correct": true}, {"label": "C", "text": "Requires a court order", "correct": false}, {"label": "D", "text": "Denies it permanently", "correct": false}], "explanation": "The irrevocable beneficiary must consent in writing to the loan.", "id": "en-s2-q6", "topic": "Texas Law", "globalNumber": 56}, {"simulator": 2, "number": 7, "stem": "A producer wants to sell a variable annuity. In addition to a life license, they need:", "options": [{"label": "A", "text": "A health license", "correct": false}, {"label": "B", "text": "A securities registration (FINRA/SEC)", "correct": true}, {"label": "C", "text": "Nothing additional", "correct": false}, {"label": "D", "text": "A property license", "correct": false}], "explanation": "Variable = security → securities registration in addition to the life license.", "id": "en-s2-q7", "topic": "General", "globalNumber": 57}, {"simulator": 2, "number": 8, "stem": "An insurer declines an application based on a consumer report. Under the FCRA it must:", "options": [{"label": "A", "text": "Keep the source secret", "correct": false}, {"label": "B", "text": "Notify the applicant and identify the agency", "correct": true}, {"label": "C", "text": "Pay compensation", "correct": false}, {"label": "D", "text": "Reimburse the medical exam", "correct": false}], "explanation": "FCRA: adverse action → notify and identify the agency.", "id": "en-s2-q8", "topic": "Retirement", "globalNumber": 58}, {"simulator": 2, "number": 9, "stem": "An insured dies during the grace period with an unpaid premium. The insurer:", "options": [{"label": "A", "text": "Denies the claim", "correct": false}, {"label": "B", "text": "Pays the full benefit with no deduction", "correct": false}, {"label": "C", "text": "Pays the benefit minus the overdue premium", "correct": true}, {"label": "D", "text": "Refunds the premiums", "correct": false}], "explanation": "During the grace period the benefit is paid minus the overdue premium.", "id": "en-s2-q9", "topic": "Retirement", "globalNumber": 59}, {"simulator": 2, "number": 10, "stem": "An employee of a 501(c)(3) organization wants to defer salary for retirement with a tax advantage. The typical plan is:", "options": [{"label": "A", "text": "SEP IRA", "correct": false}, {"label": "B", "text": "403(b) / TSA", "correct": true}, {"label": "C", "text": "Keogh", "correct": false}, {"label": "D", "text": "Roth IRA only", "correct": false}], "explanation": "501(c)(3) → 403(b)/TSA.", "id": "en-s2-q10", "topic": "General", "globalNumber": 60}, {"simulator": 2, "number": 11, "stem": "An agent exaggerates the flaws of the client’s current policy and hides the charges so they replace it. This is:", "options": [{"label": "A", "text": "Churning", "correct": false}, {"label": "B", "text": "Twisting", "correct": true}, {"label": "C", "text": "Sliding", "correct": false}, {"label": "D", "text": "Backdating", "correct": false}], "explanation": "Replacement induced by deception = twisting.", "id": "en-s2-q11", "topic": "General", "globalNumber": 61}, {"simulator": 2, "number": 12, "stem": "A client wants maximum coverage for 20 years at the lowest cost, with the option to convert it to permanent without a new medical exam. Best suited is:", "options": [{"label": "A", "text": "Limited-pay whole life", "correct": false}, {"label": "B", "text": "Level convertible term", "correct": true}, {"label": "C", "text": "Deferred annuity", "correct": false}, {"label": "D", "text": "Single-premium whole life", "correct": false}], "explanation": "Level convertible term: cheap maximum coverage + conversion without exam.", "id": "en-s2-q12", "topic": "Texas Law", "globalNumber": 62}, {"simulator": 2, "number": 13, "stem": "The cash value of a whole life policy is surrendered. The client paid $30,000 in premiums (no dividends) and the cash value is $42,000. The taxable amount is:", "options": [{"label": "A", "text": "$42,000", "correct": false}, {"label": "B", "text": "$30,000", "correct": false}, {"label": "C", "text": "$12,000", "correct": true}, {"label": "D", "text": "$0", "correct": false}], "explanation": "Gain = 42,000 − 30,000 = $12,000 (only the gain is taxable).", "id": "en-s2-q13", "topic": "Taxation", "globalNumber": 63}, {"simulator": 2, "number": 14, "stem": "A wealthy couple wants funds to pay the estate tax their children will face after both parents have died. The suitable policy is:", "options": [{"label": "A", "text": "Joint life (first-to-die)", "correct": false}, {"label": "B", "text": "Survivorship (second-todie)", "correct": true}, {"label": "C", "text": "Decreasing term", "correct": false}, {"label": "D", "text": "Annual renewable term", "correct": false}], "explanation": "Survivorship (second-to-die) for estate taxes at the second death.", "id": "en-s2-q14", "topic": "Annuities", "globalNumber": 64}, {"simulator": 2, "number": 15, "stem": "Under Texas law, an agent who sells annuities must complete, before selling them, a course of:", "options": [{"label": "A", "text": "8 hours of ethics", "correct": false}, {"label": "B", "text": "4 hours Best Interest (suitability)", "correct": true}, {"label": "C", "text": "24 hours of LTC", "correct": false}, {"label": "D", "text": "3 hours of flood", "correct": false}], "explanation": "Texas requires the 4-hour Best Interest course before selling annuities.", "id": "en-s2-q15", "topic": "Texas Law", "globalNumber": 65}, {"simulator": 2, "number": 16, "stem": "A Universal Life policy has for years paid only the minimum; rates drop and the cash value is depleted without covering the cost of insurance. If the owner does not contribute more, the policy:", "options": [{"label": "A", "text": "Converts to whole life", "correct": false}, {"label": "B", "text": "Lapses", "correct": true}, {"label": "C", "text": "Increases its face amount", "correct": false}, {"label": "D", "text": "Pays dividends", "correct": false}], "explanation": "If the cash value cannot cover the cost of insurance, the UL lapses.", "id": "en-s2-q16", "topic": "General", "globalNumber": 66}, {"simulator": 2, "number": 17, "stem": "The primary beneficiary died a year before the insured; there is a living contingent. When the insured dies, who collects?", "options": [{"label": "A", "text": "The primary’s estate", "correct": false}, {"label": "B", "text": "The contingent beneficiary", "correct": true}, {"label": "C", "text": "The insured’s estate", "correct": false}, {"label": "D", "text": "The insurer", "correct": false}], "explanation": "The contingent collects (the primary did not survive).", "id": "en-s2-q17", "topic": "General", "globalNumber": 67}, {"simulator": 2, "number": 18, "stem": "An applicant pays the premium and receives a conditional receipt. They die before issue, but underwriting concludes they were insurable as applied. The insurer:", "options": [{"label": "A", "text": "Does not pay", "correct": false}, {"label": "B", "text": "Pays the benefit", "correct": true}, {"label": "C", "text": "Refunds only the premium", "correct": false}, {"label": "D", "text": "Pays half", "correct": false}], "explanation": "Conditional receipt: they were insurable → the insurer pays.", "id": "en-s2-q18", "topic": "Retirement", "globalNumber": 68}, {"simulator": 2, "number": 19, "stem": "Which statement about the Roth IRA is correct?", "options": [{"label": "A", "text": "Its contributions are deductible", "correct": false}, {"label": "B", "text": "It requires RMDs at 73", "correct": false}, {"label": "C", "text": "Its qualified distributions are tax-free and there are no lifetime RMDs", "correct": true}, {"label": "D", "text": "It has no income limits to contribute", "correct": false}], "explanation": "Roth: qualified distributions tax-free, no lifetime RMDs.", "id": "en-s2-q19", "topic": "General", "globalNumber": 69}, {"simulator": 2, "number": 20, "stem": "An insurer spreads, without basis, that a competitor “is about to go bankrupt” to steal its clients. It commits:", "options": [{"label": "A", "text": "Rebating", "correct": false}, {"label": "B", "text": "Defamation", "correct": true}, {"label": "C", "text": "Twisting", "correct": false}, {"label": "D", "text": "Sliding", "correct": false}], "explanation": "Defaming a competitor’s solvency = defamation.", "id": "en-s2-q20", "topic": "Texas Law", "globalNumber": 70}, {"simulator": 2, "number": 21, "stem": "In an annuity, the phase in which money is contributed and grows tax-deferred is called:", "options": [{"label": "A", "text": "Payout phase", "correct": false}, {"label": "B", "text": "Accumulation phase", "correct": true}, {"label": "C", "text": "Annuitization", "correct": false}, {"label": "D", "text": "Liquidation", "correct": false}], "explanation": "Contributing and growing tax-deferred = accumulation phase.", "id": "en-s2-q21", "topic": "Texas Law", "globalNumber": 71}, {"simulator": 2, "number": 22, "stem": "An insured commits suicide 18 months after the policy is issued. The insurer:", "options": [{"label": "A", "text": "Pays the full benefit", "correct": false}, {"label": "B", "text": "Pays nothing", "correct": false}, {"label": "C", "text": "Refunds the premiums paid", "correct": true}, {"label": "D", "text": "Pays half", "correct": false}], "explanation": "Suicide within 2 years → refunds premiums.", "id": "en-s2-q22", "topic": "Taxation", "globalNumber": 72}, {"simulator": 2, "number": 23, "stem": "Which of the following describes a defined contribution (DC) plan?", "options": [{"label": "A", "text": "Promises a fixed monthly benefit at retirement", "correct": false}, {"label": "B", "text": "Defines the contribution; the benefit depends on performance and the risk is on the employee", "correct": true}, {"label": "C", "text": "The employer assumes all investment risk", "correct": false}, {"label": "D", "text": "Guarantees the final amount to the retiree", "correct": false}], "explanation": "DC: defined contribution, benefit based on performance, employee’s risk.", "id": "en-s2-q23", "topic": "Texas Law", "globalNumber": 73}, {"simulator": 2, "number": 24, "stem": "An agent notices an error in an application answer. The correct thing is that:", "options": [{"label": "A", "text": "The agent corrects it without notice", "correct": false}, {"label": "B", "text": "The applicant makes and initials the correction", "correct": true}, {"label": "C", "text": "The underwriter changes it", "correct": false}, {"label": "D", "text": "It is ignored", "correct": false}], "explanation": "Corrections are initialed by the applicant.", "id": "en-s2-q24", "topic": "General", "globalNumber": 74}, {"simulator": 2, "number": 25, "stem": "The Texas Guaranty Association limit for the present value of an annuity is:", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": true}, {"label": "C", "text": "$300,000", "correct": false}, {"label": "D", "text": "$500,000", "correct": false}], "explanation": "TLHIGA annuity = $250,000 (present value).", "id": "en-s2-q25", "topic": "Texas Law", "globalNumber": 75}, {"simulator": 2, "number": 26, "stem": "A person wants to receive a fixed monthly payment from their life benefit until the funds run out. They should choose:", "options": [{"label": "A", "text": "Fixed period", "correct": false}, {"label": "B", "text": "Fixed amount", "correct": true}, {"label": "C", "text": "Interest only", "correct": false}, {"label": "D", "text": "Life only", "correct": false}], "explanation": "Fixed amount until depleted = fixed amount.", "id": "en-s2-q26", "topic": "Retirement", "globalNumber": 76}, {"simulator": 2, "number": 27, "stem": "The double indemnity rider will pay the additional benefit only if death:", "options": [{"label": "A", "text": "Occurs from any cause", "correct": false}, {"label": "B", "text": "Is accidental and occurs within the specified period (e.g., 90 days)", "correct": true}, {"label": "C", "text": "Is from illness in the first year", "correct": false}, {"label": "D", "text": "Occurs after age 65", "correct": false}], "explanation": "Double indemnity: accident within the period (~90 days).", "id": "en-s2-q27", "topic": "General", "globalNumber": 77}, {"simulator": 2, "number": 28, "stem": "To reinstate a lapsed policy, you do NOT need:", "options": [{"label": "A", "text": "Evidence of insurability", "correct": false}, {"label": "B", "text": "Payment of back premiums with interest", "correct": false}, {"label": "C", "text": "To buy a new policy at a new age", "correct": true}, {"label": "D", "text": "To reactivate outstanding loans", "correct": false}], "explanation": "Reinstatement does not mean buying a new policy (keeps the original age).", "id": "en-s2-q28", "topic": "General", "globalNumber": 78}, {"simulator": 2, "number": 29, "stem": "A client wants to exchange their life policy for an annuity without triggering tax on the gain. The mechanism is:", "options": [{"label": "A", "text": "A MEC", "correct": false}, {"label": "B", "text": "A 1035 exchange", "correct": true}, {"label": "C", "text": "A 60-day rollover", "correct": false}, {"label": "D", "text": "Backdating", "correct": false}], "explanation": "Exchanging life for an annuity tax-free = 1035.", "id": "en-s2-q29", "topic": "Retirement", "globalNumber": 79}, {"simulator": 2, "number": 30, "stem": "What happens to the death benefit when there is an outstanding policy loan at the insured’s death?", "options": [{"label": "A", "text": "It doubles", "correct": false}, {"label": "B", "text": "It is reduced by the loan balance plus interest", "correct": true}, {"label": "C", "text": "It does not change", "correct": false}, {"label": "D", "text": "It is voided", "correct": false}], "explanation": "The outstanding loan reduces the death benefit (balance + interest).", "id": "en-s2-q30", "topic": "Texas Law", "globalNumber": 80}, {"simulator": 2, "number": 31, "stem": "An insolvent insurer is liquidated. Who is protected by TLHIGA?", "options": [{"label": "A", "text": "Anyone in the U.S.", "correct": false}, {"label": "B", "text": "Only Texas residents as of the liquidation date", "correct": true}, {"label": "C", "text": "Only agents", "correct": false}, {"label": "D", "text": "No one", "correct": false}], "explanation": "TLHIGA protects Texas residents as of the liquidation date.", "id": "en-s2-q31", "topic": "General", "globalNumber": 81}, {"simulator": 2, "number": 32, "stem": "An applicant skydives every weekend. In insurance terms, that hobby is:", "options": [{"label": "A", "text": "A peril", "correct": false}, {"label": "B", "text": "A hazard", "correct": true}, {"label": "C", "text": "A speculative risk", "correct": false}, {"label": "D", "text": "A fortuitous loss", "correct": false}], "explanation": "The hobby that increases risk = hazard.", "id": "en-s2-q32", "topic": "Retirement", "globalNumber": 82}, {"simulator": 2, "number": 33, "stem": "Which type of insurer is owned by its policyholders and issues participating policies?", "options": [{"label": "A", "text": "Stock", "correct": false}, {"label": "B", "text": "Mutual", "correct": true}, {"label": "C", "text": "Reciprocal", "correct": false}, {"label": "D", "text": "Fraternal", "correct": false}], "explanation": "Owned by policyholders + participating policies = mutual.", "id": "en-s2-q33", "topic": "Annuities", "globalNumber": 83}, {"simulator": 2, "number": 34, "stem": "A 30-year-old with low taxes wants tax-free growth at retirement and does not want to be forced to withdraw. Best suited is a:", "options": [{"label": "A", "text": "Traditional IRA", "correct": false}, {"label": "B", "text": "Roth IRA", "correct": true}, {"label": "C", "text": "Immediate annuity", "correct": false}, {"label": "D", "text": "DB pension", "correct": false}], "explanation": "Roth IRA: tax-free growth and no lifetime RMDs.", "id": "en-s2-q34", "topic": "General", "globalNumber": 84}, {"simulator": 2, "number": 35, "stem": "The producer delivers a policy for which the premium was not collected at application. Before coverage begins, they must obtain:", "options": [{"label": "A", "text": "A court order", "correct": false}, {"label": "B", "text": "Payment of the first premium and a statement of good health", "correct": true}, {"label": "C", "text": "The beneficiary’s signature", "correct": false}, {"label": "D", "text": "An MIB exam", "correct": false}], "explanation": "At delivery with no prior premium: first premium + statement of good health.", "id": "en-s2-q35", "topic": "Texas Law", "globalNumber": 85}, {"simulator": 2, "number": 36, "stem": "The penalty for withdrawing qualified retirement funds before age 59½, absent an exception, is:", "options": [{"label": "A", "text": "5%", "correct": false}, {"label": "B", "text": "10%", "correct": true}, {"label": "C", "text": "20%", "correct": false}, {"label": "D", "text": "50%", "correct": false}], "explanation": "Early-withdrawal penalty = 10%.", "id": "en-s2-q36", "topic": "Taxation", "globalNumber": 86}, {"simulator": 2, "number": 37, "stem": "In a Universal Life policy, the components deducted from the cash value each period include:", "options": [{"label": "A", "text": "Dividends and credited interest", "correct": false}, {"label": "B", "text": "The cost of insurance and expense charges", "correct": true}, {"label": "C", "text": "Only the gross premium", "correct": false}, {"label": "D", "text": "The beneficiary’s commissions", "correct": false}], "explanation": "From the UL are deducted the cost of insurance and expense charges.", "id": "en-s2-q37", "topic": "Annuities", "globalNumber": 87}, {"simulator": 2, "number": 38, "stem": "A person wants an annuity that participates in the gains of a stock index without risking principal if the index falls. Best suited is a(n):", "options": [{"label": "A", "text": "Variable annuity", "correct": false}, {"label": "B", "text": "Indexed annuity (with floor and cap)", "correct": true}, {"label": "C", "text": "Fixed immediate annuity", "correct": false}, {"label": "D", "text": "Whole life", "correct": false}], "explanation": "Index with floor and cap, without risking principal = indexed annuity.", "id": "en-s2-q38", "topic": "General", "globalNumber": 88}, {"simulator": 2, "number": 39, "stem": "Which practice consists of adding coverage or charges to a policy without the client’s consent?", "options": [{"label": "A", "text": "Rebating", "correct": false}, {"label": "B", "text": "Sliding", "correct": true}, {"label": "C", "text": "Twisting", "correct": false}, {"label": "D", "text": "Churning", "correct": false}], "explanation": "Adding charges without consent = sliding.", "id": "en-s2-q39", "topic": "Taxation", "globalNumber": 89}, {"simulator": 2, "number": 40, "stem": "Life insurance is an example of a contract that is:", "options": [{"label": "A", "text": "Of indemnity", "correct": false}, {"label": "B", "text": "Valued", "correct": true}, {"label": "C", "text": "Bilateral", "correct": false}, {"label": "D", "text": "Speculative", "correct": false}], "explanation": "Life = a valued contract (fixed sum).", "id": "en-s2-q40", "topic": "General", "globalNumber": 90}, {"simulator": 2, "number": 41, "stem": "A company pays the premiums on a key person policy covering its manager. The tax treatment is:", "options": [{"label": "A", "text": "Premiums deductible; benefit taxable", "correct": false}, {"label": "B", "text": "Premiums not deductible; benefit generally tax-free", "correct": true}, {"label": "C", "text": "Both taxable", "correct": false}, {"label": "D", "text": "Both exempt and deductible", "correct": false}], "explanation": "Key person: premiums not deductible, benefit taxfree.", "id": "en-s2-q41", "topic": "General", "globalNumber": 91}, {"simulator": 2, "number": 42, "stem": "In insurance, the tendency of higher risks to seek coverage more than low risks is called:", "options": [{"label": "A", "text": "Law of large numbers", "correct": false}, {"label": "B", "text": "Adverse selection", "correct": true}, {"label": "C", "text": "Indemnity", "correct": false}, {"label": "D", "text": "Pooling", "correct": false}], "explanation": "Higher risks seeking insurance = adverse selection.", "id": "en-s2-q42", "topic": "General", "globalNumber": 92}, {"simulator": 2, "number": 43, "stem": "Which is the annuity payout option that pays over two lives and continues for the survivor?", "options": [{"label": "A", "text": "Life only", "correct": false}, {"label": "B", "text": "Period certain", "correct": false}, {"label": "C", "text": "Joint and survivor", "correct": true}, {"label": "D", "text": "Fixed amount", "correct": false}], "explanation": "Two lives with continuation to the survivor = joint and survivor.", "id": "en-s2-q43", "topic": "Texas Law", "globalNumber": 93}, {"simulator": 2, "number": 44, "stem": "Under the transfer-for-value rule, if a policy is sold for consideration, the death benefit:", "options": [{"label": "A", "text": "Always stays tax-free", "correct": false}, {"label": "B", "text": "May become partially taxable, except in certain exceptions", "correct": true}, {"label": "C", "text": "Doubles", "correct": false}, {"label": "D", "text": "Is voided", "correct": false}], "explanation": "Transfer-for-value: the benefit may become taxable (with exceptions).", "id": "en-s2-q44", "topic": "General", "globalNumber": 94}, {"simulator": 2, "number": 45, "stem": "An agent represents three different insurers. To do so legally, they need:", "options": [{"label": "A", "text": "A single license, nothing more", "correct": false}, {"label": "B", "text": "An appointment from each one, reported to the TDI", "correct": true}, {"label": "C", "text": "Three separate licenses", "correct": false}, {"label": "D", "text": "The beneficiary’s approval", "correct": false}], "explanation": "Needs an appointment from each insurer, reported to the TDI.", "id": "en-s2-q45", "topic": "Retirement", "globalNumber": 95}, {"simulator": 2, "number": 46, "stem": "A participating policy’s dividend left to accumulate with the insurer: which part is taxable?", "options": [{"label": "A", "text": "The whole dividend", "correct": false}, {"label": "B", "text": "None", "correct": false}, {"label": "C", "text": "Only the interest earned", "correct": true}, {"label": "D", "text": "Only the dividend, not the interest", "correct": false}], "explanation": "The dividend is not taxable; the accumulated interest is.", "id": "en-s2-q46", "topic": "General", "globalNumber": 96}, {"simulator": 2, "number": 47, "stem": "Which type of authority arises when the insurer, by its conduct, leads the public to believe an agent has powers it did not actually grant?", "options": [{"label": "A", "text": "Express", "correct": false}, {"label": "B", "text": "Implied", "correct": false}, {"label": "C", "text": "Apparent", "correct": true}, {"label": "D", "text": "Fiduciary", "correct": false}], "explanation": "Apparent authority, from the appearance created (estoppel).", "id": "en-s2-q47", "topic": "General", "globalNumber": 97}, {"simulator": 2, "number": 48, "stem": "What is the main purpose of backdating a policy?", "options": [{"label": "A", "text": "To extend the contestable period", "correct": false}, {"label": "B", "text": "To obtain a lower premium for a younger insured age", "correct": true}, {"label": "C", "text": "To avoid the medical exam", "correct": false}, {"label": "D", "text": "To eliminate the grace period", "correct": false}], "explanation": "Backdating: lower premium from a younger insured age.", "id": "en-s2-q48", "topic": "General", "globalNumber": 98}, {"simulator": 2, "number": 49, "stem": "A “life only” annuity is normally chosen when the annuitant:", "options": [{"label": "A", "text": "Wants to leave the largest possible balance to heirs", "correct": false}, {"label": "B", "text": "Has no dependents and seeks the highest monthly income", "correct": true}, {"label": "C", "text": "Wants to guarantee 20 years of payments", "correct": false}, {"label": "D", "text": "Wants accidental death coverage", "correct": false}], "explanation": "Life only: no dependents, highest income, nothing to heirs.", "id": "en-s2-q49", "topic": "Retirement", "globalNumber": 99}, {"simulator": 2, "number": 50, "stem": "In Texas, if an insurer unjustifiably delays payment of a valid claim beyond the legal deadline, it generally must:", "options": [{"label": "A", "text": "Nothing additional", "correct": false}, {"label": "B", "text": "Pay a penalty interest (18%) and attorney’s fees", "correct": true}, {"label": "C", "text": "Cancel the policy", "correct": false}, {"label": "D", "text": "Double the benefit", "correct": false}], "explanation": "Texas: unjustified delay → 18% interest + fees.", "id": "en-s2-q50", "topic": "Texas Law", "globalNumber": 100}, {"simulator": 3, "number": 1, "stem": "The principle that lets an insurer accurately predict its expected annual losses is:", "options": [{"label": "A", "text": "Adverse selection", "correct": false}, {"label": "B", "text": "The Law of Large Numbers", "correct": true}, {"label": "C", "text": "Indemnity", "correct": false}, {"label": "D", "text": "Insurable interest", "correct": false}], "explanation": "Accurate loss prediction rests on the Law of Large Numbers.", "id": "en-s3-q1", "topic": "Annuities", "globalNumber": 101}, {"simulator": 3, "number": 2, "stem": "A client wants a permanent policy whose premiums they can raise or lower and whose face amount they can adjust. Best suited is:", "options": [{"label": "A", "text": "Level term", "correct": false}, {"label": "B", "text": "Limited-pay whole life", "correct": false}, {"label": "C", "text": "Universal Life", "correct": true}, {"label": "D", "text": "Decreasing term", "correct": false}], "explanation": "Flexible premium + adjustable face = Universal Life.", "id": "en-s3-q2", "topic": "General", "globalNumber": 102}, {"simulator": 3, "number": 3, "stem": "Under SECURE 2.0, the RMD starting age for a traditional IRA is:", "options": [{"label": "A", "text": "65", "correct": false}, {"label": "B", "text": "70½", "correct": false}, {"label": "C", "text": "72", "correct": false}, {"label": "D", "text": "73", "correct": true}], "explanation": "RMD at 73 (SECURE 2.0).", "id": "en-s3-q3", "topic": "Texas Law", "globalNumber": 103}, {"simulator": 3, "number": 4, "stem": "An indexed annuity generally:", "options": [{"label": "A", "text": "Requires a securities license", "correct": false}, {"label": "B", "text": "Does not require a securities license and offers a protective floor", "correct": true}, {"label": "C", "text": "Invests directly in individual stocks", "correct": false}, {"label": "D", "text": "Guarantees market losses", "correct": false}], "explanation": "The indexed annuity does not require a securities license and has a protective floor.", "id": "en-s3-q4", "topic": "General", "globalNumber": 104}, {"simulator": 3, "number": 5, "stem": "The Texas Guaranty Association limit for the cash surrender value of life insurance is:", "options": [{"label": "A", "text": "$50,000", "correct": false}, {"label": "B", "text": "$100,000", "correct": true}, {"label": "C", "text": "$250,000", "correct": false}, {"label": "D", "text": "$300,000", "correct": false}], "explanation": "TLHIGA life cash value = $100,000.", "id": "en-s3-q5", "topic": "Retirement", "globalNumber": 105}, {"simulator": 3, "number": 6, "stem": "A revocable beneficiary, while the insured is alive, has:", "options": [{"label": "A", "text": "A vested right", "correct": false}, {"label": "B", "text": "A mere expectancy, with no rights", "correct": true}, {"label": "C", "text": "Control of the policy", "correct": false}, {"label": "D", "text": "The right to take loans", "correct": false}], "explanation": "The revocable beneficiary has a mere expectancy, no rights while the insured lives.", "id": "en-s3-q6", "topic": "Texas Law", "globalNumber": 106}, {"simulator": 3, "number": 7, "stem": "In a non-qualified plan, upon distribution, what is taxed:", "options": [{"label": "A", "text": "The entire amount", "correct": false}, {"label": "B", "text": "Only the gain", "correct": true}, {"label": "C", "text": "Nothing", "correct": false}, {"label": "D", "text": "Twice the gain", "correct": false}], "explanation": "Non-qualified plan: only the gain is taxed.", "id": "en-s3-q7", "topic": "General", "globalNumber": 107}, {"simulator": 3, "number": 8, "stem": "The clause that uses the cash value to automatically pay an unpaid premium and prevent lapse is:", "options": [{"label": "A", "text": "Reduced paid-up", "correct": false}, {"label": "B", "text": "Extended term", "correct": false}, {"label": "C", "text": "Automatic Premium Loan", "correct": true}, {"label": "D", "text": "Waiver of premium", "correct": false}], "explanation": "Paying the unpaid premium from cash value = APL.", "id": "en-s3-q8", "topic": "Retirement", "globalNumber": 108}, {"simulator": 3, "number": 9, "stem": "The Texas state exam for the life license is administered by:", "options": [{"label": "A", "text": "The TDI directly", "correct": false}, {"label": "B", "text": "Pearson VUE", "correct": true}, {"label": "C", "text": "The NAIC", "correct": false}, {"label": "D", "text": "FINRA", "correct": false}], "explanation": "The exam is administered by Pearson VUE.", "id": "en-s3-q9", "topic": "Retirement", "globalNumber": 109}, {"simulator": 3, "number": 10, "stem": "A person wants a guaranteed lifetime income for at least 20 years to protect their family if they die soon. Best suited is:", "options": [{"label": "A", "text": "Life only", "correct": false}, {"label": "B", "text": "Life with 20-year period certain", "correct": true}, {"label": "C", "text": "Interest only", "correct": false}, {"label": "D", "text": "Cash surrender", "correct": false}], "explanation": "Lifetime income with a guaranteed minimum of years = life with period certain.", "id": "en-s3-q10", "topic": "General", "globalNumber": 110}, {"simulator": 3, "number": 11, "stem": "Which of these practices is legal if done with proper disclosure?", "options": [{"label": "A", "text": "Rebating", "correct": false}, {"label": "B", "text": "Twisting", "correct": false}, {"label": "C", "text": "Replacement", "correct": true}, {"label": "D", "text": "Churning", "correct": false}], "explanation": "Replacement is legal with proper disclosure.", "id": "en-s3-q11", "topic": "General", "globalNumber": 111}, {"simulator": 3, "number": 12, "stem": "A traditional whole life policy typically “endows” (matures) at age:", "options": [{"label": "A", "text": "65", "correct": false}, {"label": "B", "text": "80", "correct": false}, {"label": "C", "text": "100 (or 121 under recent tables)", "correct": true}, {"label": "D", "text": "59½", "correct": false}], "explanation": "Whole life matures at 100 (or 121 under recent tables).", "id": "en-s3-q12", "topic": "Texas Law", "globalNumber": 112}, {"simulator": 3, "number": 13, "stem": "An insured with a MEC policy takes a loan at age 50. The tax treatment of the loan is:", "options": [{"label": "A", "text": "Tax-free", "correct": false}, {"label": "B", "text": "Taxable gain (LIFO) plus a 10% penalty", "correct": true}, {"label": "C", "text": "Tax-free, as in any policy", "correct": false}, {"label": "D", "text": "Not permitted", "correct": false}], "explanation": "MEC: loan taxed LIFO + 10% (under 59½).", "id": "en-s3-q13", "topic": "Taxation", "globalNumber": 113}, {"simulator": 3, "number": 14, "stem": "In Texas, an agent’s life license expires:", "options": [{"label": "A", "text": "Every year, on December 31", "correct": false}, {"label": "B", "text": "Every 2 years, on the last day of the birth month", "correct": true}, {"label": "C", "text": "Every 5 years", "correct": false}, {"label": "D", "text": "Never, it is permanent", "correct": false}], "explanation": "License: 2 years, last day of the birth month.", "id": "en-s3-q14", "topic": "Annuities", "globalNumber": 114}, {"simulator": 3, "number": 15, "stem": "Option A of a Universal Life provides a death benefit that is:", "options": [{"label": "A", "text": "Increasing (face + cash value)", "correct": false}, {"label": "B", "text": "Level", "correct": true}, {"label": "C", "text": "Decreasing", "correct": false}, {"label": "D", "text": "Variable with the market", "correct": false}], "explanation": "Option A = level benefit.", "id": "en-s3-q15", "topic": "Texas Law", "globalNumber": 115}, {"simulator": 3, "number": 16, "stem": "In its relationship with client premiums, the insurance agent acts as:", "options": [{"label": "A", "text": "An investor", "correct": false}, {"label": "B", "text": "A fiduciary who must not commingle funds", "correct": true}, {"label": "C", "text": "A beneficiary", "correct": false}, {"label": "D", "text": "An insured", "correct": false}], "explanation": "The agent is a fiduciary; must not commingle funds.", "id": "en-s3-q16", "topic": "General", "globalNumber": 116}, {"simulator": 3, "number": 17, "stem": "Which plan lets an unincorporated self-employed person set up a qualified retirement plan?", "options": [{"label": "A", "text": "Corporate 401(k)", "correct": false}, {"label": "B", "text": "Keogh (HR-10)", "correct": true}, {"label": "C", "text": "403(b)", "correct": false}, {"label": "D", "text": "Government pension", "correct": false}], "explanation": "Unincorporated self-employed = Keogh (HR10).", "id": "en-s3-q17", "topic": "General", "globalNumber": 117}, {"simulator": 3, "number": 18, "stem": "An applicant intentionally omits a serious diagnosis that the application directly asks about. This is:", "options": [{"label": "A", "text": "An immaterial representation", "correct": false}, {"label": "B", "text": "Concealment", "correct": true}, {"label": "C", "text": "A warranty", "correct": false}, {"label": "D", "text": "Utmost good faith", "correct": false}], "explanation": "Withholding a material fact that was asked = concealment.", "id": "en-s3-q18", "topic": "Retirement", "globalNumber": 118}, {"simulator": 3, "number": 19, "stem": "The accelerated benefit for terminal illness is generally:", "options": [{"label": "A", "text": "Fully taxable", "correct": false}, {"label": "B", "text": "Income-tax-free", "correct": true}, {"label": "C", "text": "50% taxable", "correct": false}, {"label": "D", "text": "Taxable only if over $50,000", "correct": false}], "explanation": "Terminal accelerated benefit = tax-free.", "id": "en-s3-q19", "topic": "General", "globalNumber": 119}, {"simulator": 3, "number": 20, "stem": "A 75-year-old client needs liquidity soon. Recommending a deferred annuity with 12-year surrender charges:", "options": [{"label": "A", "text": "Is suitable", "correct": false}, {"label": "B", "text": "Is not suitable (violates suitability/best interest)", "correct": true}, {"label": "C", "text": "Is mandatory", "correct": false}, {"label": "D", "text": "Reduces their risk", "correct": false}], "explanation": "Trapping the liquidity of a client who needs it is not suitable.", "id": "en-s3-q20", "topic": "Texas Law", "globalNumber": 120}, {"simulator": 3, "number": 21, "stem": "Which type of receipt grants immediate temporary coverage, insurable or not, for a set period?", "options": [{"label": "A", "text": "Conditional receipt", "correct": false}, {"label": "B", "text": "Binding receipt", "correct": true}, {"label": "C", "text": "Statement of good health", "correct": false}, {"label": "D", "text": "Agent’s report", "correct": false}], "explanation": "Immediate temporary coverage, insurable or not = binding receipt.", "id": "en-s3-q21", "topic": "Texas Law", "globalNumber": 121}, {"simulator": 3, "number": 22, "stem": "In a non-qualified annuity, the “exclusion ratio” is calculated as:", "options": [{"label": "A", "text": "Expected return ÷ investment in the contract", "correct": false}, {"label": "B", "text": "Investment in the contract ÷ expected return", "correct": true}, {"label": "C", "text": "Premium ÷ commission", "correct": false}, {"label": "D", "text": "Age ÷ life expectancy", "correct": false}], "explanation": "Exclusion ratio = investment in the contract ÷ expected return.", "id": "en-s3-q22", "topic": "Taxation", "globalNumber": 122}, {"simulator": 3, "number": 23, "stem": "A company incorporated in London is, with respect to Texas:", "options": [{"label": "A", "text": "Domestic", "correct": false}, {"label": "B", "text": "Foreign", "correct": false}, {"label": "C", "text": "Alien", "correct": true}, {"label": "D", "text": "Automatically admitted", "correct": false}], "explanation": "Incorporated in another country = alien.", "id": "en-s3-q23", "topic": "Texas Law", "globalNumber": 123}, {"simulator": 3, "number": 24, "stem": "Which is NOT a nonforfeiture option?", "options": [{"label": "A", "text": "Cash surrender value", "correct": false}, {"label": "B", "text": "Reduced paid-up insurance", "correct": false}, {"label": "C", "text": "Extended term insurance", "correct": false}, {"label": "D", "text": "Automatic premium loan", "correct": true}], "explanation": "The APL is a clause, not a nonforfeiture option.", "id": "en-s3-q24", "topic": "General", "globalNumber": 124}, {"simulator": 3, "number": 25, "stem": "The IRA contribution limit for 2026 (excluding catch-up) is:", "options": [{"label": "A", "text": "$6,000", "correct": false}, {"label": "B", "text": "$7,000", "correct": false}, {"label": "C", "text": "$7,500", "correct": true}, {"label": "D", "text": "$10,000", "correct": false}], "explanation": "IRA 2026 = $7,500 (excluding catch-up).", "id": "en-s3-q25", "topic": "Texas Law", "globalNumber": 125}, {"simulator": 3, "number": 26, "stem": "An agent promises to return part of their commission to a client if they sign today. This is:", "options": [{"label": "A", "text": "Suitability", "correct": false}, {"label": "B", "text": "Rebating (illegal, both parties liable)", "correct": true}, {"label": "C", "text": "Field underwriting", "correct": false}, {"label": "D", "text": "Best interest", "correct": false}], "explanation": "Returning part of the commission = rebating (illegal, both).", "id": "en-s3-q26", "topic": "Retirement", "globalNumber": 126}, {"simulator": 3, "number": 27, "stem": "Which clause prevents the insurer from voiding the policy for application errors after 2 years?", "options": [{"label": "A", "text": "Suicide clause", "correct": false}, {"label": "B", "text": "Incontestability clause", "correct": true}, {"label": "C", "text": "Grace period", "correct": false}, {"label": "D", "text": "Free look", "correct": false}], "explanation": "After 2 years: incontestability clause.", "id": "en-s3-q27", "topic": "General", "globalNumber": 127}, {"simulator": 3, "number": 28, "stem": "A variable annuity invests the money in:", "options": [{"label": "A", "text": "The insurer’s general account", "correct": false}, {"label": "B", "text": "A separate account with subaccounts", "correct": true}, {"label": "C", "text": "Guaranteed government bonds", "correct": false}, {"label": "D", "text": "A certificate of deposit", "correct": false}], "explanation": "Variable = separate account with subaccounts.", "id": "en-s3-q28", "topic": "General", "globalNumber": 128}, {"simulator": 3, "number": 29, "stem": "Employer group term life insurance is income-tax-free to the employee up to:", "options": [{"label": "A", "text": "$25,000", "correct": false}, {"label": "B", "text": "$50,000", "correct": true}, {"label": "C", "text": "$100,000", "correct": false}, {"label": "D", "text": "No limit", "correct": false}], "explanation": "Group term tax-free up to $50,000.", "id": "en-s3-q29", "topic": "Retirement", "globalNumber": 129}, {"simulator": 3, "number": 30, "stem": "A client replaces their policy using the accumulated values of the existing one just to generate commission for the agent. This is:", "options": [{"label": "A", "text": "Twisting", "correct": false}, {"label": "B", "text": "Churning", "correct": t
