const T={en:{subtitle:'Texas Life Insurance Trainer',homeTitle:'Start Practice',mode:'Mode',set:'Set',qty:'Quantity',options:'Options',start:'Start',dashboard:'Dashboard',reset:'Reset progress',seen:'Seen',attempts:'Attempts',missed:'Missed bank',flagged:'Flagged',q:'Question',of:'of',sim:'Simulator',check:'Check',next:'Next',prev:'Previous',finish:'Finish',flag:'Flag',unflag:'Unflag',correct:'Correct',incorrect:'Incorrect',correctAnswer:'Correct answer',results:'Results',review:'Review missed',again:'Practice again',home:'Home',back:'Back',dash:'Dashboard',ready:'Ready for the state exam.',almost:'Almost ready. Review weak areas.',reviewMsg:'Review before scheduling.',study:'Study more before another simulator.',noQuestions:'No questions available for this set.',select:'Select an answer first.',examDone:'Exam mode: answers are shown at the end.',independent:'Independent study aid. Not affiliated with TDI or Pearson VUE.'},es:{subtitle:'Entrenador de Seguro de Vida de Texas',homeTitle:'Comenzar práctica',mode:'Modo',set:'Set',qty:'Cantidad',options:'Opciones',start:'Empezar',dashboard:'Panel',reset:'Reiniciar progreso',seen:'Vistas',attempts:'Intentos',missed:'Banco de falladas',flagged:'Marcadas',q:'Pregunta',of:'de',sim:'Simulador',check:'Revisar',next:'Siguiente',prev:'Anterior',finish:'Terminar',flag:'Marcar',unflag:'Quitar marca',correct:'Correcto',incorrect:'Incorrecto',correctAnswer:'Respuesta correcta',results:'Resultados',review:'Revisar falladas',again:'Practicar otra vez',home:'Inicio',back:'Atrás',dash:'Panel',ready:'Listo para el examen estatal.',almost:'Casi listo. Repasa áreas débiles.',reviewMsg:'Repasa antes de programar.',study:'Estudia más antes de otro simulador.',noQuestions:'No hay preguntas disponibles para este set.',select:'Selecciona una respuesta primero.',examDone:'Modo examen: las respuestas se muestran al final.',independent:'Herramienta independiente de estudio. No afiliada con TDI ni Pearson VUE.'}};
let lang=localStorage.getItem('certivoLang')||'en';let session=[],idx=0,answers={},checked={},lastResults=null;
const $=id=>document.getElementById(id);function bank(){return QUESTION_BANK[lang]}function shuffleArr(a){let x=[...a];for(let i=x.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
function progress(){return JSON.parse(localStorage.getItem('certivoProgress')||'{"seen":{},"missed":{},"flagged":{},"attempts":0,"scores":[]}')}
function saveProgress(p){localStorage.setItem('certivoProgress',JSON.stringify(p));updatePills()}
function updateText(){let tr=T[lang];$('subtitle').textContent=tr.subtitle;$('homeTitle').textContent=tr.homeTitle;$('modeLabel').textContent=tr.mode;$('setLabel').textContent=tr.set;$('countLabel').textContent=tr.qty;$('shuffleLabel').textContent=tr.options;$('startBtn').textContent=tr.start;$('dashboardBtn').textContent=tr.dashboard;$('resetBtn').textContent=tr.reset;$('prevBtn').textContent=tr.prev;$('checkBtn').textContent=tr.check;$('nextBtn').textContent=tr.next;$('finishBtn').textContent=tr.finish;$('resultTitle').textContent=tr.results;$('reviewBtn').textContent=tr.review;$('againBtn').textContent=tr.again;$('homeBtn').textContent=tr.home;$('dashTitle').textContent=tr.dash;$('dashHome').textContent=tr.back;$('footer').textContent=tr.independent;$('langEn').classList.toggle('active',lang==='en');$('langEs').classList.toggle('active',lang==='es');updatePills()}
function updatePills(){let p=progress(),tr=T[lang];let total=bank().length;$('seenPill').textContent=`${tr.seen}: ${Object.keys(p.seen).filter(k=>k.startsWith(lang+'-')).length}/${total}`;$('attemptsPill').textContent=`${tr.attempts}: ${p.attempts||0}`;$('missedPill').textContent=`${tr.missed}: ${Object.keys(p.missed).filter(k=>k.startsWith(lang+'-')).length}`;$('flaggedPill').textContent=`${tr.flagged}: ${Object.keys(p.flagged).filter(k=>k.startsWith(lang+'-')).length}`}
function getPool(){let p=progress();let set=$('set').value;let b=bank();if(set==='all')return b;if(set==='missed')return b.filter(q=>p.missed[q.id]);if(set==='flagged')return b.filter(q=>p.flagged[q.id]);return b.filter(q=>String(q.simulator)===set)}
function start(){let pool=getPool();let tr=T[lang];if(!pool.length){alert(tr.noQuestions);return}let count=Math.min(parseInt($('count').value),pool.length);let qShuffle=$('shuffle').value!=='none';let aShuffle=$('shuffle').value==='both';let selected=qShuffle?shuffleArr(pool).slice(0,count):pool.slice(0,count);session=selected.map(q=>{let opts=aShuffle?shuffleArr(q.options):q.options.map(o=>({...o}));return {...q,displayOptions:opts}});idx=0;answers={};checked={};show('quiz');render()}
function show(id){['home','quiz','results','dashboard'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}
function render(){let q=session[idx],tr=T[lang];$('qCount').textContent=`${tr.q} ${idx+1} ${tr.of} ${session.length}`;$('bar').style.width=((idx+1)/session.length*100)+'%';$('topicTag').textContent=q.topic;$('simInfo').textContent=`${tr.sim} ${q.simulator} · ${tr.q} ${q.number}`;$('stem').textContent=q.stem;$('optionsBox').innerHTML='';let selected=answers[q.id];q.displayOptions.forEach((o,i)=>{let btn=document.createElement('button');btn.className='option';let display=String.fromCharCode(65+i);btn.textContent=`${display}) ${o.text}`;btn.onclick=()=>select(o);if(selected&&selected.text===o.text)btn.classList.add('selected');if(checked[q.id]){if(o.correct)btn.classList.add('correct');if(selected&&selected.text===o.text&&!o.correct)btn.classList.add('wrong');} $('optionsBox').appendChild(btn)});$('prevBtn').disabled=idx===0;$('nextBtn').disabled=idx===session.length-1;let p=progress();$('flagBtn').textContent=p.flagged[q.id]?tr.unflag:tr.flag;$('feedback').classList.add('hidden');if(checked[q.id])showFeedback(q)}
function select(o){let q=session[idx];if(checked[q.id])return;answers[q.id]=o;render()}
function check(){let q=session[idx],tr=T[lang];if(!answers[q.id]){alert(tr.select);return}checked[q.id]=true;let p=progress();p.seen[q.id]=true;if(!answers[q.id].correct)p.missed[q.id]=true;else delete p.missed[q.id];saveProgress(p);render()}
function showFeedback(q){let tr=T[lang],sel=answers[q.id],correct=q.displayOptions.find(o=>o.correct),correctIndex=q.displayOptions.findIndex(o=>o.correct),correctLetter=String.fromCharCode(65+correctIndex);let ok=sel&&sel.correct;let fb=$('feedback');fb.className='feedback '+(ok?'ok':'bad');fb.innerHTML=`<strong>${ok?'✅ '+tr.correct:'❌ '+tr.incorrect+' · '+tr.correctAnswer+': '+correctLetter}</strong><br>${q.explanation}`;fb.classList.remove('hidden')}
function next(){if(idx<session.length-1){idx++;render()}}function prev(){if(idx>0){idx--;render()}}
function finish(){let tr=T[lang];let mode=$('mode').value;if(mode==='exam'){session.forEach(q=>{if(answers[q.id])checked[q.id]=true});}
let score=0,miss=[];let p=progress();session.forEach(q=>{p.seen[q.id]=true;if(answers[q.id]&&answers[q.id].correct)score++;else{miss.push(q);p.missed[q.id]=true}});p.attempts=(p.attempts||0)+1;p.scores=p.scores||[];p.scores.push({date:new Date().toISOString(),lang,score,total:session.length,set:$('set').value,mode:$('mode').value});saveProgress(p);lastResults=miss;show('results');$('scoreNum').textContent=`${score}/${session.length}`;let pct=score/session.length*100;let msg=pct>=90?tr.ready:pct>=80?tr.almost:pct>=70?tr.reviewMsg:tr.study;$('scoreMsg').textContent=`${Math.round(pct)}% · ${msg}`}
function reviewMissed(){if(lastResults&&lastResults.length){session=lastResults;idx=0;answers={};checked={};show('quiz');render()}else{$('set').value='missed';start()}}
function toggleFlag(){let q=session[idx],p=progress();if(p.flagged[q.id])delete p.flagged[q.id];else p.flagged[q.id]=true;saveProgress(p);render()}
function dashboard(){let p=progress(),tr=T[lang];let scores=(p.scores||[]).filter(s=>s.lang===lang).slice(-10).reverse();let html=`<div class="dashItem"><strong>${tr.seen}</strong><span>${Object.keys(p.seen).filter(k=>k.startsWith(lang+'-')).length}/${bank().length}</span></div><div class="dashItem"><strong>${tr.missed}</strong><span>${Object.keys(p.missed).filter(k=>k.startsWith(lang+'-')).length}</span></div><div class="dashItem"><strong>${tr.flagged}</strong><span>${Object.keys(p.flagged).filter(k=>k.startsWith(lang+'-')).length}</span></div>`;html+=`<h3>Recent scores</h3>`;if(!scores.length)html+=`<p class="muted">No attempts yet.</p>`;scores.forEach(s=>{html+=`<div class="dashItem"><span>${new Date(s.date).toLocaleDateString()} · ${s.mode} · ${s.set}</span><strong>${s.score}/${s.total}</strong></div>`});$('dashList').innerHTML=html;show('dashboard')}
function reset(){if(confirm('Reset all local progress?')){localStorage.removeItem('certivoProgress');updatePills()}}
$('startBtn').onclick=start;$('checkBtn').onclick=check;$('nextBtn').onclick=next;$('prevBtn').onclick=prev;$('finishBtn').onclick=finish;$('flagBtn').onclick=toggleFlag;$('dashboardBtn').onclick=dashboard;$('dashHome').onclick=()=>show('home');$('homeBtn').onclick=()=>show('home');$('againBtn').onclick=()=>show('home');$('reviewBtn').onclick=reviewMissed;$('resetBtn').onclick=reset;$('langEn').onclick=()=>{lang='en';localStorage.setItem('certivoLang',lang);updateText()};$('langEs').onclick=()=>{lang='es';localStorage.setItem('certivoLang',lang);updateText()};
$('mode').onchange=()=>{let tr=T[lang];$('checkBtn').style.display=$('mode').value==='practice'?'inline-block':'none'};updateText();$('mode').onchange();
</script>
