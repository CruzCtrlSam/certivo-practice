-weight:900;margin:8px 0}.bar{height:12px;background:#e2e8f0;border-radius:999px;overflow:hidden}.bar>div{height:100%;background:var(--accent);width:0}.small{color:#64748b;font-size:13px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.topicRow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #e2e8f0}@media(max-width:760px){.controls,.grid2{grid-template-columns:1fr}.stem{font-size:18px}header{position:relative}}

<script>
const BANK = [{"sim": 1, "num": 1, "stem": "Una anualidad protege principalmente al titular contra el riesgo de:", "options": {"A": "Morir prematuramente", "B": "Sobrevivir a sus propios ahorros", "C": "Quedar discapacitado", "D": "Daños a su propiedad"}, "correct": "B", "explanation": "La anualidad cubre el riesgo de longevidad (vivir demasiado). (A es el seguro de vida.)", "tag": "Annuities"}, {"sim": 1, "num": 2, "stem": "En el seguro de vida, el interés asegurable debe existir:", "options": {"A": "Solo al momento de la muerte", "B": "Tanto al emitir como al morir", "C": "Solo al momento de solicitar/emitir la póliza", "D": "En cualquier momento de la vigencia"}, "correct": "C", "explanation": "En vida, el interés asegurable solo se exige al emitir. (B mezcla la regla de propiedad.)", "tag": "General"}, {"sim": 1, "num": 3, "stem": "¿Cuántas horas de educación continua, incluida la ética, exige Texas por periodo de licencia de 2 años?", "options": {"A": "20 horas, 2 de ética", "B": "24 horas, 3 de ética", "C": "30 horas, 5 de ética", "D": "12 horas, 1 de ética"}, "correct": "B", "explanation": "Texas: 24 horas / 3 de ética por periodo de 2 años.", "tag": "Texas / Statutes"}, {"sim": 1, "num": 4, "stem": "La opción de no confiscación que se aplica automáticamente si el dueño no elige otra suele ser:", "options": {"A": "Valor de rescate en efectivo", "B": "Seguro saldado reducido", "C": "Seguro de término extendido", "D": "Préstamo automático de prima"}, "correct": "C", "explanation": "La opción automática es extended term (misma suma, plazo limitado). (D es una cláusula, no nonforfeiture.)", "tag": "General"}, {"sim": 1, "num": 5, "stem": "¿A qué edad deben comenzar generalmente las distribuciones mínimas obligatorias (RMD) de una IRA tradicional bajo las reglas vigentes?", "options": {"A": "59½", "B": "65", "C": "70½", "D": "73"}, "correct": "D", "explanation": "RMD a los 73 (SECURE 2.0). (C, 70½, es la regla antigua.)", "tag": "Retirement"}, {"sim": 1, "num": 6, "stem": "El límite de cobertura de la Texas Life and Health Insurance Guaranty Association para el beneficio por muerte de una póliza de vida es:", "options": {"A": "$100,000", "B": "$250,000", "C": "$300,000", "D": "$500,000"}, "correct": "C", "explanation": "TLHIGA: $300,000 de beneficio por muerte. (A es el límite de cash value.)", "tag": "Texas / Statutes"}, {"sim": 1, "num": 7, "stem": "Las respuestas de un solicitante en la solicitud de seguro se consideran legalmente:", "options": {"A": "Garantías absolutamente verdaderas", "B": "Representaciones ciertas a su leal saber y entender", "C": "Opiniones sin efecto legal", "D": "Cláusulas contractuales independientes"}, "correct": "B", "explanation": "Son representaciones (solo la material misrepresentation anula).", "tag": "General"}, {"sim": 1, "num": 8, "stem": "En una anualidad no calificada, los retiros (no anualizados) se gravan bajo el método:", "options": {"A": "FIFO, primero la base", "B": "LIFO, primero la ganancia", "C": "Prorrateo igual", "D": "Exentos siempre"}, "correct": "B", "explanation": "LIFO: la ganancia sale primero y es gravable (+10% si <59½).", "tag": "Annuities"}, {"sim": 1, "num": 9, "stem": "¿Qué tipo de plan de retiro recibe aportaciones únicamente del empleador?", "options": {"A": "SIMPLE IRA", "B": "401(k) tradicional", "C": "SEP IRA", "D": "Roth IRA"}, "correct": "C", "explanation": "En el SEP IRA solo aporta el empleador.", "tag": "Retirement"}, {"sim": 1, "num": 10, "stem": "Un beneficiario irrevocable debe dar su consentimiento para que el dueño pueda:", "options": {"A": "Pagar la prima", "B": "Tomar un préstamo sobre el valor en efectivo", "C": "Leer la póliza", "D": "Recibir el estado de cuenta"}, "correct": "B", "explanation": "El irrevocable debe consentir préstamos, cambios, cesión o cancelación.", "tag": "Beneficiaries"}, {"sim": 1, "num": 11, "stem": "El recibo condicional (conditional receipt) otorga cobertura desde la solicitud/examen siempre que el solicitante:", "options": {"A": "Pague el doble de la prima", "B": "Resulte asegurable según el underwriting normal", "C": "Tenga menos de 40 años", "D": "Firme ante notario"}, "correct": "B", "explanation": "El conditional receipt cubre si el solicitante era asegurable.", "tag": "General"}, {"sim": 1, "num": 12, "stem": "Bajo la ley de Texas, al disolverse un matrimonio, la designación de un excónyuge como beneficiario:", "options": {"A": "Permanece siempre válida", "B": "Se revoca automáticamente, salvo excepciones", "C": "Solo cambia si el excónyuge lo pide", "D": "La decide la aseguradora"}, "correct": "B", "explanation": "Divorce Revocation §9.301: el excónyuge se revoca automáticamente (con excepciones).", "tag": "Beneficiaries"}, {"sim": 1, "num": 13, "stem": "El beneficio por muerte de una póliza de vida pagado en suma global al beneficiario es, para income tax:", "options": {"A": "Totalmente gravable", "B": "Generalmente libre de impuesto", "C": "Gravable en un 50%", "D": "Gravable si excede $100,000"}, "correct": "B", "explanation": "El death benefit en lump sum es libre de income tax.", "tag": "Beneficiaries"}, {"sim": 1, "num": 14, "stem": "¿Qué opción de pago de anualidad ofrece el mayor ingreso mensual pero no deja saldo a beneficiarios?", "options": {"A": "Life with 10-year period certain", "B": "Joint and survivor", "C": "Life only (straight life)", "D": "Cash refund"}, "correct": "C", "explanation": "Life only paga más, pero nada a herederos.", "tag": "Beneficiaries"}, {"sim": 1, "num": 15, "stem": "Una compañía aseguradora constituida en otro estado de EE. UU., respecto de Texas, es:", "options": {"A": "Domestic", "B": "Foreign", "C": "Alien", "D": "Non-admitted"}, "correct": "B", "explanation": "Otro estado de EE. UU. = foreign (alien = otro país).", "tag": "Texas / Statutes"}, {"sim": 1, "num": 16, "stem": "El rider de exención de prima (waiver of premium) se activa cuando el asegurado:", "options": {"A": "Cumple 65 años", "B": "Sufre una discapacidad total que cumple las condiciones", "C": "Cambia de beneficiario", "D": "Toma un préstamo"}, "correct": "B", "explanation": "El waiver se activa por discapacidad total (tras el periodo de espera).", "tag": "Riders"}, {"sim": 1, "num": 17, "stem": "El acto de mezclar las primas del cliente con los fondos personales del agente se llama:", "options": {"A": "Rebating", "B": "Commingling", "C": "Twisting", "D": "Sliding"}, "correct": "B", "explanation": "Mezclar primas con fondos personales es commingling.", "tag": "General"}, {"sim": 1, "num": 18, "stem": "En un plan calificado, ¿qué porción de la distribución es gravable como ingreso ordinario?", "options": {"A": "Solo la ganancia", "B": "La totalidad", "C": "La mitad", "D": "Nada"}, "correct": "B", "explanation": "En un plan calificado se grava TODO (las aportaciones fueron pre-tax).", "tag": "Taxation"}, {"sim": 1, "num": 19, "stem": "¿Qué característica del contrato de seguro hace que las ambigüedades se interpreten a favor del asegurado?", "options": {"A": "Aleatorio", "B": "Unilateral", "C": "De adhesión", "D": "Condicional"}, "correct": "C", "explanation": "El contrato de adhesión → ambigüedad a favor del asegurado.", "tag": "General"}, {"sim": 1, "num": 20, "stem": "Una anualidad variable requiere que el productor tenga:", "options": {"A": "Solo licencia de vida", "B": "Licencia de vida y registro de valores", "C": "Solo registro de valores", "D": "Licencia de salud"}, "correct": "B", "explanation": "Variable = security → licencia de vida + de valores.", "tag": "Annuities"}, {"sim": 1, "num": 21, "stem": "El periodo contestable (incontestability) en Texas es de:", "options": {"A": "6 meses", "B": "1 año", "C": "2 años", "D": "5 años"}, "correct": "C", "explanation": "Periodo contestable = 2 años.", "tag": "Texas / Statutes"}, {"sim": 1, "num": 22, "stem": "Una póliza que falla el 7-pay test se clasifica como:", "options": {"A": "MEC (Modified Endowment Contract)", "B": "Endowment puro", "C": "Term convertible", "D": "Anualidad"}, "correct": "A", "explanation": "Fallar el 7-pay test la convierte en MEC.", "tag": "General"}, {"sim": 1, "num": 23, "stem": "¿Quién dirige el Departamento de Seguros de Texas (TDI)?", "options": {"A": "Una junta electa", "B": "El Comisionado de Seguros, designado por el Gobernador", "C": "El Procurador General", "D": "Un panel federal"}, "correct": "B", "explanation": "El Comisionado (designado por el Gobernador) dirige el TDI.", "tag": "Texas / Statutes"}, {"sim": 1, "num": 24, "stem": "En una Universal Life, la Opción B (beneficio creciente) paga:", "options": {"A": "Solo la suma asegurada nivelada", "B": "La suma asegurada más el valor en efectivo", "C": "Únicamente el valor en efectivo", "D": "El doble en caso de accidente"}, "correct": "B", "explanation": "Opción B = suma asegurada + cash value (crece).", "tag": "General"}, {"sim": 1, "num": 25, "stem": "Ofrecer a un cliente un incentivo de valor no incluido en la póliza para inducir la compra es:", "options": {"A": "Defamation", "B": "Rebating", "C": "Twisting", "D": "Coercion"}, "correct": "B", "explanation": "Incentivo no contractual para inducir compra = rebating (ilegal, ambos).", "tag": "General"}, {"sim": 1, "num": 26, "stem": "El “exclusion ratio” en una anualidad sirve para:", "options": {"A": "Calcular la comisión del agente", "B": "Separar la porción no gravable (base) de la gravable (ganancia)", "C": "Determinar la prima", "D": "Fijar la edad de jubilación"}, "correct": "B", "explanation": "El exclusion ratio separa la base (no gravable) de la ganancia (gravable).", "tag": "Annuities"}, {"sim": 1, "num": 27, "stem": "¿Cuál de los siguientes NO es un elemento esencial de un contrato válido?", "options": {"A": "Consideración", "B": "Propósito legal", "C": "Una póliza impresa y firmada", "D": "Partes competentes"}, "correct": "C", "explanation": "Una póliza impresa y firmada no es un elemento esencial (lo son acuerdo, consideración, partes competentes, propósito legal).", "tag": "General"}, {"sim": 1, "num": 28, "stem": "El children’s term rider típicamente:", "options": {"A": "Cubre solo al hijo mayor", "B": "Cubre a todos los hijos y suele ser convertible sin examen", "C": "Paga el doble por accidente", "D": "Devuelve las primas"}, "correct": "B", "explanation": "El children’s term cubre a todos los hijos, convertible sin examen.", "tag": "Riders"}, {"sim": 1, "num": 29, "stem": "En un plan de beneficio definido (defined benefit), el riesgo de inversión lo asume:", "options": {"A": "El empleado", "B": "El empleador", "C": "El gobierno", "D": "La aseguradora del empleado"}, "correct": "B", "explanation": "En un DB, el riesgo lo asume el empleador.", "tag": "Retirement"}, {"sim": 1, "num": 30, "stem": "El free look para una póliza de vida ordinaria en Texas es de:", "options": {"A": "3 días", "B": "10 días", "C": "30 días", "D": "60 días"}, "correct": "B", "explanation": "Free look de vida en Texas = 10 días.", "tag": "Texas / Statutes"}, {"sim": 1, "num": 31, "stem": "El Accelerated Death Benefit permite al asegurado:", "options": {"A": "Duplicar el beneficio por accidente", "B": "Cobrar en vida parte del beneficio ante enfermedad terminal, reduciendo el monto final", "C": "Recuperar todas las primas", "D": "Comprar más cobertura sin examen"}, "correct": "B", "explanation": "Accelerated DB = cobrar en vida por enfermedad terminal, reduce el beneficio.", "tag": "Riders"}, {"sim": 1, "num": 32, "stem": "Las aportaciones a una Roth IRA son:", "options": {"A": "Siempre deducibles", "B": "Nunca deducibles (after- tax)", "C": "Deducibles solo para mayores de 50", "D": "Parcialmente deducibles"}, "correct": "B", "explanation": "Las aportaciones Roth nunca son deducibles.", "tag": "Retirement"}, {"sim": 1, "num": 33, "stem": "Un intercambio 1035 NO permite ir de:", "options": {"A": "Vida a vida", "B": "Vida a anualidad", "C": "Anualidad a anualidad", "D": "Anualidad a vida"}, "correct": "D", "explanation": "1035 no permite anualidad → vida.", "tag": "Taxation"}, {"sim": 1, "num": 34, "stem": "Si el asegurado declaró mal su edad y pagó una prima insuficiente, la aseguradora:", "options": {"A": "Rescinde la póliza", "B": "Paga el beneficio que la prima habría comprado a la edad correcta", "C": "Paga el beneficio completo sin ajuste", "D": "Devuelve solo las primas"}, "correct": "B", "explanation": "Misstatement of age → ajustan el beneficio (no anulan).", "tag": "General"}, {"sim": 1, "num": 35, "stem": "La cláusula de suicidio en Texas típicamente excluye el pago del beneficio si el suicidio ocurre dentro de:", "options": {"A": "6 meses, y devuelve primas", "B": "1 año, y no paga nada", "C": "2 años, y devuelve las primas", "D": "5 años, y paga la mitad"}, "correct": "C", "explanation": "Suicidio dentro de 2 años → devuelve primas.", "tag": "Texas / Statutes"}, {"sim": 1, "num": 36, "stem": "¿Qué fuente de información NO puede ser la única base para declinar una solicitud?", "options": {"A": "El examen médico", "B": "La información del MIB", "C": "La solicitud", "D": "El APS"}, "correct": "B", "explanation": "No se puede declinar solo por el MIB.", "tag": "General"}, {"sim": 1, "num": 37, "stem": "Una anualidad inmediata de prima única (SPIA):", "options": {"A": "Tiene una larga fase de acumulación", "B": "Comienza a pagar dentro de aproximadamente un año, sin acumulación", "C": "Requiere aportaciones flexibles", "D": "Solo existe en versión variable"}, "correct": "B", "explanation": "SPIA: prima única, paga en ≤1 año, sin acumulación.", "tag": "Annuities"}, {"sim": 1, "num": 38, "stem": "Un agente que induce a un cliente a reemplazar su póliza mediante declaraciones falsas comete:", "options": {"A": "Churning", "B": "Twisting", "C": "Backdating", "D": "Rebating"}, "correct": "B", "explanation": "Reemplazo por declaraciones falsas = twisting.", "tag": "General"}, {"sim": 1, "num": 39, "stem": "El seguro de vida grupal de término del empleador está libre de impuesto para el empleado hasta una cobertura de:", "options": {"A": "$25,000", "B": "$50,000", "C": "$100,000", "D": "$250,000"}, "correct": "B", "explanation": "Group term libre hasta $50,000.", "tag": "Taxation"}, {"sim": 1, "num": 40, "stem": "¿Qué clasificación de riesgo se aplica a un solicitante con riesgo mayor al promedio pero aún asegurable?", "options": {"A": "Preferred", "B": "Standard", "C": "Substandard (rated)", "D": "Declined"}, "correct": "C", "explanation": "Riesgo alto pero asegurable = substandard (rated), no rechazo.", "tag": "General"}, {"sim": 1, "num": 41, "stem": "En la designación “per stirpes”, si un beneficiario muere antes que el asegurado, su porción:", "options": {"A": "Se reparte entre los beneficiarios sobrevivientes", "B": "Baja a sus descendientes", "C": "Va al estate del asegurado", "D": "Se pierde"}, "correct": "B", "explanation": "Per stirpes: la porción baja a los descendientes del fallecido.", "tag": "Beneficiaries"}, {"sim": 1, "num": 42, "stem": "¿Qué documento contiene observaciones del agente que NO se muestran al solicitante?", "options": {"A": "La Parte II médica", "B": "El agent’s report", "C": "El buyer’s guide", "D": "El policy summary"}, "correct": "B", "explanation": "El agent’s report no se muestra al solicitante.", "tag": "General"}, {"sim": 1, "num": 43, "stem": "Está prohibido que un agente use, como argumento de venta, la existencia de:", "options": {"A": "El periodo de gracia", "B": "La Texas Life and Health Insurance Guaranty Association", "C": "El free look", "D": "La cláusula de incontestabilidad"}, "correct": "B", "explanation": "Prohibido usar la Guaranty Association como argumento de venta.", "tag": "General"}, {"sim": 1, "num": 44, "stem": "En una Universal Life con prima flexible, la póliza puede caducar si:", "options": {"A": "El asegurado cumple 65", "B": "El valor en efectivo no cubre el costo del seguro", "C": "Se nombra un beneficiario contingente", "D": "Se paga de más"}, "correct": "B", "explanation": "La UL caduca si el cash value no cubre el cost of insurance.", "tag": "General"}, {"sim": 1, "num": 45, "stem": "Las distribuciones en vida de un MEC antes de los 59½ se gravan:", "options": {"A": "Libres de impuesto", "B": "Ganancia primero (LIFO), gravable, más penalidad del 10%", "C": "Base primero (FIFO), libre", "D": "No se permiten"}, "correct": "B", "explanation": "MEC: distribuciones LIFO (ganancia primero) + 10% si <59½.", "tag": "Taxation"}, {"sim": 1, "num": 46, "stem": "El productor de seguros, legalmente, representa a:", "options": {"A": "El solicitante", "B": "La aseguradora", "C": "El beneficiario", "D": "El TDI"}, "correct": "B", "explanation": "El agente representa a la aseguradora.", "tag": "General"}, {"sim": 1, "num": 47, "stem": "¿Qué tipo de póliza permanente permite pagar las primas en un periodo limitado pero mantiene la cobertura de por vida?", "options": {"A": "Term life", "B": "Limited-pay whole life", "C": "Annual renewable term", "D": "Decreasing term"}, "correct": "B", "explanation": "Limited-pay whole life: pagas menos tiempo, cobertura vitalicia.", "tag": "General"}, {"sim": 1, "num": 48, "stem": "Bajo la Fair Credit Reporting Act, si se toma una acción adversa basada en un consumer report, la aseguradora debe:", "options": {"A": "Ocultar la fuente", "B": "Notificar e identificar la agencia que emitió el reporte", "C": "Pagar una multa al solicitante", "D": "Cancelar la póliza"}, "correct": "B", "explanation": "FCRA: adverse action → notificar y revelar la fuente.", "tag": "Application / Underwriting"}, {"sim": 1, "num": 49, "stem": "¿Qué plan de retiro está diseñado para empleados de escuelas públicas y organizaciones sin fines de lucro?", "options": {"A": "401(k)", "B": "403(b) / TSA", "C": "SEP IRA", "D": "Keogh"}, "correct": "B", "explanation": "403(b)/TSA = escuelas públicas y nonprofits.", "tag": "Retirement"}, {"sim": 1, "num": 50, "stem": "El periodo de gracia para una póliza de vida ordinaria en Texas es de:", "options": {"A": "7 días", "B": "10 días", "C": "31 días", "D": "60 días"}, "correct": "C", "explanation": "Grace period de vida ordinaria en Texas = 31 días.", "tag": "Texas / Statutes"}, {"sim": 2, "num": 1, "stem": "Una empresa compra una póliza sobre la vida de su director financiero, se nombra beneficiaria y paga las primas. El director renuncia dos años después y fallece un año más tarde. La aseguradora:", "options": {"A": "No paga, porque el interés asegurable desapareció", "B": "Paga, porque en vida el interés asegurable solo se exige al emitir", "C": "Paga solo la mitad", "D": "Devuelve las primas"}, "correct": "B", "explanation": "En vida el interés asegurable solo se exige al emitir; la póliza sigue pagadera.", "tag": "General"}, {"sim": 2, "num": 2, "stem": "Un cliente de 45 años retira $12,000 de su IRA tradicional sin que aplique excepción alguna. Las consecuencias fiscales son:", "options": {"A": "Libre de impuesto", "B": "Impuesto ordinario más una penalidad del 10%", "C": "Solo la penalidad del 10%", "D": "Impuesto del 20% de retención únicamente"}, "correct": "B", "explanation": "Retiro temprano de IRA: impuesto ordinario + 10% de penalidad.", "tag": "Retirement"}, {"sim": 2, "num": 3, "stem": "Una mujer designa a sus tres hijos “per stirpes”. Uno fallece antes que ella dejando dos nietos. Al morir ella, los fondos se reparten:", "options": {"A": "Mitad y mitad entre los dos hijos vivos", "B": "Un tercio a cada hijo vivo y el tercio del fallecido entre sus dos nietos", "C": "Partes iguales entre hijos y nietos", "D": "Todo al estate"}, "correct": "B", "explanation": "Per stirpes: la porción del hijo fallecido baja a sus dos nietos (1/6 c/u).", "tag": "Beneficiaries"}, {"sim": 2, "num": 4, "stem": "Un agente deposita la prima de un cliente en su cuenta personal por tres días antes de enviarla a la aseguradora. Esto constituye:", "options": {"A": "Una práctica aceptable", "B": "Commingling, una violación del deber fiduciario", "C": "Rebating", "D": "Field underwriting"}, "correct": "B", "explanation": "Mezclar primas con fondos personales = commingling.", "tag": "General"}, {"sim": 2, "num": 5, "stem": "Un jubilado entrega $250,000 a una aseguradora y comienza a recibir pagos mensuales al mes siguiente. Adquirió una:", "options": {"A": "Anualidad diferida de prima flexible", "B": "Anualidad inmediata de prima única (SPIA)", "C": "Anualidad variable diferida", "D": "Whole life de prima única"}, "correct": "B", "explanation": "Prima única + pagos casi inmediatos = SPIA.", "tag": "General"}, {"sim": 2, "num": 6, "stem": "Un asegurado con beneficiario irrevocable solicita un préstamo sobre el valor en efectivo. La aseguradora:", "options": {"A": "Lo concede sin condiciones", "B": "Lo concede solo con el consentimiento escrito del beneficiario irrevocable", "C": "Requiere una orden judicial", "D": "Lo niega permanentemente"}, "correct": "B", "explanation": "El irrevocable debe consentir por escrito el préstamo.", "tag": "Beneficiaries"}, {"sim": 2, "num": 7, "stem": "Un productor quiere vender una anualidad variable. Además de su licencia de vida, necesita:", "options": {"A": "Una licencia de salud", "B": "Un registro de valores (FINRA/SEC)", "C": "Nada adicional", "D": "Una licencia de propiedad"}, "correct": "B", "explanation": "Variable = security → registro de valores además de la licencia de vida.", "tag": "Annuities"}, {"sim": 2, "num": 8, "stem": "Una aseguradora declina una solicitud basándose en un consumer report. Bajo la FCRA debe:", "options": {"A": "Mantener la fuente en secreto", "B": "Notificar al solicitante e identificar la agencia", "C": "Pagar una indemnización", "D": "Reembolsar el examen médico"}, "correct": "B", "explanation": "FCRA: adverse action → notificar e identificar la agencia.", "tag": "Application / Underwriting"}, {"sim": 2, "num": 9, "stem": "Un asegurado fallece durante el periodo de gracia con una prima impaga. La aseguradora:", "options": {"A": "Niega la reclamación", "B": "Paga el beneficio completo sin descuento", "C": "Paga el beneficio menos la prima vencida", "D": "Devuelve las primas"}, "correct": "C", "explanation": "Durante el grace period se paga el beneficio menos la prima vencida.", "tag": "General"}, {"sim": 2, "num": 10, "stem": "Un empleado de una organización 501(c)(3) quiere diferir salario para el retiro con ventaja fiscal. El plan típico es:", "options": {"A": "SEP IRA", "B": "403(b) / TSA", "C": "Keogh", "D": "Roth IRA exclusivamente"}, "correct": "B", "explanation": "501(c)(3) → 403(b)/TSA.", "tag": "Retirement"}, {"sim": 2, "num": 11, "stem": "Un agente exagera los defectos de la póliza vigente del cliente y oculta los cargos para que la reemplace. Comete:", "options": {"A": "Churning", "B": "Twisting", "C": "Sliding", "D": "Backdating"}, "correct": "B", "explanation": "Reemplazo inducido por engaño = twisting.", "tag": "General"}, {"sim": 2, "num": 12, "stem": "Un cliente quiere la máxima cobertura por 20 años al menor costo, con opción de volverla permanente sin nuevo examen médico. Conviene:", "options": {"A": "Whole life de pago limitado", "B": "Term nivelado convertible", "C": "Anualidad diferida", "D": "Single-premium whole life"}, "correct": "B", "explanation": "Term nivelado convertible: máxima cobertura barata + conversión sin examen.", "tag": "General"}, {"sim": 2, "num": 13, "stem": "El valor en efectivo de una whole life se rescata. El cliente pagó $30,000 en primas (sin dividendos) y el cash value es $42,000. La parte gravable es:", "options": {"A": "$42,000", "B": "$30,000", "C": "$12,000", "D": "$0"}, "correct": "C", "explanation": "Ganancia = 42,000 − 30,000 = $12,000 (solo la ganancia es gravable).", "tag": "Taxation"}, {"sim": 2, "num": 14, "stem": "Un matrimonio adinerado quiere fondos para pagar el impuesto sucesorio que sus hijos enfrentarán cuando ambos padres hayan muerto. La póliza idónea es:", "options": {"A": "Joint life (first-to-die)", "B": "Survivorship (second-to-die)", "C": "Decreasing term", "D": "Annual renewable term"}, "correct": "B", "explanation": "Survivorship (second-to-die) para impuestos sucesorios al segundo deceso.", "tag": "Suitability / Ethics"}, {"sim": 2, "num": 15, "stem": "Bajo la ley de Texas, un agente que vende anualidades debe completar, antes de venderlas, un curso de:", "options": {"A": "8 horas de ética", "B": "4 horas Best Interest (suitability)", "C": "24 horas de LTC", "D": "3 horas de flood"}, "correct": "B", "explanation": "Texas exige el curso Best Interest de 4 horas antes de vender anualidades.", "tag": "Annuities"}, {"sim": 2, "num": 16, "stem": "Una póliza de Universal Life lleva años pagando solo el mínimo; las tasas bajan y el valor en efectivo se agota sin cubrir el costo del seguro. Si el dueño no aporta más, la póliza:", "options": {"A": "Se convierte en whole life", "B": "Caduca (lapse)", "C": "Aumenta su suma asegurada", "D": "Paga dividendos"}, "correct": "B", "explanation": "Si el cash value no cubre el cost of insurance, la UL caduca.", "tag": "General"}, {"sim": 2, "num": 17, "stem": "El beneficiario primario falleció un año antes que el asegurado; hay un contingente vivo. Al morir el asegurado, cobra:", "options": {"A": "El estate del primario", "B": "El beneficiario contingente", "C": "El estate del asegurado", "D": "La aseguradora"}, "correct": "B", "explanation": "El contingente cobra (el primario no sobrevivió).", "tag": "Beneficiaries"}, {"sim": 2, "num": 18, "stem": "Un solicitante paga la prima y recibe un recibo condicional. Muere antes de la emisión, pero el underwriting concluye que era asegurable como se solicitó. La aseguradora:", "options": {"A": "No paga", "B": "Paga el beneficio", "C": "Devuelve solo la prima", "D": "Paga la mitad"}, "correct": "B", "explanation": "Conditional receipt: era asegurable → la aseguradora paga.", "tag": "Application / Underwriting"}, {"sim": 2, "num": 19, "stem": "¿Qué afirmación sobre la Roth IRA es correcta?", "options": {"A": "Sus aportaciones son deducibles", "B": "Exige RMD a los 73", "C": "Sus distribuciones calificadas son libres de impuesto y no hay RMD en vida", "D": "No tiene límites de ingreso para aportar"}, "correct": "C", "explanation": "Roth: distribuciones calificadas tax-free, sin RMD en vida.", "tag": "Retirement"}, {"sim": 2, "num": 20, "stem": "Una aseguradora difunde, sin sustento, que una competidora “está por quebrar” para robarle clientes. Comete:", "options": {"A": "Rebating", "B": "Defamation", "C": "Twisting", "D": "Sliding"}, "correct": "B", "explanation": "Difamar la solvencia de otra aseguradora = defamation.", "tag": "General"}, {"sim": 2, "num": 21, "stem": "En una anualidad, la fase en que el dinero se aporta y crece con impuestos diferidos se llama:", "options": {"A": "Fase de pago", "B": "Fase de acumulación", "C": "Anualización", "D": "Liquidación"}, "correct": "B", "explanation": "Aportar y crecer tax-deferred = fase de acumulación.", "tag": "Taxation"}, {"sim": 2, "num": 22, "stem": "Un asegurado se suicida 18 meses después de emitida la póliza. La aseguradora:", "options": {"A": "Paga el beneficio completo", "B": "No paga nada", "C": "Devuelve las primas pagadas", "D": "Paga la mitad"}, "correct": "C", "explanation": "Suicidio dentro de 2 años → devuelve las primas.", "tag": "General"}, {"sim": 2, "num": 23, "stem": "¿Cuál de los siguientes describe un plan de contribución definida (DC)?", "options": {"A": "Promete un beneficio mensual fijo en el retiro", "B": "Define la aportación; el beneficio depende del desempeño y el riesgo es del empleado", "C": "El empleador asume todo el riesgo de inversión", "D": "Garantiza el monto final al jubilado"}, "correct": "B", "explanation": "DC: aportación definida, beneficio según desempeño, riesgo del empleado.", "tag": "Retirement"}, {"sim": 2, "num": 24, "stem": "Un agente nota un error en una respuesta de la solicitud. Lo correcto es que:", "options": {"A": "El agente lo corrija sin avisar", "B": "El solicitante realice e inicialice la corrección", "C": "El underwriter lo cambie", "D": "Se ignore"}, "correct": "B", "explanation": "Las correcciones las inicializa el solicitante.", "tag": "General"}, {"sim": 2, "num": 25, "stem": "El límite de la Texas Guaranty Association para el valor presente de una anualidad es:", "options": {"A": "$100,000", "B": "$250,000", "C": "$300,000", "D": "$500,000"}, "correct": "B", "explanation": "TLHIGA anualidad = $250,000 (valor presente).", "tag": "Annuities"}, {"sim": 2, "num": 26, "stem": "Una persona quiere recibir un pago mensual fijo de su beneficio de vida hasta que los fondos se agoten. Debe elegir:", "options": {"A": "Fixed period", "B": "Fixed amount", "C": "Interest only", "D": "Life only"}, "correct": "B", "explanation": "Monto fijo hasta agotarse = fixed amount.", "tag": "General"}, {"sim": 2, "num": 27, "stem": "El rider de doble indemnización pagará el beneficio adicional solo si la muerte:", "options": {"A": "Ocurre por cualquier causa", "B": "Es accidental y ocurre dentro del plazo especificado (p. ej., 90 días)", "C": "Es por enfermedad en el primer año", "D": "Ocurre después de los 65"}, "correct": "B", "explanation": "Double indemnity: accidente dentro del plazo (~90 días).", "tag": "Riders"}, {"sim": 2, "num": 28, "stem": "Para reactivar (reinstate) una póliza caducada, NO se requiere:", "options": {"A": "Evidencia de asegurabilidad", "B": "Pago de primas atrasadas con interés", "C": "Comprar una póliza nueva con nueva edad", "D": "Reactivar préstamos pendientes"}, "correct": "C", "explanation": "El reinstatement no implica comprar póliza nueva (conserva la edad original).", "tag": "General"}, {"sim": 2, "num": 29, "stem": "Un cliente quiere cambiar su póliza de vida por una anualidad sin disparar impuesto sobre la ganancia. El mecanismo es:", "options": {"A": "Un MEC", "B": "Un intercambio 1035", "C": "Un rollover de 60 días", "D": "Un backdating"}, "correct": "B", "explanation": "Cambiar vida por anualidad sin impuesto = 1035.", "tag": "Taxation"}, {"sim": 2, "num": 30, "stem": "¿Qué le ocurre al beneficio por muerte cuando hay un préstamo de póliza pendiente al morir el asegurado?", "options": {"A": "Se duplica", "B": "Se reduce por el saldo del préstamo más intereses", "C": "No cambia", "D": "Se anula"}, "correct": "B", "explanation": "El préstamo pendiente reduce el death benefit (saldo + intereses).", "tag": "General"}, {"sim": 2, "num": 31, "stem": "Una aseguradora insolvente es liquidada. ¿Quién queda protegido por la TLHIGA?", "options": {"A": "Cualquier persona en EE. UU.", "B": "Solo residentes de Texas en la fecha de liquidación", "C": "Solo los agentes", "D": "Nadie"}, "correct": "B", "explanation": "TLHIGA protege a residentes de Texas a la fecha de liquidación.", "tag": "Texas / Statutes"}, {"sim": 2, "num": 32, "stem": "Un solicitante practica paracaidismo cada fin de semana. En términos de seguros, esa afición es:", "options": {"A": "Un peril", "B": "Un hazard", "C": "Un riesgo especulativo", "D": "Una pérdida fortuita"}, "correct": "B", "explanation": "La afición que aumenta el riesgo = hazard.", "tag": "General"}, {"sim": 2, "num": 33, "stem": "¿Qué tipo de aseguradora es propiedad de sus asegurados y emite pólizas participantes?", "options": {"A": "Stock", "B": "Mutual", "C": "Reciprocal", "D": "Fraternal"}, "correct": "B", "explanation": "Propiedad de asegurados + pólizas participantes = mutual.", "tag": "General"}, {"sim": 2, "num": 34, "stem": "Una persona de 30 años con impuestos bajos quiere crecimiento libre de impuestos al jubilarse y no verse obligada a retirar dinero. Le conviene una:", "options": {"A": "IRA tradicional", "B": "Roth IRA", "C": "Anualidad inmediata", "D": "Pensión DB"}, "correct": "B", "explanation": "Roth IRA: crecimiento tax-free y sin RMD en vida.", "tag": "Taxation"}, {"sim": 2, "num": 35, "stem": "El productor entrega una póliza cuya prima no se cobró al solicitar. Antes de que la cobertura inicie debe obtener:", "options": {"A": "Una orden judicial", "B": "El pago de la primera prima y una declaración de buena salud", "C": "La firma del beneficiario", "D": "Un examen del MIB"}, "correct": "B", "explanation": "En la entrega sin prima previa: primera prima + statement of good health.", "tag": "General"}, {"sim": 2, "num": 36, "stem": "La penalidad por retiro de fondos de retiro calificados antes de los 59½, salvo excepción, es de:", "options": {"A": "5%", "B": "10%", "C": "20%", "D": "50%"}, "correct": "B", "explanation": "Penalidad por retiro temprano = 10%.", "tag": "Retirement"}, {"sim": 2, "num": 37, "stem": "En una póliza de Universal Life, los componentes que se descuentan del valor en efectivo cada periodo incluyen:", "options": {"A": "Dividendos e intereses acreditados", "B": "El costo del seguro y los cargos de gastos", "C": "Solo la prima bruta", "D": "Las comisiones del beneficiario"}, "correct": "B", "explanation": "De la UL se descuentan costo del seguro y cargos de gastos.", "tag": "General"}, {"sim": 2, "num": 38, "stem": "Una persona quiere una anualidad que participe de las ganancias de un índice bursátil sin arriesgar el capital si el índice cae. Le conviene una:", "options": {"A": "Anualidad variable", "B": "Anualidad indexada (con piso y tope)", "C": "Anualidad inmediata fija", "D": "Whole life"}, "correct": "B", "explanation": "Índice con piso y tope, sin arriesgar capital = anualidad indexada.", "tag": "Annuities"}, {"sim": 2, "num": 39, "stem": "¿Qué práctica consiste en agregar cobertura o cargos a una póliza sin el consentimiento del cliente?", "options": {"A": "Rebating", "B": "Sliding", "C": "Twisting", "D": "Churning"}, "correct": "B", "explanation": "Agregar cargos sin consentimiento = sliding.", "tag": "General"}, {"sim": 2, "num": 40, "stem": "El seguro de vida es un ejemplo de contrato:", "options": {"A": "De indemnización", "B": "Valuado (valued)", "C": "Bilateral", "D": "Especulativo"}, "correct": "B", "explanation": "Vida = contrato valuado (suma fija).", "tag": "General"}, {"sim": 2, "num": 41, "stem": "Una compañía paga las primas de una póliza key person sobre su gerente. El tratamiento fiscal es:", "options": {"A": "Primas deducibles; beneficio gravable", "B": "Primas no deducibles; beneficio generalmente libre de impuesto", "C": "Ambos gravables", "D": "Ambos exentos y deducibles"}, "correct": "B", "explanation": "Key person: primas no deducibles, beneficio libre.", "tag": "Taxation"}, {"sim": 2, "num": 42, "stem": "En el seguro, la tendencia de los riesgos más altos a buscar cobertura en mayor medida que los bajos se llama:", "options": {"A": "Ley de los grandes números", "B": "Selección adversa", "C": "Indemnización", "D": "Mancomunación"}, "correct": "B", "explanation": "Riesgos altos buscan seguro = selección adversa.", "tag": "General"}, {"sim": 2, "num": 43, "stem": "¿Cuál es la opción de pago de anualidad que paga sobre dos vidas y continúa para el sobreviviente?", "options": {"A": "Life only", "B": "Period certain", "C": "Joint and survivor", "D": "Fixed amount"}, "correct": "C", "explanation": "Dos vidas con continuación al sobreviviente = joint and survivor.", "tag": "Annuities"}, {"sim": 2, "num": 44, "stem": "Bajo la regla de transferencia por valor (transfer-for-value), si una póliza se vende por una contraprestación, el beneficio por muerte:", "options": {"A": "Siempre permanece libre de impuesto", "B": "Puede volverse parcialmente gravable, salvo ciertas excepciones", "C": "Se duplica", "D": "Se anula"}, "correct": "B", "explanation": "Transfer-for-value: el beneficio puede volverse gravable (con excepciones).", "tag": "Taxation"}, {"sim": 2, "num": 45, "stem": "Un agente representa a tres aseguradoras distintas. Para hacerlo legalmente necesita:", "options": {"A": "Una sola licencia, sin más", "B": "Un appointment de cada una, notificado al TDI", "C": "Tres licencias separadas", "D": "Aprobación del beneficiario"}, "correct": "B", "explanation": "Necesita un appointment de cada aseguradora, notificado al TDI.", "tag": "General"}, {"sim": 2, "num": 46, "stem": "El dividendo de una póliza participante dejado a  "Preferred", "C": "Substandard", "D": "Declined"}, "correct": "B", "explanation": "Riesgo mejor que el promedio = preferred.", "tag": "General"}, {"sim": 5, "num": 38, "stem": "¿Qué práctica consiste en reemplazar pólizas usando sus valores acumulados solo para generar comisiones?", "options": {"A": "Twisting", "B": "Churning", "C": "Sliding", "D": "Rebating"}, "correct": "B", "explanation": "Reemplazar con valores existentes por comisión = churning.", "tag": "General"}, {"sim": 5, "num": 39, "stem": "Bajo la cláusula “entire contract”, el contrato completo lo forman:", "options": {"A": "Solo la póliza", "B": "La póliza más la solicitud adjunta", "C": "La póliza más el buyer’s guide", "D": "Solo la solicitud"}, "correct": "B", "explanation": "Entire contract = póliza + solicitud adjunta.", "tag": "General"}, {"sim": 5, "num": 40, "stem": "El curso obligatorio que un agente de Texas debe tomar antes de vender anualidades dura:", "options": {"A": "24 horas", "B": "4 horas (Best Interest)", "C": "8 horas de ética", "D": "3 horas de flood"}, "correct": "B", "explanation": "Curso Best Interest de 4 horas.", "tag": "Annuities"}, {"sim": 5, "num": 41, "stem": "¿Qué tipo de seguro de vida no acumula valor en efectivo?", "options": {"A": "Whole life", "B": "Universal life", "C": "Term life", "D": "Variable life"}, "correct": "C", "explanation": "El term life no acumula cash value.", "tag": "General"}, {"sim": 5, "num": 42, "stem": "Una aseguradora toma una acción adversa por un consumer report. Bajo la FCRA debe:", "options": {"A": "Ocultar la fuente", "B": "Notificar al solicitante y revelar la agencia", "C": "Pagar una multa", "D": "Cancelar la póliza"}, "correct": "B", "explanation": "FCRA: notificar y revelar la agencia.", "tag": "Application / Underwriting"}, {"sim": 5, "num": 43, "stem": "El concepto “MIG” (mortalidad sube, interés baja, gastos suben) describe los factores de:", "options": {"A": "El cálculo de la prima", "B": "Las opciones de liquidación", "C": "El un e conflictos de interés", "D": "Garantizar un rendimiento mínimo del 8%"}, "correct": "D", "explanation": "El best interest exige care, disclosure y manejo de conflictos; ningún producto garantiza 8%. A/B/C sí son obligaciones reales del estándar.", "tag": "Suitability / Ethics"}, {"sim": 6, "num": 4, "stem": "Un cliente quiere reemplazar una póliza vigente por una nueva. ¿Cuál es la obligación PRINCIPAL del agente?", "options": {"A": "Ocultar la póliza anterior a la nueva aseguradora", "B": "Proporcionar un aviso de reemplazo y una comparación de las pólizas", "C": "Cancelar la póliza vieja antes de emitir la nueva", "D": "Aumentar su comisión"}, "correct": "B", "explanation": "La obligación central es avisar el reemplazo y comparar las pólizas. A: ocultar viola la regla. C: no se cancela antes de emitir. D: la comisión no es la obligación.", "tag": "General"}, {"sim": 6, "num": 5, "stem": "Al recomendar un producto a un cliente mayor (senior), la MEJOR práctica del agente es:", "options": {"A": "Acelerar la venta para aprovechar la decisión", "B": "Documentar la idoneidad y las razones de la recomendación", "C": "Evitar explicar los cargos", "D": "Omitir la tolerancia al riesgo"}, "correct": "B", "explanation": "Con seniors, documentar idoneidad y razones es la mejor práctica. A/C/D describen exactamente lo que NO se debe hacer.", "tag": "Suitability / Ethics"}, {"sim": 6, "num": 6, "stem": "Un productor recomienda una anualidad variable a un cliente de 82 años, sin experiencia en inversiones, que busca proteger su capital de pérdidas. ¿Cuál es la MEJOR caracterización?", "options": {"A": "Idónea, porque las anualidades variables siempre ganan", "B": "No idónea: el riesgo de mercado contradice el objetivo de proteger el capital", "C": "Idónea, si paga buena comisión", "D": "Requerida por el best interest"}, "correct": "B", "explanation": "El riesgo de mercado de la variable contradice el objetivo de proteger capital: no idónea. A: las variables pueden perder. C: la comisión no determina idoneidad. D: el best interest lo prohíbe.", "tag": "Annuities"}, {"sim": 6, "num": 7, "stem": "El propósito PRINCIPAL del periodo de “free look” es:", "options": {"A": "Dar tiempo a la aseguradora para investigar", "B": "Permitir al cliente revisar la póliza y devolverla para reembolso total si no le satisface", "C": "Extender el periodo contestable", "D": "Aumentar la prima"}, "correct": "B", "explanation": "El free look permite revisar y devolver para reembolso total. A: no es para la aseguradora. C: no extiende la contestabilidad. D: no afecta la prima.", "tag": "Texas / Statutes"}, {"sim": 6, "num": 8, "stem": "La información de idoneidad que un agente debe recabar antes de recomendar una anualidad incluye todo lo siguiente EXCEPTO:", "options": {"A": "Edad e ingresos del cliente", "B": "Objetivos financieros y horizonte de tiempo", "C": "Tolerancia al riesgo y necesidades de liquidez", "D": "El pasatiempo favorito del cliente"}, "correct": "D", "explanation": "Edad, ingresos, objetivos, liquidez y tolerancia al riesgo son idoneidad; el pasatiempo no. A/B/C sí son información de idoneidad.", "tag": "Suitability / Ethics"}, {"sim": 6, "num": 9, "stem": "Antes de poder vender anualidades en Texas, un agente DEBE completar:", "options": {"A": "Un examen de bienes raíces", "B": "Un curso inicial de “Best Interest” de 4 horas", "C": "40 horas de ética", "D": "Nada adicional"}, "correct": "B", "explanation": "Texas exige el curso Best Interest de 4 horas antes de vender anualidades. A/C/D no son requisitos para anualidades.", "tag": "Annuities"}, {"sim": 6, "num": 10, "stem": "Un agente convence a un cliente de reemplazar su póliza usando los valores acumulados de esta, solo para generar una nueva comisión. Esta práctica se conoce como:", "options": {"A": "Suitability", "B": "Churning", "C": "Field underwriting", "D": "Free look"}, "correct": "B", "explanation": "Reemplazar usando los valores existentes por comisión = churning. A: suitability es lo correcto, no esto. C: field underwriting es reunir info. D: free look es otra cosa.", "tag": "General"}, {"sim": 6, "num": 11, "stem": "Al evaluar la idoneidad de una anualidad para un jubilado, ¿cuál es el factor MÁS importante?", "options": {"A": "El color del folleto", "B": "Que el producto se ajuste a sus objetivos, liquidez y tolerancia al riesgo", "C": "La comisión del agente", "D": "La marca de la aseguradora"}, "correct": "B", "explanation": "Lo MÁS importante es el ajuste a objetivos, liquidez y riesgo. A/C/D son irrelevantes para la idoneidad.", "tag": "Suitability / Ethics"}, {"sim": 6, "num": 12, "stem": "Usar una designación engañosa de “especialista en seniors” para ganarse la confianza de un cliente mayor es:", "options": {"A": "Una buena práctica de marketing", "B": "Una práctica prohibida de protección al consumidor", "C": "Requerido por el TDI", "D": "Parte del field underwriting"}, "correct": "B", "explanation": "Una designación engañosa de “senior” es práctica prohibida de protección al consumidor. A: no es buen marketing, es engaño. C: el TDI no lo exige. D: no es field underwriting.", "tag": "Suitability / Ethics"}, {"sim": 6, "num": 13, "stem": "Un agente exagera con información falsa los defectos de la póliza vigente de un cliente para que la reemplace. Esto es:", "options": {"A": "Churning", "B": "Twisting", "C": "Suitability", "D": "Rebating"}, "correct": "B", "explanation": "Inducir el reemplazo con información falsa = twisting. A: churning usa valores, no engaño. C: suitability es lo correcto. D: rebating es un incentivo.", "tag": "General"}, {"sim": 6, "num": 14, "stem": "Bajo el estándar de mejor interés, si el agente recibe una comisión mayor por recomendar cierto producto, DEBE:", "options": {"A": "Ocultarlo", "B": "Divulgar el conflicto de interés", "C": "Cancelar la venta", "D": "Pagar la comisión al cliente"}, "correct": "B", "explanation": "El best interest exige divulgar el conflicto de interés. A: ocultarlo lo viola. C: no obliga a cancelar. D: no se “paga” la comisión al cliente.", "tag": "General"}, {"sim": 6, "num": 15, "stem": "El propósito PRINCIPAL de la regulación de reemplazos es:", "options": {"A": "Aumentar las comisiones del agente", "B": "Proteger al cliente de perder beneficios y de cargos innecesarios al cambiar de póliza", "C": "Eliminar el periodo de gracia", "D": "Acelerar el underwriting"}, "correct": "B", "explanation": "El reemplazo se regula para proteger al cliente de pérdidas y cargos. A: lo contrario. C/D: no es su propósito.", "tag": "Suitability / Ethics"}, {"sim": 6, "num": 16, "stem": "Un agente recomienda a una persona de 75 años colocar todos sus ahorros en una sola anualidad diferida de largo plazo. La MEJOR observación es:", "options": {"A": "Es idóneo concentrar todo en un producto", "B": "No es idóneo: compromete toda su liquidez en un producto de largo plazo", "C": "Reduce su riesgo a cero", "D": "Es obligatorio"}, "correct": "B", "explanation": "Concentrar toda la liquidez en un producto de largo plazo no es idóneo. A: concentrar no es prudente aquí. C: no elimina el riesgo. D: no es obligatorio.", "tag": "Annuities"}, {"sim": 6, "num": 17, "stem": "Un cliente recibe su póliza de vida el lunes y la devuelve ocho días después, sin reclamo. Bajo el free look de Texas, la aseguradora DEBE:", "options": {"A": "Negarse, porque ya pasó el plazo", "B": "Reembolsar la prima pagada (está dentro de los 10 días)", "C": "Cobrar una penalidad", "D": "Convertir la póliza en anualidad"}, "correct": "B", "explanation": "Ocho días está dentro de los 10 del free look: la aseguradora reembolsa. A: no ha pasado el plazo. C: no hay penalidad. D: no se convierte en nada.", "tag": "Texas / Statutes"}, {"sim": 6, "num": 18, "stem": "Una aseguradora retrasa injustificadamente el pago de una reclamación válida más allá del plazo legal. ¿Qué DEBE hacer, generalmente?", "options": {"A": "Nada", "B": "Pagar interés de penalización (18%) y honorarios de abogado", "C": "Cancelar la póliza", "D": "Duplicar el beneficio"}, "correct": "B", "explanation": "Demora injustificada → 18% de interés y honorarios. A: sí hay consecuencia. C/D: no aplican.", "tag": "General"}, {"sim": 6, "num": 19, "stem": "Un asegurado se divorcia y muere meses después sin actualizar a su excónyuge como beneficiario. Bajo la ley de Texas, lo MÁS probable es que:", "options": {"A": "El excónyuge cobre igualmente", "B": "La designación del excónyuge se haya revocado automáticamente (con excepciones)", "C": "La aseguradora decida a quién pagar", "D": "El beneficio se pierda"}, "correct": "B", "explanation": "Divorce revocation (§9.301): el excónyuge se revoca automáticamente. A: por defecto no cobra. C: no decide la aseguradora. D: pasa al contingente/patrimonio, no se “pierde”.", "tag": "Beneficiaries"}, {"sim": 6, "num": 20, "stem": "Un agente con licencia quiere empezar a vender para una nueva aseguradora. ¿Qué se necesita PRIMERO?", "options": {"A": "Un nuevo examen estatal", "B": "Un appointment de esa aseguradora (notificado al TDI)", "C": "La aprobación del cliente", "D": "Una segunda licencia"}, "correct": "B", "explanation": "Primero necesita un appointment de esa aseguradora. A: no repite examen. C: el cliente no autoriza. D: no necesita otra licencia.", "tag": "Texas / Statutes"}, {"sim": 6, "num": 21, "stem": "La aseguradora de un residente de Texas es declarada insolvente. La TLHIGA cubre el beneficio por muerte de su póliza de vida hasta:", "options": {"A": "$100,000", "B": "$250,000", "C": "$300,000", "D": "$500,000"}, "correct": "C", "explanation": "TLHIGA beneficio por muerte = $300,000. A: $100k es cash value. B: $250k es anualidad. D: $500k es salud.", "tag": "Texas / Statutes"}, {"sim": 6, "num": 22, "stem": "Un agente ofrece a un cliente una tarjeta de regalo de $200 por firmar hoy. Respecto del rebating:", "options": {"A": "Solo el agente puede ser sancionado", "B": "Tanto el agente como el cliente que acepta pueden ser sancionados", "C": "Es legal en Texas", "D": "Solo el cliente es sancionado"}, "correct": "B", "explanation": "El rebating sanciona a agente y cliente. A/D: no es solo uno. C: no es legal.", "tag": "Texas / Statutes"}, {"sim": 6, "num": 23, "stem": "Un agente de Texas va a renovar su licencia de vida. DEBE completar, por periodo de 2 años:", "options": {"A": "12 horas, 1 de ética", "B": "24 horas, 3 de ética", "C": "40 horas, 5 de ética", "D": "Ninguna"}, "correct": "B", "explanation": "CE en Texas = 24 horas, 3 de ética. A/C/D no corresponden.", "tag": "Texas / Statutes"}, {"sim": 6, "num": 24, "stem": "Un agente difunde, sin pruebas, que una aseguradora rival “está quebrando” para robarle clientes. Comete:", "options": {"A": "Rebating", "B": "Defamation", "C": "Twisting", "D": "Sliding"}, "correct": "B", "explanation": "Difamar la solvencia de otra aseguradora = defamation. A: rebating es un incentivo. C: twisting es reemplazo por engaño. D: sliding es cargo sin permiso.", "tag": "General"}, {"sim": 6, "num": 25, "stem": "Un agente deposita las primas de sus clientes en su cuenta bancaria personal “por unos días”. Esto es:", "options": {"A": "Aceptable", "B": "Commingling, una violación del deber fiduciario", "C": "Rebating", "D": "Field underwriting"}, "correct": "B", "explanation": "Mezclar primas con fondos personales = commingling. A: no es aceptable. C/D: no aplican.", "tag": "General"}, {"sim": 6, "num": 26, "stem": "Para obtener la licencia de vida de Texas, un candidato DEBE obtener una calificación de al menos:", "options": {"A": "60%", "B": "65%", "C": "70%", "D": "80%"}, "correct": "C", "explanation": "Aprobar la licencia de Texas = 70%. A/B/D no son el umbral.", "tag": "Texas / Statutes"}, {"sim": 6, "num": 27, "stem": "Un cliente invirtió $100,000 en una anualidad cuyo rendimiento esperado total es $200,000. ¿Qué porcentaje de cada pago está excluido de impuestos (exclusion ratio)?", "options": {"A": "25%", "B": "50%", "C": "75%", "D": "100%"}, "correct": "B", "explanation": "Exclusion ratio = inversión ÷ rendimiento esperado = 100,000 ÷ 200,000 = 50%. Las demás no resultan de esa razón.", "tag": "Taxation"}, {"sim": 6, "num": 28, "stem": "Un dueño rescata su póliza. Pagó $25,000 en primas (sin dividendos) y el valor en efectivo es $40,000. ¿Cuánto es gravable?", "options": {"A": "$40,000", "B": "$25,000", "C": "$15,000", "D": "$0"}, "correct": "C", "explanation": "Gravable = valor en efectivo − base = 40,000 − 25,000 = $15,000. A: gravar todo ignora la base. B: es la base. D: sí hay ganancia.", "tag": "Taxation"}, {"sim": 6, "num": 29, "stem": "Un empleador proporciona $90,000 de seguro de vida grupal de término a un empleado. ¿Sobre qué monto se calcula el ingreso imputado (gravable)?", "options": {"A": "$90,000", "B": "$50,000", "C": "$40,000", "D": "$0"}, "correct": "C", "explanation": "Libre hasta $50,000; el ingreso imputado se calcula sobre el exceso de $40,000. A: no todo. B: ese tramo es libre. D: sí hay exceso.", "tag": "Taxation"}, {"sim": 6, "num": 30, "stem": "Un titular de IRA tradicional cumple los requisitos de edad bajo las reglas vigentes. ¿A qué edad DEBE comenzar a tomar sus RMD?", "options": {"A": "59½", "B": "70½", "C": "72", "D": "73"}, "correct": "D", "explanation": "RMD a los 73 (SECURE 2.0). A: penalidad temprana. B: regla antigua. C: ya no aplica.", "tag": "Retirement"}, {"sim": 6, "num": 31, "stem": "Un beneficiario elige recibir $1,000 mensuales hasta agotar el beneficio. ¿Qué opción de liquidación eligió, y qué variable se determina?", "options": {"A": "Fixed period; se determina el monto", "B": "Fixed amount; se determina el tiempo (cuánto durará)", "C": "Interest only; se retiene el capital", "D": "Life only; de por vida"}, "correct": "B", "explanation": "Monto fijo hasta agotarse = fixed amount; se determina el tiempo. A: el fixed period fija el tiempo y calcula el monto. C: retiene capital. D: es de por vida.", "tag": "Beneficiaries"}, {"sim": 6, "num": 32, "stem": "Un cliente pagó $30,000 en primas y recibió $5,000 en dividendos. ¿Cuál es su base de costo (cost basis)?", "options": {"A": "$35,000", "B": "$30,000", "C": "$25,000", "D": "$5,000"}, "correct": "C", "explanation": "Base = primas − dividendos = 30,000 − 5,000 = $25,000. A: suma en vez de restar. B: ignora los dividendos. D: solo los dividendos.", "tag": "Taxation"}, {"sim": 6, "num": 33, "stem": "Una póliza tiene un beneficio por muerte de $250,000 y un préstamo pendiente de $20,000 más intereses al morir el asegurado. El beneficiario recibe:", "options": {"A": "$250,000", "B": "$270,000", "C": "$250,000 menos el préstamo y sus intereses", "D": "$0"}, "correct": "C", "explanation": "El préstamo pendiente reduce el beneficio por el saldo más intereses. A: ignora el préstamo. B: no se suma. D: no se anula.", "tag": "Beneficiaries"}, {"sim": 6, "num": 34, "stem": "¿Cuál de los siguientes intercambios 1035 puede hacerse SIN reconocer ganancia gravable?", "options": {"A": "Anualidad a vida", "B": "Vida a anualidad", "C": "Anualidad a salud", "D": "Salud a vida"}, "correct": "B", "explanation": "1035 permite vida → anualidad sin impuesto. A: anualidad→vida NO. C/D: salud no participa así.", "tag": "Taxation"}, {"sim": 6, "num": 35, "stem": "Un cliente menor de 59½ retira $10,000 de ganancia de una anualidad no calificada. ¿Cómo se grava bajo LIFO?", "options": {"A": "Libre de impuesto", "B": "Como ganancia gravable, más penalidad del 10%", "C": "Como retorno de base, libre", "D": "No está permitido"}, "correct": "B", "explanation": "Anualidad no calificada: ganancia LIFO gravable + 10% si <59½. A/C: la ganancia sí se grava. D: sí está permitido.", "tag": "Annuities"}, {"sim": 6, "num": 36, "stem": "Un cliente de 50 años retira fondos de un plan calificado sin excepción aplicable. Además del impuesto ordinario, paga una penalidad de:", "options": {"A": "5%", "B": "10%", "C": "20%", "D": "50%"}, "correct": "B", "explanation": "Retiro temprano de plan calificado = penalidad del 10%. A/C/D no son la penalidad.", "tag": "Taxation"}, {"sim": 6, "num": 37, "stem": "Un cliente quiere una Universal Life cuyo beneficio por muerte CREZCA junto con el valor en efectivo. ¿Qué opción es la MÁS apropiada?", "options": {"A": "Opción A (nivelada)", "B": "Opción B (suma asegurada + valor en efectivo)", "C": "Decreasing term", "D": "Prima única"}, "correct": "B", "explanation": "DB creciente con el cash value = Opción B. A: la A es nivelada. C/D: no aplican.", "tag": "General"}, {"sim": 6, "num": 38, "stem": "El asegurado muere. El beneficiario primario había fallecido antes; hay un contingente vivo. ¿Quién cobra PRIMERO?", "options": {"A": "El estate del primario", "B": "El beneficiario contingente", "C": "El estate del asegurado", "D": "La aseguradora"}, "correct": "B", "explanation": "Cobra el contingente (el primario no sobrevivió). A/C: no aplican si hay contingente vivo. D: no cobra la aseguradora.", "tag": "Beneficiaries"}, {"sim": 6, "num": 39, "stem": "En el proceso de solicitud, ¿quién actúa como el PRIMER underwriter?", "options": {"A": "El actuario", "B": "El agente (field underwriting)", "C": "El MIB", "D": "El reasegurador"}, "correct": "B", "explanation": "El agente es el primer underwriter (field underwriting). A/C/D actúan después o no evalúan al inicio.", "tag": "General"}, {"sim": 6, "num": 40, "stem": "Un cliente paga una prima única grande y la póliza falla el 7-pay test. La consecuencia PRINCIPAL es:", "options": {"A": "Pierde el beneficio por muerte", "B": "Se clasifica como MEC y sus distribuciones en vida se gravan LIFO (+10% si <59½)", "C": "Se convierte en término", "D": "Sube la prima"}, "correct": "B", "explanation": "Fallar el 7-pay test → MEC, distribuciones LIFO (+10% si <59½). A: conserva el DB. C/D: no ocurre eso.", "tag": "General"}, {"sim": 6, "num": 41, "stem": "Un asegurado con enfermedad terminal quiere acceder en vida a parte de su beneficio. ¿Qué rider lo permite, reduciendo el beneficio final?", "options": {"A": "Accidental Death Benefit", "B": "Accelerated Death Benefit", "C": "Waiver of Premium", "D": "Return of Premium"}, "correct": "B", "explanation": "Cobrar en vida por enfermedad terminal, reduciendo el DB = Accelerated Death Benefit. A: es por accidente. C: exime primas. D: devuelve primas.", "tag": "Riders"}, {"sim": 6, "num": 42, "stem": "El propósito PRINCIPAL de una anualidad es proteger contra el riesgo de:", "options": {"A": "Morir prematuramente", "B": "Vivir más de lo que duran los ahorros (longevidad)", "C": "Discapacidad", "D": "Incendio"}, "correct": "B", "explanation": "La anualidad protege contra vivir demasiado (longevidad). A: eso es el seguro de vida. C/D: no son su propósito.", "tag": "Annuities"}, {"sim": 6, "num": 43, "stem": "Un solicitante paga la prima y recibe un recibo condicional. Muere antes de la emisión, pero era asegurable como se solicitó. La aseguradora MÁS probablemente:", "options": {"A": "No paga", "B": "Paga el beneficio", "C": "Devuelve solo la prima", "D": "Paga la mitad"}, "correct": "B", "explanation": "Conditional receipt + asegurable = paga. A: sí paga si era asegurable. C/D: no corresponde.", "tag": "General"}, {"sim": 6, "num": 44, "stem": "Un agente quiere recomendar una anualidad variable. Además de su licencia de vida, DEBE tener:", "options": {"A": "Una licencia de salud", "B": "Un registro de valores (securities)", "C": "Nada", "D": "Una licencia de propiedad"}, "correct": "B", "explanation": "Variable = security → registro de valores además de la licencia de vida. A/D: otras líneas. C: sí requiere algo más.", "tag": "Annuities"}, {"sim": 6, "num": 45, "stem": "Un asegurado queda totalmente discapacitado y no puede trabajar. El rider que MÁS le conviene haber adquirido es:", "options": {"A": "Accidental Death Benefit", "B": "Waiver of Premium", "C": "Guaranteed Insurability", "D": "Return of Premium"}, "correct": "B", "explanation": "Discapacidad total → Waiver of Premium. A: por muerte accidental. C: compra futura. D: devuelve primas.", "tag": "Riders"}, {"sim": 6, "num": 46, "stem": "Tras la muerte se descubre que el asegurado declaró una edad menor y pagó de menos. La aseguradora MÁS probablemente:", "options": {"A": "Anula la póliza", "B": "Ajusta el beneficio a lo que la prima habría comprado a la edad correcta", "C": "Paga el doble", "D": "Devuelve las primas"}, "correct": "B", "explanation": "Misstatement of age → ajustan el beneficio. A: no anulan. C/D: no aplican.", "tag": "General"}, {"sim": 6, "num": 47, "stem": "Una aseguradora descubre, a los 3 años de emitida la póliza, un error no fraudulento en la solicitud. PUEDE:", "options": {"A": "Anular la póliza", "B": "No anularla: ya pasó el periodo contestable de 2 años", "C": "Duplicar la prima", "D": "Cancelar sin pago"}, "correct": "B", "explanation": "A los 3 años (>2) ya no pueden anular por la solicitud (incontestability). A/D: no pueden. C: no aplica.", "tag": "General"}, {"sim": 6, "num": 48, "stem": "Una madre designa a sus 3 hijos “per stirpes”. Un hijo muere antes que ella, dejando 2 nietos. Al morir la madre, ¿qué reciben esos 2 nietos EN CONJUNTO?", "options": {"A": "Nada", "B": "Un tercio del beneficio (la porción del hijo fallecido)", "C": "La mitad", "D": "Todo"}, "correct": "B", "explanation": "Per stirpes: los 2 nietos comparten la porción de su padre (un tercio). A: sí reciben. C/D: no es la mitad ni todo.", "tag": "Beneficiaries"}, {"sim": 6, "num": 49, "stem": "Un agente recomienda reemplazar una anualidad por otra con mayores cargos y sin beneficio claro para el cliente, solo por comisión. Esto viola principalmente:", "options": {"A": "El estándar de idoneidad / mejor interés", "B": "Ninguna regla", "C": "El periodo de gracia", "D": "El free look"}, "correct": "A", "explanation": "Reemplazo sin beneficio para el cliente, solo por comisión, viola la idoneidad/mejor interés. B: sí viola una regla. C/D: no son lo relevante.", "tag": "Annuities"}, {"sim": 6, "num": 50, "stem": "Una agente se reúne con un matrimonio de 80 años interesado en una anualidad. ¿Cuál debe ser su PRIMER paso para actuar en el mejor interés de ellos?", "options": {"A": "Cerrar la venta de inmediato", "B": "Recabar y documentar su situación financiera, objetivos y necesidades de liquidez", "C": "Recomendar el producto de mayor comisión", "D": "Omitir la divulgación de cargos"}, "correct": "B", "explanation": "El PRIMER paso es recabar y documentar la situación del matrimonio. A/C/D anteponen la venta o la comisión al cliente.", "tag": "Annuities"}];

function $(id){return document.getElementById(id)}
function shuffleArr(a){a=[...a]; for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]} return a}
function key(q){return q.sim+'-'+q.num}
function loadProg(){try{return JSON.parse(localStorage.getItem('certivoProgress')||'{}')}catch{return {}}}
function saveAttempt(q, correct){let p=loadProg(), k=key(q); p[k]=p[k]||{seen:0,correct:0,wrong:0}; p[k].seen++; if(correct)p[k].correct++; else p[k].wrong++; localStorage.setItem('certivoProgress',JSON.stringify(p)); updateSavedStats()}
function updateSavedStats(){let p=loadProg(), seen=Object.keys(p).length, attempts=Object.values(p).reduce((a,x)=>a+x.seen,0), wrong=Object.entries(p).filter(([k,v])=>v.wrong>0).length; $('savedStats').innerHTML=`<span class="pill">Questions seen: ${seen}/300</span><span class="pill">Attempts: ${attempts}</span><span class="pill">Missed bank: ${wrong}</span>`}
function resetProgress(){if(confirm('Reset saved progress?')){localStorage.removeItem('certivoProgress'); updateSavedStats()}}
function startQuiz(){
  let set=$('set').value, count=+$('count').value; state.mode=$('mode').value;
  let pool=BANK.filter(q=> set==='all' || (set==='missed'? (loadProg()[key(q)]?.wrong>0) : q.sim==+set));
  if(!pool.length){alert('No questions in this set yet.'); return}
  if($('shuffle').value==='yes') pool=shuffleArr(pool);
  state.items=pool.slice(0, Math.min(count,pool.length)); state.idx=0; state.answers={}; state.checked={}; state.optionOrders={};
  for(const q of state.items){let letters=['A','B','C','D']; state.optionOrders[key(q)] = $('shuffle').value==='yes'? shuffleArr(letters): letters}
  $('setup').classList.add('hidden'); $('results').classList.add('hidden'); $('quiz').classList.remove('hidden'); renderQ();
}
function renderQ(){
  let q=state.items[state.idx], k=key(q); $('progress').textContent=`Question ${state.idx+1} of ${state.items.length}`; $('bar').style.width=((state.idx+1)/state.items.length*100)+'%'; $('tag').textContent=q.tag; $('origin').textContent=`Simulator ${q.sim} · Question ${q.num}`; $('stem').textContent=q.stem;
  let selected=state.answers[k], checked=state.checked[k]; $('options').innerHTML='';
  state.optionOrders[k].forEach((origLetter,idx)=>{let display=String.fromCharCode(65+idx); let b=document.createElement('button'); b.className='opt'; b.textContent=display+') '+q.options[origLetter]; b.onclick=()=>selectOpt(origLetter); if(selected===origLetter)b.classList.add('selected'); if(checked){ if(origLetter===q.correct)b.classList.add('correct'); else if(selected===origLetter)b.classList.add('wrong'); } $('options').appendChild(b)});
  if(checked) showFeedback(q); else $('feedback').classList.add('hidden');
  $('checkBtn').style.display=state.mode==='practice'?'inline-block':'none'; $('nextBtn').textContent=state.idx===state.items.length-1?'Finish':'Next';
}
function selectOpt(letter){let q=state.items[state.idx], k=key(q); if(state.checked[k]&&state.mode==='practice')return; state.answers[k]=letter; renderQ();}
function checkAnswer(){let q=state.items[state.idx], k=key(q); if(!state.answers[k]){alert('Choose an answer first.');return} if(!state.checked[k]){state.checked[k]=true; saveAttempt(q,state.answers[k]===q.correct)} renderQ();}
function showFeedback(q){let k=key(q), ans=state.answers[k], ok=ans===q.correct; let box=$('feedback'); box.classList.remove('hidden'); box.innerHTML=`<b>${ok?'✅ Correct':'❌ Incorrect'} · Correct answer: ${q.correct}</b><div>${q.explanation}</div>`}
function nextQ(){ if(state.mode==='practice'&&!state.checked[key(state.items[state.idx])]){checkAnswer(); return} if(state.idx<state.items.length-1){state.idx++; renderQ()} else finishQuiz()}
function prevQ(){if(state.idx>0){state.idx--; renderQ()}}
function finishQuiz(){
  if(state.mode==='exam'){for(const q of state.items){let k=key(q); if(state.answers[k]&&!state.checked[k]){state.checked[k]=true; saveAttempt(q,state.answers[k]===q.correct)}}}
  let total=state.items.length, correct=state.items.filter(q=>state.answers[key(q)]===q.correct).length, pct=Math.round(correct/total*100);
  let readiness=pct>=90?'Ready with strong margin':pct>=84?'Ready / strong review':pct>=70?'Passing range, review weak areas':'Not ready yet';
  let topics={}; state.items.forEach(q=>{let t=q.tag; topics[t]=topics[t]||{total:0,miss:0}; topics[t].total++; if(state.answers[key(q)]!==q.correct)topics[t].miss++});
  $('quiz').classList.add('hidden'); let res=$('results'); res.classList.remove('hidden');
  res.innerHTML=`<h2>Results</h2><div class="scorebig">${correct}/${total} · ${pct}%</div><div class="pill">${readiness}</div><h3>Weak Areas</h3><div id="topicBox"></div><div class="nav"><button onclick="startQuiz()">Retake with same settings</button><button class="ghost" onclick="backHome()">Home</button></div><h3>Review</h3><div id="review"></div>`;
  $('topicBox').innerHTML=Object.entries(topics).sort((a,b)=>b[1].miss-a[1].miss).map(([t,v])=>`<div class="topicRow"><span>${t}</span><b>${v.miss} missed / ${v.total}</b></div>`).join('');
  $('review').innerHTML=state.items.map((q,i)=>{let k=key(q), ans=state.answers[k]||'—', ok=ans===q.correct; return `<div class="review-item ${ok?'good':'bad'}"><b>${i+1}. Sim ${q.sim} #${q.num} · ${ok?'Correct':'Missed'}</b><div>${q.stem}</div><div class="small">Your answer: ${ans} · Correct: ${q.correct}</div><div>${q.explanation}</div></div>`}).join('');
}
function backHome(){$('results').classList.add('hidden'); $('quiz').classList.add('hidden'); $('setup').classList.remove('hidden'); updateSavedStats()}
function showDashboard(){
 let p=loadProg(); let bySim={}; for(const q of BANK){let rec=p[key(q)]||{seen:0,correct:0,wrong:0}; bySim[q.sim]=bySim[q.sim]||{seen:0,correct:0,wrong:0,total:0}; bySim[q.sim].total++; if(rec.seen)bySim[q.sim].seen++; bySim[q.sim].correct+=rec.correct; bySim[q.sim].wrong+=rec.wrong;}
 $('setup').classList.add('hidden'); $('quiz').classList.add('hidden'); let res=$('results'); res.classList.remove('hidden'); res.innerHTML='<h2>Dashboard</h2>'+Object.entries(bySim).map(([s,v])=>`<div class="topicRow"><span>Simulator ${s}</span><b>Seen ${v.seen}/${v.total} · Correct attempts ${v.correct} · Wrong attempts ${v.wrong}</b></div>`).join('')+'<div class="nav"><button class="ghost" onclick="backHome()">Home</button></div>'
}

window.onerror = function(message, source, lineno, colno, error){
  var banner=document.getElementById('errorBanner');
  if(banner){banner.style.display='block'; banner.textContent='App error: '+message+' (line '+lineno+'). Try opening this file in Safari/Chrome, not the chat preview.';}
};
document.addEventListener('DOMContentLoaded', function(){
  var start=document.getElementById('startBtn');
  var dash=document.getElementById('dashBtn');
  var reset=document.getElementById('resetBtn');
  if(start) start.addEventListener('click', startQuiz);
  if(dash) dash.addEventListener('click', showDashboard);
  if(reset) reset.addEventListener('click', resetProgress);
});
updateSavedStats();
</script>
</body>
</html>
