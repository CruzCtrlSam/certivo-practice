: "Un cliente de 75 años necesita liquidez pronto. Recomendarle una anualidad diferida con cargos de rescate de 12 años:", "options": [{"label": "A", "text": "Es idóneo", "correct": false}, {"label": "B", "text": "No es idóneo (viola la suitability/best interest)", "correct": true}, {"label": "C", "text": "Es obligatorio", "correct": false}, {"label": "D", "text": "Reduce su riesgo", "correct": false}], "explanation": "Atrapar liquidez de un cliente que la necesita no es idóneo.", "id": "es-s3-q20", "topic": "Ley de Texas", "globalNumber": 120}, {"simulator": 3, "number": 21, "stem": "¿Qué tipo de recibo otorga cobertura temporal inmediata, asegurable o no, por un periodo determinado?", "options": [{"label": "A", "text": "Conditional receipt", "correct": false}, {"label": "B", "text": "Binding receipt", "correct": true}, {"label": "C", "text": "Statement of good health", "correct": false}, {"label": "D", "text": "Agent’s report", "correct": false}], "explanation": "Cobertura inmediata temporal, asegurable o no = binding receipt.", "id": "es-s3-q21", "topic": "Ley de Texas", "globalNumber": 121}, {"simulator": 3, "number": 22, "stem": "En una anualidad no calificada, el “exclusion ratio” se calcula como:", "options": [{"label": "A", "text": "Rendimiento esperado ÷ inversión en el contrato", "correct": false}, {"label": "B", "text": "Inversión en el contrato ÷ rendimiento esperado", "correct": true}, {"label": "C", "text": "Prima ÷ comisión", "correct": false}, {"label": "D", "text": "Edad ÷ expectativa de vida", "correct": false}], "explanation": "Exclusion ratio = inversión en el contrato ÷ rendimiento esperado.", "id": "es-s3-q22", "topic": "Impuestos", "globalNumber": 122}, {"simulator": 3, "number": 23, "stem": "Una compañía constituida en Londres, respecto de Texas, es:", "options": [{"label": "A", "text": "Domestic", "correct": false}, {"label": "B", "text": "Foreign", "correct": false}, {"label": "C", "text": "Alien", "correct": true}, {"label": "D", "text": "Admitted automáticamente", "correct": false}], "explanation": "Constituida en otro país = alien.", "id": "es-s3-q23", "topic": "Ley de Texas", "globalNumber": 123}, {"simulator": 3, "number": 24, "stem": "¿Cuál NO es una opción de no confiscación (nonforfeiture)?", "options": [{"label": "A", "text": "Cash surrender value", "correct": false}, {"label": "B", "text": "Reduced paid-up insurance", "correct": false}, {"label": "C", "text": "Extended term insurance", "correct": false}, {"label": "D", "text": "Automatic premium loan", "correct": true}], "explanation": "El APL es una cláusula, no una nonforfeiture option.", "id": "es-s3-q24", "topic": "General", "globalNumber": 124}, {"simulator": 3, "number": 25, "stem": "El límite de aportación a una IRA en 2026 (sin contar catch-up) es de:", "options": [{"label": "A", "text": "$6,000", "correct": false}, {"label": "B", "text": "$7,000", "correct": false}, {"label": "C", "text": "$7,500", "correct": true}, {"label": "D", "text": "$10,000", "correct": false}], "explanation": "IRA 2026 = $7,500 (sin catch-up).", "id": "es-s3-q25", "topic": "Ley de Texas", "globalNumber": 125}, {"simulator": 3, "number": 26, "stem": "Un agente le promete a un cliente devolverle parte de su comisión si firma hoy. Esto es:", "options": [{"label": "A", "text": "Suitability", "correct": false}, {"label": "B", "text": "Rebating (ilegal, ambos sancionables)", "correct": true}, {"label": "C", "text": "Field underwriting", "correct": false}, {"label": "D", "text": "Best interest", "correct": false}], "explanation": "Devolver parte de la comisión = rebating (ilegal, ambos).", "id": "es-s3-q26", "topic": "Retiro", "globalNumber": 126}, {"simulator": 3, "number": 27, "stem": "¿Qué cláusula impide a la aseguradora anular la póliza por errores en la solicitud después de 2 años?", "options": [{"label": "A", "text": "Suicide clause", "correct": false}, {"label": "B", "text": "Incontestability clause", "correct": true}, {"label": "C", "text": "Grace period", "correct": false}, {"label": "D", "text": "Free look", "correct": false}], "explanation": "Tras 2 años: incontestability clause.", "id": "es-s3-q27", "topic": "General", "globalNumber": 127}, {"simulator": 3, "number": 28, "stem": "Una anualidad variable invierte el dinero en:", "options": [{"label": "A", "text": "La cuenta general de la aseguradora", "correct": false}, {"label": "B", "text": "Una cuenta separada con subcuentas", "correct": true}, {"label": "C", "text": "Bonos del gobierno garantizados", "correct": false}, {"label": "D", "text": "Un certificado de depósito", "correct": false}], "explanation": "Variable = cuenta separada con subcuentas.", "id": "es-s3-q28", "topic": "General", "globalNumber": 128}, {"simulator": 3, "number": 29, "stem": "El seguro de vida grupal del empleador es libre de impuesto para el empleado hasta:", "options": [{"label": "A", "text": "$25,000", "correct": false}, {"label": "B", "text": "$50,000", "correct": true}, {"label": "C", "text": "$100,000", "correct": false}, {"label": "D", "text": "Sin límite", "correct": false}], "explanation": "Group term libre hasta $50,000.", "id": "es-s3-q29", "topic": "Retiro", "globalNumber": 129}, {"simulator": 3, "number": 30, "stem": "Un cliente reemplaza su póliza usando los valores acumulados de la existente solo para generar comisión al agente. Esto es:", "options": [{"label": "A", "text": "Twisting", "correct": false}, {"label": "B", "text": "Churning", "correct": true}, {"label": "C", "text": "Backdating", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "Reemplazar con los valores existentes por comisión = churning.", "id": "es-s3-q30", "topic": "Ley de Texas", "globalNumber": 130}, {"simulator": 3, "number": 31, "stem": "El productor que actúa como “primer underwriter” reuniendo y verificando información realiza:", "options": [{"label": "A", "text": "Adverse selection", "correct": false}, {"label": "B", "text": "Field underwriting", "correct": true}, {"label": "C", "text": "Commingling", "correct": false}, {"label": "D", "text": "Rebating", "correct": false}], "explanation": "El agente como primer evaluador = field underwriting.", "id": "es-s3-q31", "topic": "General", "globalNumber": 131}, {"simulator": 3, "number": 32, "stem": "Una pareja de socios quiere fondos al fallecer el primero de ellos para financiar un acuerdo de compra-venta. Les conviene:", "options": [{"label": "A", "text": "Survivorship (second-to-die)", "correct": false}, {"label": "B", "text": "Joint life (first-to-die)", "correct": true}, {"label": "C", "text": "Decreasing term individual", "correct": false}, {"label": "D", "text": "Anualidad inmediata", "correct": false}], "explanation": "Fondos al primer deceso entre socios = joint life (first-to-die).", "id": "es-s3-q32", "topic": "Retiro", "globalNumber": 132}, {"simulator": 3, "number": 33, "stem": "El interés ganado sobre dividendos dejados a acumularse con la aseguradora es:", "options": [{"label": "A", "text": "No gravable", "correct": false}, {"label": "B", "text": "Gravable", "correct": true}, {"label": "C", "text": "Deducible", "correct": false}, {"label": "D", "text": "Un return of premium", "correct": false}], "explanation": "El interés sobre dividendos acumulados es gravable.", "id": "es-s3-q33", "topic": "Anualidades", "globalNumber": 133}, {"simulator": 3, "number": 34, "stem": "En Texas, la regulación de los seguros corresponde principalmente:", "options": [{"label": "A", "text": "Al gobierno federal", "correct": false}, {"label": "B", "text": "A los estados (McCarran-Ferguson)", "correct": true}, {"label": "C", "text": "A la SEC", "correct": false}, {"label": "D", "text": "A la FINRA", "correct": false}], "explanation": "Regulación estatal (McCarran-Ferguson).", "id": "es-s3-q34", "topic": "General", "globalNumber": 134}, {"simulator": 3, "number": 35, "stem": "¿Qué clasificación de riesgo recibe la prima más baja?", "options": [{"label": "A", "text": "Declined", "correct": false}, {"label": "B", "text": "Substandard", "correct": false}, {"label": "C", "text": "Standard", "correct": false}, {"label": "D", "text": "Preferred", "correct": true}], "explanation": "Preferred recibe la prima más baja.", "id": "es-s3-q35", "topic": "Ley de Texas", "globalNumber": 135}, {"simulator": 3, "number": 36, "stem": "Un empleado deja su trabajo y quiere mover su 401(k) a una IRA sin retención del 20%. Debe usar:", "options": [{"label": "A", "text": "Un rollover indirecto de 60 días", "correct": false}, {"label": "B", "text": "Una transferencia directa (trustee-to-trustee)", "correct": true}, {"label": "C", "text": "Un retiro en efectivo", "correct": false}, {"label": "D", "text": "Un préstamo", "correct": false}], "explanation": "Sin retención del 20% = transferencia directa.", "id": "es-s3-q36", "topic": "Impuestos", "globalNumber": 136}, {"simulator": 3, "number": 37, "stem": "El death benefit pagado en suma global por muerte es libre de income tax, pero entra al patrimonio (estate) si el asegurado:", "options": [{"label": "A", "text": "Tenía menos de 65 años", "correct": false}, {"label": "B", "text": "Tenía atributos de propiedad (incidents of ownership)", "correct": true}, {"label": "C", "text": "Pagó primas anuales", "correct": false}, {"label": "D", "text": "Vivía en Texas", "correct": false}], "explanation": "Entra al estate si tenía incidents of ownership.", "id": "es-s3-q37", "topic": "Anualidades", "globalNumber": 137}, {"simulator": 3, "number": 38, "stem": "Una anualidad “life only” deja a los beneficiarios, al morir el annuitant:", "options": [{"label": "A", "text": "Todo el saldo restante", "correct": false}, {"label": "B", "text": "Nada (los pagos cesan)", "correct": true}, {"label": "C", "text": "La mitad", "correct": false}, {"label": "D", "text": "Un reembolso de primas", "correct": false}], "explanation": "Life only: al morir el annuitant, nada a beneficiarios.", "id": "es-s3-q38", "topic": "General", "globalNumber": 138}, {"simulator": 3, "number": 39, "stem": "El recibo condicional paga el beneficio si el solicitante muere antes de la emisión y:", "options": [{"label": "A", "text": "Pagó la prima doble", "correct": false}, {"label": "B", "text": "Era asegurable según el underwriting normal", "correct": true}, {"label": "C", "text": "Tenía un beneficiario irrevocable", "correct": false}, {"label": "D", "text": "Vivía fuera de Texas", "correct": false}], "explanation": "Conditional receipt: paga si era asegurable.", "id": "es-s3-q39", "topic": "Impuestos", "globalNumber": 139}, {"simulator": 3, "number": 40, "stem": "Las aportaciones a un plan calificado son:", "options": [{"label": "A", "text": "After-tax (no deducibles)", "correct": false}, {"label": "B", "text": "Pre-tax (deducibles)", "correct": true}, {"label": "C", "text": "Siempre Roth", "correct": false}, {"label": "D", "text": "No permitidas", "correct": false}], "explanation": "Plan calificado: aportaciones pre-tax (deducibles).", "id": "es-s3-q40", "topic": "General", "globalNumber": 140}, {"simulator": 3, "number": 41, "stem": "¿Qué documento debe entregarse al consumidor para que compare pólizas de vida?", "options": [{"label": "A", "text": "El agent’s report", "correct": false}, {"label": "B", "text": "El buyer’s guide y el policy summary", "correct": true}, {"label": "C", "text": "El MIB", "correct": false}, {"label": "D", "text": "El APS", "correct": false}], "explanation": "Para comparar: buyer’s guide + policy summary.", "id": "es-s3-q41", "topic": "General", "globalNumber": 141}, {"simulator": 3, "number": 42, "stem": "En una designación “per capita”, si un beneficiario muere antes que el asegurado, su porción:", "options": [{"label": "A", "text": "Baja a sus descendientes", "correct": false}, {"label": "B", "text": "Se reparte entre los beneficiarios sobrevivientes", "correct": true}, {"label": "C", "text": "Va al estate del beneficiario fallecido", "correct": false}, {"label": "D", "text": "Se pierde para todos", "correct": false}], "explanation": "Per capita: la porción se reparte entre sobrevivientes.", "id": "es-s3-q42", "topic": "General", "globalNumber": 142}, {"simulator": 3, "number": 43, "stem": "El periodo de gracia de una póliza de vida ordinaria en Texas es de:", "options": [{"label": "A", "text": "7 días", "correct": false}, {"label": "B", "text": "10 días", "correct": false}, {"label": "C", "text": "31 días", "correct": true}, {"label": "D", "text": "90 días", "correct": false}], "explanation": "Grace period de vida en Texas = 31 días.", "id": "es-s3-q43", "topic": "Ley de Texas", "globalNumber": 143}, {"simulator": 3, "number": 44, "stem": "¿Qué rider permite comprar cobertura adicional en fechas futuras sin demostrar buena salud?", "options": [{"label": "A", "text": "Waiver of premium", "correct": false}, {"label": "B", "text": "Guaranteed Insurability", "correct": true}, {"label": "C", "text": "Accidental Death Benefit", "correct": false}, {"label": "D", "text": "Return of Premium", "correct": false}], "explanation": "Comprar más cobertura sin examen = Guaranteed Insurability.", "id": "es-s3-q44", "topic": "General", "globalNumber": 144}, {"simulator": 3, "number": 45, "stem": "Una aseguradora no puede declinar una solicitud basándose únicamente en:", "options": [{"label": "A", "text": "El examen médico", "correct": false}, {"label": "B", "text": "La información codificada del MIB", "correct": true}, {"label": "C", "text": "La Parte II de la solicitud", "correct": false}, {"label": "D", "text": "El APS", "correct": false}], "explanation": "No declinar solo por el MIB.", "id": "es-s3-q45", "topic": "Retiro", "globalNumber": 145}, {"simulator": 3, "number": 46, "stem": "El SIMPLE IRA está disponible para empleadores con un máximo de:", "options": [{"label": "A", "text": "10 empleados", "correct": false}, {"label": "B", "text": "50 empleados", "correct": false}, {"label": "C", "text": "100 empleados", "correct": true}, {"label": "D", "text": "500 empleados", "correct": false}], "explanation": "SIMPLE IRA: hasta 100 empleados.", "id": "es-s3-q46", "topic": "General", "globalNumber": 146}, {"simulator": 3, "number": 47, "stem": "¿Qué característica del contrato significa que solo la aseguradora hace una promesa legalmente exigible?", "options": [{"label": "A", "text": "Aleatorio", "correct": false}, {"label": "B", "text": "Unilateral", "correct": true}, {"label": "C", "text": "De adhesión", "correct": false}, {"label": "D", "text": "Condicional", "correct": false}], "explanation": "Solo la aseguradora promete = unilateral.", "id": "es-s3-q47", "topic": "General", "globalNumber": 147}, {"simulator": 3, "number": 48, "stem": "Bajo la cláusula de desastre común (Uniform Simultaneous Death Act), si el asegurado y el beneficiario primario mueren juntos sin saber el orden:", "options": [{"label": "A", "text": "Cobra el estate del beneficiario", "correct": false}, {"label": "B", "text": "Se presume que el asegurado sobrevivió, y cobra el contingente", "correct": true}, {"label": "C", "text": "No se paga nada", "correct": false}, {"label": "D", "text": "Cobra la aseguradora", "correct": false}], "explanation": "Se presume que el asegurado sobrevivió → cobra el contingente.", "id": "es-s3-q48", "topic": "General", "globalNumber": 148}, {"simulator": 3, "number": 49, "stem": "¿Qué plan de retiro recibe aportaciones tanto del empleado como del empleador, para empresas pequeñas?", "options": [{"label": "A", "text": "SEP IRA", "correct": false}, {"label": "B", "text": "SIMPLE IRA", "correct": true}, {"label": "C", "text": "Pensión DB", "correct": false}, {"label": "D", "text": "Keogh exclusivamente", "correct": false}], "explanation": "Empleado + empleador, empresa pequeña = SIMPLE IRA.", "id": "es-s3-q49", "topic": "Retiro", "globalNumber": 149}, {"simulator": 3, "number": 50, "stem": "En Texas, está prohibido que un agente utilice como argumento de venta:", "options": [{"label": "A", "text": "Las características de la póliza", "correct": false}, {"label": "B", "text": "La existencia de la Guaranty Association", "correct": true}, {"label": "C", "text": "El nombre de la aseguradora", "correct": false}, {"label": "D", "text": "El precio de la prima", "correct": false}], "explanation": "Prohibido usar la Guaranty Association como argumento de venta.", "id": "es-s3-q50", "topic": "Ley de Texas", "globalNumber": 150}, {"simulator": 4, "number": 1, "stem": "Un asegurado transfiere el riesgo puro de muerte a la aseguradora a cambio de una prima. Esto ilustra el concepto de:", "options": [{"label": "A", "text": "Indemnización", "correct": false}, {"label": "B", "text": "Transferencia de riesgo", "correct": true}, {"label": "C", "text": "Riesgo especulativo", "correct": false}, {"label": "D", "text": "Mancomunación", "correct": false}], "explanation": "Transferir el riesgo puro por una prima = transferencia de riesgo.", "id": "es-s4-q1", "topic": "Anualidades", "globalNumber": 151}, {"simulator": 4, "number": 2, "stem": "¿Cuál de las siguientes opciones de dividendo aumenta tanto el valor en efectivo como el beneficio por muerte sin requerir examen médico?", "options": [{"label": "A", "text": "Cash", "correct": false}, {"label": "B", "text": "Reduce premium", "correct": false}, {"label": "C", "text": "Paid-up additions", "correct": true}, {"label": "D", "text": "Accumulate at interest", "correct": false}], "explanation": "Paid-up additions aumenta CV y DB sin examen.", "id": "es-s4-q2", "topic": "General", "globalNumber": 152}, {"simulator": 4, "number": 3, "stem": "Un agente de Texas que vende anualidades, tras el curso inicial Best Interest, debe completar por cada periodo de licencia:", "options": [{"label": "A", "text": "4 horas de anualidades", "correct": false}, {"label": "B", "text": "8 horas de anualidades", "correct": true}, {"label": "C", "text": "Ninguna hora adicional", "correct": false}, {"label": "D", "text": "24 horas de ética", "correct": false}], "explanation": "Tras el curso inicial: 8 horas de anualidades por periodo.", "id": "es-s4-q3", "topic": "Ley de Texas", "globalNumber": 153}, {"simulator": 4, "number": 4, "stem": "Una persona aporta a una anualidad durante 20 años y luego comienza a recibir pagos. El momento en que convierte el valor en pagos —y que es irreversible— se llama:", "options": [{"label": "A", "text": "Acumulación", "correct": false}, {"label": "B", "text": "Anualización", "correct": true}, {"label": "C", "text": "Rescate", "correct": false}, {"label": "D", "text": "Free look", "correct": false}], "explanation": "Convertir el valor en pagos (irreversible) = anualización.", "id": "es-s4-q4", "topic": "General", "globalNumber": 154}, {"simulator": 4, "number": 5, "stem": "En un plan de beneficio definido, lo que está garantizado es:", "options": [{"label": "A", "text": "La aportación anual", "correct": false}, {"label": "B", "text": "El beneficio específico en el retiro", "correct": true}, {"label": "C", "text": "El rendimiento de la inversión", "correct": false}, {"label": "D", "text": "La comisión del agente", "correct": false}], "explanation": "DB garantiza el beneficio específico.", "id": "es-s4-q5", "topic": "Retiro", "globalNumber": 155}, {"simulator": 4, "number": 6, "stem": "¿Qué cantidad de cobertura de death benefit protege la TLHIGA por persona y aseguradora insolvente?", "options": [{"label": "A", "text": "$100,000", "correct": false}, {"label": "B", "text": "$250,000", "correct": false}, {"label": "C", "text": "$300,000", "correct": true}, {"label": "D", "text": "$500,000", "correct": false}], "explanation": "TLHIGA death benefit = $300,000.", "id": "es-s4-q6", "topic": "Ley de Texas", "globalNumber": 156}, {"simulator": 4, "number": 7, "stem": "Un dueño deja de pagar y no elige opción. La aseguradora mantiene la misma suma asegurada durante el mayor tiempo que el cash value permita. Aplicó:", "options": [{"label": "A", "text": "Reduced paid-up", "correct": false}, {"label": "B", "text": "Extended term", "correct": true},
