{id:'s1q1',topic:'annuities',sim:1,q:{en:'An annuity primarily protects the owner against the risk of:',es:'Una anualidad protege principalmente al titular contra el riesgo de:'},a:[{id:'a',en:'Dying prematurely',es:'Morir prematuramente'},{id:'b',en:'Outliving their own savings',es:'Sobrevivir a sus propios ahorros',correct:true},{id:'c',en:'Becoming disabled',es:'Quedar discapacitado'},{id:'d',en:'Property damage',es:'Daños a su propiedad'}],x:{en:'Annuities protect against longevity risk: living longer than your money lasts.',es:'Las anualidades protegen contra el riesgo de longevidad: vivir más tiempo de lo que dura el dinero.'}},
{id:'s1q2',topic:'life insurance',sim:1,q:{en:'In life insurance, insurable interest must exist:',es:'En el seguro de vida, el interés asegurable debe existir:'},a:[{id:'a',en:'Only at the time of death',es:'Solo al momento de la muerte'},{id:'b',en:'Both at issue and at death',es:'Tanto al emitir como al morir'},{id:'c',en:'Only at application/policy issue',es:'Solo al momento de solicitar/emitir la póliza',correct:true},{id:'d',en:'At any time during the policy period',es:'En cualquier momento de la vigencia'}],x:{en:'For life insurance, insurable interest is required at inception, not at death.',es:'En vida, el interés asegurable se exige al inicio de la póliza, no al fallecimiento.'}},
{id:'s1q3',topic:'texas',sim:1,q:{en:'How many continuing education hours, including ethics, does Texas require per 2-year license period?',es:'¿Cuántas horas de educación continua, incluida la ética, exige Texas por periodo de licencia de 2 años?'},a:[{id:'a',en:'20 hours, 2 ethics',es:'20 horas, 2 de ética'},{id:'b',en:'24 hours, 3 ethics',es:'24 horas, 3 de ética',correct:true},{id:'c',en:'30 hours, 5 ethics',es:'30 horas, 5 de ética'},{id:'d',en:'12 hours, 1 ethics',es:'12 horas, 1 de ética'}],x:{en:'Texas requires 24 CE hours per 2-year license period, including 3 hours of ethics.',es:'Texas exige 24 horas de educación continua por periodo de 2 años, incluidas 3 horas de ética.'}},
{id:'s1q4',topic:'policy provisions',sim:1,q:{en:'The nonforfeiture option applied automatically if the owner does not choose another option is usually:',es:'La opción de no confiscación que se aplica automáticamente si el dueño no elige otra suele ser:'},a:[{id:'a',en:'Cash surrender value',es:'Valor de rescate en efectivo'},{id:'b',en:'Reduced paid-up insurance',es:'Seguro saldado reducido'},{id:'c',en:'Extended term insurance',es:'Seguro de término extendido',correct:true},{id:'d',en:'Automatic premium loan',es:'Préstamo automático de prima'}],x:{en:'The automatic nonforfeiture option is commonly extended term: same face amount for a limited period.',es:'La opción automática suele ser término extendido: misma suma asegurada por un periodo limitado.'}},
{id:'s1q5',topic:'retirement',sim:1,q:{en:'At what age must required minimum distributions generally begin for a traditional IRA under current rules?',es:'¿A qué edad deben comenzar generalmente las distribuciones mínimas obligatorias (RMD) de una IRA tradicional bajo las reglas vigentes?'},a:[{id:'a',en:'59½',es:'59½'},{id:'b',en:'65',es:'65'},{id:'c',en:'70½',es:'70½'},{id:'d',en:'73',es:'73',correct:true}],x:{en:'Under SECURE 2.0, RMDs generally begin at age 73.',es:'Bajo SECURE 2.0, los RMD generalmente comienzan a los 73 años.'}},
{id:'s1q6',topic:'texas',sim:1,q:{en:'The Texas Life and Health Insurance Guaranty Association limit for life insurance death benefits is:',es:'El límite de cobertura de la Texas Life and Health Insurance Guaranty Association para el beneficio por muerte de una póliza de vida es:'},a:[{id:'a',en:'$100,000',es:'$100,000'},{id:'b',en:'$250,000',es:'$250,000'},{id:'c',en:'$300,000',es:'$300,000',correct:true},{id:'d',en:'$500,000',es:'$500,000'}],x:{en:'The TLHIGA life insurance death benefit limit is $300,000.',es:'El límite de TLHIGA para beneficio por muerte de vida es $300,000.'}},
{id:'s1q7',topic:'contracts',sim:1,q:{en:'Statements made by an insurance applicant in the application are legally considered:',es:'Las respuestas de un solicitante en la solicitud de seguro se consideran legalmente:'},a:[{id:'a',en:'Absolutely true warranties',es:'Garantías absolutamente verdaderas'},{id:'b',en:'Representations true to the best of their knowledge',es:'Representaciones ciertas a su leal saber y entender',correct:true},{id:'c',en:'Opinions with no legal effect',es:'Opiniones sin efecto legal'},{id:'d',en:'Independent contract clauses',es:'Cláusulas contractuales independientes'}],x:{en:'Application answers are representations, not warranties.',es:'Las respuestas en la solicitud son representaciones, no garantías.'}},
{id:'s1q8',topic:'annuities',sim:1,q:{en:'In a nonqualified annuity, withdrawals that are not annuitized are taxed under which method?',es:'En una anualidad no calificada, los retiros no anualizados se gravan bajo qué método?'},a:[{id:'a',en:'FIFO, basis first',es:'FIFO, primero la base'},{id:'b',en:'LIFO, gain first',es:'LIFO, primero la ganancia',correct:true},{id:'c',en:'Equal pro rata',es:'Prorrateo igual'},{id:'d',en:'Always tax exempt',es:'Exentos siempre'}],x:{en:'Nonqualified annuity withdrawals are generally taxed LIFO: gain comes out first.',es:'Los retiros de anualidades no calificadas generalmente se gravan LIFO: sale primero la ganancia.'}},
{id:'s1q9',topic:'retirement',sim:1,q:{en:'Which retirement plan receives contributions only from the employer?',es:'¿Qué tipo de plan de retiro recibe aportaciones únicamente del empleador?'},a:[{id:'a',en:'SIMPLE IRA',es:'SIMPLE IRA'},{id:'b',en:'Traditional 401(k)',es:'401(k) tradicional'},{id:'c',en:'SEP IRA',es:'SEP IRA',correct:true},{id:'d',en:'Roth IRA',es:'Roth IRA'}],x:{en:'In a SEP IRA, contributions are made by the employer.',es:'En una SEP IRA, las aportaciones las hace el empleador.'}},

{id:'s1q12',topic:'texas',sim:1,q:{en:'Under Texas law, when a marriage is dissolved, the designation of an ex-spouse as beneficiary:',es:'Bajo la ley de Texas, al disolverse un matrimonio, la designación de un excónyuge como beneficiario:'},a:[{id:'a',en:'Always remains valid',es:'Permanece siempre válida'},{id:'b',en:'Is automatically revoked, subject to exceptions',es:'Se revoca automáticamente, salvo excepciones',correct:true},{id:'c',en:'Changes only if the ex-spouse requests it',es:'Solo cambia si el excónyuge lo pide'},{id:'d',en:'Is decided by the insurer',es:'La decide la aseguradora'}],x:{en:'Texas Family Code §9.301 generally revokes an ex-spouse beneficiary designation after divorce, with exceptions.',es:'El Texas Family Code §9.301 generalmente revoca la designación del excónyuge tras el divorcio, con excepciones.'}},
{id:'s1q13',topic:'taxes',sim:1,q:{en:'A life insurance death benefit paid as a lump sum to the beneficiary is, for income tax purposes:',es:'El beneficio por muerte de una póliza de vida pagado en suma global al beneficiario es, para income tax:'},a:[{id:'a',en:'Fully taxable',es:'Totalmente gravable'},{id:'b',en:'Generally income tax free',es:'Generalmente libre de impuesto',correct:true},{id:'c',en:'50% taxable',es:'Gravable en un 50%'},{id:'d',en:'Taxable if it exceeds $100,000',es:'Gravable si excede $100,000'}],x:{en:'Life insurance death benefits paid in a lump sum are generally free of income tax.',es:'Los beneficios por muerte pagados en suma global generalmente están libres de impuesto sobre la renta.'}},
{id:'s1q14',topic:'annuities',sim:1,q:{en:'Which annuity payout option gives the highest monthly income but leaves no balance to beneficiaries?',es:'¿Qué opción de pago de anualidad ofrece el mayor ingreso mensual pero no deja saldo a beneficiarios?'},a:[{id:'a',en:'Life with 10-year period certain',es:'Life with 10-year period certain'},{id:'b',en:'Joint and survivor',es:'Joint and survivor'},{id:'c',en:'Life only (straight life)',es:'Life only (straight life)',correct:true},{id:'d',en:'Cash refund',es:'Cash refund'}],x:{en:'Life only pays the highest income because payments stop at the annuitant’s death.',es:'Life only paga el mayor ingreso porque los pagos cesan al morir el annuitant.'}},
{id:'s1q15',topic:'texas',sim:1,q:{en:'An insurer organized in another U.S. state, relative to Texas, is:',es:'Una compañía aseguradora constituida en otro estado de EE. UU., respecto de Texas, es:'},a:[{id:'a',en:'Domestic',es:'Domestic'},{id:'b',en:'Foreign',es:'Foreign',correct:true},{id:'c',en:'Alien',es:'Alien'},{id:'d',en:'Non-admitted',es:'Non-admitted'}],x:{en:'A company from another U.S. state is foreign. A company from another country is alien.',es:'Una compañía de otro estado de EE. UU. es foreign. Una de otro país es alien.'}},
{id:'s1q16',topic:'riders',sim:1,q:{en:'The waiver of premium rider is activated when the insured:',es:'El rider de exención de prima (waiver of premium) se activa cuando el asegurado:'},a:[{id:'a',en:'Turns 65',es:'Cumple 65 años'},{id:'b',en:'Suffers total disability meeting the policy conditions',es:'Sufre una discapacidad total que cumple las condiciones',correct:true},{id:'c',en:'Changes beneficiary',es:'Cambia de beneficiario'},{id:'d',en:'Takes a loan',es:'Toma un préstamo'}],x:{en:'Waiver of premium waives premiums after qualifying total disability, usually after a waiting period.',es:'La exención de prima elimina el pago de primas tras una discapacidad total calificada, normalmente después de un periodo de espera.'}},
{id:'s1q17',topic:'ethics',sim:1,q:{en:'Mixing client premiums with the agent’s personal funds is called:',es:'El acto de mezclar las primas del cliente con los fondos personales del agente se llama:'},a:[{id:'a',en:'Rebating',es:'Rebating'},{id:'b',en:'Commingling',es:'Commingling',correct:true},{id:'c',en:'Twisting',es:'Twisting'},{id:'d',en:'Sliding',es:'Sliding'}],x:{en:'Commingling client funds with personal funds violates the agent’s fiduciary duty.',es:'Mezclar fondos del cliente con fondos personales viola el deber fiduciario del agente.'}},
{id:'s1q18',topic:'retirement',sim:1,q:{en:'In a qualified plan, what portion of the distribution is taxable as ordinary income?',es:'En un plan calificado, ¿qué porción de la distribución es gravable como ingreso ordinario?'},a:[{id:'a',en:'Only the gain',es:'Solo la ganancia'},{id:'b',en:'The entire amount',es:'La totalidad',correct:true},{id:'c',en:'Half',es:'La mitad'},{id:'d',en:'None',es:'Nada'}],x:{en:'Qualified plan distributions are generally fully taxable because contributions were pre-tax.',es:'Las distribuciones de planes calificados generalmente son totalmente gravables porque las aportaciones fueron pre-tax.'}},
{id:'s1q19',topic:'contracts',sim:1,q:{en:'Which insurance contract characteristic causes ambiguities to be interpreted in favor of the insured?',es:'¿Qué característica del contrato de seguro hace que las ambigüedades se interpreten a favor del asegurado?'},a:[{id:'a',en:'Aleatory',es:'Aleatorio'},{id:'b',en:'Unilateral',es:'Unilateral'},{id:'c',en:'Adhesion',es:'De adhesión',correct:true},{id:'d',en:'Conditional',es:'Condicional'}],x:{en:'Insurance policies are contracts of adhesion; ambiguities are construed against the insurer.',es:'Las pólizas son contratos de adhesión; las ambigüedades se interpretan contra la aseguradora.'}},
{id:'s1q20',topic:'annuities',sim:1,q:{en:'A variable annuity requires the producer to have:',es:'Una anualidad variable requiere que el productor tenga:'},a:[{id:'a',en:'Only a life license',es:'Solo licencia de vida'},{id:'b',en:'Life license and securities registration',es:'Licencia de vida y registro de valores',correct:true},{id:'c',en:'Only securities registration',es:'Solo registro de valores'},{id:'d',en:'Health license',es:'Licencia de salud'}],x:{en:'Variable annuities are securities, so the producer needs a life license plus securities registration.',es:'Las anualidades variables son valores, por lo que se requiere licencia de vida y registro de valores.'}},
{id:'s4q40',topic:'underwriting',sim:4,q:{en:'A “substandard (rated)” risk classification means the applicant:',es:'Una clasificación de riesgo “substandard (rated)” significa que el solicitante:'},a:[{id:'a',en:'Receives the lowest premium',es:'Recibe la prima más baja'},{id:'b',en:'Was rejected',es:'Fue rechazado'},{id:'c',en:'Is accepted with an extra premium/rating',es:'Es aceptado con prima recargada',correct:true},{id:'d',en:'Needs no underwriting',es:'No necesita underwriting'}],x:{en:'Substandard means the applicant is insurable, but at a higher premium or with a rating.',es:'Substandard significa que el solicitante es asegurable, pero con prima recargada o rating.'}},
{id:'s6q1',topic:'best interest',sim:6,q:{en:'A 79-year-old client needs access to her money in less than one year. An agent recommends a deferred annuity with 10-year surrender charges. What is the BEST characterization?',es:'Una clienta de 79 años necesita acceso a su dinero en menos de un año. Un agente le recomienda una anualidad diferida con cargos de rescate a 10 años. ¿Cuál es la MEJOR caracterización?'},a:[{id:'a',en:'Suitable, because the annuity defers taxes',es:'Idónea, porque la anualidad difiere impuestos'},{id:'b',en:'Not suitable: the product restricts liquidity she needs',es:'No idónea: el producto compromete la liquidez que la clienta necesita',correct:true},{id:'c',en:'Suitable, because it has a surrender charge',es:'Idónea, porque ofrece un cargo de rescate'},{id:'d',en:'Required under the best interest standard',es:'Obligatoria bajo el estándar de mejor interés'}],x:{en:'The recommendation conflicts with her liquidity need, so it is not suitable or in her best interest.',es:'La recomendación contradice su necesidad de liquidez, por eso no es idónea ni en su mejor interés.'}},
{id:'s6q2',topic:'best interest',sim:6,q:{en:'Before recommending an annuity to a client, what is the producer’s FIRST action?',es:'Antes de recomendar una anualidad a un cliente, ¿cuál es la PRIMERA acción que debe tomar el productor?'},a:[{id:'a',en:'Collect the premium',es:'Cobrar la prima'},{id:'b',en:'Gather suitability information: financial situation, objectives, liquidity, and risk tolerance',es:'Recabar la información de idoneidad: situación financiera, objetivos, liquidez y tolerancia al riesgo',correct:true},{id:'c',en:'Issue the policy',es:'Emitir la póliza'},{id:'d',en:'Notify the TLHIGA',es:'Notificar a la TLHIGA'}],x:{en:'The recommendation process begins with gathering suitability information.',es:'El proceso de recomendación comienza recabando la información de idoneidad.'}},

function tr(k){return T[lang][k]||k}function letters(n){return ['A','B','C','D'][n]}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function localize(){document.documentElement.lang=lang; for(const id of ['appTitle','subtitle','startTitle','languageLabel','modeLabel','countLabel','proofNote']) document.getElementById(id).textContent=tr(id); document.getElementById('startBtn').textContent=tr('start');document.getElementById('resetBtn').textContent=tr('reset');document.querySelector('#mode option[value=practice]').textContent=tr('practice');document.querySelector('#mode option[value=exam]').textContent=tr('exam');document.getElementById('prevBtn').textContent=tr('previous');document.getElementById('nextBtn').textContent=tr('next');document.getElementById('checkBtn').textContent=tr('check');document.getElementById('finishBtn').textContent=tr('finish');document.getElementById('againBtn').textContent=tr('newPractice');document.getElementById('resultsTitle').textContent=tr('results'); if(!document.getElementById('quiz').classList.contains('hidden')) render();}
function start(){mode=document.getElementById('mode').value; const n=+document.getElementById('count').value; deck=shuffle(bank).slice(0,n).map(q=>({...q,shown:shuffle(q.a)})); i=0; answers={}; selected=null; checked=false; document.getElementById('setup').classList.add('hidden');document.getElementById('results').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');render();}
function render(){const q=deck[i]; selected=answers[q.id]?.selected||null; checked=!!answers[q.id]?.checked; document.getElementById('qCounter').textContent=`${tr('question')} ${i+1} ${tr('of')} ${deck.length}`;document.getElementById('topicPill').textContent=q.topic;document.getElementById('bar').style.width=((i+1)/deck.length*100)+'%';document.getElementById('source').textContent=`Simulator ${q.sim} · ${q.id.toUpperCase()}`;document.getElementById('qtext').textContent=q.q[lang]; const box=document.getElementById('answers');box.innerHTML=''; q.shown.forEach((a,idx)=>{const b=document.createElement('button');b.className='answer';b.textContent=`${letters(idx)}) ${a[lang]}`; if(selected===a.id)b.classList.add('selected'); if(checked){ if(a.correct)b.classList.add('correct'); if(selected===a.id&&!a.correct)b.classList.add('wrong'); } b.onclick=()=>{ if(checked)return; selected=a.id; answers[q.id]={...(answers[q.id]||{}),selected}; render();}; box.appendChild(b);}); const fb=document.getElementById('feedback'); if(checked){const correct=q.shown.find(a=>a.correct); const correctIdx=q.shown.findIndex(a=>a.correct); const ok=selected===correct.id; fb.classList.remove('hidden'); fb.innerHTML=`<strong>${ok?'✅ '+tr('correct'):'❌ '+tr('incorrect')+' · '+tr('correctAnswer')+': '+letters(correctIdx)}</strong><br>${q.x[lang]}`;}else fb.classList.add('hidden'); document.getElementById('prevBtn').disabled=i===0; document.getElementById('nextBtn').disabled=i===deck.length-1;}
function check(){const q=deck[i]; if(!selected){return} answers[q.id]={selected,checked:true}; if(mode==='practice') render(); else { if(i<deck.length-1){i++; render();}else finish();}}
function finish(){let correct=0, missed=[]; deck.forEach(q=>{const ans=answers[q.id]; const cid=q.a.find(a=>a.correct).id; if(ans&&ans.selected===cid) correct++; else missed.push(q);}); document.getElementById('quiz').classList.add('hidden');document.getElementById('results').classList.remove('hidden'); document.getElementById('score').textContent=`${tr('score')}: ${correct}/${deck.length}`; const pct=correct/deck.length; document.getElementById('resultMsg').textContent=pct>=.84?tr('strong'):pct>=.7?tr('pass'):tr('review'); const ml=document.getElementById('missedList'); ml.innerHTML='<h3>'+tr('missed')+'</h3>'+(missed.length?missed.map(q=>`<div class="badge">${q.id.toUpperCase()} · ${q.topic}</div>`).join(''):'<p>'+tr('noneMissed')+'</p>');}
document.getElementById('lang').onchange=e=>{lang=e.target.value;localize()};document.getElementById('startBtn').onclick=start;document.getElementById('resetBtn').onclick=()=>localStorage.clear();document.getElementById('prevBtn').onclick=()=>{if(i>0){i--;render()}};document.getElementById('nextBtn').onclick=()=>{if(i<deck.length-1){i++;render()}};document.getElementById('checkBtn').onclick=check;document.getElementById('finishBtn').onclick=finish;document.getElementById('againBtn').onclick=()=>{document.getElementById('results').classList.add('hidden');document.getElementById('setup').classList.remove('hidden')};localize();
</script>
</body>
</html>
